}


// ══════════════════════════════════════════════════════════
// OP BAR DRAG — move entire op bar, resize left/right
// Op span is stored on op.schedStart / op.schedEnd
// ══════════════════════════════════════════════════════════

// Helper: get/set op schedule span
function _opSpan(woNumber, opSeq) {
  const wo  = state.workOrders.find(w => w.woNumber === woNumber);
  const op  = wo ? wo.operations.find(o => o.opSeq === opSeq) : null;
  if (!op) return null;
  // Derive span from assignments if not explicitly set
  const allA = state.assignments.filter(a => a.woNumber === woNumber && a.opSeq === opSeq);
  const dates = allA.map(a => a.date).sort();
  return {
    op,
    start: op.schedStart || (dates.length ? dates[0]              : null),
    end:   op.schedEnd   || (dates.length ? dates[dates.length-1] : null)
  };
}

// ── Op bar: drag middle = MOVE entire op window ──
function ganttOpBarDragStart(e, woNumber, opSeq) {
  e.stopPropagation();
  ganttDS.type      = 'op-bar';
  ganttDS.woNumber  = woNumber;
  ganttDS.opSeq     = opSeq;
  ganttDS.grabOffsetPx = e.clientX - e.currentTarget.getBoundingClientRect().left;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', 'op-bar');
  e.currentTarget.style.opacity = '0.5';
}
function ganttOpBarDragEnd(e) {
  if (e.currentTarget) e.currentTarget.style.opacity = '';
  ganttDS.type = null;
  _ganttEdgeClear();
}

// ── Op bar: drag LEFT handle = move op start date ──
function ganttOpResizeLeftStart(e, woNumber, opSeq) {
  e.stopPropagation();
  ganttDS.type      = 'op-resize-left';
  ganttDS.woNumber  = woNumber;
  ganttDS.opSeq     = opSeq;
  ganttDS.grabOffsetPx = 0;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', 'op-resize-left');
}

// ── Op bar: drag RIGHT handle = move op end date ──
function ganttOpResizeRightStart(e, woNumber, opSeq) {
  e.stopPropagation();
  ganttDS.type      = 'op-resize-right';
  ganttDS.woNumber  = woNumber;
  ganttDS.opSeq     = opSeq;
  ganttDS.grabOffsetPx = 0;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', 'op-resize-right');
}

// ── Op row: dragover — accept op-bar/resize drags ──
function ganttOpRowOver(e, woNumber, opSeq) {
  if (!ganttDS.type) return;
  if (ganttDS.woNumber !== woNumber || ganttDS.opSeq !== opSeq) return;
  if (!ganttDS.type.startsWith('op-')) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  _ganttEdgeCheck(e.clientX);
}

// ── Op row: drop ──
function ganttOpRowDrop(e, woNumber, opSeq) {
  e.preventDefault();
  _ganttEdgeClear();
  if (!ganttDS.type || !ganttDS.type.startsWith('op-')) return;
  if (ganttDS.woNumber !== woNumber || ganttDS.opSeq !== opSeq) return;

  const span = _opSpan(woNumber, opSeq);
  if (!span) { ganttDS.type = null; return; }
  const { op, start: opStart, end: opEnd } = span;

  const targetDate = _ganttColDate(e.clientX, ganttDS.type === 'op-bar' ? ganttDS.grabOffsetPx : 0);
  if (!targetDate) { ganttDS.type = null; return; }

  if (ganttDS.type === 'op-bar') {
    // Move entire op window + all assignments
    if (!opStart) { ganttDS.type = null; return; }
    const offset = _dayDiff(opStart, targetDate);
    if (offset === 0) { ganttDS.type = null; return; }
    op.schedStart = _addDays(opStart, offset);
    op.schedEnd   = _addDays(opEnd || opStart, offset);
    // Move all assignments for this op
    state.assignments
      .filter(a => a.woNumber === woNumber && a.opSeq === opSeq)
      .forEach(a => { a.date = _addDays(a.date, offset); });
    // Auto-expand WO window
    _autoExpandWO(woNumber, op.schedStart, op.schedEnd);

  } else if (ganttDS.type === 'op-resize-left') {
    // Extend/contract op start date (assignments stay where they are)
    if (opEnd && targetDate > opEnd) { ganttDS.type = null; return; }
    op.schedStart = targetDate;
    _autoExpandWO(woNumber, op.schedStart, null);

  } else if (ganttDS.type === 'op-resize-right') {
    // Extend/contract op end date (assignments stay where they are)
    if (opStart && targetDate < opStart) { ganttDS.type = null; return; }
    op.schedEnd = targetDate;
    _autoExpandWO(woNumber, null, op.schedEnd);
  }

  ganttDS.type = null;
  const scroll = document.getElementById('gantt-scroll');
  const sx = scroll ? scroll.scrollLeft : 0, sy = scroll ? scroll.scrollTop : 0;
  render();
  requestAnimationFrame(() => {
    const s = document.getElementById('gantt-scroll');
    if (s) { s.scrollLeft = sx; s.scrollTop = sy; }
  });
}

// Auto-expand WO scheduledStart/End to cover op dates
function _autoExpandWO(woNumber, newStart, newEnd) {
  const wo = state.workOrders.find(w => w.woNumber === woNumber);
  if (!wo) return;
  const ws = wo.scheduledStart ? wo.scheduledStart.slice(0,10) : null;
  const we = wo.scheduledEnd   ? wo.scheduledEnd.slice(0,10)   : null;
  if (newStart && (!ws || newStart < ws)) wo.scheduledStart = newStart;
  if (newEnd   && (!we || newEnd   > we)) wo.scheduledEnd   = newEnd;
}


// ══════════════════════════════════════════════════════════
// OP HOURS EDITOR POPUP
// Click op bar → popup shows all assignments, editable hours
// ══════════════════════════════════════════════════════════

let _ghpWO = null, _ghpOp = null; // current popup context

// ── GANTT ASSIGN PANEL ─────────────────────────────────────────
let _gapWO = null, _gapOp = null;

function ganttHoursOpen(e, woNumber, opSeq) {
  e.stopPropagation();
  _gapWO = woNumber; _gapOp = opSeq;
  ganttPanelRefresh();
  const panel = document.getElementById('gantt-assign-panel');
  const overlay = document.getElementById('gap-overlay');
  panel.style.display = 'flex';
  overlay.style.display = 'block';
  requestAnimationFrame(() => panel.style.transform = 'translateX(0)');
}

// Keep old alias for any remaining references
function ganttHoursClose() { ganttPanelClose(); }

function ganttPanelClose() {
  const panel = document.getElementById('gantt-assign-panel');
  const overlay = document.getElementById('gap-overlay');
  if (!panel) return;
  panel.style.transform = 'translateX(100%)';
  overlay.style.display = 'none';
  setTimeout(() => { panel.style.display = 'none'; }, 230);
  _gapWO = null; _gapOp = null;
}

function ganttPanelRefresh() {
  if (!_gapWO || !_gapOp) return;
  const wo = state.workOrders.find(w => w.woNumber === _gapWO);
  const op = wo ? wo.operations.find(o => o.opSeq === _gapOp) : null;
  if (!op) return;

  const dates = getWeekDates();
  const ganttDates = getGanttDates();
  const allA = state.assignments.filter(a => a.woNumber === _gapWO && a.opSeq === _gapOp);
  const namedA2 = allA.filter(a => !isPoolAssignment(a));
  const poolA3  = allA.filter(a => isPoolAssignment(a));
  const poolMode = state.resourceMode === 'pool';
  // In pool mode, pool hrs count; in named mode only named hrs count toward coverage
  const coveredH = poolMode
    ? allA.reduce((s,a) => s+a.hours, 0)
    : namedA2.reduce((s,a) => s+a.hours, 0);
  const assignedH = allA.reduce((s, a) => s + a.hours, 0);
  const pct = op.estHours > 0 ? Math.min(100, coveredH / op.estHours * 100) : 0;
  const pctColor = pct >= 100 ? '#28A745' : pct > 0 ? '#F0AD4E' : '#6C757D';
  const cc = typeof gc === 'function' ? gc(op.craft) : { badge: '#666' };

  // Op status
  const hasNamed   = namedA2.length > 0;
  const hasPool    = poolA3.length > 0;
  const isFull     = coveredH >= op.estHours && (hasNamed || (poolMode && hasPool));
  const isPoolOnlyOp = hasPool && !hasNamed && !poolMode; // pool assigned, but site expects named

  // Header
  document.getElementById('gap-title').textContent = _gapWO + '  ·  Op ' + _gapOp;
  document.getElementById('gap-sub').textContent = op.description + '  ·  ' + op.craft;
  const overUnder = coveredH - op.estHours;
  let ouColor, ouLabel;
  if (isPoolOnlyOp) {
    ouColor = '#17A2B8';
    ouLabel = '⚠ Pool assigned — no named employee yet';
  } else if (isFull) {
    ouColor = '#28A745';
    ouLabel = overUnder > 0 ? '+' + overUnder.toFixed(1) + 'h over plan' : '✓ fully covered';
  } else if (coveredH > 0) {
    ouColor = '#F0AD4E';
    ouLabel = overUnder.toFixed(1) + 'h remaining';
  } else {
    ouColor = '#6C757D';
    ouLabel = 'unscheduled — no assignments yet';
  }
  document.getElementById('gap-progress').innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
      <div style="display:flex;flex-direction:column;align-items:center">
        <span style="font-size:15px;font-weight:700;color:var(--text-primary)">${op.estHours}h</span>
        <span style="font-size:8px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px">Est (Plan)</span>
      </div>
      <div style="flex:1;height:6px;background:var(--cap-bar-bg);border-radius:3px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${pctColor};border-radius:3px;transition:width 0.3s"></div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center">
        <span style="font-size:15px;font-weight:700;color:${pctColor}">${assignedH.toFixed(1)}h</span>
        <span style="font-size:8px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px">Assigned</span>
      </div>
    </div>
    <div style="text-align:center;font-size:10px;font-weight:700;color:${ouColor};background:${ouColor}18;border:1px solid ${ouColor}44;border-radius:4px;padding:2px 8px">${ouLabel}</div>`;

  // Current assignments
  const aDiv = document.getElementById('gap-assignments');
  if (allA.length === 0) {
    aDiv.innerHTML = `<div style="font-size:10px;color:var(--text-muted);font-style:italic;padding:4px 0">None yet</div>`;
  } else {
    aDiv.innerHTML = allA.map(a => {
      const isPool = isPoolAssignment(a);
      const dayLoad = !isPool ? getEmpLoad(a.employeeName, a.date) : a.hours;
      const dayAvail = !isPool ? getEmpAvailHours(a.employeeName, a.date) : 0;
      const dayPct   = dayAvail > 0 ? Math.min(100, Math.round(dayLoad / dayAvail * 100)) : 0;
      const dayColor = dayPct >= 100 ? '#EF4444' : dayPct >= 80 ? '#F59E0B' : '#22C55E';
      const displayName = getDisplayName(a);
      const ini = isPool ? '◉' : a.employeeName.split(' ').map(w => w[0] || '').join('').substring(0,2).toUpperCase();
      const avatarBg = isPool ? '#17A2B8' : cc.badge;
      return `<div style="display:flex;align-items:center;gap:8px;padding:5px 8px;background:var(--bg-base);border-radius:5px;margin-bottom:4px;border:1px solid var(--border)">
        <span style="width:26px;height:26px;border-radius:50%;background:${avatarBg};color:#FFF;font-size:${isPool?'12':'9'}px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">${ini}</span>
        <div style="flex:1;min-width:0">
          <div style="font-size:10px;font-weight:600;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${displayName}</div>
          <div style="font-size:9px;color:var(--text-secondary)">
            ${fmtDate(a.date)} · <input type="number" value="${a.hours}" min="0.5" max="24" step="0.5"
              style="width:38px;padding:1px 3px;font-size:9px;border:1px solid var(--border);border-radius:3px;background:var(--bg-card);color:var(--accent);font-weight:700;text-align:center"
              onchange="updateAssignmentHours('${a.id}', parseFloat(this.value))"
              title="Click to edit hours">h
          </div>
          ${isPool ? '' : `<div style="display:flex;align-items:center;gap:4px;margin-top:2px">
            <div style="flex:1;height:3px;background:var(--cap-bar-bg);border-radius:2px;overflow:hidden">
              <div style="height:100%;width:${dayPct}%;background:${dayColor}"></div>
            </div>
            <span style="font-size:8px;color:${dayColor}">${dayLoad.toFixed(1)}/${dayAvail}h</span>
          </div>`}
        </div>
        <button onclick="ganttPanelRemove('${a.id}')" style="background:none;border:none;color:#DC354566;cursor:pointer;font-size:14px;padding:2px 4px;line-height:1">×</button>
      </div>`;
    }).join('');
  }

  // Populate employee dropdown — tiered matching:
  // 1. Exact craft match (primary OR any craft in allCrafts)
  // 2. Same department (from WO, including allDepartments)
  // 3. All employees as last resort
  let matchEmps = state.employees.filter(e =>
    e.craft === op.craft ||
    (e.allCrafts && e.allCrafts.includes(op.craft))
  );
  if (matchEmps.length === 0 && wo) {
    // Fall back to employees in the same department (check allDepartments too)
    matchEmps = state.employees.filter(e =>
      e.department === wo.department ||
      (e.allDepartments && e.allDepartments.includes(wo.department))
    );
  }
  if (matchEmps.length === 0) {
    // Last resort: all employees
    matchEmps = state.employees;
  }
  const empSel = document.getElementById('gap-emp');
  if (poolMode) {
    // Pool mode: show all pools in this dept (including contractors)
    const poolDept = wo ? wo.department : '';
    const deptPools = Object.entries(state.craftConfig).filter(([k,v]) => v.dept === poolDept);
    // Only pull cross-dept pools if the op's craft isn't available in this dept
    const hasCraftInDept = deptPools.some(([k,v]) => v.resource === op.craft);
    const crossPools = hasCraftInDept ? [] : Object.entries(state.craftConfig).filter(([k,v]) => v.dept !== poolDept && v.resource === op.craft);
    const allPools = [...deptPools, ...crossPools];
    empSel.disabled = false;
    empSel.style.opacity = '1';
    empSel.innerHTML = allPools.map(([key, cfg]) => {
      const weekAvail = cfg.headcount * cfg.hoursPerDay * 6;
      const weekSched = getWeekDates().reduce((s,d) => s + getDeptCraftCap(cfg.dept, cfg.resource, d).scheduled, 0);
      const pct2 = weekAvail > 0 ? Math.round(weekSched/weekAvail*100) : 0;
      const isCraft = cfg.resource === op.craft;
      const label = cfg.isContractor ? `🔶 ${cfg.resource} (contractor · ${cfg.headcount}hd · ${pct2}%)` : `◉ ${cfg.resource} (${cfg.headcount}hd · ${pct2}%)`;
      return `<option value="__POOL:${cfg.resource}" ${isCraft && !cfg.isContractor ? 'selected' : ''}>${label}</option>`;
    }).join('');
    if (allPools.length === 0) {
      empSel.innerHTML = `<option value="__POOL:${op.craft}">◉ ${op.craft} Pool</option>`;
    }
  } else {
    empSel.disabled = false;
    empSel.style.opacity = '1';
    empSel.innerHTML = `<option value="">-- Select employee --</option>` +
      `<option value="Pool">◉ Pool (unassigned resource)</option>` +
      matchEmps.map(e => {
        const wkLoad = getEmpWeekLoad(e.name);
        const wkAvail = getEmpWeekAvail(e.name);
        const pct2 = wkAvail > 0 ? Math.round(wkLoad/wkAvail*100) : 0;
        return `<option value="${e.name}">${e.name} (${pct2}% loaded)</option>`;
      }).join('');
  }

  // Populate day checkboxes (week dates)
  const daysDiv = document.getElementById('gap-days');
  const useDates = dates.length > 0 ? dates : ganttDates.slice(0, 6);
  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  daysDiv.innerHTML = useDates.map(d => {
    const dt = new Date(d + 'T00:00:00');
    const dayName = dayNames[dt.getDay()];
    const dayNum = dt.getDate();
    const isWeekend = [0, 6].includes(dt.getDay());
    const inWindow = wo && wo.scheduledStart && wo.scheduledEnd && d >= wo.scheduledStart && d <= wo.scheduledEnd;
    return `<label style="display:flex;align-items:center;gap:3px;padding:3px 6px;background:${inWindow ? 'var(--accent-glow)' : 'var(--bg-base)'};border:1px solid ${isWeekend ? '#F0AD4E44' : 'var(--border)'};border-radius:4px;cursor:pointer;font-size:10px;color:${isWeekend ? '#F0AD4E' : 'var(--text-primary)'}">
      <input type="checkbox" class="gap-day-cb" value="${d}" style="margin:0;width:12px;height:12px">
      <span style="font-weight:600">${dayName}</span><span style="color:var(--text-muted)">${dayNum}</span>
    </label>`;
  }).join('');

  // Default hours = remaining
  const rem = Math.max(0, op.estHours - assignedH);
  document.getElementById('gap-hours').value = rem > 0 ? rem : op.estHours;

  // Resource pool
  ganttPanelRenderPool(op, matchEmps);

  // Emp load update on selection change
  empSel.onchange = () => ganttPanelUpdateEmpLoad();
  // Day checkbox change
  setTimeout(() => {
    document.querySelectorAll('.gap-day-cb').forEach(cb => {
      cb.onchange = () => ganttPanelUpdateEmpLoad();
    });
  }, 10);
  ganttPanelUpdateEmpLoad();
}

function updateGapEmpLoad() { ganttPanelUpdateEmpLoad(); }
function ganttPanelUpdateEmpLoad() {
  const empSelect = document.getElementById('gap-emp');
  const div = document.getElementById('gap-emp-load');
  if (!div || !empSelect) { if(div) div.textContent = ''; return; }

  const selectedEmps = [...empSelect.selectedOptions].map(o => o.value).filter(Boolean);
  const checkedDays = [...document.querySelectorAll('.gap-day-cb:checked')].map(c => c.value);

  if (selectedEmps.length === 0) { div.textContent = ''; return; }

  // Show summary of selected employees × days
  const lines = selectedEmps.slice(0, 3).map(empName => {
    if (empName === 'Pool' || empName.startsWith('__POOL:')) return `◉ Pool`;
    const wkLoad = getEmpWeekLoad(empName);
    const wkAvail = getEmpWeekAvail(empName);
    const pct = wkAvail > 0 ? Math.round(wkLoad/wkAvail*100) : 0;
    const color = pct > 100 ? '#DC3545' : pct > 85 ? '#F0AD4E' : '#28A745';
    return `<span style="color:${color}">${empName.split(',')[0]}: ${wkLoad}h/${wkAvail}h wk (${pct}%)</span>`;
  });
  const extra = selectedEmps.length > 3 ? `<span> +${selectedEmps.length - 3} more</span>` : '';
  const dayCount = checkedDays.length;
  div.innerHTML = lines.join('<br>') + extra +
    (dayCount > 0 ? `<br><span style="color:var(--text-muted)">${selectedEmps.length} emp × ${dayCount} day${dayCount!==1?'s':''}</span>` : '');
}

function ganttPanelAddAssign() {
  if (!_gapWO || !_gapOp) return;
  let empName = document.getElementById('gap-emp').value;
  const date = document.getElementById('gap-date').value;
  const hours = parseFloat(document.getElementById('gap-hours').value) || 0;
  if (!empName || !date || hours <= 0) return;
  // Handle pool selection: if 'Pool' selected (named mode), convert to __POOL:craft
  if (empName === 'Pool') {
    const wo = state.workOrders.find(w => w.woNumber === _gapWO);
    const op = wo ? wo.operations.find(o => o.opSeq === _gapOp) : null;
    empName = '__POOL:' + (op ? op.craft : 'General');
  }
  const status = empName.startsWith('__POOL:') ? 'Allocated' : 'Scheduled';
  state.assignments.push({ id: uid(), woNumber: _gapWO, opSeq: _gapOp, employeeName: empName, date, hours, status });
  adjustWODatesToAssignments(_gapWO);
  render();
  // Re-open panel after render
  setTimeout(() => {
    ganttPanelRefresh();
    const panel = document.getElementById('gantt-assign-panel');
    if (panel) { panel.style.display = 'flex'; panel.style.transform = 'translateX(0)'; }
  }, 50);
}

function ganttPanelAddAssignMulti() {
  if (!_gapWO || !_gapOp) return;
  const empSelect = document.getElementById('gap-emp');
  const selectedEmps = [...empSelect.selectedOptions].map(o => o.value).filter(Boolean);
  const checkedDays = [...document.querySelectorAll('.gap-day-cb:checked')].map(c => c.value);
  const hours = parseFloat(document.getElementById('gap-hours').value) || 0;

  if (selectedEmps.length === 0 || checkedDays.length === 0 || hours <= 0) {
    document.getElementById('gap-assign-summary').textContent = '⚠ Select employee(s), day(s), and hours';
    return;
  }

  let count = 0;
  selectedEmps.forEach(empName => {
    let actualEmp = empName;
    if (empName === 'Pool') {
      const wo = state.workOrders.find(w => w.woNumber === _gapWO);
      const op = wo ? wo.operations.find(o => o.opSeq === _gapOp) : null;
      actualEmp = '__POOL:' + (op ? op.craft : 'General');
    }
    const status = actualEmp.startsWith('__POOL:') ? 'Allocated' : 'Scheduled';
    checkedDays.forEach(date => {
      state.assignments.push({ id: uid(), woNumber: _gapWO, opSeq: _gapOp, employeeName: actualEmp, date, hours, status });
      count++;
    });
  });

  // Adjust WO dates to match assignments
  adjustWODatesToAssignments(_gapWO);

  document.getElementById('gap-assign-summary').textContent = `✓ Created ${count} assignment${count!==1?'s':''} (${selectedEmps.length} emp × ${checkedDays.length} day${checkedDays.length!==1?'s':''})`;
  render();
  setTimeout(() => {
    ganttPanelRefresh();
    const panel = document.getElementById('gantt-assign-panel');
    if (panel) { panel.style.display = 'flex'; panel.style.transform = 'translateX(0)'; }
  }, 50);
}

function ganttPanelRemove(id) {
  state.assignments = state.assignments.filter(a => a.id !== id);
  render();
  setTimeout(() => {
    if (_gapWO) {
      ganttPanelRefresh();
      const panel = document.getElementById('gantt-assign-panel');
      if (panel) { panel.style.display = 'flex'; panel.style.transform = 'translateX(0)'; }
    }
  }, 50);
}

function ganttPanelRenderPool(op, matchEmps) {
  const div = document.getElementById('gap-pool');
  if (!div) return;
  const dates = getWeekDates();
  const cc = typeof gc === 'function' ? gc(op.craft) : { badge: '#666' };
  const poolMode = state.resourceMode === 'pool';

  if (poolMode) {
    // Pool mode: show ALL pools in this department
    const wo2 = state.workOrders.find(w => w.woNumber === _gapWO);
    const dept = wo2 ? wo2.department : '';
    const deptPools = Object.entries(state.craftConfig).filter(([k,v]) => v.dept === dept);
    // Only pull cross-dept pools if the op's craft isn't available in this dept
    const hasCraftInDept = deptPools.some(([k,v]) => v.resource === op.craft);
    const crossPools = hasCraftInDept ? [] : Object.entries(state.craftConfig).filter(([k,v]) => v.dept !== dept && v.resource === op.craft);
    const allPools = [...deptPools, ...crossPools];

    if (allPools.length === 0) {
      div.innerHTML = `<div style="font-size:10px;color:var(--text-muted);font-style:italic">No pools configured for ${dept}</div>`;
      return;
    }

    div.innerHTML = allPools.map(([key, cfg]) => {
      const poolCC = typeof gc === 'function' ? gc(cfg.resource) : { badge: '#666' };
      const weekAvail = cfg.headcount * cfg.hoursPerDay * 6;
      const weekSched = dates.reduce((s,d) => s + getDeptCraftCap(cfg.dept, cfg.resource, d).scheduled, 0);
      const wkPct = weekAvail > 0 ? Math.min(100, weekSched/weekAvail*100) : 0;
      const wkColor = wkPct > 95 ? '#DC3545' : wkPct > 80 ? '#F0AD4E' : '#28A745';
      const isCraftMatch = cfg.resource === op.craft;
      const dayBars = dates.map(d => {
        const cap = getDeptCraftCap(cfg.dept, cfg.resource, d);
        const pct2 = cap.available > 0 ? Math.min(100, cap.scheduled/cap.available*100) : 0;
        const c2 = pct2 > 95 ? '#DC3545' : pct2 > 80 ? '#F0AD4E' : pct2 > 0 ? '#28A745' : 'var(--border)';
        return `<div title="${fmtDate(d)}: ${cap.scheduled.toFixed(1)}/${cap.available}h" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:1px">
          <div style="width:100%;height:18px;background:var(--bg-base);border-radius:2px;overflow:hidden;border:1px solid var(--border)">
            <div style="width:100%;height:${pct2}%;background:${c2};position:relative;top:${100-pct2}%"></div>
          </div>
          <div style="font-size:6px;color:var(--text-muted)">${d.slice(5)}</div>
        </div>`;
      }).join('');

      return `<div style="padding:8px 10px;background:var(--bg-base);border:1px solid ${isCraftMatch ? poolCC.badge+'66' : 'var(--border)'};border-radius:6px;margin-bottom:6px${isCraftMatch ? ';border-left:3px solid '+poolCC.badge : ''}">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <span style="width:24px;height:24px;border-radius:50%;background:${poolCC.badge};color:#FFF;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">${cfg.isContractor ? '🔶' : '◉'}</span>
          <div style="flex:1;min-width:0">
            <div style="font-size:10px;font-weight:600;color:var(--text-primary)">${cfg.resource}${cfg.isContractor ? ' <span style="font-size:8px;background:#F0AD4E;color:white;padding:1px 3px;border-radius:2px">CONTR</span>' : ''}</div>
            <div style="font-size:9px;color:var(--text-secondary)">${cfg.headcount} hd · ${cfg.hoursPerDay}h/day · ${weekAvail}h/wk</div>
          </div>
          <span style="font-size:10px;font-weight:700;color:${wkColor}">${wkPct.toFixed(0)}%</span>
        </div>
        <div style="display:flex;gap:2px;height:22px">${dayBars}</div>
        <div style="margin-top:4px;height:3px;background:var(--cap-bar-bg);border-radius:2px;overflow:hidden">
          <div style="height:100%;width:${wkPct}%;background:${wkColor};border-radius:2px"></div>
        </div>
        <div style="font-size:9px;color:var(--text-secondary);margin-top:4px">${weekSched.toFixed(1)}h / ${weekAvail}h</div>
      </div>`;
    }).join('');
    return;
  }

  // Named mode: show individual employee cards
  if (matchEmps.length === 0) {
    div.innerHTML = `<div style="font-size:10px;color:var(--text-muted);font-style:italic">No ${op.craft} employees in roster</div>`;
    return;
  }

  div.innerHTML = matchEmps.map(emp => {
    const wkLoad = getEmpWeekLoad(emp.name);
    const wkAvail = getEmpWeekAvail(emp.name);
    const wkPct = wkAvail > 0 ? Math.min(100, wkLoad/wkAvail*100) : 0;
    const wkColor = wkPct > 95 ? '#DC3545' : wkPct > 80 ? '#F0AD4E' : '#28A745';
    const ini = emp.name.split(' ').map(w => w[0]||'').join('').substring(0,2).toUpperCase();
    // Daily mini bars
    const dayBars = dates.map(d => {
      const load = getEmpLoad ? getEmpLoad(emp.name, d) : 0;
      const avail = getEmpAvailHours ? getEmpAvailHours(emp.name, d) : emp.hoursPerDay;
      const pct2 = avail > 0 ? Math.min(100, load/avail*100) : 0;
      const c2 = pct2 > 95 ? '#DC3545' : pct2 > 80 ? '#F0AD4E' : pct2 > 0 ? '#28A745' : 'var(--border)';
      const isOff = avail === 0;
      return `<div title="${fmtDate(d)}: ${load}/${avail}h" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:1px">
        <div style="width:100%;height:18px;background:var(--bg-base);border-radius:2px;overflow:hidden;border:1px solid var(--border);${isOff?'opacity:0.3':''}">
          <div style="width:100%;height:${pct2}%;background:${c2};position:relative;top:${100-pct2}%"></div>
        </div>
        <div style="font-size:6px;color:var(--text-muted)">${d.slice(5)}</div>
      </div>`;
    }).join('');

    return `<div style="padding:8px 10px;background:var(--bg-base);border:1px solid var(--border);border-radius:6px;margin-bottom:6px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <span style="width:24px;height:24px;border-radius:50%;background:${cc.badge};color:#FFF;font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">${ini}</span>
        <div style="flex:1;min-width:0">
          <div style="font-size:10px;font-weight:600;color:var(--text-primary)">${emp.name}</div>
          <div style="font-size:9px;color:var(--text-secondary)">${emp.craft} · ${emp.department}</div>
        </div>
        <span style="font-size:10px;font-weight:700;color:${wkColor}">${wkPct.toFixed(0)}%</span>
      </div>
      <div style="display:flex;gap:2px;height:22px">${dayBars}</div>
      <div style="margin-top:4px;height:3px;background:var(--cap-bar-bg);border-radius:2px;overflow:hidden">
        <div style="height:100%;width:${wkPct}%;background:${wkColor};border-radius:2px"></div>
      </div>
    </div>`;
  }).join('');
}

// GANTT DEPENDENCY LINES
// Draws SVG arrows between op bars using data-dep-node attrs
// Respects state.showDepLines toggle (same as schedule board)
// ══════════════════════════════════════════════════════════
function drawGanttDepLines() {
  const svg = document.getElementById('gantt-dep-svg');
  if (!svg) return;

  if (!state.showDepLines || !state.showDependencies) {
    svg.innerHTML = '';
    return;
  }

  const inner = document.getElementById('gantt-grid-inner');
  if (!inner) return;

  // Size the SVG to cover the full scrollable content
  const W = inner.scrollWidth, H = inner.scrollHeight;
  svg.setAttribute('width', W);
  svg.setAttribute('height', H);
  svg.style.width  = W + 'px';
  svg.style.height = H + 'px';

  // Use offsetLeft/offsetTop relative to gantt-grid-inner (same coordinate space as SVG)
  // The op bars use position:absolute with left/top in px from inner's top-left.
  // getBoundingClientRect() gives viewport coords which change on scroll — avoid it.
  const nodes = inner.querySelectorAll('[data-dep-node]');
  const posMap = {};

  function offsetFromInner(el) {
    let x = 0, y = 0;
    let cur = el;
    while (cur && cur !== inner) {
      x += cur.offsetLeft || 0;
      y += cur.offsetTop  || 0;
      cur = cur.offsetParent;
    }
    return { x, y };
  }

  nodes.forEach(el => {
    const key = el.getAttribute('data-dep-node');
    const off = offsetFromInner(el);
    posMap[key] = {
      x: off.x,
      y: off.y,
      w: el.offsetWidth,
      h: el.offsetHeight
    };
  });

  const arrowId = 'gdep';
  let lines = `<defs>
    <marker id="${arrowId}-ok"        markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#28A745"/></marker>
    <marker id="${arrowId}-violation" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#DC3545"/></marker>
    <marker id="${arrowId}-warn"      markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#F0AD4E"/></marker>
  </defs>`;

  state.workOrders.forEach(wo => {
    // Only draw for expanded WOs (op bars are only in DOM when expanded)
    if (!state.ganttExpanded.has(wo.woNumber)) return;
    wo.operations.forEach(op => {
      if (!op.dependencies || !op.dependencies.length) return;
      const toKey  = `${wo.woNumber}:${op.opSeq}`;
      const toPos  = posMap[toKey];
      if (!toPos) return;

      op.dependencies.forEach(depSeq => {
        const fromKey = `${wo.woNumber}:${depSeq}`;
        const fromPos = posMap[fromKey];
        if (!fromPos) return;

        // Color: red = violation (successor starts before predecessor ends)
        //        amber = same-day warning, green = OK
        const toStart   = op.schedStart   || (state.assignments.find(a=>a.woNumber===wo.woNumber&&a.opSeq===op.opSeq)||{}).date;
        const fromEnd   = wo.operations.find(o=>o.opSeq===depSeq)?.schedEnd
                          || (state.assignments.filter(a=>a.woNumber===wo.woNumber&&a.opSeq===depSeq).map(a=>a.date).sort().slice(-1)[0]);
        let cls = 'ok';
        if (toStart && fromEnd) {
          if (toStart < fromEnd) cls = 'violation';
          else if (toStart === fromEnd) cls = 'warn';
        }

        // Arrow from right-center of predecessor → left-center of successor
        const x1 = fromPos.x + fromPos.w;
        const y1 = fromPos.y + fromPos.h / 2;
        const x2 = toPos.x;
        const y2 = toPos.y + toPos.h / 2;

        if (Math.abs(x2-x1) < 2 && Math.abs(y2-y1) < 2) return;

        // Elbow routing: go right, then vertical, then into target
        const gap  = Math.max(16, Math.abs(x2-x1) * 0.4);
        const cx1  = x1 + gap;
        const cx2  = x2 - gap;
        const path = `M${x1},${y1} C${cx1},${y1} ${cx2},${y2} ${x2},${y2}`;

        const strokeColor = cls === 'violation' ? '#DC354588' : cls === 'warn' ? '#F0AD4E88' : '#28A74588';
        lines += `<path d="${path}" fill="none" stroke="${strokeColor}" stroke-width="1.5"
          stroke-dasharray="${cls==='violation'?'5,3':cls==='warn'?'4,2':'none'}"
          marker-end="url(#${arrowId}-${cls})"/>`;
      });
    });
  });

  svg.innerHTML = lines;
}

// Hook: redraw gantt dep lines after render and on scroll
function _ganttDepRedraw() {
  if (state.view === 'gantt') requestAnimationFrame(drawGanttDepLines);
}


// ─── HEAT MAP RENDER ───
function renderHeatMap(html, dates) {
  html += `<div style="padding:20px 20px 8px;display:flex;gap:16px;align-items:center;flex-wrap:wrap">
    <div style="font-size:11px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:1px">Capacity Heat Map</div>
    <div style="display:flex;gap:8px;align-items:center;font-size:10px">
      <span style="background:#28A74522;color:#28A745;border:1px solid #28A74533;padding:2px 8px;border-radius:3px">0–75% — Healthy</span>
      <span style="background:#F0AD4E22;color:#B87000;border:1px solid #F0AD4E44;padding:2px 8px;border-radius:3px">75–90% — Near Capacity</span>
      <span style="background:#E8712A22;color:#E8712A;border:1px solid #E8712A44;padding:2px 8px;border-radius:3px">90–100% — At Limit</span>
      <span style="background:#DC354522;color:#DC3545;border:1px solid #DC354544;padding:2px 8px;border-radius:3px">>100% — Overloaded</span>
    </div>
  </div>`;

  html += `<div class="heatmap-wrap"><table class="heatmap-table"><thead><tr>
    <th>Employee / Resource</th>`;
  dates.forEach((d,i) => {
    html += `<th>${DAY_ABR[i]}<br><span style="font-size:9px;font-weight:400">${fmtDate(d)}</span></th>`;
  });
  html += `<th>Week</th></tr></thead><tbody>`;

  // Employee rows grouped by dept
  const capDepts = state.filterDept === 'All' ? DEPARTMENTS : [state.filterDept];
  // Build craft set for filtered dept (from craftConfig + WO ops)
  const capDeptCrafts = new Set();
  if (state.filterDept !== 'All') {
    Object.entries(state.craftConfig).forEach(([k, v]) => {
      if (v.dept === state.filterDept) capDeptCrafts.add(v.resource);
    });
    state.workOrders.filter(wo => wo.department === state.filterDept).forEach(wo => wo.operations.forEach(op => capDeptCrafts.add(op.craft)));
  }
  capDepts.forEach(dept => {
    let emps = state.employees.filter(e => {
      if (e.department === dept) return true;
      if (state.filterDept !== 'All' && capDeptCrafts.has(e.craft)) return true;
      return false;
    });
    if (state.filterCraft !== 'All') emps = emps.filter(e => e.craft === state.filterCraft);
    if (state.filterEmployee !== 'All') emps = emps.filter(e => e.name === state.filterEmployee);
    if (state.filterSupervisor !== 'All') emps = emps.filter(e => e.supervisor === state.filterSupervisor);
    if (!emps.length) return;

    const dc = DEPT_COLORS[dept] || {};
    html += `<tr class="heatmap-section"><td colspan="${dates.length+2}" style="color:${dc.badge||'#888'};border-left:3px solid ${dc.badge||'#888'}">${dept}</td></tr>`;

    emps.forEach(emp => {
      const wkAvail = getEmpWeekAvail(emp.name);
      const wkLoad = getEmpWeekLoad(emp.name);
      const wkUtil = wkAvail > 0 ? (wkLoad/wkAvail)*100 : 0;
      const wkClass = wkUtil > 100 ? 'hm-red' : wkUtil > 90 ? 'hm-orange' : wkUtil > 75 ? 'hm-yellow' : wkLoad > 0 ? 'hm-green' : 'hm-empty';

      html += `<tr><td><div style="display:flex;align-items:center;gap:6px">
        <div>
          <div style="font-weight:600;font-size:11px">${emp.name}</div>
          <div style="font-size:9px;color:var(--text-secondary)">${emp.craft}</div>
        </div>
      </div></td>`;

      dates.forEach(d => {
        const avail = getEmpAvailHours(emp.name, d);
        const load = getEmpLoad(emp.name, d);
        const isOff = avail === 0;
        const util = avail > 0 ? (load/avail)*100 : 0;
        const cls = isOff ? 'hm-off' : util > 100 ? 'hm-red' : util > 90 ? 'hm-orange' : util > 75 ? 'hm-yellow' : load > 0 ? 'hm-green' : 'hm-empty';
        const reason = getEmpAvailReason(emp.name, d);
        const title = isOff ? (reason||'Day off') : `${load.toFixed(1)}h / ${avail}h (${Math.round(util)}%)`;
        html += `<td title="${title}"><div class="heatmap-cell ${cls}">
          ${isOff
            ? `<div style="font-size:9px">OFF</div>${reason?`<div style="font-size:8px;opacity:0.7">${reason.substring(0,8)}</div>`:''}` 
            : load > 0
              ? `<div class="hm-pct">${Math.round(util)}%</div><div class="hm-hrs">${load.toFixed(1)}/${avail}h</div>`
              : `<div style="font-size:9px;color:var(--text-muted)">${avail}h avail</div>`
          }
        </div></td>`;
      });
      html += `<td><div class="heatmap-cell ${wkClass}">
        ${wkLoad > 0 ? `<div class="hm-pct">${Math.round(wkUtil)}%</div><div class="hm-hrs">${wkLoad.toFixed(1)}/${wkAvail}h</div>` : `<div style="font-size:9px;color:var(--text-muted)">${wkAvail}h</div>`}
      </div></td></tr>`;
    });

    // Resource pool rows for this dept
    let deptConfigs = Object.entries(state.craftConfig).filter(([k,v]) => v.dept === dept);
    if (state.filterCraft !== 'All') deptConfigs = deptConfigs.filter(([k,v]) => v.resource === state.filterCraft);
    if (deptConfigs.length) {
      html += `<tr class="heatmap-section"><td colspan="${dates.length+2}" style="color:${dc.badge||'#888'};padding-left:20px;font-size:9px">Resource Pools</td></tr>`;
      deptConfigs.forEach(([key, cfg]) => {
        const cc = gc(cfg.resource);
        const weekSched = dates.reduce((s,d) => s + getDeptCraftCap(dept, cfg.resource, d).scheduled, 0);
        const weekAvail = dates.length * cfg.headcount * cfg.hoursPerDay;
        const wkUtil = weekAvail > 0 ? (weekSched/weekAvail)*100 : 0;
        const wkClass = wkUtil > 100 ? 'hm-red' : wkUtil > 90 ? 'hm-orange' : wkUtil > 75 ? 'hm-yellow' : weekSched > 0 ? 'hm-green' : 'hm-empty';

        html += `<tr><td><div style="display:flex;align-items:center;gap:6px">
          <div class="tag" style="background:${cc.badge}">${cfg.resource}</div>
          <div style="font-size:9px;color:var(--text-secondary)">${cfg.headcount} people · ${cfg.hoursPerDay}h/day</div>
        </div></td>`;

        dates.forEach(d => {
          const cap = getDeptCraftCap(dept, cfg.resource, d);
          const cls = cap.utilization > 100 ? 'hm-red' : cap.utilization > 90 ? 'hm-orange' : cap.utilization > 75 ? 'hm-yellow' : cap.scheduled > 0 ? 'hm-green' : 'hm-empty';
          html += `<td><div class="heatmap-cell ${cls}">
            ${cap.scheduled > 0
              ? `<div class="hm-pct">${Math.round(cap.utilization)}%</div><div class="hm-hrs">${cap.scheduled.toFixed(1)}/${cap.available}h</div>`
              : `<div style="font-size:9px;color:var(--text-muted)">${cap.available}h</div>`}
          </div></td>`;
        });
        html += `<td><div class="heatmap-cell ${wkClass}">
          ${weekSched > 0 ? `<div class="hm-pct">${Math.round(wkUtil)}%</div><div class="hm-hrs">${weekSched.toFixed(1)}/${weekAvail}h</div>` : `<div style="font-size:9px;color:var(--text-muted)">${weekAvail}h</div>`}
        </div></td></tr>`;
      });
    }
  });

  html += `</tbody></table></div>`;
  return html;
}

// ─── RENDER ───
function render() {
  const dates = getWeekDates();
  const allOps = getAllOps();
  const unscheduled = getUnscheduledOps();
  const completedCount = state.assignments.filter(a => a.status === 'Complete').length;

  const filteredBacklog = unscheduled.filter(op => {
    if (state.filterCraft !== 'All' && op.craft !== state.filterCraft) return false;
    if (state.filterDept !== 'All' && op.department !== state.filterDept) return false;
    if (state.filterSupervisor !== 'All' && op.supervisor !== state.filterSupervisor) return false;
    if (state.filterWOType === 'PM' && !op.isPM) return false;
    if (state.filterWOType === 'CM' && op.isPM) return false;
    return true;
  });
  const crafts = [...new Set(allOps.map(o => o.craft))];
  const depts = [...new Set(allOps.map(o => o.department))];

  let html = `
  <!-- HEADER -->
  <div class="header" style="padding:6px 12px;gap:8px">
    <div style="flex-shrink:0">
      <div class="logo-text" style="font-size:16px">⚙ Joeyi</div>
      <div class="logo-sub" style="font-size:9px">Scheduling Workbench</div>
    </div>
    <div class="nav" style="flex:1;gap:2px;flex-wrap:nowrap;overflow-x:auto">
      <button class="nav-btn ${state.view==='import'?'active':''}" onclick="setView('import')" style="font-size:10px;padding:5px 8px;white-space:nowrap;${state.view==='import'?'background:#17A2B8;color:white':''}">📁 Import</button>
      <button class="nav-btn ${state.view==='dashboard'?'active':''}" onclick="setView('dashboard')" ${!state.importLoaded?'disabled style="opacity:0.4;cursor:not-allowed;font-size:10px;padding:5px 8px"':''} style="font-size:10px;padding:5px 8px;white-space:nowrap;${state.view==='dashboard'?'background:#FF6B35;color:white':''}">📊 Dashboard</button>
      <button class="nav-btn ${state.view==='plan'?'active':''}" onclick="setView('plan')" style="font-size:10px;padding:5px 8px;white-space:nowrap" ${!state.importLoaded?'disabled style="opacity:0.4;cursor:not-allowed;font-size:10px;padding:5px 8px"':''}>📋 Plan Week</button>
      <button class="nav-btn ${state.view==='gantt'?'active':''}" onclick="setView('gantt')" style="font-size:10px;padding:5px 8px;white-space:nowrap" ${!state.importLoaded?'disabled style="opacity:0.4;cursor:not-allowed;font-size:10px;padding:5px 8px"':''}>📊 Gantt</button>
      <button class="nav-btn ${state.view==='backlog'?'active':''}" onclick="setView('backlog')" style="font-size:10px;padding:5px 8px;white-space:nowrap" ${!state.importLoaded?'disabled style="opacity:0.4;cursor:not-allowed;font-size:10px;padding:5px 8px"':''}>Work Orders</button>
      <button class="nav-btn ${state.view==='employees'?'active':''}" onclick="setView('employees')" style="font-size:10px;padding:5px 8px;white-space:nowrap" ${!state.importLoaded?'disabled style="opacity:0.4;cursor:not-allowed;font-size:10px;padding:5px 8px"':''}>${state.resourceMode === 'pool' ? 'Resources' : 'Employees'}</button>
      <button class="nav-btn ${state.view==='capacity'?'active':''}" onclick="setView('capacity')" style="font-size:10px;padding:5px 8px;white-space:nowrap" ${!state.importLoaded?'disabled style="opacity:0.4;cursor:not-allowed;font-size:10px;padding:5px 8px"':''}>Capacity</button>
      <button class="nav-btn ${state.view==='summary'?'active':''}" onclick="setView('summary')" style="font-size:10px;padding:5px 8px;white-space:nowrap" ${!state.importLoaded?'disabled style="opacity:0.4;cursor:not-allowed;font-size:10px;padding:5px 8px"':''}>Summary</button>
      <span style="width:1px;height:20px;background:var(--border);margin:0 2px;flex-shrink:0"></span>
      <button class="nav-btn ${state.view==='admin'?'active':''}" onclick="setView('admin')" style="font-size:10px;padding:5px 8px;white-space:nowrap;${state.view==='admin'?'background:#6C757D;color:white':''}">Admin</button>
      <button class="nav-btn ${state.view==='guide'?'active':''}" onclick="setView('guide')" style="font-size:10px;padding:5px 8px;white-space:nowrap;${state.view==='guide'?'background:#6C757D;color:white':''}">Guide</button>
    </div>
    <div style="display:flex;gap:4px;align-items:center;flex-shrink:0">
      <button class="btn btn-green" onclick="runAI()" style="font-size:10px;padding:5px 10px">${state.apiKey ? '🤖' : '⚡'} Auto-Sched</button>
      ${state.oracleConfig && state.oracleConfig.connected && state.importLoaded ? `<button class="btn-outline" onclick="pushToOracle()" style="border-color:#17A2B8;color:#17A2B8;font-size:10px;padding:5px 8px" ${state.oracleSyncing ? 'disabled' : ''}>↑ Push</button>` : ''}
      <button class="btn-outline btn-outline-orange" onclick="exportSchedule(false)" title="Export schedule" style="font-size:10px;padding:5px 8px;border-radius:4px">↓ Export</button>
      <button class="btn-outline btn-outline-orange" onclick="exportSchedule(true)" title="Export &amp; email" style="font-size:11px;padding:4px 6px;border-radius:4px">✉</button>
      <button class="btn-outline btn-outline-red" onclick="clearAll()" style="font-size:10px;padding:5px 8px">✕ Clear</button>
      <span style="width:1px;height:20px;background:var(--border);margin:0 2px"></span>
      <button class="theme-toggle" onclick="showOracleSettings()" title="Oracle EBS" style="font-size:13px;padding:4px;${state.oracleConfig && state.oracleConfig.connected ? 'color:#28A745' : ''}">🔗</button>
      <button class="theme-toggle" onclick="showSettings()" title="Settings" style="font-size:13px;padding:4px">⚙</button>
      <button class="theme-toggle" onclick="toggleTheme()" title="Theme" style="font-size:13px;padding:4px">${state.theme === 'dark' ? '☀' : '🌙'}</button>
    </div>
  </div>

  <!-- CONTROLS -->
  ${state.view === 'import' || state.view === 'dashboard' ? '' : `<div class="controls">
    <div class="week-nav">
      <button class="week-btn" onclick="shiftWeek(-1)">◀ Prev</button>
      <div class="week-label">Week of ${fmtDate(dates[0])} — ${fmtDate(dates[5])}</div>
      <button class="week-btn" onclick="shiftWeek(1)">Next ▶</button>
    </div>
    <div style="display:flex;gap:10px;align-items:center;margin-left:16px;flex-wrap:wrap">
      <div class="filter-group">
        <span class="filter-label">Dept:</span>
        <select class="filter-select" onchange="state.filterDept=this.value;render()">
          <option value="All" ${state.filterDept==='All'?'selected':''}>All Depts</option>
          ${DEPARTMENTS.map(d => `<option value="${d}" ${state.filterDept===d?'selected':''}>${d}</option>`).join('')}
        </select>
      </div>
      <div class="filter-group">
        <span class="filter-label">Resource:</span>
        <select class="filter-select" onchange="state.filterCraft=this.value;render()">
          <option value="All" ${state.filterCraft==='All'?'selected':''}>All Resources</option>
          ${crafts.map(c => `<option value="${c}" ${state.filterCraft===c?'selected':''}>${c}</option>`).join('')}
        </select>
      </div>
      ${state.resourceMode !== 'pool' ? `<div class="filter-group">
        <span class="filter-label">Employee:</span>
        <select class="filter-select" onchange="state.filterEmployee=this.value;render()">
          <option value="All" ${state.filterEmployee==='All'?'selected':''}>All Employees</option>
          ${state.employees.filter(e => (state.filterDept==='All' || e.department===state.filterDept) && (state.filterCraft==='All' || e.craft===state.filterCraft)).map(e => `<option value="${e.name}" ${state.filterEmployee===e.name?'selected':''}>${e.name}</option>`).join('')}
        </select>
      </div>` : ''}
      <div class="filter-group">
        <span class="filter-label">Supervisor:</span>
        <select class="filter-select" onchange="state.filterSupervisor=this.value;render()">
          <option value="All" ${state.filterSupervisor==='All'?'selected':''}>All Supers</option>
          ${(() => {
            // Include supervisors from employees AND from admin dept config
            const empSupers = state.employees.map(e => e.supervisor).filter(Boolean);
            const adminSupers = Object.values(state.deptSupervisors || {}).filter(Boolean);
            return [...new Set([...empSupers, ...adminSupers])].sort().map(s =>
              `<option value="${s}" ${state.filterSupervisor===s?'selected':''}>${s}</option>`
            ).join('');
          })()}
        </select>
        <span class="filter-label">Type:</span>
        <select class="filter-select" onchange="state.filterWOType=this.value;render()">
          <option value="All" ${(state.filterWOType||'All')==='All'?'selected':''}>All Types</option>
          <option value="PM" ${state.filterWOType==='PM'?'selected':''}>PM Only</option>
          <option value="CM" ${state.filterWOType==='CM'?'selected':''}>CM Only</option>
        </select>
      </div>
      ${(state.filterDept !== 'All' || state.filterCraft !== 'All' || state.filterEmployee !== 'All' || state.filterSupervisor !== 'All' || (state.filterWOType && state.filterWOType !== 'All')) ? `
        <button class="filter-reset" onclick="state.filterDept='All';state.filterCraft='All';state.filterEmployee='All';state.filterSupervisor='All';state.filterWOType='All';render()">✕ Clear Filters</button>
        <div style="display:flex;gap:3px;flex-wrap:wrap">
          ${state.filterDept !== 'All' ? `<button class="filter-active" onclick="state.filterDept='All';render()">${state.filterDept} ✕</button>` : ''}
          ${state.filterCraft !== 'All' ? `<button class="filter-active" onclick="state.filterCraft='All';render()">${state.filterCraft} ✕</button>` : ''}
          ${state.filterEmployee !== 'All' ? `<button class="filter-active" onclick="state.filterEmployee='All';render()">${state.filterEmployee} ✕</button>` : ''}
          ${state.filterSupervisor !== 'All' ? `<button class="filter-active" onclick="state.filterSupervisor='All';render()">${state.filterSupervisor} ✕</button>` : ''}
          ${state.filterWOType && state.filterWOType !== 'All' ? `<button class="filter-active" onclick="state.filterWOType='All';render()">${state.filterWOType} ✕</button>` : ''}
        </div>` : ''}
    </div>
    <div style="flex:1"></div>
  </div>`}`;

  // ─── KPI DASHBOARD BAR (filter-aware) — hidden on Dashboard view ───
  if (state.view === 'dashboard') {
    // Dashboard has its own KPIs — skip the bar
  } else {
  const hasFilters = state.filterDept !== 'All' || state.filterCraft !== 'All' || state.filterEmployee !== 'All' || state.filterSupervisor !== 'All';
  
  // Filtered employee set
  // Build set of crafts needed by filtered dept (via craftConfig)
  const kpiDeptCrafts = new Set();
  if (state.filterDept !== 'All') {
    Object.entries(state.craftConfig).forEach(([k, v]) => {
      if (v.dept === state.filterDept) kpiDeptCrafts.add(v.resource);
    });
    // Also include crafts from WO operations in that dept
    state.workOrders.filter(wo => wo.department === state.filterDept).forEach(wo => {
      wo.operations.forEach(op => kpiDeptCrafts.add(op.craft));
    });
  }

  const kpiEmps = state.employees.filter(e => {
    if (state.filterDept !== 'All') {
      // Match if employee's home dept matches OR their craft serves this dept
      if (e.department !== state.filterDept && !kpiDeptCrafts.has(e.craft)) return false;
    }
    if (state.filterCraft !== 'All' && e.craft !== state.filterCraft) return false;
    if (state.filterEmployee !== 'All' && e.name !== state.filterEmployee) return false;
    if (state.filterSupervisor !== 'All' && e.supervisor !== state.filterSupervisor) return false;
    return true;
  });
  const kpiEmpNames = new Set(kpiEmps.map(e => e.name));

  // Filtered WOs
  const kpiWOs = state.workOrders.filter(wo => {
    if (state.filterDept !== 'All' && wo.department !== state.filterDept) return false;
    if (state.filterSupervisor !== 'All' && wo.supervisor !== state.filterSupervisor) return false;
    if (state.filterWOType === 'PM' && !wo.isPM) return false;
    if (state.filterWOType === 'CM' && wo.isPM) return false;
    return true;
  });

  // Filtered assignments (by employee filter AND current week)
  const kpiDateSet = new Set(dates);
  const kpiAllOpsCache = getAllOps();
  const kpiAssignments = state.assignments.filter(a => {
    if (!kpiDateSet.has(a.date)) return false;
    if (isPoolAssignment(a)) {
      // For pool assignments, filter by department/craft of the underlying op
      if (state.filterDept !== 'All' || state.filterCraft !== 'All') {
        const aOp = kpiAllOpsCache.find(o => o.woNumber === a.woNumber && o.opSeq === a.opSeq);
        if (!aOp) return false;
        if (state.filterDept !== 'All' && aOp.department !== state.filterDept) return false;
        if (state.filterCraft !== 'All' && aOp.craft !== state.filterCraft) return false;
      }
      return true;
    }
    return kpiEmpNames.has(a.employeeName);
  });

  // Filtered unscheduled ops
  const kpiUnscheduled = unscheduled.filter(op => {
    if (state.filterDept !== 'All' && op.department !== state.filterDept) return false;
    if (state.filterCraft !== 'All' && op.craft !== state.filterCraft) return false;
    if (state.filterSupervisor !== 'All' && op.supervisor !== state.filterSupervisor) return false;
    if (state.filterWOType === 'PM' && !op.isPM) return false;
    if (state.filterWOType === 'CM' && op.isPM) return false;
    return true;
  });

  const totalAvailHrs = state.resourceMode === 'pool'
    ? getPoolWeekAvail(state.filterDept, state.filterCraft)
    : kpiEmps.reduce((s,e) => s + getEmpWeekAvail(e.name), 0);
  const assignedHrs = kpiAssignments.reduce((s,a) => s + a.hours, 0);
  // Include confirmed WO estimated hours (planned but not yet assigned to specific employees)
  // Include ALL confirmed WO estimated hours in Plan Week — full week picture
  // In Gantt view, separate internal vs vendor for utilization accuracy
  const confirmedEstHrs = kpiWOs.filter(wo => state.confirmedWOs.has(wo.woNumber))
    .reduce((s,wo) => s + wo.operations
      .filter(op => state.filterCraft === 'All' || op.craft === state.filterCraft)
      .reduce((s2,op) => s2 + getRemainingHours({woNumber: wo.woNumber, opSeq: op.opSeq, estHours: op.estHours}), 0)
    , 0);
  // Separate internal vs vendor hours for display
  const internalEstHrs = kpiWOs.filter(wo => state.confirmedWOs.has(wo.woNumber))
    .reduce((s,wo) => s + wo.operations
      .filter(op => !op.isExternal && (state.filterCraft === 'All' || op.craft === state.filterCraft))
      .reduce((s2,op) => s2 + getRemainingHours({woNumber: wo.woNumber, opSeq: op.opSeq, estHours: op.estHours}), 0)
    , 0);
  const vendorEstHrs = confirmedEstHrs - internalEstHrs;
  // Scheduled = assigned + confirmed estimates (all hours for planning visibility)
  const totalSchedHrs = Math.max(assignedHrs, assignedHrs + confirmedEstHrs);
  const totalBacklogHrs = kpiUnscheduled.reduce((s,op) => s + getRemainingHours(op), 0);
  const kpiAllOps = getAllOps().filter(op => {
    if (state.filterDept !== 'All' && op.department !== state.filterDept) return false;
    if (state.filterCraft !== 'All' && op.craft !== state.filterCraft) return false;
    if (state.filterSupervisor !== 'All' && op.supervisor !== state.filterSupervisor) return false;
    if (state.filterWOType === 'PM' && !op.isPM) return false;
    if (state.filterWOType === 'CM' && op.isPM) return false;
    return true;
  });
  const kpiCompletedCount = kpiAssignments.filter(a => a.status === 'Complete').length;
  const overallUtil = totalAvailHrs > 0 ? (totalSchedHrs / totalAvailHrs * 100) : 0;
  const utilClass = v => v > 95 ? 'danger' : v > 75 ? 'warn' : v > 0 ? 'ok' : 'neutral';
  const utilColor = v => v > 95 ? '#DC3545' : v > 75 ? '#F0AD4E' : '#28A745';

  // Compliance (filtered WOs)
  let onTrack = 0, atRisk = 0, overdue = 0;
  kpiWOs.forEach(wo => {
    const ops = wo.operations.filter(op => state.filterCraft === 'All' || op.craft === state.filterCraft);
    if (!ops.length) return;
    const allSched = ops.every(op => isFullyScheduled(wo.woNumber, op.opSeq));
    const anySched = ops.some(op => state.assignments.some(a => a.woNumber === wo.woNumber && a.opSeq === op.opSeq));
    const lastDate = state.assignments.filter(a => a.woNumber === wo.woNumber).reduce((m,a) => a.date > m ? a.date : m, '');
    if (allSched && lastDate <= wo.scheduledEnd) onTrack++;
    else if (lastDate > wo.scheduledEnd) overdue++;
    else if (anySched && !allSched) atRisk++;
    else if (!anySched) atRisk++;
  });

  const filterScope = hasFilters ? `<span style="font-size:8px;color:var(--accent);font-weight:400;margin-left:4px">(filtered)</span>` : '';

  html += `
  <div class="kpi-bar" style="${state.showKPIs ? '' : 'display:none'}">
    <!-- HOURS -->
    <div class="kpi-group">
      <div class="kpi-group-title"><span class="kpi-icon">📊</span> HOURS ${filterScope}
        <button class="kpi-toggle" onclick="state.showKPIs=false;render()">▲ hide</button>
      </div>
      <div class="kpi-row">
        <div class="kpi-item">
          <div class="kpi-label">Available</div>
          <div class="kpi-value neutral">${totalAvailHrs}</div>
          <div class="kpi-sub">${state.resourceMode === 'pool' ? 'pool capacity' : kpiEmps.length + ' emp × 6d'}</div>
        </div>
        <div class="kpi-item">
          <div class="kpi-label">Scheduled</div>
          <div class="kpi-value accent">${totalSchedHrs.toFixed(0)}</div>
          <div class="kpi-sub">${assignedHrs > 0 ? assignedHrs.toFixed(0) + 'h assigned' : ''}${internalEstHrs > 0 ? (assignedHrs > 0 ? ' + ' : '') + internalEstHrs.toFixed(1) + 'h int' : ''}${vendorEstHrs > 0 ? ' + ' + vendorEstHrs.toFixed(1) + 'h vendor' : ''}${assignedHrs === 0 && confirmedEstHrs === 0 ? '0 ops' : ''}</div>
        </div>
        <div class="kpi-item">
          <div class="kpi-label">Remaining</div>
          <div class="kpi-value ${totalAvailHrs - totalSchedHrs < totalBacklogHrs ? 'warn' : 'ok'}">${(totalAvailHrs - totalSchedHrs).toFixed(0)}</div>
        </div>
        <div class="kpi-item">
          <div class="kpi-label">Backlog</div>
          <div class="kpi-value ${totalBacklogHrs > 0 ? 'warn' : 'ok'}">${totalBacklogHrs.toFixed(0)}</div>
          <div class="kpi-sub">${kpiUnscheduled.length} ops</div>
        </div>
      </div>
    </div>

    <!-- UTILIZATION -->
    <div class="kpi-group">
      <div class="kpi-group-title"><span class="kpi-icon">⚡</span> UTILIZATION</div>
      <div class="kpi-row">
        <div class="kpi-item">
          <div class="kpi-label">Overall</div>
          <div class="kpi-value ${utilClass(overallUtil)}">${overallUtil.toFixed(0)}%</div>
          <div class="kpi-mini-bar"><div class="kpi-mini-fill" style="width:${Math.min(overallUtil,100)}%;background:${utilColor(overallUtil)}"></div></div>
        </div>
        ${DEPARTMENTS.filter(d => state.filterDept === 'All' || state.filterDept === d).map(dept => {
          let deptAvail, deptSched;
          if (state.resourceMode === 'pool') {
            // Pool mode: use craftConfig for available, all assignments in dept for scheduled
            deptAvail = Object.entries(state.craftConfig).filter(([k,v]) => v.dept === dept).reduce((s,[k,v]) => {
              if (state.filterCraft !== 'All' && v.resource !== state.filterCraft) return s;
              return s + v.headcount * v.hoursPerDay * 6;
            }, 0);
            deptSched = kpiAssignments.filter(a => {
              const aOp = getAllOps().find(o => o.woNumber === a.woNumber && o.opSeq === a.opSeq);
              return aOp && aOp.department === dept;
            }).reduce((s,a) => s + a.hours, 0);
          } else {
            const deptEmps = kpiEmps.filter(e => e.department === dept);
            if (!deptEmps.length) return '';
            deptAvail = deptEmps.reduce((s,e) => s + 6 * e.hoursPerDay, 0);
            deptSched = kpiAssignments.filter(a => deptEmps.some(e => e.name === a.employeeName)).reduce((s,a) => s + a.hours, 0);
          }
          if (deptAvail === 0) return '';
          const deptUtil = deptAvail > 0 ? (deptSched / deptAvail * 100) : 0;
          const dc = DEPT_COLORS[dept] || {};
          return `<div class="kpi-item">
            <div class="kpi-dept-label" style="color:${dc.badge}">${dept}</div>
            <div class="kpi-value ${utilClass(deptUtil)}" style="font-size:12px">${deptUtil.toFixed(0)}%</div>
            <div class="kpi-mini-bar"><div class="kpi-mini-fill" style="width:${Math.min(deptUtil,100)}%;background:${utilColor(deptUtil)}"></div></div>
            <div class="kpi-sub">${deptSched.toFixed(0)}/${deptAvail}h</div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <!-- BACKLOG -->
    <div class="kpi-group">
      <div class="kpi-group-title"><span class="kpi-icon">📋</span> BACKLOG</div>
      <div class="kpi-row">
        ${DEPARTMENTS.filter(d => state.filterDept === 'All' || state.filterDept === d).map(dept => {
          const deptBacklog = kpiUnscheduled.filter(op => op.department === dept);
          const deptHrs = deptBacklog.reduce((s,op) => s + op.estHours, 0);
          const dc = DEPT_COLORS[dept] || {};
          return `<div class="kpi-item">
            <div class="kpi-dept-label" style="color:${dc.badge}">${dept}</div>
            <div class="kpi-value ${deptHrs > 0 ? 'warn' : 'ok'}" style="font-size:12px">${deptHrs.toFixed(0)}h</div>
            <div class="kpi-sub">${deptBacklog.length} ops</div>
          </div>`;
        }).join('')}
        ${(() => {
          const resCounts = {};
          kpiUnscheduled.forEach(op => { resCounts[op.craft] = (resCounts[op.craft]||0) + op.estHours; });
          const topRes = Object.entries(resCounts).sort((a,b) => b[1]-a[1]).slice(0,3);
          if (!topRes.length) return `<div class="kpi-item"><div class="kpi-label">Top Need</div><div class="kpi-value ok" style="font-size:10px">Clear ✓</div></div>`;
          return topRes.map(([r,h]) => `<div class="kpi-item">
            <div class="kpi-label">${r}</div>
            <div class="kpi-value warn" style="font-size:11px">${h.toFixed(0)}h</div>
          </div>`).join('');
        })()}

    <!-- COMPLIANCE -->
    <div class="kpi-group">

  </div>
  ${!state.showKPIs ? `<div style="background:var(--bg-surface);border-bottom:1px solid var(--border);padding:2px 12px;text-align:right"><button class="kpi-toggle" style="font-size:10px;color:var(--text-secondary)" onclick="state.showKPIs=true;render()">▼ Show KPIs</button></div>` : ''}

  } // end KPI bar else block (hidden on dashboard)
  // (controls/KPI block)

  html += `<div class="main">`;

  // ─── IMPORT DATA VIEW ───
  if (state.view === 'import') {
    const dates = getWeekDates();
    const oracleCfg = state.oracleConfig;
    const oracleConfigured = oracleCfg && (oracleCfg.host || oracleCfg.proxyUrl);
    html += `<div style="flex:1;overflow:auto;padding:24px;display:flex;justify-content:center;align-items:flex-start">
    <div style="max-width:720px;width:100%">
      <div style="text-align:center;margin-bottom:24px">

        <p style="margin:4px 0 0;font-size:12px;color:var(--text-secondary)">Load work orders and employees from a spreadsheet or Oracle EBS</p>

      <div style="display:flex;gap:0;margin-bottom:16px;border:1px solid var(--border);border-radius:8px;overflow:hidden">
        <button onclick="state.importTab='file';render()" style="flex:1;padding:12px;font-size:12px;font-weight:600;border:none;cursor:pointer;transition:all 0.2s;background:${state.importTab==='file'?'var(--accent)':'var(--bg-card)'};color:${state.importTab==='file'?'white':'var(--text-secondary)'}">
          📁 File Import
        </button>
        <button onclick="state.importTab='oracle';render()" style="flex:1;padding:12px;font-size:12px;font-weight:600;border:none;border-left:1px solid var(--border);cursor:pointer;transition:all 0.2s;background:${state.importTab==='oracle'?'var(--accent)':'var(--bg-card)'};color:${state.importTab==='oracle'?'white':'var(--text-secondary)'}">
          🔗 Oracle Sync ${oracleCfg.connected ? '<span style="color:#28A745">●</span>' : ''}
        </button>
      </div>

      <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:16px">
        <div style="margin-bottom:16px">
          <label style="font-size:10px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.5px">Schedule Board Week Start (Monday)</label>
          <input type="date" value="${dates[0]}" onchange="setWeekStart(this.value)" style="display:block;width:100%;margin-top:4px;padding:8px;background:var(--bg-base);border:1px solid var(--border);border-radius:4px;color:var(--text-primary);font-size:12px">
          <div style="font-size:9px;color:var(--text-secondary);margin-top:4px">Sets which week the schedule board displays — Mon through Sat</div>
        </div>

      ${state.importTab === 'file' ? `
        ${!state.importLoading && !state.importLoaded ? `
        <div style="border:2px dashed var(--border);border-radius:8px;padding:32px;text-align:center;margin-bottom:16px;cursor:pointer;transition:border-color 0.2s"
             ondragover="event.preventDefault();this.style.borderColor='var(--accent)'"
             ondragleave="this.style.borderColor='var(--border)'"
             ondrop="event.preventDefault();this.style.borderColor='var(--border)';const f=event.dataTransfer.files[0];if(f){const dt=new DataTransfer();dt.items.add(f);document.getElementById('file-upload').files=dt.files;handleFileUpload(document.getElementById('file-upload'))}"
             onclick="document.getElementById('file-upload').click()">
          <input type="file" id="file-upload" accept=".xlsx,.xls,.csv" style="display:none" onchange="handleFileUpload(this)">
          <div style="font-size:28px;margin-bottom:8px">📄</div>

          <div style="font-size:10px;color:var(--text-secondary)">Accepts .xlsx, .xls, or .csv files</div>
        </div>

        <div style="background:var(--bg-base);border:1px solid var(--border);border-radius:6px;padding:14px;margin-bottom:16px">
          <div style="font-size:11px;font-weight:600;color:var(--text-primary);margin-bottom:8px">📋 Expected Format</div>
          <div style="font-size:10px;color:var(--text-secondary);line-height:1.6">
            Your spreadsheet should have two sheets:<br>
            <strong>Sheet 1: Work Orders</strong> — columns: WO Number, Description, Department, Priority (1-5), WO Type (PM/CM), PM (Yes/No), Asset Number, Asset Description, Scheduled Start, Scheduled End, Supervisor, Op Seq, Op Description, Craft/Resource, Est Hours, Depends On Op<br>
            <strong>Sheet 2: Employees</strong> — columns: Employee Name, Department, Craft/Resource, Hours Per Day, Supervisor, Skills<br><br>
            Column names are matched flexibly — the scheduler auto-detects them. WO Type and PM flag are optional but recommended. Departments and crafts are auto-discovered from the data.
          </div>
          <a href="#" onclick="event.preventDefault();downloadTemplate()" style="display:inline-block;margin-top:8px;font-size:10px;color:var(--accent);font-weight:600">↓ Download blank template with examples</a>
        </div>
        ` : ''}

        ${!state.importLoading && state.importLoaded ? `
        <button class="btn-outline btn-outline-orange" style="width:100%;padding:10px;font-size:12px;margin-bottom:16px;border-radius:6px" onclick="state.importLoaded=false;state.importStats=null;state.workOrders=[];state.employees=[];state.assignments=[];render()">
          ↻ Upload New File
        </button>
        ` : ''}

        ${state.importLoading ? `
        <div style="background:var(--bg-base);border:1px solid var(--border);border-radius:6px;padding:16px;margin-bottom:16px;text-align:center">
          <div class="chat-typing" style="display:inline-flex;margin-bottom:8px"><span></span><span></span><span></span></div>

        ${state.importError ? `<div style="background:#DC354522;border:1px solid #DC354544;border-radius:4px;padding:8px 12px;margin-bottom:12px;font-size:11px;color:#DC3545">${state.importError}</div>` : ''}
      ` : `
        <!-- ORACLE SYNC TAB -->
        ${!oracleConfigured ? `
        <div style="text-align:center;padding:24px">
          <div style="font-size:36px;margin-bottom:12px;opacity:0.4">🔗</div>
          <div style="font-size:13px;font-weight:600;color:var(--text-primary);margin-bottom:8px">Oracle EBS Not Configured</div>
          <div style="font-size:11px;color:var(--text-secondary);margin-bottom:16px">Set up your Oracle EBS connection to pull work orders and employees directly from the database.</div>
          <button class="btn" onclick="showOracleSettings()" style="font-size:12px;padding:8px 20px">⚙ Configure Oracle Connection</button>
        </div>
        ` : `
        <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg-base);border:1px solid var(--border);border-radius:6px;margin-bottom:16px">
          <span style="font-size:16px">${oracleCfg.connected ? '🟢' : '🔴'}</span>
          <div style="flex:1">
            <div style="font-size:11px;font-weight:600;color:var(--text-primary)">${oracleCfg.host || 'Oracle EBS'}${oracleCfg.port ? ':' + oracleCfg.port : ''}</div>
            <div style="font-size:9px;color:var(--text-secondary)">Mode: ${oracleCfg.mode === 'rest' ? 'REST API (ISG)' : 'SQL Proxy'} ${oracleCfg.lastSync ? ' · Last sync: ' + new Date(oracleCfg.lastSync).toLocaleString() : ''}</div>
          </div>
          <button class="btn-outline" style="font-size:10px;padding:4px 10px" onclick="showOracleSettings()">⚙</button>
        </div>

        ${!state.oracleSyncing && !state.importLoaded ? `
        <div style="text-align:center;padding:20px">
          <button class="btn btn-green" style="font-size:14px;padding:14px 32px;border-radius:8px" onclick="pullFromOracle()">

          <div style="font-size:10px;color:var(--text-secondary);margin-top:8px">Fetches work orders, operations, and employees for the selected week</div>

        ${state.oracleSyncing ? `

        ${state.oracleError ? `<div style="background:#DC354522;border:1px solid #DC354544;border-radius:4px;padding:8px 12px;margin-bottom:12px;font-size:11px;color:#DC3545">${state.oracleError}</div>` : ''}

        ${!state.oracleSyncing && state.importLoaded ? `
        <div style="display:flex;gap:8px;margin-bottom:16px">
          <button class="btn-outline btn-outline-orange" style="flex:1;padding:10px;font-size:12px;border-radius:6px" onclick="state.importLoaded=false;state.importStats=null;state.workOrders=[];state.employees=[];state.assignments=[];render()">
            ↻ Re-Pull from Oracle
          </button>
          <button class="btn" style="flex:1;padding:10px;font-size:12px;border-radius:6px" onclick="pushToOracle()">
            ↑ Push Schedule to Oracle
          </button>
        </div>

        `}
      `}

        ${state.importLoaded && state.importStats ? `
        <div style="background:#28A74522;border:1px solid #28A74544;border-radius:6px;padding:16px;margin-bottom:16px">
