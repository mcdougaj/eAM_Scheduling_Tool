// ─── DRAG & DROP ───
// Supports two drag types:
//   1. Backlog op → calendar cell (new assignment)
//   2. Assigned op on calendar → different cell (move assignment)
let dragData = null;    // { type: 'backlog', op } or { type: 'assigned', assignmentId, op }

function onDragStartBacklog(e, op) {
  dragData = { type: 'backlog', op };
  e.dataTransfer.effectAllowed = 'move';
  e.target.classList.add('dragging');
}

function onDragStartAssigned(e, assignmentId) {
  const a = state.assignments.find(x => x.id === assignmentId);
  if (!a) return;
  const op = getAllOps().find(o => o.woNumber === a.woNumber && o.opSeq === a.opSeq);
  if (!op) return;
  dragData = { type: 'assigned', assignmentId, op, sourceEmp: a.employeeName, sourceDate: a.date };
  e.dataTransfer.effectAllowed = 'move';
  // Slight delay so the drag image captures before we style it
  setTimeout(() => { e.target.classList.add('dragging'); }, 0);
}

function onDragEnd(e) {
  dragData = null;
  e.target.classList.remove('dragging');
  // Clean up any lingering drag-over states
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
}

function onDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; e.currentTarget.classList.add('drag-over'); }
function onDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }

function onDragStartResourceWO(e, woNumber, craft, sourceDate) {
  dragData = { type: 'resourceWO', woNumber, craft, sourceDate };
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => { e.target.classList.add('dragging'); }, 0);
}

function moveResourceWO(woNumber, craft, sourceDate, direction) {
  // direction: -1 = prev day, +1 = next day, -7 = prev week, +7 = next week
  const src = new Date(sourceDate + 'T00:00:00');
  src.setDate(src.getDate() + direction);
  const newDate = src.toISOString().split('T')[0];
  
  // Move all assignments for this WO+craft on sourceDate
  const toMove = state.assignments.filter(a => {
    if (a.woNumber !== woNumber || a.date !== sourceDate) return false;
    const op = getAllOps().find(o => o.woNumber === a.woNumber && o.opSeq === a.opSeq);
    return op && op.craft === craft;
  });
  
  if (toMove.length === 0) return;
  toMove.forEach(a => { a.date = newDate; });
  
  // If the new date is outside the current week, navigate to that week
  const dates = getWeekDates();
  if (newDate < dates[0] || newDate > dates[dates.length - 1]) {
    setWeekStart(newDate);
  } else {
    render();
  }
}

function onDrop(e, date, empName, craftPool) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (!dragData) return;

  // ── Move resource WO card to a different day ──
  if (dragData.type === 'resourceWO') {
    const { woNumber, craft, sourceDate } = dragData;
    if (date === sourceDate) { dragData = null; return; } // same day, no-op
    
    // Find all assignments for this WO+craft on the source date
    const toMove = state.assignments.filter(a => {
      if (a.woNumber !== woNumber || a.date !== sourceDate) return false;
      const op = getAllOps().find(o => o.woNumber === a.woNumber && o.opSeq === a.opSeq);
      return op && op.craft === (craftPool || craft);
    });
    
    if (toMove.length === 0) { dragData = null; return; }
    
    // Move all to the new date
    toMove.forEach(a => { a.date = date; });
    dragData = null;
    render();
    return;
  }

  const op = dragData.op;

  // Resource pool drop (By Resource view)
  if (craftPool && !empName) {
    if (dragData.type === 'backlog') {
      // Get ALL unscheduled ops for this WO that match the craft pool
      const woNum = op.woNumber;
      const wo = state.workOrders.find(w => w.woNumber === woNum);
      if (!wo) { dragData = null; return; }
      
      const woOps = wo.operations.filter(o => o.craft === craftPool && !isFullyScheduled(o.woNumber, o.opSeq));
      
      if (woOps.length === 0) {
        alert(`No unscheduled ${craftPool} ops on ${woNum}`);
        dragData = null;
        return;
      }
      
      // Date window check (ask once for the WO, not per op)
      const ow = (wo.scheduledStart && date < wo.scheduledStart.slice(0,10)) || (wo.scheduledEnd && date > wo.scheduledEnd.slice(0,10));
      if (ow) {
        const parseUTC = s => { const p = s.split('-'); return new Date(Date.UTC(+p[0], +p[1]-1, +p[2])); };
        let msg = '';
        if (wo.scheduledStart && date < wo.scheduledStart.slice(0,10)) {
          const diff = Math.round((parseUTC(wo.scheduledStart) - parseUTC(date)) / 86400000);
          msg = `${woNum} is scheduled to start ${fmtDate(wo.scheduledStart)} but you're allocating to ${fmtDate(date)} (${diff} day${diff!==1?'s':''} early).`;
        } else {
          const diff = Math.round((parseUTC(date) - parseUTC(wo.scheduledEnd)) / 86400000);
          msg = `${woNum} is due by ${fmtDate(wo.scheduledEnd)} but you're allocating to ${fmtDate(date)} (${diff} day${diff!==1?'s':''} past due).`;
        }
        if (!confirm(`⚠ Outside Date Window\n\n${msg}\n\nAllocate ${woOps.length} ${craftPool} ops (${woOps.reduce((s,o)=>s+getRemainingHours(o),0)}h) anyway?`)) {
          dragData = null;
          return;
        }
      }
      
      // Allocate all matching craft ops
      woOps.forEach(woOp => {
        const remain = getRemainingHours(woOp);
        if (remain > 0) {
          addPoolAssignment(woOp.woNumber, woOp.opSeq, craftPool, date, remain, true);
        }
      });
      render();
    }
    dragData = null;
    return;
  }

  // If no employee specified (dept/priority view), open assign modal with date pre-selected
  if (!empName) {
    if (dragData.type === 'backlog') {
      showAssignModal(op, date);
    }
    dragData = null;
    return;
  }

  const emp = state.employees.find(x => x.name === empName);
  if (!emp) return;

  // Craft match check
  if (emp.craft !== op.craft) {
    alert(`Craft mismatch: ${op.craft} operation cannot be assigned to ${emp.name} (${emp.craft})`);
    dragData = null;
    return;
  }

  if (dragData.type === 'backlog') {
    // Date window check
    if (!checkDateWindow(op.woNumber, date)) {
      dragData = null;
      return;
    }
    // New assignment from backlog
    const load = getEmpLoad(empName, date);
    const avail = getEmpAvailHours(empName, date);
    if (avail === 0) {
      const reason = getEmpAvailReason(empName, date);
      alert(`${empName} is unavailable on ${fmtDate(date)}${reason ? ' (' + reason + ')' : ''}`);
      dragData = null;
      return;
    }
    if (load + op.estHours > avail) {
      // If there's remaining capacity, offer to assign what fits
      const canFit = Math.max(0, avail - load);
      const remain = getRemainingHours(op);
      const assignHrs = Math.min(remain > 0 ? remain : op.estHours, canFit);
      if (assignHrs >= 0.5) {
        if (confirm(`${empName} has ${canFit.toFixed(1)}h available. Assign ${assignHrs}h of this ${op.estHours}h op?`)) {
          addAssignment(op.woNumber, op.opSeq, empName, date, assignHrs);
        }
      } else {
        alert(`${empName} only has ${canFit.toFixed(1)}h available on ${fmtDate(date)}${avail < emp.hoursPerDay ? ' (reduced)' : ''}`);
      }
      dragData = null;
      return;
    }
    const remain = getRemainingHours(op);
    addAssignment(op.woNumber, op.opSeq, empName, date, remain > 0 ? remain : op.estHours);

  } else if (dragData.type === 'assigned') {
    // Moving existing assignment
    const a = state.assignments.find(x => x.id === dragData.assignmentId);
    if (!a) { dragData = null; return; }

    // Skip if dropped on same cell
    if (a.date === date && a.employeeName === empName) { dragData = null; return; }

    // Date window check on new date
    if (a.date !== date && !checkDateWindow(a.woNumber, date)) {
      dragData = null;
      return;
    }

    // Check availability on target
    const targetAvail = getEmpAvailHours(empName, date);
    if (targetAvail === 0) {
      const reason = getEmpAvailReason(empName, date);
      alert(`${empName} is unavailable on ${fmtDate(date)}${reason ? ' (' + reason + ')' : ''}`);
      dragData = null;
      return;
    }

    // Check capacity on target cell
    const targetLoad = getEmpLoad(empName, date) - (a.employeeName === empName && a.date === date ? a.hours : 0);
    if (targetLoad + a.hours > targetAvail) {
      alert(`${empName} only has ${(targetAvail - getEmpLoad(empName, date)).toFixed(1)}h available on ${fmtDate(date)}${targetAvail < emp.hoursPerDay ? ' (reduced)' : ''}`);
      dragData = null;
      return;
    }

    // Update the assignment in place
    a.date = date;
    a.employeeName = empName;
    render();
  }

  dragData = null;
}

      <div style="margin-bottom:12px;padding:10px;background:var(--bg-base);border:1px solid var(--border);border-radius:6px">
        <div style="font-size:10px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">\u26a1 Quick Split \u2014 ${remainH}h to assign</div>
        <div style="display:flex;flex-wrap:wrap;gap:5px">
          <button class="btn-outline" style="font-size:9px;padding:4px 8px" onclick="splitAcrossDays()">
            \ud83d\udcc5 ${isPoolMode ? 'Split across days' : '1 person \u00d7 multiple days'}
          </button>
          ${!isPoolMode ? `<button class="btn-outline" style="font-size:9px;padding:4px 8px" onclick="splitAcrossPeople()">
            \ud83d\udc65 Multiple people \u00d7 1 day
          </button>
          <button class="btn-outline" style="font-size:9px;padding:4px 8px" onclick="evenSplit()">
            \u2b50 People \u00d7 days grid
          </button>` : ''}
        </div>
      </div>` : ''}

      <!-- Assignment Rows -->
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <div style="font-size:10px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.5px">${existingAssignments.length > 0 ? 'Add Assignments' : 'Assignments'}</div>
        <div style="display:flex;gap:4px;font-size:9px;color:var(--text-muted)">
          <span style="font-weight:600">${isPoolMode ? 'Pool' : 'Employee'}</span>
          <span>\u2022</span>
          <span style="font-weight:600">Day</span>
          <span>\u2022</span>
          <span style="font-weight:600">Hours</span>
        </div>
      </div>
      <div id="split-rows" style="display:flex;flex-direction:column;gap:5px">
        ${rowHtml('', '', remainH > 0 ? Math.min(remainH, 8) : 1, false)}

      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
        <button class="btn-outline" style="font-size:9px;padding:3px 8px" onclick="addSplitRow()">+ Add Row</button>
        <div id="split-total" style="font-size:10px;color:var(--text-secondary)"></div>

    const container = document.getElementById('split-rows');
    container.innerHTML = '';
    // Pick days within WO window, or all weekdays

    const perDay = Math.round(remainH / useDates.length * 2) / 2 || 0.5;
    let left = remainH;
    useDates.forEach(d => {
      if (left <= 0) return;
      const h = Math.min(perDay, left, 8);

    // If rounding left a remainder, add to last row
    if (left > 0) {
      const lastHrs = container.lastChild?.querySelector('.sr-hrs');

    const numP = Math.min(matchEmps.length, Math.max(2, Math.ceil(remainH / 4)));
    const perP = Math.round(remainH / numP * 2) / 2 || 0.5;
    let left = remainH;
    for (let i = 0; i < numP && left > 0; i++) {
      const h = Math.min(perP, left, 8);
      left = Math.round((left - h) * 10) / 10;
      container.appendChild(makeRow(matchEmps[i]?.name || '', '', h));
    }
    if (left > 0) {
      const lastHrs = container.lastChild?.querySelector('.sr-hrs');
      if (lastHrs) lastHrs.value = parseFloat(lastHrs.value) + left;
    }
    updateSplitTotal();
  };

  window.evenSplit = function() {
    const container = document.getElementById('split-rows');
    container.innerHTML = '';
    const numP = Math.min(matchEmps.length, 2);
    const validDates = dates.filter(d => {
      if (wo && wo.scheduledStart && d < wo.scheduledStart) return false;
      if (wo && wo.scheduledEnd && d > wo.scheduledEnd) return false;
      return true;
    });
    const useDates = validDates.length > 0 ? validDates.slice(0, 3) : dates.slice(0, 3);
    const slots = numP * useDates.length;
    const perSlot = Math.round(remainH / slots * 2) / 2 || 0.5;
    let left = remainH;
    for (let p = 0; p < numP && left > 0; p++) {
      for (let di = 0; di < useDates.length && left > 0; di++) {
        const h = Math.min(perSlot, left, 8);
        left = Math.round((left - h) * 10) / 10;
        container.appendChild(makeRow(matchEmps[p]?.name || '', useDates[di], h));
      }
    }
    if (left > 0) {
      const lastHrs = container.lastChild?.querySelector('.sr-hrs');
      if (lastHrs) lastHrs.value = parseFloat(lastHrs.value) + left;
    }
    updateSplitTotal();
  };

  window.updateSplitTotal = function() {
    const rows = document.querySelectorAll('#split-rows .split-row');
    let total = 0;
    rows.forEach(r => { total += parseFloat(r.querySelector('.sr-hrs')?.value) || 0; });
    const el = document.getElementById('split-total');
    if (el) {
      const grandTotal = Math.round((assignedH + total) * 10) / 10;
      const color = grandTotal > op.estHours ? '#DC3545' : grandTotal >= op.estHours ? '#28A745' : '#F0AD4E';
      el.innerHTML = `<span style="color:${color};font-weight:600">${total}h in rows</span> \u00b7 ${grandTotal}/${op.estHours}h total`;
    }
  };

  // Wire up hours input changes
  modal.addEventListener('input', e => { if (e.target.classList.contains('sr-hrs')) updateSplitTotal(); });
  updateSplitTotal();

  // Set initial row values after DOM is ready
  const firstRow = modal.querySelector('.split-row');
  if (firstRow && preDate) {
    firstRow.querySelector('.sr-date').value = preDate;
  }

  // ─── Assign All ───
  document.getElementById('m-assign-all').onclick = () => {
    // Save dependency edits
    const depChecks = modal.querySelectorAll('.dep-check');
    if (depChecks.length > 0) {
      const newDeps = [];
      depChecks.forEach(cb => { if (cb.checked) newDeps.push(parseInt(cb.dataset.opseq)); });
      if (wo) {
        const woOp = wo.operations.find(o => o.opSeq === op.opSeq);
        if (woOp) woOp.dependencies = newDeps;
      }
    }

    // Collect and validate all rows
    const rows = document.querySelectorAll('#split-rows .split-row');
    const assignments = [];
    let errors = [];
    rows.forEach((r, i) => {
      const empEl = r.querySelector('.sr-emp');
      const emp = isPoolMode ? '__POOL:' + op.craft : (empEl ? empEl.value : '');
      const date = r.querySelector('.sr-date')?.value;
      const hrs = parseFloat(r.querySelector('.sr-hrs')?.value);
      if (!isPoolMode && !emp && !date && (!hrs || isNaN(hrs))) return; // skip fully empty rows
      if (!isPoolMode && !emp) { errors.push(`Row ${i+1}: pick an employee`); if (empEl) empEl.style.borderColor='#DC3545'; return; }
      if (!date) { errors.push(`Row ${i+1}: pick a day`); r.querySelector('.sr-date').style.borderColor='#DC3545'; return; }
      if (!hrs || hrs <= 0) { errors.push(`Row ${i+1}: enter hours`); r.querySelector('.sr-hrs').style.borderColor='#DC3545'; return; }
      assignments.push({ emp, date, hrs });
    });

    if (assignments.length === 0) {
      if (errors.length > 0) alert(errors.join('\n'));
      return;
    }

    // Date window checks
    for (const a of assignments) {
      if (!checkDateWindow(op.woNumber, a.date)) return;
    }

    // All good — create assignments
    assignments.forEach(a => {
      addAssignment(op.woNumber, op.opSeq, a.emp, a.date, a.hrs);
    });
    modal.remove();
  };
}

          <th style="padding:4px;font-size:10px;color:var(--text-secondary)">Reason</th>
          <th style="text-align:center;padding:4px;font-size:10px;color:var(--text-secondary)">Load</th>
        </tr></thead>
        <tbody>${dayRows}</tbody>
      </table>
      <div class="form-actions" style="margin-top:12px">
        <button class="btn-outline" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
        <button class="btn" id="avail-save">Save Availability</button>
      </div>
    </div>`;
  document.body.appendChild(modal);

  document.getElementById('avail-save').onclick = () => {
    dates.forEach(d => {
      const row = modal.querySelector('select[data-date="' + d + '"]');
      if (!row) return;
      const sel = row.value;
      const customInput = modal.querySelector('input[data-field="custom-hours"][data-date="' + d + '"]');
      const reasonInput = modal.querySelector('input[data-field="reason"][data-date="' + d + '"]');
      const reason = reasonInput ? reasonInput.value.trim() : '';
      
      let hours;
      if (sel === 'custom') {
        hours = parseFloat(customInput?.value) || 0;
      } else {
        hours = parseFloat(sel);
      }
      
      if (hours === emp.hoursPerDay && !reason) {
        // Full day = remove override
        delete state.availability[empName + '|' + d];
      } else {
        state.availability[empName + '|' + d] = { hours, reason };
      }
    });
    saveAvailability();
    modal.remove();
    render();
  };
}


// ─── GANTT VIEW HELPERS ───

// How many days to generate based on zoom level
// Week=7col@120px, Month=30col@56px, Quarter=90col@28px
// All scrollable — user scrolls through the full range
function getGanttDays() {
  if (state.ganttZoom === 'week')    return 90;   // ~13 weeks
  if (state.ganttZoom === 'month')   return 90;   // ~3 months
  if (state.ganttZoom === 'quarter') return 180;  // ~6 months
  return 90;
}
function getGanttCellW() {
  if (state.ganttZoom === 'week')    return 52;   // comfortable week view
  if (state.ganttZoom === 'month')   return 32;   // 4-week overview
  if (state.ganttZoom === 'quarter') return 18;   // quarter overview
  return 52;
}
function getGanttDates() {
  // Always anchor Gantt to the planning week (weekStart minus 7 days for context)
  let start = state.ganttStart;
  if (!start) {
    // Use the planning week as anchor, not old WO dates
    const d = new Date(state.weekStart + 'T00:00:00');
    d.setDate(d.getDate() - 7);
    start = d.toISOString().split('T')[0];
  }
  const base = new Date(start + 'T00:00:00');
  const count = getGanttDays();
  const result = [];
  for (let i = 0; i < count; i++) {
    const d = new Date(base);
    d.setDate(base.getDate() + i);
    result.push(d.toISOString().split('T')[0]);
  }
  return result;
}
// Scroll gantt to show a specific date (used after auto-expand)
function ganttScrollToDate(dateStr) {
  const scroll = document.getElementById('gantt-scroll');
  if (!scroll) return;
  const dates = getGanttDates();
  const idx = dates.indexOf(dateStr);
  if (idx < 0) return;
  scroll.scrollLeft = 280 + idx * getGanttCellW() - 120;
}

function getPriorityColor(p) {
  if (p <= 1) return '#DC3545';
  if (p <= 2) return '#E8712A';
  if (p <= 3) return '#F0AD4E';
  if (p <= 4) return '#28A745';
  return '#6C757D';
}

function renderGanttView(html, dates) {
  const today = new Date().toISOString().split('T')[0];
  const ganttDates = getGanttDates();
  const cellW = getGanttCellW();
  const labelW = 280;
  const WO_H = 44, OP_H = 26, GRP_H = 28, SPACE_H = 4;
  const MONTH_H = 18; // month banner
  const DAY_H   = 28; // day number row

  let wos = state.workOrders.filter(wo => {
    // Only show WOs confirmed in Plan Week (if any are confirmed)
    if (state.confirmedWOs.size > 0 && !state.confirmedWOs.has(wo.woNumber)) return false;
    if (state.filterDept !== 'All' && wo.department !== state.filterDept) return false;
    if (state.filterSupervisor !== 'All' && wo.supervisor !== state.filterSupervisor) return false;
    if (state.filterWOType === 'PM' && !wo.isPM) return false;
    if (state.filterWOType === 'CM' && wo.isPM) return false;
    // Show all confirmed WOs in Gantt regardless of vendor/internal
    // The named/pool distinction only affects the assignment panel (who you can assign)
    return true;
  });
  wos = wos.slice().sort((a,b) => {
    if (a.priority !== b.priority) return a.priority - b.priority;
    return a.isPM === b.isPM ? 0 : a.isPM ? -1 : 1;
  });

  const groups = state.ganttGroupBy === 'dept'
    ? DEPARTMENTS.map(d => ({ label: d, color: (DEPT_COLORS[d]||{}).badge||'#888', wos: wos.filter(w => w.department === d) })).filter(g => g.wos.length)
    : [1,2,3,4,5].map(p => ({ label: `P${p} — ${{1:'Emergency',2:'Urgent',3:'High',4:'Medium',5:'Low'}[p]}`, color: getPriorityColor(p), wos: wos.filter(w => w.priority === p) })).filter(g => g.wos.length);

  const gridW = ganttDates.length * cellW;

  // ── Controls ──
  html += `<div class="gantt-controls">
    <span style="font-size:10px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:1px">ZOOM:</span>
    <button class="gantt-zoom-btn ${state.ganttZoom==='week'?'active':''}"    onclick="state.ganttZoom='week';render()">Week</button>
    <button class="gantt-zoom-btn ${state.ganttZoom==='month'?'active':''}"   onclick="state.ganttZoom='month';render()">Month</button>
    <button class="gantt-zoom-btn ${state.ganttZoom==='quarter'?'active':''}" onclick="state.ganttZoom='quarter';render()">Quarter</button>
    <div style="width:1px;height:18px;background:var(--border);margin:0 4px"></div>
    <button class="gantt-zoom-btn" onclick="ganttExpandAll()" title="Expand all WOs to show operations">⊞ Expand All</button>
    <button class="gantt-zoom-btn" onclick="ganttCollapseAll()" title="Collapse all WOs">⊟ Collapse All</button>
    <button class="gantt-zoom-btn ${state.ganttGroupBy==='dept'?'active':''}" onclick="state.ganttGroupBy='dept';render()">By Dept</button>
    <button class="gantt-zoom-btn ${state.ganttGroupBy==='priority'?'active':''}" onclick="state.ganttGroupBy='priority';render()">By Priority</button>
    <button class="gantt-zoom-btn ${state.ganttGroupBy==='people'?'active':''}" onclick="state.ganttGroupBy='people';render()" style="${state.ganttGroupBy==='people'?'background:#28A745;color:#FFF;':''}">👥 People</button>
    <div class="gantt-legend">
      <div class="gantt-legend-item"><div class="gantt-legend-swatch" style="background:#28A745"></div>Low/Med</div>
      <div class="gantt-legend-item"><div class="gantt-legend-swatch" style="background:#F0AD4E"></div>High</div>
      <div class="gantt-legend-item"><div class="gantt-legend-swatch" style="background:#E8712A"></div>Urgent</div>
      <div class="gantt-legend-item"><div class="gantt-legend-swatch" style="background:#DC3545"></div>Emergency</div>
      <div class="gantt-legend-item"><div class="gantt-legend-swatch" style="background:#17A2B8"></div>PM</div>
    </div>
    <div style="flex:1"></div>
    <span style="font-size:10px;color:var(--text-muted)">Scroll ← → through dates · Drag bars to move · ⋮ to resize</span>
  </div>`;

  // ══════════════════════════════════════════
  // SINGLE scroll container — both axes
  // ══════════════════════════════════════════
  html += `<div id="gantt-scroll" onscroll="ganttScrollHandler(this)"
    style="flex:1;overflow:auto;min-height:0;position:relative">
    <div id="gantt-grid-inner" style="min-width:${labelW + gridW}px;position:relative">`;
  // SVG dep-lines overlay (sits on top, pointer-events:none)
  html += `<svg id="gantt-dep-svg" style="position:absolute;top:0;left:0;pointer-events:none;overflow:visible;z-index:10"></svg>`;

  // ────────────────────────────────────────
  // HEADER: two sticky rows
  //   Row 1 (MONTH_H): Month name banners   ← always shown
  //   Row 2 (DAY_H):   Day number columns
  // ────────────────────────────────────────

  // ── Row 1: Month banners (sticky top:0) ──
  html += `<div style="display:flex;height:${MONTH_H}px;position:sticky;top:0;z-index:12;background:var(--bg-card)">`;
  // Corner
  html += `<div style="width:${labelW}px;min-width:${labelW}px;flex-shrink:0;
    position:sticky;left:0;z-index:14;
    background:var(--bg-card);border-right:2px solid var(--border);border-bottom:1px solid var(--border);
    display:flex;align-items:center;padding:0 10px;
    font-size:10px;font-weight:700;color:var(--text-secondary);box-sizing:border-box">
    Work Order / Operation
  </div>`;
  // Month spans
  {
    let curM = '', spanW = 0;
    const flush = (m, w) => {
      const label = new Date(m+'-01T00:00:00').toLocaleString('default',{month:'long',year:'numeric'});
      html += `<div style="width:${w}px;flex-shrink:0;box-sizing:border-box;
        border-right:2px solid var(--accent);border-bottom:1px solid var(--border);
        padding:2px 6px;font-size:${w<60?8:10}px;font-weight:700;
        color:var(--accent);background:var(--bg-card);
        overflow:hidden;white-space:nowrap;display:flex;align-items:center">${label}</div>`;
    };
    ganttDates.forEach((d, i) => {
      const m = d.slice(0,7);
      if (m !== curM) {
        if (curM) flush(curM, spanW);
        curM = m; spanW = cellW;
      } else {
        spanW += cellW;
      }
      if (i === ganttDates.length-1) flush(curM, spanW);
    });
  }
  html += `</div>`; // end month row

  // ── Row 2: Day columns (sticky top:MONTH_H) ──
  html += `<div style="display:flex;height:${DAY_H}px;position:sticky;top:${MONTH_H}px;z-index:12;
    background:var(--bg-card);border-bottom:2px solid var(--accent)">`;
  // Corner (bottom part — same left sticky, no text)
  html += `<div style="width:${labelW}px;min-width:${labelW}px;flex-shrink:0;
    position:sticky;left:0;z-index:14;
    background:var(--bg-card);border-right:2px solid var(--border);box-sizing:border-box"></div>`;
  // Day cells
  ganttDates.forEach((d, i) => {
    const dt    = new Date(d+'T00:00:00');
    const dow   = ['Su','Mo','Tu','We','Th','Fr','Sa'][dt.getDay()];
    const isWE  = [0,6].includes(dt.getDay());
    const isTod = d === today;
    const isMon = dt.getDate() === 1;  // first of month
    const dayN  = dt.getDate();
    const showDow = cellW >= 42;
    html += `<div style="width:${cellW}px;min-width:${cellW}px;flex-shrink:0;
      text-align:center;box-sizing:border-box;
      border-right:${isMon&&i>0?'2px solid var(--accent)':'1px solid var(--border)'};
      padding:2px 0;line-height:1.25;overflow:hidden;
      color:${isTod?'var(--accent)':isWE?'var(--text-muted)':'var(--text-secondary)'};
      background:${isTod?'var(--accent-glow)':'transparent'};
      font-weight:${isTod?700:isWE?400:500}">
      ${showDow?`<div style="font-size:8px;opacity:0.7">${dow}</div>`:''}
      <div style="font-size:${cellW<28?8:10}px;font-weight:${isTod||isMon?700:400}">${dayN}</div>
    </div>`;
  });
  html += `</div>`; // end day row

  // ────────────────────────────────────────
  // DATA ROWS
  // ────────────────────────────────────────
  if (!wos.length) {
    const hasVendorConfirmed = state.resourceMode === 'named' && [...state.confirmedWOs].some(woNum => {
      const wo = state.workOrders.find(w => w.woNumber === woNum);
      return wo && wo.isExternal;
    });
    html += `<div style="display:flex;flex-direction:column;height:100px;align-items:center;justify-content:center;color:var(--text-muted);gap:8px">
      <div>No work orders match current filters</div>
      ${hasVendorConfirmed ? `<div style="font-size:10px">Vendor/contractor WOs are confirmed but hidden in Named mode. <button class="btn-outline" style="font-size:10px;padding:3px 10px;color:#F0AD4E;border-color:#F0AD4E66" onclick="state.resourceMode='pool';render()">Switch to Pool Mode</button> to assign vendors.</div>` : ''}
      ${state.confirmedWOs.size === 0 ? '<div style="font-size:10px">Go to <a href="#" onclick="event.preventDefault();setView(\'plan\')" style="color:var(--accent)">Plan Week</a> to confirm WOs first.</div>' : ''}
    </div>`;
  }

  const mkLabel = (h, borderColor, content, bg='var(--bg-surface)', indent=0, extras='') =>
    `<div ${extras} style="width:${labelW}px;min-width:${labelW}px;flex-shrink:0;
      position:sticky;left:0;z-index:6;background:${bg};
      border-bottom:1px solid var(--border);
      border-left:${borderColor?`3px solid ${borderColor}`:'none'};
      padding-left:${indent+8}px;
      border-right:2px solid var(--border);
      height:${h}px;box-sizing:border-box;display:flex;align-items:center;
      padding-right:4px;overflow:hidden;${extras.includes('onclick')?'cursor:pointer':''}">${content}</div>`;

  const mkCells = (h, bg) => ganttDates.map((d,i) => {
    const isWE = [0,6].includes(new Date(d+'T00:00:00').getDay());
    const isTod = d === today;
    const isMon = new Date(d+'T00:00:00').getDate()===1;
    return `<div style="width:${cellW}px;flex-shrink:0;height:${h}px;box-sizing:border-box;
      border-right:${isMon&&i>0?'2px solid var(--accent)':'1px solid var(--border)'};
      border-bottom:1px solid var(--border);
      background:${isTod?'var(--accent-glow)':bg(d,isWE)}"></div>`;
  }).join('');

  if (state.ganttGroupBy !== 'people') {
    groups.forEach(grp => {
    // Group header row
    html += `<div style="display:flex;height:${GRP_H}px">`;
    html += mkLabel(GRP_H, null,
      `<span style="color:${grp.color};font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px">${grp.label}</span>
       <span style="font-size:9px;color:var(--text-secondary);margin-left:6px">${grp.wos.length} WO${grp.wos.length!==1?'s':''}</span>`,
      'var(--bg-card)');
    html += ganttDates.map((d,i) => {
      const isWE = [0,6].includes(new Date(d+'T00:00:00').getDay());
      const isMon = new Date(d+'T00:00:00').getDate()===1;
      return `<div style="width:${cellW}px;flex-shrink:0;height:${GRP_H}px;
        border-right:${isMon&&i>0?'2px solid var(--accent)':'1px solid var(--border)'};
        border-bottom:1px solid var(--border);
        background:${isWE?'var(--bg-surface)':'var(--bg-card)'}"></div>`;
    }).join('');
    html += `</div>`;

    grp.wos.forEach(wo => {
      const pColor   = getPriorityColor(wo.priority);
      const barColor = wo.isPM ? '#17A2B8' : pColor;
      const ws  = wo.scheduledStart ? wo.scheduledStart.slice(0,10) : '';
      const we  = wo.scheduledEnd   ? wo.scheduledEnd.slice(0,10)   : '';
      const allA = state.assignments.filter(a => a.woNumber===wo.woNumber && !isPoolAssignment(a));
      const pct  = allA.length ? Math.round(allA.filter(a=>a.status==='Complete').length/allA.length*100) : 0;
      const estH   = wo.operations.reduce((s,o) => s + (o.estHours||0), 0);
      const schedH = state.assignments.filter(a => a.woNumber===wo.woNumber).reduce((s,a) => s + (a.hours||0), 0);

      // Bar position (clamped to visible range for display; -1 = not in range)
      const bStart = ws ? ganttDates.findIndex(d => d >= ws) : -1;
      let   bEnd   = -1;
      if (we) {
        for (let i = ganttDates.length-1; i >= 0; i--) {
          if (ganttDates[i] <= we) { bEnd = i; break; }
        }
      }
      const bSpan  = (bStart>=0 && bEnd>=bStart) ? bEnd-bStart+1 : bStart>=0 && bEnd<0 ? 1 : 0;
      const barInRange = bStart >= 0 && bSpan > 0;

      // ── WO Row ──
      const isExp = state.ganttExpanded.has(wo.woNumber);
      html += `<div style="display:flex;height:${WO_H}px;position:relative"
        ondragover="ganttWORowOver(event,'${escAttr(wo.woNumber)}')"
        ondrop="ganttWORowDrop(event,'${escAttr(wo.woNumber)}')">`;

      html += mkLabel(WO_H, barColor,
        `<div style="min-width:0;flex:1;display:flex;align-items:center;gap:6px;cursor:pointer"
          onclick="ganttToggleWO('${escAttr(wo.woNumber)}')">
          <span style="font-size:11px;color:var(--text-secondary);flex-shrink:0;
            display:inline-block;transition:transform 0.15s;
            transform:${isExp?'rotate(90deg)':'rotate(0)'}"
          >▶</span>
          <div style="min-width:0;flex:1">
            <div style="display:flex;align-items:center;gap:4px;margin-bottom:1px">
              <span style="font-weight:700;color:var(--accent);font-size:11px">${wo.woNumber}</span>
              ${wo.isPM?'<span style="font-size:7px;background:#17A2B822;color:#17A2B8;border:1px solid #17A2B844;padding:1px 3px;border-radius:2px">PM</span>':''}
              <span style="font-size:7px;background:${pColor}22;color:${pColor};border:1px solid ${pColor}44;padding:1px 3px;border-radius:2px">P${wo.priority}</span>
              <span style="font-size:8px;color:var(--text-muted)">${wo.operations.length}op</span>
            </div>
            <div style="font-size:10px;color:var(--text-primary);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;max-width:${labelW-44}px" title="${wo.description.replace(/"/g,'')}">${wo.description}</div>
            <div style="font-size:9px;color:var(--text-secondary)">${wo.department}${ws?' · '+fmtDate(ws)+'–'+fmtDate(we):''}</div>
          </div>
        </div>`);

      // Day cells (tinted in bar range) — each cell must accept WO resize/move drops
      html += ganttDates.map((d,i) => {
        const isWE  = [0,6].includes(new Date(d+'T00:00:00').getDay());
        const isTod = d === today;
        const inB   = ws&&we&&d>=ws&&d<=we;
        const isMon = new Date(d+'T00:00:00').getDate()===1;
        return `<div
          ondragover="ganttWORowOver(event,'${escAttr(wo.woNumber)}')"
          ondrop="ganttWORowDrop(event,'${escAttr(wo.woNumber)}')"
          style="width:${cellW}px;flex-shrink:0;height:${WO_H}px;box-sizing:border-box;
          border-right:${isMon&&i>0?'2px solid var(--accent)':'1px solid var(--border)'};
          border-bottom:1px solid var(--border);
          background:${isTod?'var(--accent-glow)':inB?barColor+'15':isWE?'var(--bg-surface)':'var(--cell-bg)'}"></div>`;
      }).join('');

      // ── WO Bar overlay ── (absolute on the row div)
      if (barInRange) {
        const barLeft = labelW + bStart * cellW + 2;
        const barWid  = Math.max(bSpan * cellW - 4, 8);
        const handleW = Math.min(10, Math.floor(barWid/4));
        html += `<div class="gantt-bar${wo.isPM?' pm-bar':''}${pct===100?' complete-bar':''}"
          draggable="true"
          ondragstart="ganttBarDragStart(event,'${wo.woNumber}')"
          ondragend="ganttBarDragEnd(event)"
          ondragover="event.stopPropagation();ganttWORowOver(event,'${escAttr(wo.woNumber)}')"
          ondrop="event.stopPropagation();ganttWORowDrop(event,'${escAttr(wo.woNumber)}')"
          onclick="event.stopPropagation()"
          title="${wo.woNumber}: ${wo.description}&#10;${ws?fmtDate(ws)+' → '+fmtDate(we):'No dates set'}&#10;${pct}% complete&#10;↔ Drag bar to move · ◁ left handle to change start · ▷ right handle to change end"
          style="position:absolute;top:50%;transform:translateY(-50%);
            left:${barLeft}px;width:${barWid}px;height:28px;
            background:${barColor};z-index:4;border-radius:4px;
            display:flex;align-items:center;overflow:hidden;
            box-shadow:0 1px 6px #00000055;cursor:grab;pointer-events:auto">
          <!-- Progress fill -->
          <div style="position:absolute;left:0;top:0;bottom:0;width:${pct}%;background:rgba(255,255,255,0.2);pointer-events:none;border-radius:4px 0 0 4px"></div>
          <!-- LEFT resize handle (change start date) -->
          <div draggable="true"
            ondragstart="ganttResizeLeftStart(event,'${wo.woNumber}')"
            ondragend="ganttResizeDragEnd(event)"
            ondragover="event.stopPropagation();event.preventDefault()"
            onclick="event.stopPropagation()"
            style="position:absolute;left:0;top:0;bottom:0;width:${handleW}px;
              cursor:w-resize;background:rgba(0,0,0,0.25);border-radius:4px 0 0 4px;
              display:flex;align-items:center;justify-content:center;z-index:6;flex-shrink:0"
            title="Drag to change start date">◁</div>
          <!-- Label -->
          <span style="position:relative;z-index:1;padding:0 ${handleW+2}px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:9px;font-weight:700;color:#FFF;flex:1;min-width:0;text-align:center">
            ${barWid>60?wo.woNumber+(barWid>110?' · '+wo.description.substring(0,barWid>180?16:9)+(wo.description.length>(barWid>180?16:9)?'…':''):'')+(barWid>155?'  '+schedH.toFixed(1)+'/'+estH.toFixed(1)+'h':''):''}
          </span>
          <!-- RIGHT resize handle (change end date) -->
          <div draggable="true"
            ondragstart="ganttResizeRightStart(event,'${wo.woNumber}')"
            ondragend="ganttResizeDragEnd(event)"
            ondragover="event.stopPropagation();event.preventDefault()"
            onclick="event.stopPropagation()"
            style="position:absolute;right:0;top:0;bottom:0;width:${handleW}px;
              cursor:e-resize;background:rgba(0,0,0,0.25);border-radius:0 4px 4px 0;
              display:flex;align-items:center;justify-content:center;z-index:6;flex-shrink:0"
            title="Drag to change end date">▷</div>
        </div>`;
      }
      html += `</div>`; // end WO row

      // ── Op Rows ── (only if this WO is expanded)
      if (isExp) {
        wo.operations.forEach(op => {
          const allA  = state.assignments.filter(a=>a.woNumber===wo.woNumber&&a.opSeq===op.opSeq);
          const empA  = allA.filter(a=>!isPoolAssignment(a));
          const poolA = allA.filter(a=>isPoolAssignment(a));
          const cc    = gc(op.craft);
          const empByDate={}, poolByDate={};
          empA.forEach(a  => { if(!empByDate[a.date])  empByDate[a.date]  = []; empByDate[a.date].push(a);  });
          poolA.forEach(a => { if(!poolByDate[a.date]) poolByDate[a.date] = []; poolByDate[a.date].push(a); });
          const namedHrs = empA.reduce((s,a)=>s+a.hours,0);
          const poolHrs  = poolA.reduce((s,a)=>s+a.hours,0);
          const poolMode = state.resourceMode === 'pool';
          // In pool mode, pool hrs count toward full; in named mode, only named employee hrs count
          const coveredHrs = poolMode ? (namedHrs + poolHrs) : namedHrs;
          const full     = coveredHrs >= op.estHours && (empA.length > 0 || (poolMode && poolA.length > 0));
          const part     = (empA.length > 0 || (poolMode && poolA.length > 0)) && !full;
          const poolOnly = poolA.length > 0 && empA.length === 0 && !poolMode; // pool assigned but site uses named mode
          const sc       = full?'#28A745':part?'#F0AD4E':poolOnly?'#17A2B8':'#6C757D';
          const sl       = full?'✓':part?'~':poolOnly?'pool':'open';

          // ── Op span bar: earliest → latest assignment date ──
          // opStart/opEnd stored on op (or derived from assignments)
          const assignedDates = allA.map(a=>a.date).sort();
          const opStart = op.schedStart || (assignedDates.length ? assignedDates[0] : ws);
          const opEnd   = op.schedEnd   || (assignedDates.length ? assignedDates[assignedDates.length-1] : we);

          // Bar position in ganttDates
          const obStart = opStart ? ganttDates.findIndex(d => d >= opStart) : -1;
          let   obEnd   = -1;
          if (opEnd) { for(let i=ganttDates.length-1;i>=0;i--){ if(ganttDates[i]<=opEnd){obEnd=i;break;} } }
          const obSpan  = (obStart>=0 && obEnd>=obStart) ? obEnd-obStart+1 : 0;
          const opInRange = obStart>=0 && obSpan>0;

          html += `<div style="display:flex;height:${OP_H}px;position:relative"
            ondragover="ganttOpRowOver(event,'${escAttr(wo.woNumber)}',${op.opSeq})"
            ondrop="ganttOpRowDrop(event,'${escAttr(wo.woNumber)}',${op.opSeq})">`;

          html += mkLabel(OP_H, cc.badge+'55',
            `<span style="color:var(--text-muted);font-size:8px;flex-shrink:0;margin-right:2px">Op${op.opSeq}</span>
             <span class="tag" style="background:${cc.badge};font-size:7px;padding:1px 3px;flex-shrink:0">${op.craft}</span>
             ${op.isExternal ? '<span class="tag" style="background:#F0AD4E;font-size:7px;padding:1px 3px;flex-shrink:0">VENDOR</span>' : ''}
             <span style="font-size:9px;color:var(--text-secondary);flex:1;min-width:0;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;margin-left:3px">${op.description}</span>
             <span style="font-size:7px;color:var(--text-muted);flex-shrink:0;margin-right:2px">${op.estHours}h</span>
             <span style="font-size:7px;padding:1px 3px;border-radius:2px;background:${sc}22;color:${sc};border:1px solid ${sc}33;flex-shrink:0">${sl}</span>`,
            'var(--bg-base)', 8,
            `onclick="ganttHoursOpen(event,'${escAttr(wo.woNumber)}',${op.opSeq})" title="Click to assign"`);

          // Day cells (background tint only — no individual chips, bar overlay handles interaction)
          ganttDates.forEach((d,i) => {
            const inW   = ws&&we&&d>=ws&&d<=we;
            const inOp  = opStart&&opEnd&&d>=opStart&&d<=opEnd;
            const isWE  = [0,6].includes(new Date(d+'T00:00:00').getDay());
            const isTod = d === today;
            const isMon = new Date(d+'T00:00:00').getDate()===1;
            const dayEmp  = empByDate[d]  || [];
            const dayPool = poolByDate[d] || [];
            const hasPeople = dayEmp.length || dayPool.length;
            html += `<div style="width:${cellW}px;flex-shrink:0;height:${OP_H}px;position:relative;
              border-right:${isMon&&i>0?'2px solid var(--accent)':'1px solid var(--border)'};
              border-bottom:1px solid var(--border);box-sizing:border-box;
              background:${isTod?'var(--accent-glow)':inW?cc.badge+'08':isWE?'var(--bg-surface)':'transparent'}">`;
            // Small dot indicator for assigned people (visible through transparent bar)
            if (hasPeople && inOp) {
              const cnt = dayEmp.length + dayPool.length;
              html += `<div style="position:absolute;bottom:3px;left:50%;transform:translateX(-50%);
                font-size:7px;color:#FFF;background:rgba(0,0,0,0.3);border-radius:2px;padding:0 2px;z-index:6;pointer-events:none">${cnt}p</div>`;
            }
            html += `</div>`;
          });

          // ── Op bar overlay (like WO bar but thinner) ──
          if (opInRange) {
            const hw = Math.min(8, Math.floor(obSpan*cellW/4)); // handle width
            const barLeft = labelW + obStart * cellW + 1;
            const barWid  = Math.max(obSpan * cellW - 2, 10);
            const totalHrs = allA.reduce((s,a)=>s+a.hours,0);
            html += `<div class="gantt-op-bar"
              data-dep-node="${wo.woNumber}:${op.opSeq}"
              draggable="true"
              ondragstart="ganttOpBarDragStart(event,'${wo.woNumber}',${op.opSeq})"
              ondragend="ganttOpBarDragEnd(event)"
              ondragover="event.stopPropagation();ganttOpRowOver(event,'${escAttr(wo.woNumber)}',${op.opSeq})"
              ondrop="event.stopPropagation();ganttOpRowDrop(event,'${escAttr(wo.woNumber)}',${op.opSeq})"
              onclick="event.stopPropagation();ganttHoursOpen(event,'${escAttr(wo.woNumber)}',${op.opSeq})"
              title="Op${op.opSeq}: ${op.description}&#10;${op.craft} · ${op.estHours}h est · ${totalHrs}h scheduled&#10;${opStart?fmtDate(opStart)+'→'+fmtDate(opEnd):'No dates'}&#10;◁ left/▷ right to resize · drag to move"
              style="position:absolute;top:4px;
                left:${barLeft}px;width:${barWid}px;height:${OP_H-8}px;
                background:${cc.badge};opacity:0.88;z-index:4;border-radius:3px;
                display:flex;align-items:center;overflow:hidden;
                box-shadow:0 1px 3px #00000033;cursor:grab;pointer-events:auto">
              <!-- LEFT resize handle -->
              <div draggable="true"
                ondragstart="ganttOpResizeLeftStart(event,'${wo.woNumber}',${op.opSeq})"
                ondragend="ganttOpBarDragEnd(event)"
                ondragover="event.stopPropagation();event.preventDefault()"
                onclick="event.stopPropagation()"
                style="width:${hw}px;height:100%;background:rgba(0,0,0,0.25);flex-shrink:0;
                  cursor:w-resize;display:flex;align-items:center;justify-content:center;border-radius:3px 0 0 3px"
                title="Drag to change op start date">◁</div>
              <!-- Label -->
              <span style="flex:1;min-width:0;padding:0 2px;font-size:${cellW<28?7:8}px;
                font-weight:700;color:#FFF;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;text-align:center">
                ${barWid>50?'Op'+op.opSeq+(barWid>90?' '+op.description.substring(0,8)+(op.description.length>8?'…':''):''):''}
              </span>
              <!-- Employee initials bubbles -->
              ${(() => {
                const names = [...new Set(empA.map(a=>a.employeeName))];
                if (!names.length && !poolA.length) return '';
                const show = names.slice(0,3);
                const extra = names.length - show.length + (poolA.length ? 1 : 0);
                let html2 = '<span style="display:flex;gap:1px;align-items:center;padding-right:2px;flex-shrink:0">';
                if (poolA.length) html2 += '<span style="width:14px;height:14px;border-radius:50%;background:rgba(23,162,184,0.85);color:#FFF;font-size:6px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid rgba(255,255,255,0.3)" title="Pool">◉</span>';
                show.forEach(n => {
                  const ini = n.split(' ').map(w=>w[0]||'').join('').substring(0,2).toUpperCase();
                  html2 += '<span style="width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,0.25);color:#FFF;font-size:6px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid rgba(255,255,255,0.4)" title="' + n + '">' + ini + '</span>';
                });
                if (extra > 0) html2 += '<span style="width:14px;height:14px;border-radius:50%;background:rgba(0,0,0,0.3);color:#FFF;font-size:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0">+' + extra + '</span>';
                html2 += '</span>';
                return html2;
              })()}
              <!-- RIGHT resize handle -->
              <div draggable="true"
                ondragstart="ganttOpResizeRightStart(event,'${wo.woNumber}',${op.opSeq})"
                ondragend="ganttOpBarDragEnd(event)"
                ondragover="event.stopPropagation();event.preventDefault()"
                onclick="event.stopPropagation()"
                style="width:${hw}px;height:100%;background:rgba(0,0,0,0.25);flex-shrink:0;
                  cursor:e-resize;display:flex;align-items:center;justify-content:center;border-radius:0 3px 3px 0"
                title="Drag to change op end date">▷</div>
            </div>`;
          }

          html += `</div>`; // end op row
        });

        // Spacer between WOs
        html += `<div style="display:flex;height:${SPACE_H}px">
          <div style="width:${labelW}px;min-width:${labelW}px;flex-shrink:0;position:sticky;left:0;z-index:6;
            background:var(--bg-base);border-bottom:2px solid var(--border);border-right:2px solid var(--border)"></div>
          <div style="flex:1;min-width:${gridW}px;border-bottom:2px solid var(--border)"></div>
        </div>`;
      }
    });
  });

  html += `</div></div>`; // close min-width wrapper + gantt-scroll

  // Hint element for auto-scroll to current week
  const weekIdx = ganttDates.indexOf(state.weekStart);
  const scrollIdx = weekIdx >= 0 ? weekIdx : ganttDates.findIndex(d => d >= state.weekStart);
  if (scrollIdx > 0) {
    html += `<div id="gantt-autoscroll" data-idx="${scrollIdx}" data-cw="${cellW}" data-lw="${labelW}" style="display:none"></div>`;
  }

  } else {
    // ── PEOPLE VIEW: employee rows with their op bars ──────────────
    const craftFilter = state.filterCraft !== 'All' ? state.filterCraft : null;
    const deptFilter  = state.filterDept  !== 'All' ? state.filterDept  : null;
    let visEmps = state.employees.filter(e => {
      if (craftFilter && e.craft !== craftFilter) return false;
      if (deptFilter  && e.department !== deptFilter) return false;
      return true;
    });
    if (!visEmps.length) visEmps = state.employees;

    // Group employees by department
    const empDepts = [...new Set(visEmps.map(e => e.department))];
    empDepts.forEach(dept => {
      const deptEmps = visEmps.filter(e => e.department === dept);
      const dc = DEPT_COLORS[dept] || {};

      // Dept header
      html += `<div style="display:flex;height:${GRP_H}px">`;
      html += mkLabel(GRP_H, null,
        `<span style="color:${dc.badge||'#888'};font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px">${dept}</span>
         <span style="font-size:9px;color:var(--text-secondary);margin-left:6px">${deptEmps.length} emp</span>`
      );
      html += `<div style="flex:1;background:${dc.badge||'#888'}12;border-bottom:1px solid ${dc.badge||'#888'}33;display:flex">`;
      ganttDates.forEach((d,i) => {
        const isMon = new Date(d+'T00:00:00').getDate()===1;
        html += `<div style="width:${cellW}px;flex-shrink:0;border-right:${isMon&&i>0?'2px solid var(--accent)':'1px solid var(--border)'}"></div>`;
      });
      html += `</div></div>`;

      deptEmps.forEach(emp => {
        const wkLoad  = getEmpWeekLoad(emp.name);
        const wkAvail = getEmpWeekAvail(emp.name);
        const wkPct   = wkAvail > 0 ? Math.min(100, wkLoad/wkAvail*100) : 0;
        const wkColor = wkPct > 95 ? '#DC3545' : wkPct > 80 ? '#F0AD4E' : '#28A745';
        const ini = emp.name.split(' ').map(w=>w[0]||'').join('').substring(0,2).toUpperCase();
        const cc = gc(emp.craft);

        // Employee label
        const empLabel = `<div style="display:flex;align-items:center;gap:6px;padding:0 8px;height:100%">
          <span style="width:22px;height:22px;border-radius:50%;background:${cc.badge};color:#FFF;font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">${ini}</span>
          <div style="flex:1;min-width:0">
            <div style="font-size:10px;font-weight:600;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${emp.name}</div>
            <div style="font-size:8px;color:var(--text-secondary)">${emp.craft}</div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-size:9px;font-weight:700;color:${wkColor}">${wkPct.toFixed(0)}%</div>
            <div style="font-size:8px;color:var(--text-secondary)">${wkLoad.toFixed(0)}/${wkAvail}h</div>
          </div>
        </div>`;

        html += `<div style="display:flex;height:${OP_H+4}px;border-bottom:1px solid var(--border)44">`;
        html += mkLabel(OP_H+4, null, empLabel);
        html += `<div style="flex:1;position:relative;display:flex">`;

        // Day cells
        ganttDates.forEach((d,i) => {
          const dayAvail = getEmpAvailHours ? getEmpAvailHours(emp.name, d) : emp.hoursPerDay;
          const isOff = dayAvail === 0;
          const isMon = new Date(d+'T00:00:00').getDate()===1;
          html += `<div style="width:${cellW}px;flex-shrink:0;height:100%;position:relative;
            border-right:${isMon&&i>0?'2px solid var(--accent)':'1px solid var(--border)'};
            box-sizing:border-box;
            ${isOff?'background:repeating-linear-gradient(45deg,transparent,transparent 3px,var(--border) 3px,var(--border) 4px)':''}">`;
          html += `</div>`;
        });

        // Op bars — all assignments for this employee across the gantt range
        const empAssigns = state.assignments.filter(a => a.employeeName === emp.name && ganttDates.includes(a.date));
        empAssigns.forEach(a => {
          const op = getAllOps().find(o => o.woNumber === a.woNumber && o.opSeq === a.opSeq);
          if (!op) return;
          const dayIdx = ganttDates.indexOf(a.date);
          if (dayIdx < 0) return;
          const occ = typeof gc === 'function' ? gc(op.craft) : cc;
          const wo = state.workOrders.find(w => w.woNumber === a.woNumber);
          const isDone = a.status === 'Complete';
          const barColor = isDone ? '#28A745' : occ.badge;
          const dayAvail = getEmpAvailHours ? getEmpAvailHours(emp.name, a.date) : emp.hoursPerDay;
          const dayLoad = getEmpLoad ? getEmpLoad(emp.name, a.date) : a.hours;
          const overloaded = dayLoad > dayAvail;
          const barLeft = dayIdx * cellW + 1;
          const barW = Math.max(cellW - 2, 10);
          // Height proportional to hours vs dayAvail
          const hPct = dayAvail > 0 ? Math.min(1, a.hours / dayAvail) : 0.5;
          const barH = Math.max(6, Math.round((OP_H - 2) * hPct));
          const barTop = (OP_H + 4 - barH) / 2;

          html += `<div title="${escAttr(a.woNumber)} Op${a.opSeq}: ${escAttr(op.description)}\n${a.hours}h · ${fmtDate(a.date)}\nClick to view assignment"
            onclick="ganttHoursOpen(event,'${escAttr(a.woNumber)}',${a.opSeq})"
            style="position:absolute;left:${barLeft}px;top:${barTop}px;width:${barW}px;height:${barH}px;
              background:${barColor};border-radius:3px;opacity:0.85;cursor:pointer;z-index:4;
              overflow:hidden;display:flex;align-items:center;justify-content:center;
              ${overloaded?'border:2px solid #DC3545':''}
              box-shadow:0 1px 3px #00000033">
            <span style="font-size:${cellW<28?6:7}px;font-weight:700;color:#FFF;overflow:hidden;white-space:nowrap;padding:0 2px">
              ${cellW>40?a.woNumber.replace('WO-','')+(cellW>70?' Op'+a.opSeq:''):''}
            </span>
          </div>`;
        });

        html += `</div></div>`;
      });
    });

    // Pool assignments row
    const poolAssigns = state.assignments.filter(a => isPoolAssignment(a) && ganttDates.includes(a.date));
    if (poolAssigns.length) {
      html += `<div style="display:flex;height:${OP_H+4}px;border-bottom:1px solid var(--border)44">`;
      html += mkLabel(OP_H+4, null,
        `<div style="display:flex;align-items:center;gap:6px;padding:0 8px;height:100%">
          <span style="width:22px;height:22px;border-radius:50%;background:#17A2B8;color:#FFF;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center">◉</span>
          <div><div style="font-size:10px;font-weight:600;color:#17A2B8">Resource Pool</div>
          <div style="font-size:8px;color:var(--text-secondary)">${poolAssigns.length} ops</div></div>
        </div>`);
      html += `<div style="flex:1;position:relative;display:flex">`;
      ganttDates.forEach((d,i) => {
        const isMon = new Date(d+'T00:00:00').getDate()===1;
        html += `<div style="width:${cellW}px;flex-shrink:0;height:100%;border-right:${isMon&&i>0?'2px solid var(--accent)':'1px solid var(--border)'}"></div>`;
      });
      poolAssigns.forEach(a => {
        const op = getAllOps().find(o => o.woNumber === a.woNumber && o.opSeq === a.opSeq);
        if (!op) return;
        const dayIdx = ganttDates.indexOf(a.date);
        if (dayIdx < 0) return;
        const occ = typeof gc === 'function' ? gc(op.craft) : { badge: '#17A2B8' };
        html += `<div title="${escAttr(a.woNumber)} Op${a.opSeq}\n${a.hours}h pool · ${fmtDate(a.date)}"
          onclick="ganttHoursOpen(event,'${escAttr(a.woNumber)}',${a.opSeq})"
          style="position:absolute;left:${dayIdx*cellW+1}px;top:2px;width:${Math.max(cellW-2,10)}px;height:${OP_H}px;
            background:#17A2B8;border-radius:3px;opacity:0.8;cursor:pointer;z-index:4;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px #00000033">
          <span style="font-size:7px;font-weight:700;color:#FFF">${cellW>40?a.woNumber.replace('WO-',''):''}</span>
        </div>`;
      });
      html += `</div></div>`;
    }
  }

    html += `</div>`; // end gantt-grid-inner
  return html;
}

function ganttScrollHandler(el) {
  // Redraw dep lines on scroll so they stay aligned with bars
  if (state.showDepLines) requestAnimationFrame(drawGanttDepLines);
}

function ganttAutoScroll() {
  const hint = document.getElementById('gantt-autoscroll');
  if (!hint) return;
  const scroll = document.getElementById('gantt-scroll');
  if (!scroll || scroll.dataset.autoScrolled) return;
  scroll.dataset.autoScrolled = '1';
  const idx = parseInt(hint.dataset.idx);
  const cw  = parseInt(hint.dataset.cw);
  const lw  = parseInt(hint.dataset.lw);
  // Left-align to current week start (small left margin)
  scroll.scrollLeft = Math.max(0, idx * cw - 8);
}

// ══════════════════════════════════════════════════════════
// GANTT DRAG STATE — single object, no ambiguity
// type: 'bar' | 'resize-left' | 'resize-right' | 'chip'
// ══════════════════════════════════════════════════════════
const ganttDS = { type: null, woNumber: null, opSeq: null, fromDate: null, grabOffsetPx: 0 };

function _gcw()  { return getGanttCellW(); }
function _glw()  { return 280; }

// clientX → column index in ganttDates[]
function _ganttCol(clientX, grabOffset) {
  const scroll = document.getElementById('gantt-scroll');
  if (!scroll) return 0;
  const rect = scroll.getBoundingClientRect();
  const relX  = (clientX - rect.left) + scroll.scrollLeft - _glw() - (grabOffset || 0);
  const dates  = getGanttDates();
  return Math.max(0, Math.min(dates.length - 1, Math.floor(relX / _gcw())));
}
function _ganttColDate(clientX, grabOffset) {
  return getGanttDates()[_ganttCol(clientX, grabOffset)] || null;
}

// Date helpers
function _addDays(d, n) {
  const dt = new Date(d + 'T00:00:00'); dt.setDate(dt.getDate() + n);
  return dt.toISOString().split('T')[0];
}
function _dayDiff(a, b) {
  return Math.round((new Date(b + 'T00:00:00') - new Date(a + 'T00:00:00')) / 86400000);
}

// Auto-scroll when dragging near edges
let _ganttScrollTimer = null;
function _ganttEdgeCheck(clientX) {
  const scroll = document.getElementById('gantt-scroll');
  if (!scroll || _ganttScrollTimer) return;
  const rect = scroll.getBoundingClientRect();
  const EDGE = 80;
  const relX = clientX - rect.left;
  if (relX < EDGE)
    _ganttScrollTimer = setInterval(() => { scroll.scrollLeft = Math.max(0, scroll.scrollLeft - 40); }, 50);
  else if (relX > rect.width - EDGE)
    _ganttScrollTimer = setInterval(() => { scroll.scrollLeft += 40; }, 50);
}
function _ganttEdgeClear() {
  if (_ganttScrollTimer) { clearInterval(_ganttScrollTimer); _ganttScrollTimer = null; }
}

// ── WO BAR: drag middle = MOVE ──
function ganttBarDragStart(e, woNumber) {
  ganttDS.type      = 'bar';
  ganttDS.woNumber  = woNumber;
  ganttDS.grabOffsetPx = e.clientX - e.currentTarget.getBoundingClientRect().left;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', 'bar');
  e.currentTarget.style.opacity = '0.5';
}
function ganttBarDragEnd(e) {
  if (e.currentTarget) e.currentTarget.style.opacity = '';
  ganttDS.type = null;
  _ganttEdgeClear();
}

// ── WO BAR: drag LEFT handle = move start date ──
function ganttResizeLeftStart(e, woNumber) {
  e.stopPropagation();
  ganttDS.type      = 'resize-left';
  ganttDS.woNumber  = woNumber;
  ganttDS.grabOffsetPx = 0;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', 'resize-left');
  const bar = e.currentTarget.closest('.gantt-bar');
  if (bar) bar.style.opacity = '0.6';
}

// ── WO BAR: drag RIGHT handle = move end date ──
function ganttResizeRightStart(e, woNumber) {
  e.stopPropagation();
  ganttDS.type      = 'resize-right';
  ganttDS.woNumber  = woNumber;
  ganttDS.grabOffsetPx = 0;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', 'resize-right');
  const bar = e.currentTarget.closest('.gantt-bar');
  if (bar) bar.style.opacity = '0.6';
}

function ganttResizeDragEnd(e) {
  const bar = e.currentTarget ? e.currentTarget.closest('.gantt-bar') : null;
  if (bar) bar.style.opacity = '';
  ganttDS.type = null;
  _ganttEdgeClear();
}

// ── WO ROW: dragover — accept bar moves and resizes for this WO ──
function ganttWORowOver(e, woNumber) {
  if (!ganttDS.type) return;
  if (ganttDS.woNumber !== woNumber) return;
  if (ganttDS.type === 'chip') return; // chips handled by cell
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  _ganttEdgeCheck(e.clientX);
}

// ── WO ROW: drop ──
function ganttWORowDrop(e, woNumber) {
  e.preventDefault();
  _ganttEdgeClear();
  if (!ganttDS.type || ganttDS.woNumber !== woNumber) return;

  const wo = state.workOrders.find(w => w.woNumber === woNumber);
  if (!wo) return;

  const ws = wo.scheduledStart ? wo.scheduledStart.slice(0, 10) : null;
  const we = wo.scheduledEnd   ? wo.scheduledEnd.slice(0, 10)   : null;

  if (ganttDS.type === 'bar') {
    // Move whole WO: drop date = where the bar's LEFT edge lands (subtract grab offset)
    const targetDate = _ganttColDate(e.clientX, ganttDS.grabOffsetPx);
    if (!targetDate || !ws || !we) { ganttDS.type = null; return; }
    const offset = _dayDiff(ws, targetDate);
    if (offset === 0) { ganttDS.type = null; return; }
    wo.scheduledStart = _addDays(ws, offset);
    wo.scheduledEnd   = _addDays(we, offset);
    state.assignments.filter(a => a.woNumber === woNumber)
      .forEach(a => { a.date = _addDays(a.date, offset); });

  } else if (ganttDS.type === 'resize-left') {
    // Move start date only
    const newStart = _ganttColDate(e.clientX, 0);
    if (!newStart) { ganttDS.type = null; return; }
    if (we && newStart > we) { ganttDS.type = null; return; } // can't go past end
    wo.scheduledStart = newStart;

  } else if (ganttDS.type === 'resize-right') {
    // Move end date only
    const newEnd = _ganttColDate(e.clientX, 0);
    if (!newEnd) { ganttDS.type = null; return; }
    if (ws && newEnd < ws) { ganttDS.type = null; return; } // can't go before start
    wo.scheduledEnd = newEnd;
  }

  ganttDS.type = null;
  render();
}

// ── OP CHIP: drag start ──
function ganttChipDragStart(e, woNumber, opSeq, fromDate) {
  e.stopPropagation();
  ganttDS.type     = 'chip';
  ganttDS.woNumber = woNumber;
  ganttDS.opSeq    = opSeq;
  ganttDS.fromDate = fromDate;
  ganttDS.grabOffsetPx = 0;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', 'chip');
  e.currentTarget.style.opacity = '0.4';
}
function ganttChipDragEnd(e) {
  if (e.currentTarget) e.currentTarget.style.opacity = '';
  ganttDS.type = null;
  _ganttEdgeClear();
}

// ── OP CELL: dragover ──
function ganttCellOver(e, woNumber, opSeq) {
  if (ganttDS.type !== 'chip') return;
  if (ganttDS.woNumber !== woNumber || ganttDS.opSeq !== opSeq) return;
  e.stopPropagation();
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.style.outline = '2px solid var(--accent)';
  e.currentTarget.style.outlineOffset = '-2px';
}
function ganttCellLeave(e) {
  e.currentTarget.style.outline = '';
}

// ── OP CELL: drop ──
function ganttCellDrop(e, woNumber, opSeq, toDate) {
  e.stopPropagation();
  e.preventDefault();
  e.currentTarget.style.outline = '';
  if (ganttDS.type !== 'chip') return;
  if (ganttDS.woNumber !== woNumber || ganttDS.opSeq !== opSeq) return;
  const fromDate = ganttDS.fromDate;
  ganttDS.type = null;
  if (!fromDate || fromDate === toDate) return;

  // Move all assignments for this op on fromDate → toDate
  state.assignments
    .filter(a => a.woNumber === woNumber && a.opSeq === opSeq && a.date === fromDate)
    .forEach(a => { a.date = toDate; });

  // Auto-expand WO window if needed
  const wo = state.workOrders.find(w => w.woNumber === woNumber);
  if (wo) {
    if (!wo.scheduledStart || toDate < wo.scheduledStart.slice(0,10)) wo.scheduledStart = toDate;
    if (!wo.scheduledEnd   || toDate > wo.scheduledEnd.slice(0,10))   wo.scheduledEnd   = toDate;
  }

  // Preserve scroll position through render
  const scroll = document.getElementById('gantt-scroll');
  const sx = scroll ? scroll.scrollLeft : 0, sy = scroll ? scroll.scrollTop : 0;
  render();
  requestAnimationFrame(() => {
    const s = document.getElementById('gantt-scroll');
    if (s) { s.scrollLeft = sx; s.scrollTop = sy; }
  });
}

}
function ganttCollapseAll() {
