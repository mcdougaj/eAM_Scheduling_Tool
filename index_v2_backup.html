const DEFAULT_ADMIN_PARAMS = {
  woStatuses: [1, 3, 6],           // Default: Unreleased, Released, On Hold
  woStatusOptions: [],              // Populated from Oracle: [{code, meaning, count}]
  entityTypes: [6, 7],              // 6=eAM Work Order, 7=eAM Activity
  lastStatusLoad: null
};
function getAdminParams() {
  try { return Object.assign({}, DEFAULT_ADMIN_PARAMS, JSON.parse(localStorage.getItem('eam-admin-params') || '{}')); }
  catch(e) { return {...DEFAULT_ADMIN_PARAMS}; }
}
function saveAdminParams(params) {
  try { localStorage.setItem('eam-admin-params', JSON.stringify(params)); } catch(e) {}
}

const ORACLE_SQL = {
  woStatuses: () => `
    SELECT wdj.status_type, ml.meaning as status_meaning, COUNT(*) as wo_count
    FROM wip_discrete_jobs wdj
    JOIN mfg_lookups ml ON ml.lookup_type = 'WIP_JOB_STATUS' AND ml.lookup_code = wdj.status_type
    JOIN wip_entities we ON wdj.wip_entity_id = we.wip_entity_id AND we.entity_type IN (6, 7)
    GROUP BY wdj.status_type, ml.meaning
    ORDER BY wdj.status_type`,

  workOrders: (weekStart, weekEnd) => {
    const params = getAdminParams();
    const statusList = params.woStatuses.length > 0 ? params.woStatuses.join(',') : '1,3,6';
    return `
    SELECT we.wip_entity_name, we.description, we.entity_type, we.wip_entity_id,
           TO_CHAR(wdj.scheduled_start_date, 'YYYY-MM-DD') as scheduled_start_date,
           TO_CHAR(wdj.scheduled_completion_date, 'YYYY-MM-DD') as scheduled_completion_date,
           wdj.status_type, wdj.priority,
           bd.department_code as owning_dept,
           wdj.asset_number, wdj.maintenance_object_type
    FROM wip_entities we
    JOIN wip_discrete_jobs wdj ON we.wip_entity_id = wdj.wip_entity_id
    LEFT JOIN bom_departments bd ON wdj.owning_department = bd.department_id
    WHERE we.entity_type IN (${params.entityTypes.join(',')})
      AND wdj.status_type IN (${statusList})
    ORDER BY wdj.priority, wdj.scheduled_start_date`;
  },

  operations: (wipEntityIds) => `
    SELECT wo.wip_entity_id, wo.operation_seq_num, wo.description as op_description,
           bd.department_code,
           br.resource_code, wor.usage_rate_or_amount as est_hours,
           wor.assigned_units
    FROM wip_operations wo
    LEFT JOIN bom_departments bd ON wo.department_id = bd.department_id
    LEFT JOIN wip_operation_resources wor ON wo.wip_entity_id = wor.wip_entity_id
      AND wo.operation_seq_num = wor.operation_seq_num
    LEFT JOIN bom_resources br ON wor.resource_id = br.resource_id
    WHERE wo.wip_entity_id IN (${wipEntityIds.join(',')})
    ORDER BY wo.wip_entity_id, wo.operation_seq_num`,

  employees: (deptCodes, orgCode) => `
    SELECT DISTINCT
      papf.employee_number, papf.full_name AS employee_name, papf.email_address,
      bd.department_code, bd.description AS department_name,
      br.resource_code, br.description AS resource_description,
      bre.instance_id,
      CASE WHEN bre.effective_end_date IS NULL OR bre.effective_end_date >= SYSDATE THEN 'Active' ELSE 'Inactive' END AS instance_status
    FROM bom_departments bd
    INNER JOIN mtl_parameters mp ON mp.organization_id = bd.organization_id
    INNER JOIN bom_department_resources bdr ON bdr.department_id = bd.department_id
    INNER JOIN bom_resources br ON br.resource_id = bdr.resource_id
    LEFT JOIN bom_resource_employees bre ON bre.resource_id = br.resource_id
    LEFT JOIN per_all_people_f papf ON papf.person_id = bre.person_id
      AND SYSDATE BETWEEN papf.effective_start_date AND papf.effective_end_date
    WHERE mp.organization_code = '${(orgCode || 'FAC').replace(/'/g, "''")}'
      AND bre.instance_id IS NOT NULL
      AND bd.disable_date IS NULL
      AND br.disable_date IS NULL
      ${deptCodes && deptCodes.length > 0
        ? `AND bd.department_code IN (${deptCodes.map(d => "'" + d.replace(/'/g, "''") + "'").join(',')})`
        : ''}
    ORDER BY bd.department_code, br.resource_code, papf.full_name`
};

async function pullFromOracle() {
  const c = state.oracleConfig;
  if (!c.host && !c.proxyUrl) {
    state.oracleError = 'Oracle not configured. Open Settings → Oracle EBS Connection.';
    render();
    return;
  }

  state.oracleSyncing = true;
  state.oracleError = '';
  state.oracleSyncProgress = 'Pulling work orders...';
  render();

  try {
    const dates = getWeekDates();
    const weekStart = dates[0];
    const weekEnd = dates[5];

    if (c.mode === 'proxy') {
      // ── SQL PROXY MODE ──
      // Step 1: Pull work orders
      state.oracleSyncProgress = 'Querying work orders...';
      render();
      const woResult = await oracleSQL(ORACLE_SQL.workOrders(weekStart, weekEnd));
      if (!woResult.success) throw new Error('Work orders: ' + woResult.error);
      if (!woResult.data || woResult.data.length === 0) throw new Error('No work orders found for the selected week range. Try adjusting the week start date.');

      const wos = mapOracleWOs(woResult.data);
      const wipIdMap = {};
      wos.forEach(wo => { wipIdMap[wo._wipEntityId] = wo.woNumber; });

      // Step 2: Pull operations
      state.oracleSyncProgress = `Found ${wos.length} work orders. Pulling operations...`;
      render();
      const wipIds = Object.keys(wipIdMap).map(Number);
      if (wipIds.length > 0) {
        // Batch in groups of 50 to avoid SQL IN clause limits
        for (let i = 0; i < wipIds.length; i += 50) {
          const batch = wipIds.slice(i, i + 50);
          const opResult = await oracleSQL(ORACLE_SQL.operations(batch));
          if (opResult.success && opResult.data) {
            state.workOrders = wos;
            mapOracleOps(opResult.data, wipIdMap);
          }
        }
      }
      state.workOrders = wos;

      // Ensure every WO has at least one operation
      wos.forEach(wo => {
        if (wo.operations.length === 0) {
          wo.operations.push({ opSeq: 10, description: wo.description || 'General Work', craft: 'General', estHours: 4, dependencies: [] });
        }
      });

      // Step 3: Resolve org_id from org_code, then pull resource instances
      const woDepts = [...new Set(wos.map(w => w.department).filter(Boolean))];
      let orgNumId = 0;
      if (c.orgId) {
        const orgResult = await oracleSQL(`SELECT organization_id FROM org_organization_definitions WHERE organization_code = '${c.orgId.replace(/'/g,"''")}'`);
        if (orgResult.success && orgResult.data && orgResult.data.length > 0) {
          orgNumId = orgResult.data[0].ORGANIZATION_ID || orgResult.data[0].organization_id || 0;
        }
      }
      state.oracleSyncProgress = `Pulling resource instances for ${woDepts.length} department(s)...`;
      render();
      const empResult = await oracleSQL(ORACLE_SQL.employees(woDepts, c.orgId || 'FAC'));
      if (empResult.success && empResult.data) {
        state.employees = mapOracleEmployees(empResult.data, woDepts);
      }
    } else {
      // ── REST API MODE ──
      state.oracleSyncProgress = 'Calling ISG REST endpoints...';
      render();
      const woResult = await oracleFetch(`/webservices/rest/EAM_WORK_ORDERS/?scheduled_start_date_from=${weekStart}&scheduled_start_date_to=${weekEnd}&status=Released`);
      if (!woResult.success) throw new Error('REST API: ' + woResult.error);

      const items = woResult.data?.items || woResult.data?.WorkOrder || woResult.data || [];
      if (Array.isArray(items) && items.length > 0) {
        state.workOrders = mapOracleWOs(items);
        // Try to get operations via REST
        for (const wo of state.workOrders) {
          const opResult = await oracleFetch(`/webservices/rest/EAM_WORK_ORDERS/${wo._wipEntityId}/operations`);
          if (opResult.success && opResult.data) {
            const ops = opResult.data?.items || opResult.data || [];
            mapOracleOps(ops, { [wo._wipEntityId]: wo.woNumber });
          }
        }
      } else {
        throw new Error('No work orders returned from REST API.');
      }

      // Pull employees via REST
      const empResult = await oracleFetch('/webservices/rest/HR_EMPLOYEES/');
      if (empResult.success && empResult.data) {
        const emps = empResult.data?.items || empResult.data || [];
        const restWoDepts = [...new Set(state.workOrders.map(w => w.department).filter(Boolean))];
        state.employees = mapOracleEmployees(emps, restWoDepts);
      }
    }

    // Step 4: Load into scheduler (reuse existing loadImportResults logic)
    state.oracleSyncProgress = 'Loading into scheduler...';
    render();
    loadImportResults(state.workOrders, state.employees, []);
    applySkillsToEmployees(); // Apply saved skills & supervisors from admin config
    state.oracleDataSource = 'oracle';

    // Rebuild craftConfig from actual BOM resource instances (not just WO ops)
    // This ensures headcounts reflect real employees, not phantom pools
    const realPools = {};
    state.employees.forEach(emp => {
      const depts = emp.allDepartments || [emp.department];
      const crafts = emp.allCrafts || [emp.craft];
      depts.forEach(dept => {
        crafts.forEach(craft => {
          const key = `${dept}|${craft}`;
          if (!realPools[key]) realPools[key] = { dept, resource: craft, headcount: 0, hoursPerDay: 8 };
          realPools[key].headcount++;
        });
      });
    });
    // Merge: keep WO-derived pools but update headcounts from real data
    // Track which crafts have real employees (internal) vs none (vendor/contractor)
    const internalCrafts = new Set();
    Object.values(realPools).forEach(p => internalCrafts.add(p.resource));

    Object.entries(state.craftConfig).forEach(([key, cfg]) => {
      if (realPools[key]) {
        cfg.headcount = realPools[key].headcount;
        cfg.isContractor = false;
      } else {
        // No BOM resource employees — this is a vendor/contractor craft
        cfg.headcount = 0;
        cfg.isContractor = true;
      }
    });
    // Add any employee pools not in WO crafts
    Object.entries(realPools).forEach(([key, pool]) => {
      if (!state.craftConfig[key]) state.craftConfig[key] = pool;
    });

    // Flag WO operations as internal or external based on craft availability
    state.workOrders.forEach(wo => {
      wo.operations.forEach(op => {
        op.isExternal = !internalCrafts.has(op.craft);
      });
      // Flag WO-level: external if ALL operations are external
      wo.isExternal = wo.operations.every(op => op.isExternal);
      // Mixed: has both internal and external ops
      wo.hasMixedOps = wo.operations.some(op => op.isExternal) && wo.operations.some(op => !op.isExternal);
    });
    c.lastSync = new Date().toISOString();
    c.connected = true;
    try { localStorage.setItem('eam-oracle-config', JSON.stringify(c)); } catch(e) {}

    state.oracleSyncing = false;
    state.oracleSyncProgress = '';
    render();

  } catch(e) {
    state.oracleSyncing = false;
    state.oracleSyncProgress = '';
    state.oracleError = e.message;
    render();
  }
}

// ─── ORACLE PUSH ───

async function pushToOracle() {
  const c = state.oracleConfig;
  if (!c.host && !c.proxyUrl) {
    alert('Oracle not configured.');
    return;
  }
  if (state.assignments.length === 0) {
    alert('No assignments to push.');
    return;
  }

  // Build confirmation
  const assignCount = state.assignments.length;
  const woCount = new Set(state.assignments.map(a => a.woNumber)).size;
  if (!confirm(`Push ${assignCount} assignments across ${woCount} work orders to Oracle EBS?\n\nThis will update operation resources and status in the EAM system.`)) return;

  state.oracleSyncing = true;
  state.oracleSyncProgress = 'Pushing assignments to Oracle...';
  render();

  try {
    if (c.mode === 'proxy') {
      // Group assignments by WO
      const byWO = {};
      state.assignments.forEach(a => {
        if (!byWO[a.woNumber]) byWO[a.woNumber] = [];
        byWO[a.woNumber].push(a);
      });

      let pushed = 0;
      for (const [woNum, assigns] of Object.entries(byWO)) {
        const wo = state.workOrders.find(w => w.woNumber === woNum);
        if (!wo || !wo._wipEntityId) continue;

        for (const a of assigns) {
          // Update operation status via WIP_OPERATIONS
          const statusMap = { 'Complete': 1, 'In Progress': 3, 'Scheduled': 1 };
          const countPointType = statusMap[a.status] || 1;

          // Insert/update resource assignment note (using WIP_OPERATION_RESOURCES description)
          const sql = `
            UPDATE wip_operations
            SET description = description || ' [Assigned: ${(a.employeeName || '').replace(/'/g, "''")} ${a.date} ${a.hours}h - ${a.status || 'Scheduled'}]',
                last_update_date = SYSDATE,
                last_updated_by = -1
            WHERE wip_entity_id = ${wo._wipEntityId}
              AND operation_seq_num = ${a.opSeq}`;

          const r = await oracleSQL(sql);
          if (r.success) pushed++;
        }
        state.oracleSyncProgress = `Pushed ${pushed}/${assignCount} assignments...`;
        render();
      }

      state.oracleSyncing = false;
      state.oracleSyncProgress = '';
      c.lastSync = new Date().toISOString();
      try { localStorage.setItem('eam-oracle-config', JSON.stringify(c)); } catch(e) {}
      render();
      alert(`Successfully pushed ${pushed} of ${assignCount} assignments to Oracle.`);

    } else {
      // REST mode - PUT to ISG endpoint
      for (const wo of state.workOrders) {
        if (!wo._wipEntityId) continue;
        const woAssigns = state.assignments.filter(a => a.woNumber === wo.woNumber);
        if (woAssigns.length === 0) continue;

        const payload = {
          wip_entity_id: wo._wipEntityId,
          operations: wo.operations.map(op => ({
            operation_seq_num: op.opSeq,
            assignments: woAssigns.filter(a => a.opSeq === op.opSeq).map(a => ({
              employee_name: a.employeeName,
              scheduled_date: a.date,
              hours: a.hours,
              status: a.status
            }))
          }))
        };

        await oracleFetch(`/webservices/rest/EAM_WORK_ORDERS/${wo._wipEntityId}/`, 'PUT', payload);
      }

      state.oracleSyncing = false;
      state.oracleSyncProgress = '';
      c.lastSync = new Date().toISOString();
      try { localStorage.setItem('eam-oracle-config', JSON.stringify(c)); } catch(e) {}
      render();
      alert('Assignments pushed to Oracle via REST API.');
    }

  } catch(e) {
    state.oracleSyncing = false;
    state.oracleSyncProgress = '';
    alert('Push failed: ' + e.message);
    render();
  }
}

function toggleChat() {
  state.chatOpen = !state.chatOpen;
  document.body.classList.toggle('chat-open', state.chatOpen);
  render();
  if (state.chatOpen && state.chatMessages.length === 0) {
    state.chatMessages.push({ role: 'system', content: 'AI Scheduling Assistant ready. Ask me anything about the schedule, or tell me what to do.' });
    renderChat();
  }
  setTimeout(() => {
    const inp = document.getElementById('chat-input');
    if (inp) inp.focus();
  }, 300);
}

function renderChat() {
  const container = document.getElementById('chat-messages');
  if (!container) return;
  container.innerHTML = state.chatMessages.map(m => {
    if (m.role === 'system') return `<div class="chat-msg system">${m.content}</div>`;
    if (m.role === 'tool') return `<div class="chat-msg tool">⚡ ${m.content}</div>`;
    if (m.role === 'user') return `<div class="chat-msg user">${escHtml(m.content)}</div>`;
    return `<div class="chat-msg assistant">${formatAssistantMsg(m.content)}</div>`;
  }).join('') + (state.chatLoading ? '<div class="chat-typing"><span></span><span></span><span></span></div>' : '');
  container.scrollTop = container.scrollHeight;
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function formatAssistantMsg(s) {
  // Basic markdown-lite formatting
  return escHtml(s)
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/`(.*?)`/g, '<code style="background:var(--bg-base);padding:1px 4px;border-radius:2px;font-size:11px">$1</code>')
    .replace(/\n/g, '<br>');
}

      const deps = o.dependencies && o.dependencies.length > 0 ? ` [depends on: Op${o.dependencies.join(', Op')}]` : ' [no dependencies - can run in parallel]';
      return 'Op'+o.opSeq+' '+o.craft+' '+o.estHours+'h'+deps;

  return `You are a Joeyi Scheduling Assistant. You help maintenance planners schedule work order operations to employees. Data is loaded from uploaded spreadsheets.

DATA: ${state.importLoaded ? 'Loaded: ' + (state.importStats?.wos || 0) + ' WOs, ' + (state.importStats?.ops || 0) + ' ops, ' + (state.importStats?.emps || 0) + ' employees' : 'No data loaded yet — user needs to upload a spreadsheet on the Import Data tab'}

CURRENT WEEK: ${dates[0]} to ${dates[5]} (Mon-Sat)
DEPARTMENTS: ${DEPARTMENTS.join(', ') || 'None loaded'}
ACTIVE FILTERS: Dept=${state.filterDept}, Resource=${state.filterCraft}

WORK ORDERS:
${woSummary}

EMPLOYEES:
${empSummary}

CURRENT ASSIGNMENTS:
${schedSummary || '  (none)'}

UNSCHEDULED BACKLOG:
${backlogSummary || '  (all scheduled)'}

RULES:
- Employees can be assigned to operations if: their craft matches, OR they have the craft in their allCrafts list, OR the operation craft is 'General', OR they belong to the same department as the WO
- Prefer employees whose craft directly matches the operation resource, but department membership is sufficient
- Employees CAN work across departments (borrowing), but prefer same-dept
- Each employee works ${state.employees[0]?.hoursPerDay || 8}h/day max, Mon-Sat
- DEPENDENCIES ARE CRITICAL: Operations have Finish-to-Start dependencies shown in brackets above.
  * An op with [depends on: Op10, Op20] MUST be scheduled on the same day or AFTER both Op10 and Op20 are scheduled.
  * Prefer scheduling dependent ops on the NEXT day after their predecessor (not same day) to allow completion time.
  * Ops with [no dependencies] can be scheduled on any day in parallel with other ops.
  * NEVER schedule an op before its dependencies. This is a hard constraint.

- WO Types: PM = Planned/Preventive Maintenance, CM = Corrective Maintenance
- PM work orders (PM=Yes) represent scheduled preventive maintenance and should be treated as priority scheduling — they have compliance windows that must be met. When auto-scheduling, ensure PM work orders are scheduled first within their date windows before filling remaining capacity with CM work.
- When auto-scheduling, process ops in dependency order (predecessors first) and respect the dependency chain.
- SKILL MATCHING: When multiple employees share the same craft/resource, prefer the one whose Skills best match the operation description. For example:

  * Op description mentions "electrical" or "wiring" → prefer employee with "Electrical" skill
  * Op description mentions "brake" → prefer employee with "Brake Repair" skill

You have tools to execute scheduling actions. Use them when the user asks you to schedule, move, remove, or auto-schedule operations. Always confirm significant changes before executing. Be concise and practical — this is a shop floor tool.

${getCustomPrompt() ? 'CUSTOM SHOP RULES (from supervisor):\n' + getCustomPrompt() : ''}`;

function getTools() {
  return [
    {
      name: 'schedule_operation',
      description: 'Assign an unscheduled operation to an employee on a specific date',
      input_schema: {
        type: 'object',
        properties: {
          woNumber: { type: 'string', description: 'Work order number, e.g. WO-10050' },
          opSeq: { type: 'integer', description: 'Operation sequence number, e.g. 10' },
          employeeName: { type: 'string', description: 'Full employee name, e.g. James Wilson' },
          date: { type: 'string', description: 'Date in YYYY-MM-DD format' },
          hours: { type: 'number', description: 'Hours to assign (usually matches estHours)' }
        },
        required: ['woNumber', 'opSeq', 'employeeName', 'date', 'hours']
      }
    },
    {
      name: 'move_assignment',
      description: 'Move an existing assignment to a different employee and/or date',
      input_schema: {
        type: 'object',
        properties: {
          assignmentId: { type: 'string', description: 'Assignment ID to move' },
          newEmployeeName: { type: 'string', description: 'New employee name (or same to keep)' },
          newDate: { type: 'string', description: 'New date in YYYY-MM-DD format (or same to keep)' }
        },
        required: ['assignmentId']
      }
    },
    {
      name: 'remove_assignment',
      description: 'Remove an assignment, returning the operation to the backlog',
      input_schema: {
        type: 'object',
        properties: {
          assignmentId: { type: 'string', description: 'Assignment ID to remove' }
        },
        required: ['assignmentId']
      }
    },
    {
      name: 'update_status',
      description: 'Update the status of an assignment',
      input_schema: {
        type: 'object',
        properties: {
          assignmentId: { type: 'string', description: 'Assignment ID' },
          status: { type: 'string', enum: ['Scheduled', 'In Progress', 'Complete'], description: 'New status' }
        },
        required: ['assignmentId', 'status']
      }
    },
    {
      name: 'auto_schedule_filtered',
      description: 'Run the automatic scheduler on unscheduled ops, optionally filtered by department and/or resource',
      input_schema: {
        type: 'object',
        properties: {
          department: { type: 'string', description: 'Department filter: Fleet, Maint, Prod, or All' },
          resource: { type: 'string', description: 'Resource/craft filter: Electrician, Millwright, etc., or All' }
        }
      }
    },
    {
      name: 'clear_all_assignments',
      description: 'Remove ALL assignments and return everything to backlog. Use with caution.',
      input_schema: { type: 'object', properties: {} }
    }

}

function executeTool(name, input) {
  try {
    switch(name) {
      case 'schedule_operation': {
        const { woNumber, opSeq, employeeName, date, hours } = input;
        const op = getAllOps().find(o => o.woNumber === woNumber && o.opSeq === opSeq);
        if (!op) return { error: `Operation ${woNumber} Op${opSeq} not found` };
        const emp = state.employees.find(e => e.name === employeeName);
        if (!emp) return { error: `Employee ${employeeName} not found` };
        // Contractor/vendor ops cannot be assigned to internal employees
        if (op.isExternal) return { error: `Op${opSeq} is a contractor/vendor operation — assign via Resource Pool mode, not to internal employees.` };
        // Allow assignment if: exact craft match, OR employee has this craft in allCrafts, OR they share the same department
        const wo = state.workOrders.find(w => w.woNumber === woNumber);
        const craftMatch = emp.craft === op.craft
          || (emp.allCrafts && emp.allCrafts.includes(op.craft))
          || (wo && (emp.department === wo.department || (emp.allDepartments && emp.allDepartments.includes(wo.department))));
        if (!craftMatch) return { error: `Craft mismatch: op needs ${op.craft}, ${employeeName} is ${emp.craft}. They don't share a department either.` };
        const existing = state.assignments.find(a => a.woNumber === woNumber && a.opSeq === opSeq);
        if (existing) return { error: `${woNumber} Op${opSeq} is already assigned to ${existing.employeeName}` };
        const load = getEmpLoad(employeeName, date);
        const avail = getEmpAvailHours(employeeName, date);
        if (avail === 0) { const r = getEmpAvailReason(employeeName, date); return { error: `${employeeName} is unavailable on ${date}${r ? ' ('+r+')' : ''}` }; }
        if (load + hours > avail) return { error: `${employeeName} has ${(avail-load).toFixed(1)}h available on ${date}${avail < emp.hoursPerDay ? ' (reduced availability)' : ''}, need ${hours}h` };
        // Dependency validation
        const deps = op.dependencies || [];
        const depWarnings = [];
        for (const depSeq of deps) {
          const depA = state.assignments.find(a => a.woNumber === woNumber && a.opSeq === depSeq);
          if (!depA) depWarnings.push(`⚠ Predecessor Op${depSeq} is not yet scheduled`);
          else if (depA.date > date) depWarnings.push(`⚠ Predecessor Op${depSeq} is scheduled on ${depA.date} which is AFTER ${date}`);
          else if (depA.date === date) depWarnings.push(`Note: Predecessor Op${depSeq} is on the same day — ensure it completes first`);
        }
        addAssignment(woNumber, opSeq, employeeName, date, hours);
        const depMsg = depWarnings.length > 0 ? '\nDependency notes: ' + depWarnings.join('; ') : ' (all dependencies satisfied ✓)';
        return { success: `Scheduled ${woNumber} Op${opSeq} → ${employeeName} on ${date} for ${hours}h${depMsg}` };
      }
      case 'move_assignment': {
        const a = state.assignments.find(x => x.id === input.assignmentId);
        if (!a) return { error: `Assignment ${input.assignmentId} not found` };
        if (input.newEmployeeName) {
          const emp = state.employees.find(e => e.name === input.newEmployeeName);
          if (!emp) return { error: `Employee ${input.newEmployeeName} not found` };
          const op = getAllOps().find(o => o.woNumber === a.woNumber && o.opSeq === a.opSeq);
          if (op && emp.craft !== op.craft) return { error: `Craft mismatch` };
          a.employeeName = input.newEmployeeName;
        }
        if (input.newDate) a.date = input.newDate;
        render();
        return { success: `Moved assignment → ${a.employeeName} on ${a.date}` };
      }
      case 'remove_assignment': {
        const a = state.assignments.find(x => x.id === input.assignmentId);
        if (!a) return { error: `Assignment ${input.assignmentId} not found` };
        const info = `${a.woNumber} Op${a.opSeq} from ${a.employeeName}`;
        removeAssignment(input.assignmentId);
        return { success: `Removed ${info}, returned to backlog` };
      }
      case 'update_status': {
        const a = state.assignments.find(x => x.id === input.assignmentId);
        if (!a) return { error: `Assignment not found` };
        a.status = input.status;
        render();
        return { success: `Updated ${a.woNumber} Op${a.opSeq} status to ${input.status}` };
      }
      case 'auto_schedule_filtered': {
        const prevDept = state.filterDept;
        const prevCraft = state.filterCraft;
        state.filterDept = input.department || 'All';
        state.filterCraft = input.resource || 'All';
        // Run sync version of auto-scheduler
        const dates = getWeekDates();
        const tempLoad = {};
        state.employees.forEach(e => { tempLoad[e.name] = {}; dates.forEach(d => { tempLoad[e.name][d] = getEmpLoad(e.name, d); }); });
        let candidates = getUnscheduledOps();
        if (state.filterDept !== 'All') candidates = candidates.filter(op => op.department === state.filterDept);
        if (state.filterCraft !== 'All') candidates = candidates.filter(op => op.craft === state.filterCraft);
        candidates.sort((a,b) => {
          const aPM = state.workOrders.find(w => w.woNumber === a.woNumber)?.isPM ? 0 : 1;
          const bPM = state.workOrders.find(w => w.woNumber === b.woNumber)?.isPM ? 0 : 1;
          return (aPM - bPM) || (a.priority-b.priority) || a.woNumber.localeCompare(b.woNumber) || (a.opSeq-b.opSeq);
        });
        let count = 0;
        for (const op of candidates) {
          const matchEmps = state.employees.filter(e => e.craft === op.craft || (e.allCrafts && e.allCrafts.includes(op.craft)));
          if (!matchEmps.length) continue;
          const earliest = dates.find(d => d >= op.scheduledStart) || dates[0];
          const latest = dates.findLast(d => d <= op.scheduledEnd) || dates[dates.length-1];
          let bestEmp = null, bestDate = null, bestScore = -Infinity;
          for (const emp of matchEmps) {
            const sameDeptBonus = emp.department === op.department ? 15 : 0;
            for (const date of dates) {
              if (date < earliest || date > latest) continue;
              const dayAvail = getEmpAvailHours(emp.name, date);
              if (dayAvail === 0) continue;
              const remaining = dayAvail - (tempLoad[emp.name][date] || 0);
              if (remaining < op.estHours) continue;
              const totalWeek = dates.reduce((s,d) => s + (tempLoad[emp.name][d]||0), 0);
              const score = -totalWeek + sameDeptBonus - dates.indexOf(date);
              if (score > bestScore) { bestScore = score; bestEmp = emp; bestDate = date; }
            }
          }
          if (bestEmp && bestDate) {
            state.assignments.push({ id: uid(), woNumber: op.woNumber, opSeq: op.opSeq, employeeName: bestEmp.name, date: bestDate, hours: op.estHours, status: 'Scheduled' });
            tempLoad[bestEmp.name][bestDate] += op.estHours;
            count++;
          }
        }
        state.filterDept = prevDept;
        state.filterCraft = prevCraft;
        render();
        return { success: `Auto-scheduled ${count} of ${candidates.length} operations (Dept:${input.department||'All'}, Resource:${input.resource||'All'})` };
      }
      case 'clear_all_assignments': {
        const count = state.assignments.length;
        state.assignments = [];
        render();
        return { success: `Cleared all ${count} assignments` };
      }
      default:
        return { error: `Unknown tool: ${name}` };
    }
  } catch(e) {
    return { error: e.message };
  }
}

function buildApiMessages(messages) {
  const provider = state.aiProvider || 'anthropic';
  const apiMsgs = [];
  for (const m of messages) {
    if (m.role === 'user') {
      apiMsgs.push({ role: 'user', content: m.content });
    } else if (m.role === 'assistant' && m.apiContent) {
      if (provider === 'anthropic') {
        apiMsgs.push({ role: 'assistant', content: m.apiContent });
      } else {
        // OpenAI/Gemini: use native message object if available
        if (m.apiContent.role === 'assistant') {
          // Already an OpenAI message object — fix null content
          const msg = { ...m.apiContent };
          if (msg.content === null || msg.content === undefined) msg.content = '';
          apiMsgs.push(msg);
        } else {
          // Convert Anthropic tool_use blocks to OpenAI tool_calls format
          const textParts = [];
          const toolCalls = [];
          (Array.isArray(m.apiContent) ? m.apiContent : [m.apiContent]).forEach(block => {
            if (block.type === 'tool_use') {
              toolCalls.push({ id: block.id, type: 'function', function: { name: block.name, arguments: JSON.stringify(block.input) } });
            } else if (block.type === 'text' && block.text) {
              textParts.push(block.text);
            } else if (typeof block === 'string') {
              textParts.push(block);
            }
          });
          const msg = { role: 'assistant', content: textParts.join('\n') || '' };
          if (toolCalls.length > 0) msg.tool_calls = toolCalls;
          apiMsgs.push(msg);
        }
      }
    } else if (m.role === 'assistant') {
      apiMsgs.push({ role: 'assistant', content: m.content });
    } else if (m.role === 'tool_result') {
      if (provider === 'anthropic') {
        // Claude: tool_result as user message with content blocks
        apiMsgs.push({ role: 'user', content: m.apiContent });
      } else {
        // OpenAI/Gemini: each tool result is a separate 'tool' role message
        const results = Array.isArray(m.apiContent) ? m.apiContent : [m.apiContent];
        results.forEach(r => {
          apiMsgs.push({
            role: 'tool',
            tool_call_id: r.tool_use_id,
            content: typeof r.content === 'string' ? r.content : JSON.stringify(r.content)
          });
        });
      }
    }
    // Skip 'system' and 'tool' display-only messages
  }
  return apiMsgs;
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;
  if (!state.apiKey) { state.chatMessages.push({ role: 'system', content: `No API key configured. Click ⚙ Settings to add your ${AI_PROVIDERS[state.aiProvider]?.name || 'AI'} API key.` }); renderChat(); return; }

  state.chatMessages.push({ role: 'user', content: text });
  input.value = '';
  state.chatLoading = true;
  renderChat();

  // Build API messages per provider format
  const apiMessages = buildApiMessages(state.chatMessages);

  try {
    await callAI(apiMessages);
  } catch(e) {
    state.chatMessages.push({ role: 'system', content: 'Error: ' + e.message });
  }
  state.chatLoading = false;
  renderChat();
}

async function callAI(apiMessages) {
  const provider = state.aiProvider || 'anthropic';
  const cfg = AI_PROVIDERS[provider];
  const model = localStorage.getItem('eam-model-' + provider) || localStorage.getItem('eam-model') || cfg.defaultModel;
  const systemPrompt = buildSystemPrompt();
  const tools = getTools();

  // Build request per provider
  const url = typeof cfg.apiUrl === 'function' ? cfg.apiUrl(model, state.apiKey) : cfg.apiUrl;
  const headers = cfg.buildHeaders(state.apiKey);
  const body = JSON.stringify(cfg.buildBody(model, systemPrompt, apiMessages, tools, 2048));

  const resp = await fetch(url, { method: 'POST', headers, body });

  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    const errMsg = err.error?.message || err.error?.status || `API error ${resp.status}`;
    throw new Error(`${cfg.name}: ${errMsg}`);
  }

  const data = await resp.json();
  const parsed = cfg.parseResponse(data);

  // Show text response
  if (parsed.text) {
    // Store raw content for API history continuity (all providers)
    const apiContent = provider === 'anthropic' ? data.content :
      (data.choices?.[0]?.message || parsed.text);
    state.chatMessages.push({ role: 'assistant', content: parsed.text, apiContent });
    renderChat();
  } else if (parsed.toolCalls.length > 0) {
    const apiContent = provider === 'anthropic' ? data.content :
      (data.choices?.[0]?.message || '');
    state.chatMessages.push({ role: 'assistant', content: '', apiContent });
  }

  // Execute tool calls
  if (parsed.toolCalls.length > 0) {
    const toolResultContent = [];
    for (const tc of parsed.toolCalls) {
      const result = executeTool(tc.name, tc.input);
      const resultStr = result.success || result.error;
      state.chatMessages.push({ role: 'tool', content: `${tc.name}: ${resultStr}` });
      toolResultContent.push({
        type: 'tool_result',
        tool_use_id: tc.id,
        content: JSON.stringify(result)
      });
      renderChat();
    }

    // Store tool results for API history
    state.chatMessages.push({ role: 'tool_result', content: '', apiContent: toolResultContent });

    // Continue conversation if model wants to respond after tool use
    if (parsed.stopReason === 'tool_use') {
      const followupMessages = buildApiMessages(state.chatMessages);
      state.chatLoading = true;
      renderChat();
      await callAI(followupMessages);
    }
  }
}

// ─── HELPERS ───
function getWeekDates() {
  const dates = [];
  const s = new Date(state.weekStart + 'T00:00:00');
  for (let i = 0; i < 6; i++) { const d = new Date(s); d.setDate(s.getDate() + i); dates.push(d.toISOString().split('T')[0]); }
  return dates;
}
function fmtDate(d) { return new Date(d + 'T00:00:00').toLocaleDateString('en-US', { month:'short', day:'numeric' }); }
function uid() { return Math.random().toString(36).substr(2,9); }
function escAttr(s) { return String(s).replace(/&/g,'&amp;').replace(/'/g,'&#39;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ─── AUTO-ALLOCATE: Place WO ops on resource board by scheduled dates ───
function autoAllocateByDates() {
  const dates = getWeekDates();
  const weekStart = dates[0];
  const weekEnd = dates[dates.length - 1];
  
  // Get WOs that overlap with this week
  const wos = state.workOrders.filter(wo => {
    if (state.confirmedWOs.size > 0 && !state.confirmedWOs.has(wo.woNumber)) return false;
    if (!wo.scheduledStart && !wo.scheduledEnd) return false;
    const ws = wo.scheduledStart ? wo.scheduledStart.slice(0,10) : weekStart;
    const we = wo.scheduledEnd ? wo.scheduledEnd.slice(0,10) : weekEnd;
    // Does the WO window overlap with this week?
    return ws <= weekEnd && we >= weekStart;
  });
  
  if (wos.length === 0) return 0;
  
  let allocCount = 0;
  
  wos.forEach(wo => {
    const ws = wo.scheduledStart ? wo.scheduledStart.slice(0,10) : weekStart;
    const we = wo.scheduledEnd ? wo.scheduledEnd.slice(0,10) : weekEnd;
    
    // Get days this week that fall within the WO window
    const woDays = dates.filter(d => d >= ws && d <= we);
    if (woDays.length === 0) return;
    
    // Get unscheduled ops for this WO
    const ops = wo.operations.filter(o => !isFullyScheduled(wo.woNumber, o.opSeq));
    if (ops.length === 0) return;
    
    // Sort ops respecting dependencies (topological sort)
    const sorted = [];
    const placed = new Set();
    let remaining = [...ops];
    let safety = 0;
    while (remaining.length > 0 && safety < 200) {
      safety++;
      let progressed = false;
      for (let i = remaining.length - 1; i >= 0; i--) {
        const op = remaining[i];
        const deps = op.dependencies || [];
        if (deps.length === 0 || deps.every(d => placed.has(d))) {
          sorted.push(op);
          placed.add(op.opSeq);
          remaining.splice(i, 1);
          progressed = true;
        }
      }
      if (!progressed) { sorted.push(...remaining); break; }
    }
    
    // Spread ops across available days
    // Strategy: sequential ops go on successive days, parallel ops share a day
    let dayIdx = 0;
    const opDayMap = {}; // opSeq → date assigned
    
    sorted.forEach(op => {
      const deps = op.dependencies || [];
      
      if (deps.length > 0) {
        // Place after latest dependency
        const latestDepDay = deps.reduce((max, depSeq) => {
          const depDate = opDayMap[depSeq];
          if (depDate && depDate > max) return depDate;
          return max;
        }, '');
        
        if (latestDepDay) {
          // Place on next day after latest dep (or same day if last day)
          const depDayIdx = woDays.indexOf(latestDepDay);
          dayIdx = Math.min(depDayIdx + 1, woDays.length - 1);
        }
      }
      
      // Ensure we don't exceed available days
      if (dayIdx >= woDays.length) dayIdx = woDays.length - 1;
      
      const date = woDays[dayIdx];
      const remain = getRemainingHours(op);
      if (remain > 0) {
        // Check if already allocated (skip duplicates)
        const existing = state.assignments.find(a => 
          a.woNumber === wo.woNumber && a.opSeq === op.opSeq && isPoolAssignment(a)
        );
        if (!existing) {
          state.assignments.push({
            id: uid(), woNumber: wo.woNumber, opSeq: op.opSeq,
            employeeName: '__POOL:' + op.craft, date, hours: remain, status: 'Allocated'
          });
          allocCount++;
        }
      }
      opDayMap[op.opSeq] = date;
    });
  });
  
  return allocCount;
}


function getAllOps() {
  const ops = [];
  state.workOrders.forEach(wo => wo.operations.forEach(op => ops.push({ ...op, dependencies: op.dependencies || [], woNumber:wo.woNumber, woDesc:wo.description, asset:wo.asset, assetDesc:wo.assetDesc, priority:wo.priority, supervisor:wo.supervisor, department:wo.department, scheduledStart:wo.scheduledStart, scheduledEnd:wo.scheduledEnd, woType:wo.woType, isPM:wo.isPM })));
  return ops;
}

function getAssignedHours(woNumber, opSeq, excludePool) {
  return state.assignments.filter(a => {
    if (a.woNumber !== woNumber || a.opSeq !== opSeq) return false;
    if (excludePool && isPoolAssignment(a)) return false;
    return true;
  }).reduce((s, a) => s + a.hours, 0);
}

function getRemainingHours(op, excludePool) {
  return Math.max(0, op.estHours - getAssignedHours(op.woNumber, op.opSeq, excludePool));
}

function isFullyScheduled(woNumber, opSeq, excludePool) {
  const op = getAllOps().find(o => o.woNumber === woNumber && o.opSeq === opSeq);
  if (!op) return false;
  return getAssignedHours(woNumber, opSeq, excludePool) >= op.estHours;
}

function getUnscheduledOps() {
  // In employee/priority view, pool allocations don't count — ops still need named assignment
  const excludePool = state.boardView === 'employee' || state.boardView === 'priority';
  return getAllOps().filter(op => {
    if (state.confirmedWOs.size > 0 && !state.confirmedWOs.has(op.woNumber)) return false;
    return !isFullyScheduled(op.woNumber, op.opSeq, excludePool);
  });
}

// ─── RESOURCE CAPACITY ───
function getResourceCapacity(craft) {
  // If manual capacity set, use it
  if (state.resourceCapacity[craft]) return state.resourceCapacity[craft];
  // Derive from employees if available
  const craftEmps = state.employees.filter(e => e.craft === craft || (e.allCrafts && e.allCrafts.includes(craft)));
  if (craftEmps.length > 0) {
    return { headcount: craftEmps.length, hoursPerDay: craftEmps.reduce((s, e) => s + e.hoursPerDay, 0), auto: true };
  }
  // No employees and no manual config — return unconfigured marker
  return { headcount: 0, hoursPerDay: 0, auto: true, unconfigured: true };
}

function getResourceDayCapacity(craft, date) {
  const cap = getResourceCapacity(craft);
  if (cap.auto) {
    // Use actual employee availability
    const craftEmps = state.employees.filter(e => e.craft === craft || (e.allCrafts && e.allCrafts.includes(craft)));
    return craftEmps.reduce((s, e) => s + getEmpAvailHours(e.name, date), 0);
  }
  return cap.hoursPerDay;
}

function getResourceDayLoad(craft, date) {
  const allOps = getAllOps();
  return state.assignments.filter(a => {
    const op = allOps.find(o => o.woNumber === a.woNumber && o.opSeq === a.opSeq);
    return op && op.craft === craft && a.date === date;
  }).reduce((s, a) => s + a.hours, 0);
}

function isPoolAssignment(a) {
  return a.employeeName && a.employeeName.startsWith('__POOL:');
}

function getPoolCraft(a) {
  return a.employeeName.replace('__POOL:', '');
}
function getDisplayName(a) {
  // Returns a clean human-readable label for an assignment
  if (!isPoolAssignment(a)) return a.employeeName;
  const craft = getPoolCraft(a);
  const op = getAllOps().find(o => o.woNumber === a.woNumber && o.opSeq === a.opSeq);
  const dept = op ? (state.workOrders.find(w => w.woNumber === a.woNumber) || {}).department || craft : craft;
  return dept + ' / ' + craft;
}

function setResourceCapacity(craft, headcount, hoursPerDay) {
  state.resourceCapacity[craft] = { headcount, hoursPerDay, auto: false };
  try { localStorage.setItem('eam-resource-cap', JSON.stringify(state.resourceCapacity)); } catch(e) {}
  render();
}

function resetResourceCapacity(craft) {
  delete state.resourceCapacity[craft];

// ─── DEPENDENCY VALIDATION ───
function getDepViolations(assignment) {
  // Returns array of violation descriptions for a given assignment
  const allOps = getAllOps();
  const op = allOps.find(o => o.woNumber === assignment.woNumber && o.opSeq === assignment.opSeq);
  if (!op || !op.dependencies || !op.dependencies.length) return [];

  const violations = [];
  for (const depSeq of op.dependencies) {
    const depAssignment = state.assignments.find(a => a.woNumber === assignment.woNumber && a.opSeq === depSeq);
    const depOp = allOps.find(o => o.woNumber === assignment.woNumber && o.opSeq === depSeq);
    if (!depAssignment) {
      violations.push({ type: 'unscheduled', depSeq, msg: `Op ${depSeq} (${depOp?.description || '?'}) not yet scheduled` });
    } else if (depAssignment.date > assignment.date) {
      violations.push({ type: 'after', depSeq, msg: `Op ${depSeq} scheduled on ${fmtDate(depAssignment.date)} — after this op (${fmtDate(assignment.date)})` });
    } else if (depAssignment.date === assignment.date && depAssignment.status !== 'Complete') {
      violations.push({ type: 'sameday', depSeq, msg: `Op ${depSeq} on same day — may not finish in time` });
    }
  }
  return violations;
}

function hasDepViolation(assignment) {
  return getDepViolations(assignment).length > 0;
}

function getDepStatus(woNumber, opSeq) {
  // For backlog ops: are all dependencies met? 
  const allOps = getAllOps();
  const op = allOps.find(o => o.woNumber === woNumber && o.opSeq === opSeq);
  if (!op || !op.dependencies || !op.dependencies.length) return 'ready'; // no deps
  const allDepsSched = op.dependencies.every(depSeq => state.assignments.some(a => a.woNumber === woNumber && a.opSeq === depSeq));
  if (!allDepsSched) return 'blocked'; // some deps not scheduled
  return 'ready';
}

function getDepChain(woNumber) {
  // Returns all dependency pairs for a WO: [{from:{woNumber,opSeq}, to:{woNumber,opSeq}}]
  const wo = state.workOrders.find(w => w.woNumber === woNumber);
  if (!wo) return [];
  const links = [];
  wo.operations.forEach(op => {
    if (op.dependencies && op.dependencies.length) {
      op.dependencies.forEach(depSeq => {
        links.push({ from: { woNumber, opSeq: depSeq }, to: { woNumber, opSeq: op.opSeq } });
      });
    }
  });
  return links;
}

function getEmpLoad(name, date) {
  return state.assignments.filter(a => a.employeeName === name && a.date === date).reduce((s,a) => s + a.hours, 0);
}

// Get effective available hours for an employee on a date (respects overrides)
function getEmpAvailHours(name, date) {
  const emp = state.employees.find(e => e.name === name);
  if (!emp) return 0;
  const key = name + '|' + date;
  const override = state.availability[key];
  if (override) return override.hours;
  return emp.hoursPerDay;
}

// Get the reason for an availability override (or empty string)
function getEmpAvailReason(name, date) {
  const key = name + '|' + date;
  const override = state.availability[key];
  return override ? override.reason : '';
}

// Set availability override
function setEmpAvailability(name, date, hours, reason) {
  const key = name + '|' + date;
  if (hours === null || hours === undefined) {
    delete state.availability[key];
  } else {
    state.availability[key] = { hours: parseFloat(hours), reason: reason || '' };
  }
  saveAvailability();
  render();
}

// Set an employee out for the entire current week
function setEmpWeekOff(name, reason) {
  const dates = getWeekDates();
  dates.forEach(d => {
    state.availability[name + '|' + d] = { hours: 0, reason: reason || 'Off' };
  });
  saveAvailability();
  render();
}

// Clear all overrides for an employee this week
function clearEmpWeekAvail(name) {

  dates.forEach(d => delete state.availability[name + '|' + d]);
  saveAvailability();
  render();
}

function getEmpWeekLoad(name) {
  return getWeekDates().reduce((s,d) => s + getEmpLoad(name, d), 0);
}

function getEmpWeekAvail(name) {

// Pool-based weekly capacity from craftConfig (for Resource Pool Only mode)
function getPoolWeekAvail(filterDept, filterCraft) {
  let total = 0;
  Object.entries(state.craftConfig).forEach(([key, cfg]) => {
    if (filterDept !== 'All' && cfg.dept !== filterDept) return;
    if (filterCraft !== 'All' && cfg.resource !== filterCraft) return;
    total += cfg.headcount * cfg.hoursPerDay * 6; // 6-day work week
  });
  return total;
}

function getCraftCap(craft, date) {
  // Sum across all dept|resource configs for this craft
  let available = 0;
  Object.entries(state.craftConfig).forEach(([key, cfg]) => {
    if (cfg.resource === craft) available += cfg.headcount * cfg.hoursPerDay;
  });
  const allOps = getAllOps();
  const scheduled = state.assignments.filter(a => a.date === date && allOps.find(o => o.woNumber === a.woNumber && o.opSeq === a.opSeq)?.craft === craft).reduce((s,a) => s + a.hours, 0);
  return { available, scheduled, utilization: available > 0 ? (scheduled/available)*100 : 0 };
}

function getDeptCraftCap(dept, craft, date) {
  const key = `${dept}|${craft}`;
  const cfg = state.craftConfig[key];
  if (!cfg) return { available: 0, scheduled: 0, utilization: 0 };
  const available = cfg.headcount * cfg.hoursPerDay;
  const allOps = getAllOps();
  // Count hours: pool assignments matching this pool name OR named/craft-matched assignments
  const scheduled = state.assignments.filter(a => {
    if (a.date !== date) return false;
    // If assignment is to this specific pool, count it
    if (a.employeeName === '__POOL:' + craft) {
      const op = allOps.find(o => o.woNumber === a.woNumber && o.opSeq === a.opSeq);
      return op && op.department === dept;
    }
    // Otherwise match by op craft (for named employee assignments or generic pool)
    const op = allOps.find(o => o.woNumber === a.woNumber && o.opSeq === a.opSeq);
    return op && op.department === dept && op.craft === craft;
  }).reduce((s,a) => s + a.hours, 0);
  return { available, scheduled, utilization: available > 0 ? (scheduled/available)*100 : 0 };
}

// ─── ACTIONS ───
function checkDateWindow(woNumber, date) {
  const wo = state.workOrders.find(w => w.woNumber === woNumber);
  if (!wo || (!wo.scheduledStart && !wo.scheduledEnd)) return true; // no window set, allow
  
  // Normalize dates to YYYY-MM-DD strings for clean comparison
  const assignDate = date.slice(0, 10);
  const startDate = wo.scheduledStart ? wo.scheduledStart.slice(0, 10) : '';
  const endDate = wo.scheduledEnd ? wo.scheduledEnd.slice(0, 10) : '';
  
  // Parse dates consistently using UTC to avoid timezone shifts
  const parseUTC = s => { const p = s.split('-'); return new Date(Date.UTC(+p[0], +p[1]-1, +p[2])); };
  
  let msg = '';
  if (startDate && assignDate < startDate) {
    const diffDays = Math.round((parseUTC(startDate) - parseUTC(assignDate)) / 86400000);
    msg = `${woNumber} is scheduled to start ${fmtDate(startDate)} but you're assigning to ${fmtDate(assignDate)} (${diffDays} day${diffDays!==1?'s':''} early).`;
  } else if (endDate && assignDate > endDate) {
    const diffDays = Math.round((parseUTC(assignDate) - parseUTC(endDate)) / 86400000);
    msg = `${woNumber} is due by ${fmtDate(endDate)} but you're assigning to ${fmtDate(assignDate)} (${diffDays} day${diffDays!==1?'s':''} past due).`;
  }
  
  if (msg) {
    return confirm(`⚠ Outside Date Window\n\n${msg}\n\nSchedule anyway?`);
  }
  return true;
}

function addAssignment(woNumber, opSeq, employeeName, date, hours) {
  state.assignments.push({ id: uid(), woNumber, opSeq, employeeName, date, hours, status: 'Scheduled' });
  adjustWODatesToAssignments(woNumber);
  render();
}

function removeAssignment(id) {
  const a = state.assignments.find(x => x.id === id);
  const woNum = a ? a.woNumber : null;
  state.assignments = state.assignments.filter(a => a.id !== id);
  if (woNum) adjustWODatesToAssignments(woNum);
  render();
}

// Adjust WO start/end dates to match actual assignment dates
function adjustWODatesToAssignments(woNumber) {
  const wo = state.workOrders.find(w => w.woNumber === woNumber);
  if (!wo) return;
  const woAssignments = state.assignments.filter(a => a.woNumber === woNumber);
  const weekDates = getWeekDates();
  const weekStart = weekDates[0];
  const weekEnd = weekDates[weekDates.length - 1];

  if (woAssignments.length === 0) {
    // No assignments — keep full planning week
    wo.scheduledStart = weekStart;
    wo.scheduledEnd = weekEnd;
    return;
  }

  // Check if ALL ops are assigned
  const allOpsAssigned = wo.operations.every(op =>
    woAssignments.some(a => a.opSeq === op.opSeq)
  );

  const assignedDates = woAssignments.map(a => a.date).sort();
  const earliestAssignment = assignedDates[0];
  const latestAssignment = assignedDates[assignedDates.length - 1];

  if (allOpsAssigned) {
    // All ops have assignments — WO dates = assignment span exactly
    wo.scheduledStart = earliestAssignment;
    wo.scheduledEnd = latestAssignment;
  } else {
    // Some ops unassigned — WO start = earliest assignment, but end stays at week end
    // so unassigned ops still have room on the timeline
    wo.scheduledStart = earliestAssignment < weekStart ? earliestAssignment : weekStart;
    wo.scheduledEnd = latestAssignment > weekEnd ? latestAssignment : weekEnd;
  }
}

function updateAssignmentHours(id, newHours) {
  if (!newHours || newHours <= 0 || isNaN(newHours)) return;
  const a = state.assignments.find(x => x.id === id);
  if (!a) return;
  a.hours = newHours;
  render();
  // Re-open Gantt panel if it was open
  if (_gapWO) {
    setTimeout(() => {
      ganttPanelRefresh();
      const panel = document.getElementById('gantt-assign-panel');
      if (panel) { panel.style.display = 'flex'; panel.style.transform = 'translateX(0)'; }
    }, 50);
  }
}

function cycleStatus(id) {
  const a = state.assignments.find(x => x.id === id);
  if (!a) return;
  if (a.status === 'Allocated') a.status = 'Scheduled'; // promote from pool
  else if (a.status === 'Scheduled') a.status = 'In Progress';
  else if (a.status === 'In Progress') a.status = 'Complete';
  else a.status = 'Scheduled';
  render();
}

function clearAll() {
  if (!confirm('Clear all assignments? This cannot be undone.')) return;
  state.assignments = [];
  render();
}

function shiftWeek(dir) {
  const d = new Date(state.weekStart + 'T00:00:00');
  d.setDate(d.getDate() + dir * 7);
  state.weekStart = d.toISOString().split('T')[0];
  render();
}

function setView(v) { state.view = v; render(); }
function setWeekStart(dateStr) {
  // Find the Monday of the week containing dateStr
  const d = new Date(dateStr + 'T00:00:00');
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day; // Monday = 1
  d.setDate(d.getDate() + diff);
  state.weekStart = d.toISOString().slice(0, 10);
  try { localStorage.setItem('eam-week-start', state.weekStart); } catch(e) {}
  render();
}

function addContractorPool() {

  const craft = prompt('Contractor craft/resource name (e.g. "Welder", "Scaffolder"):');
  if (!craft || !craft.trim()) return;

  }

  // Add craft color if new
  if (!CRAFT_COLORS[craft.trim()]) {
    const palette = ['#F0AD4E','#28A745','#007BFF','#DC3545','#6C757D','#7B2FBE','#17A2B8','#E83E8C','#FD7E14','#20C997'];
    const color = palette[Object.keys(CRAFT_COLORS).length % palette.length];
    CRAFT_COLORS[craft.trim()] = { bg: color+'22', border: color, text: color, badge: color };
  }

}

function snapWOToWeek(woNumber) {
  // When confirming a WO, snap its dates to the selected planning week
  const wo = state.workOrders.find(w => w.woNumber === woNumber);
  if (!wo) return;
  const weekDates = getWeekDates();
  const weekStart = weekDates[0];   // Monday
  const weekEnd = weekDates[weekDates.length - 1]; // Saturday
  // Calculate original duration in days (preserve it)
  let durationDays = 0;
  if (wo.scheduledStart && wo.scheduledEnd) {
    const origStart = new Date(wo.scheduledStart + 'T00:00:00');
    const origEnd = new Date(wo.scheduledEnd + 'T00:00:00');
    durationDays = Math.max(0, Math.round((origEnd - origStart) / 86400000));
  }
  // Store original dates for reference (only first time)
  if (!wo._origStart) {
    wo._origStart = wo.scheduledStart;
    wo._origEnd = wo.scheduledEnd;
  }
  // Set start to planning week Monday, end = start + original duration (capped at week end)
  wo.scheduledStart = weekStart;
  if (durationDays > 0) {
    const endDate = new Date(weekStart + 'T00:00:00');
    endDate.setDate(endDate.getDate() + durationDays);
    const endStr = endDate.toISOString().split('T')[0];
    wo.scheduledEnd = endStr <= weekEnd ? endStr : weekEnd;
  } else {
    wo.scheduledEnd = weekEnd;
  }
}

function restoreWODates(woNumber) {
  // Restore original Oracle dates when un-confirming
  const wo = state.workOrders.find(w => w.woNumber === woNumber);
  if (wo && wo._origStart) {
    wo.scheduledStart = wo._origStart;
    wo.scheduledEnd = wo._origEnd;
  }
}

function confirmWO(woNumber) {
  snapWOToWeek(woNumber);
  state.confirmedWOs.add(woNumber);
  render();
}
function unconfirmWO(woNumber) {
  state.confirmedWOs.delete(woNumber);
  restoreWODates(woNumber);
  // Also remove any assignments for this WO
  state.assignments = state.assignments.filter(a => a.woNumber !== woNumber);
  render();
}
function confirmAllByPriority(maxCount) {
  const sorted = [...state.workOrders].sort((a,b) => {
    const aPM = a.isPM ? 0 : 1;
    const bPM = b.isPM ? 0 : 1;
    return (aPM - bPM) || (a.priority - b.priority);
  });
  state.confirmedWOs.clear();
  sorted.slice(0, maxCount || sorted.length).forEach(wo => {
    snapWOToWeek(wo.woNumber);
    state.confirmedWOs.add(wo.woNumber);
  });
  render();
}

// ─── AUTO-SCHEDULE ───
async function runAI() {
  const deptLabel = state.filterDept === 'All' ? 'all departments' : state.filterDept;
  const craftLabel = state.filterCraft === 'All' ? 'all resources' : state.filterCraft;

  // If API key available, use Claude
  if (state.apiKey) {
    await runAIWithClaude(deptLabel, craftLabel);
  } else {
    await runLocalScheduler(deptLabel, craftLabel);
  }
}

async function runAIWithClaude(deptLabel, craftLabel) {
  state.showAI = true;
  const provider = state.aiProvider || 'anthropic';
  const cfg = AI_PROVIDERS[provider];
  const model = localStorage.getItem('eam-model-' + provider) || localStorage.getItem('eam-model') || cfg.defaultModel;
  const providerName = cfg.name.split(' ')[0];
  const customRules = getCustomPrompt();

  try {
    // ═══════════════════════════════════════
    // STAGE 1: PLANNER AGENT — propose schedule
    // ═══════════════════════════════════════
    state.aiStatus = `🤖 Stage 1: ${providerName} Planner analyzing ${deptLabel} / ${craftLabel}...`;
    render();

    const plannerPrompt = `You are the PLANNER agent. Auto-schedule unscheduled operations for ${deptLabel} / ${craftLabel}.

IMPORTANT — SKILL-BASED SCHEDULING:
1. Read each operation's description carefully
2. Check each employee's Skills field
3. Match employees to operations based on skill relevance (e.g., "weld" op → employee with Welding skill)
4. If multiple employees match, prefer the one with lower workload

${customRules ? 'CUSTOM SHOP RULES (from supervisor):\n' + customRules + '\n' : ''}

Use schedule_operation tool for EACH assignment. Schedule operations in dependency order.
After all assignments, provide a brief summary:
- What you assigned and WHY (mention skill matches)
- Any ops that couldn't be scheduled
- Any concerns`;

    let apiMessages = [{ role: 'user', content: plannerPrompt }];
    let continueLoop = true;
    let plannerText = '';
    let iterations = 0;
    let proposedAssignments = [];

    // Save current assignments to restore if user rejects
    const savedAssignments = [...state.assignments];

    while (continueLoop && iterations < 8) {
      iterations++;
      state.aiStatus = iterations <= 1
        ? `🤖 Stage 1: ${providerName} Planner building schedule...`
        : `🤖 Stage 1: ${providerName} Planner assigning (${iterations}/8)...`;
      render();

      const url = typeof cfg.apiUrl === 'function' ? cfg.apiUrl(model, state.apiKey) : cfg.apiUrl;
      const systemPrompt = buildSystemPrompt();
      const tools = getTools();

      const resp = await fetch(url, {
        method: 'POST',
        headers: cfg.buildHeaders(state.apiKey),
        body: JSON.stringify(cfg.buildBody(model, systemPrompt, apiMessages, tools, 2048))
      });

      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        throw new Error(err.error?.message || `API error ${resp.status}`);
      }

      const data = await resp.json();
      const parsed = cfg.parseResponse(data);

      if (parsed.text) plannerText = parsed.text;

      // Store assistant response for conversation continuity
      if (provider === 'anthropic') {
        apiMessages.push({ role: 'assistant', content: data.content });
      } else {
        const assistantMsg = data.choices?.[0]?.message || { role: 'assistant', content: parsed.text || '' };
        apiMessages.push(assistantMsg);
      }

      // Execute tools — these actually create assignments
      if (parsed.toolCalls.length > 0) {
        const toolResults = [];
        for (const tc of parsed.toolCalls) {
          const result = executeTool(tc.name, tc.input);
          if (result.success && tc.name === 'schedule_operation') {
            proposedAssignments.push({ ...tc.input, result: result.success });
          }
          state.aiStatus = `🤖 ${result.success || result.error}`;
          render();
          toolResults.push({ type: 'tool_result', tool_use_id: tc.id, content: JSON.stringify(result) });
        }
        if (provider === 'anthropic') {
          apiMessages.push({ role: 'user', content: toolResults });
        } else {
          toolResults.forEach(r => {
            apiMessages.push({ role: 'tool', tool_call_id: r.tool_use_id, content: typeof r.content === 'string' ? r.content : JSON.stringify(r.content) });
          });
        }
      }

      continueLoop = parsed.stopReason === 'tool_use';
    }

    // ═══════════════════════════════════════
    // STAGE 2: REVIEWER AGENT — validate
    // ═══════════════════════════════════════
    state.aiStatus = `🤖 Stage 2: ${providerName} Reviewer checking schedule...`;
    render();

    const reviewSystemPrompt = buildSystemPrompt(); // Rebuilt with current assignments

    const reviewPrompt = `You are the REVIEWER agent. A Planner just created a schedule. Review it for quality.

CHECK THESE:
1. SKILL MATCHES — Do assigned employees have skills matching the operation descriptions? Flag mismatches.
2. CAPACITY — Is any employee overloaded (>8h on any day)? Flag overloads.
3. DEPENDENCIES — Are dependent operations scheduled in the right order? Flag violations.
4. COVERAGE — Are there unscheduled operations that could have been assigned? Flag gaps.
5. BALANCE — Is work distributed evenly across employees? Flag imbalances.

PLANNER'S SUMMARY:
${plannerText}

PROPOSED ASSIGNMENTS (${proposedAssignments.length} total):
${proposedAssignments.map(a => `  ${a.wo_number} Op${a.op_seq} → ${a.employee_name} on ${a.date} ${a.hours}h`).join('\n')}

Grade the schedule A (excellent), B (good with minor issues), or C (significant issues).
Format your response as:
GRADE: [A/B/C]
ISSUES: [list any problems found]
RECOMMENDATION: [approve as-is, or suggest specific fixes]`;

    const reviewResp = await fetch(
      typeof cfg.apiUrl === 'function' ? cfg.apiUrl(model, state.apiKey) : cfg.apiUrl,
      {
        method: 'POST',
        headers: cfg.buildHeaders(state.apiKey),
        body: JSON.stringify(cfg.buildBody(model, reviewSystemPrompt, [{ role: 'user', content: reviewPrompt }], [], 1024))
      }
    );

    let reviewText = '';
    if (reviewResp.ok) {
      const reviewData = await reviewResp.json();
      const reviewParsed = cfg.parseResponse(reviewData);
      reviewText = reviewParsed.text || '';
    }

    // ═══════════════════════════════════════
    // SHOW RESULTS — user approves or rejects
    // ═══════════════════════════════════════
    state.aiStatus = '';
    state.showAI = false;
    render();

    showAgentResults(plannerText, reviewText, proposedAssignments, savedAssignments, deptLabel, craftLabel);

  } catch(e) {
    state.aiStatus = `Error: ${e.message}. Falling back to local scheduler...`;
    render();
    await new Promise(r => setTimeout(r, 1500));
    await runLocalScheduler(deptLabel, craftLabel);
  }
}

          <div style="font-size:11px;color:var(--text-secondary);line-height:1.5;max-height:250px;overflow-y:auto">${fmtText(plannerText || 'Schedule created.')}</div>
        </div>
        <div style="flex:1;padding:12px;background:var(--bg-base);border-radius:8px;border-left:3px solid #17A2B8">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
            <span style="font-size:11px;font-weight:700;color:#17A2B8">Stage 2: Reviewer</span>
            <span style="font-size:14px;font-weight:900;color:${gradeColor};background:${gradeColor}22;padding:2px 8px;border-radius:4px">Grade: ${grade}</span>
          </div>
          <div style="font-size:11px;color:var(--text-secondary);line-height:1.5;max-height:250px;overflow-y:auto">${fmtText(reviewText || 'No review available.')}</div>
        </div>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;padding-top:12px;border-top:1px solid var(--border)">
        <button class="btn-outline" style="padding:8px 20px" onclick="
          // Reject — restore saved assignments
          state.assignments = ${JSON.stringify(savedAssignments)};
          render();
          this.closest('.modal-overlay').remove();
        ">Reject & Undo</button>
        <button class="btn btn-green" style="padding:8px 24px" onclick="

          this.closest('.modal-overlay').remove();

  document.body.appendChild(modal);
}

async function runLocalScheduler(deptLabel, craftLabel) {
  state.showAI = true;
  state.aiStatus = `Running local scheduler for ${deptLabel} / ${craftLabel}...`;
  render();
  await new Promise(r => setTimeout(r, 500));

  const dates = getWeekDates();
  const newA = [];
  const tempLoad = {};
  state.employees.forEach(e => { tempLoad[e.name] = {}; dates.forEach(d => { tempLoad[e.name][d] = getEmpLoad(e.name, d); }); });

  let candidates = getUnscheduledOps();
  if (state.filterDept !== 'All') candidates = candidates.filter(op => op.department === state.filterDept);
  if (state.filterCraft !== 'All') candidates = candidates.filter(op => op.craft === state.filterCraft);

  // Topological sort: schedule ops whose dependencies are all resolved first
  const scheduled = new Set(state.assignments.map(a => `${a.woNumber}:${a.opSeq}`));
  const remaining = [...candidates];
  const sorted = [];
  let safety = 0;
  while (remaining.length > 0 && safety < 500) {
    safety++;
    let progressed = false;
    for (let i = remaining.length - 1; i >= 0; i--) {
      const op = remaining[i];
      const deps = op.dependencies || [];
      const allDepsMet = deps.every(depSeq => scheduled.has(`${op.woNumber}:${depSeq}`));
      if (allDepsMet || deps.length === 0) {
        sorted.push(op);
        remaining.splice(i, 1);
        // Mark as "will be scheduled" so downstream ops can proceed in the sort
        scheduled.add(`${op.woNumber}:${op.opSeq}`);
        progressed = true;
      }
    }
    if (!progressed) {
      // Remaining ops have unresolvable dependencies in this batch — add them last
      sorted.push(...remaining.sort((a,b) => a.priority - b.priority || a.opSeq - b.opSeq));
      break;
    }
  }

  // Sub-sort by priority within dependency-safe order
  // PM first, then by priority, maintain topo order within WO
  const woOrder = {};
  sorted.forEach((op, i) => {
    if (!(op.woNumber in woOrder)) {
      const isPM = op.isPM ? 0 : 1;
      woOrder[op.woNumber] = isPM * 100000 + op.priority * 10000 + i;
    }
  });
  sorted.sort((a,b) => {
    const wa = woOrder[a.woNumber] || 99999;
    const wb = woOrder[b.woNumber] || 99999;
    if (wa !== wb) return wa - wb;
    return a.opSeq - b.opSeq;
  });

  let depViols = 0;
  const usePoolMode = state.employees.length === 0;
  
  for (const op of sorted) {
    if (usePoolMode) {
      // ── RESOURCE POOL MODE: allocate to craft pool ──
      const earliest = dates.find(d => d >= (op.scheduledStart||dates[0])) || dates[0];
      const latest = dates.findLast(d => d <= (op.scheduledEnd||dates[dates.length-1])) || dates[dates.length-1];
      
      const deps = op.dependencies || [];
      let depEarliestDate = '';
      deps.forEach(depSeq => {
        const depA = [...newA, ...state.assignments].find(a => a.woNumber === op.woNumber && a.opSeq === depSeq);
        if (depA && depA.date > depEarliestDate) depEarliestDate = depA.date;
      });
      const constrainedEarliest = depEarliestDate > earliest ? depEarliestDate : earliest;
      
      // Track pool load per craft per day
      if (!tempLoad['__POOL:' + op.craft]) { tempLoad['__POOL:' + op.craft] = {}; dates.forEach(d => { tempLoad['__POOL:' + op.craft][d] = getResourceDayLoad(op.craft, d); }); }
      
      const cap = getResourceCapacity(op.craft);
      const dailyCap = cap.hoursPerDay || 8;
      const remain = getRemainingHours(op);
      if (remain <= 0) continue;
      
      // Find best day with most capacity
      let bestDate = null, bestAvail = -1;
      for (const date of dates) {
        if (date < constrainedEarliest || date > latest) continue;
        const load = tempLoad['__POOL:' + op.craft][date] || 0;
        const avail = dailyCap - load;
        if (avail >= remain && avail > bestAvail) { bestAvail = avail; bestDate = date; }
      }
      // Fallback: any day with space
      if (!bestDate) {
        for (const date of dates) {
          if (date < constrainedEarliest) continue;
          const load = tempLoad['__POOL:' + op.craft][date] || 0;
          if (dailyCap - load > 0) { bestDate = date; break; }
        }
      }
      if (!bestDate) bestDate = constrainedEarliest || dates[0];
      
      const a = { id: uid(), woNumber: op.woNumber, opSeq: op.opSeq, employeeName: '__POOL:' + op.craft, date: bestDate, hours: remain, status: 'Allocated' };
      newA.push(a);
      tempLoad['__POOL:' + op.craft][bestDate] = (tempLoad['__POOL:' + op.craft][bestDate] || 0) + remain;
      
    } else {
    // ── EMPLOYEE MODE (existing) ──
    const matchEmps = state.employees.filter(e => e.craft === op.craft || (e.allCrafts && e.allCrafts.includes(op.craft)));
    if (!matchEmps.length) continue;

    const earliest = dates.find(d => d >= op.scheduledStart) || dates[0];
    const latest = dates.findLast(d => d <= op.scheduledEnd) || dates[dates.length-1];

    // Find the latest date any dependency is scheduled — this op MUST go on or after that date
    const deps = op.dependencies || [];
    let depEarliestDate = '';
    deps.forEach(depSeq => {
      const depA = [...newA, ...state.assignments].find(a => a.woNumber === op.woNumber && a.opSeq === depSeq);
      if (depA && depA.date > depEarliestDate) depEarliestDate = depA.date;
    });
    // Hard constraint: must be on or after latest dependency date
    const constrainedEarliest = depEarliestDate > earliest ? depEarliestDate : earliest;

    let bestEmp = null, bestDate = null, bestScore = -Infinity;
    const opWords = op.description.toLowerCase().split(/\s+/);

    for (const emp of matchEmps) {
      const skillMatch = opWords.filter(w => emp.skills.toLowerCase().includes(w)).length;
      const sameDeptBonus = emp.department === op.department ? 15 : 0;
      for (const date of dates) {
        if (date < constrainedEarliest || date > latest) continue;
        const dayAvail = getEmpAvailHours(emp.name, date);
        if (dayAvail === 0) continue;
        const remaining = dayAvail - (tempLoad[emp.name][date] || 0);
        if (remaining < op.estHours) continue;
        const totalWeek = dates.reduce((s,d) => s + (tempLoad[emp.name][d]||0), 0);
        // Prefer day after dependency (not same day) for safety
        const afterDepBonus = depEarliestDate && date > depEarliestDate ? 10 : 0;
        const score = -totalWeek + skillMatch * 10 + sameDeptBonus + afterDepBonus - dates.indexOf(date);
        if (score > bestScore) { bestScore = score; bestEmp = emp; bestDate = date; }
      }
    }

    if (bestEmp && bestDate) {
      const a = { id: uid(), woNumber: op.woNumber, opSeq: op.opSeq, employeeName: bestEmp.name, date: bestDate, hours: op.estHours, status: 'Scheduled' };
      newA.push(a);
      tempLoad[bestEmp.name][bestDate] += op.estHours;
    }
    } // end employee mode
  }

  // Count violations in final assignments
  state.assignments = [...state.assignments, ...newA];
  newA.forEach(a => { if (hasDepViolation(a)) depViols++; });
  const skipped = sorted.length - newA.length;
  state.aiStatus = `Local scheduler: ${newA.length} of ${sorted.length} ops scheduled (${deptLabel} / ${craftLabel}).${skipped > 0 ? ' ' + skipped + ' could not fit.' : ''}${depViols > 0 ? ' ⚠ ' + depViols + ' dependency warnings.' : ' ✓ All dependencies respected.'} Add API key in ⚙ Settings for AI-powered scheduling.`;
  render();
  await new Promise(r => setTimeout(r, 3500));
  state.showAI = false;
  render();
}

// ─── EXPORT ───
function getExportVersion(weekStart, dept) {
  const key = 'eam-export-versions';
  let versions = {};
  try { versions = JSON.parse(localStorage.getItem(key)) || {}; } catch(e) {}
  const vKey = weekStart + '|' + dept;
  const ver = (versions[vKey] || 0) + 1;
  versions[vKey] = ver;
  try { localStorage.setItem(key, JSON.stringify(versions)); } catch(e) {}
  return ver;
}
