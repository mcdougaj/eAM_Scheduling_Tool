<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joeyi — Operations Scheduling Workbench (Oracle EBS)</title>
<style>
  /* ─── THEME VARIABLES ─── */
  :root {
    --bg-base: #0D1117;
    --bg-surface: #161B22;
    --bg-card: #1C2333;
    --bg-hover: #242D3D;
    --bg-input: #0D1117;
    --border: #2A3444;
    --border-hover: #3D4F66;
    --text-primary: #E6EDF3;
    --text-secondary: #8B949E;
    --text-muted: #6E7681;
    --accent: #E8712A;
    --accent-glow: #E8712A22;
    --grid-gap: #2A3444;
    --cell-bg: #0D1117;
    --cell-hover: #1C2333;
    --modal-overlay: #000000CC;
    --shadow: 0 8px 32px #00000088;
    --scrollbar-track: #161B22;
    --scrollbar-thumb: #3D4F66;
    --scrollbar-hover: #4D6080;
    --cap-bar-bg: #2A3444;
    --theme-icon: '☀';
  }

  [data-theme="light"] {
    --bg-base: #F0F2F5;
    --bg-surface: #FFFFFF;
    --bg-card: #FFFFFF;
    --bg-hover: #F5F6F8;
    --bg-input: #F5F6F8;
    --border: #DDE1E6;
    --border-hover: #C4CAD1;
    --text-primary: #1B2128;
    --text-secondary: #5A6A7A;
    --text-muted: #8A95A3;
    --accent: #D45A1A;
    --accent-glow: #D45A1A15;
    --grid-gap: #DDE1E6;
    --cell-bg: #FAFBFC;
    --cell-hover: #EDF0F3;
    --modal-overlay: #00000055;
    --shadow: 0 8px 32px #00000018;
    --scrollbar-track: #F0F2F5;
    --scrollbar-thumb: #C4CAD1;
    --scrollbar-hover: #A0ABB5;
    --cap-bar-bg: #E4E7EB;
    --theme-icon: '🌙';
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Consolas', monospace; background: var(--bg-base); color: var(--text-primary); font-size: 13px; overflow: hidden; height: 100vh; transition: background 0.25s, color 0.25s; margin: 0; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--scrollbar-track); }
  ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-hover); }
  button { font-family: inherit; cursor: pointer; transition: all 0.15s; }
  button:hover { filter: brightness(1.1); }
  select, input { font-family: inherit; }

  /* Theme Toggle */
  .theme-toggle { background: var(--bg-hover); border: 1px solid var(--border); color: var(--text-primary); width: 34px; height: 34px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; transition: all 0.2s; }
  .theme-toggle:hover { border-color: var(--accent); background: var(--accent-glow); }

  /* Header */
  .header { background: var(--bg-card); border-bottom: 2px solid var(--accent); padding: 6px 16px; display: flex; align-items: center; justify-content: space-between; gap: 10px; transition: background 0.25s; flex-shrink: 0; }
  .logo-text { font-size: 16px; font-weight: 700; color: var(--accent); letter-spacing: 1.5px; }
  .logo-sub { font-size: 10px; color: var(--text-secondary); letter-spacing: 0.5px; margin-top: 0; }
  .nav { display: flex; gap: 2px; background: var(--bg-surface); border-radius: 6px; padding: 2px; border: 1px solid var(--border); }
  .nav-btn { padding: 7px 14px; border: none; border-radius: 4px; font-size: 12px; font-weight: 600; background: transparent; color: var(--text-secondary); }
  .nav-btn.active { background: var(--accent); color: #FFF; }
  .btn { background: var(--accent); color: #FFF; border: none; padding: 7px 16px; border-radius: 4px; font-size: 12px; font-weight: 600; }
  .btn-green { background: #2E7D32; }
  .btn-outline { background: transparent; border: 1px solid var(--text-secondary); color: var(--text-secondary); padding: 6px 14px; border-radius: 4px; font-size: 12px; font-weight: 600; }
  .btn-outline-orange { border-color: var(--accent); color: var(--accent); }
  .btn-outline-red { border-color: #DC3545; color: #DC3545; }

  /* Controls Bar */
  .controls { display: flex; align-items: center; gap: 8px; padding: 5px 16px; background: var(--bg-surface); border-bottom: 1px solid var(--border); transition: background 0.25s; flex-shrink: 0; flex-wrap: wrap; }
  .week-nav { display: flex; align-items: center; gap: 6px; }
  .week-btn { background: var(--bg-hover); border: 1px solid var(--border); color: var(--text-primary); padding: 3px 8px; border-radius: 4px; font-size: 11px; }
  .week-label { font-size: 13px; font-weight: 700; color: var(--accent); min-width: 200px; text-align: center; }
  .stats { display: flex; gap: 12px; font-size: 11px; color: var(--text-secondary); }
  .stats .val { font-weight: 700; }
  .stats .val-orange { color: var(--accent); }
  .stats .val-green { color: #28A745; }
  .stats .val-yellow { color: #F0AD4E; }

  /* Layout */
  .main { display: flex; overflow: hidden; flex: 1; min-height: 0; }
  .sidebar { width: 320px; min-width: 320px; background: var(--bg-surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; transition: background 0.25s; }
  .sidebar-header { padding: 10px 14px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .sidebar-title { font-size: 12px; font-weight: 700; color: var(--text-secondary); letter-spacing: 1.5px; text-transform: uppercase; }
  .sidebar-content { flex: 1; overflow-y: auto; padding: 8px; }
  .content { flex: 1; overflow: auto; padding: 12px; }

  /* Operation Cards */
  .op-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 4px; padding: 8px 10px; margin-bottom: 6px; cursor: grab; transition: all 0.15s; }
  .op-card:hover { border-color: var(--border-hover); background: var(--bg-hover); }
  .op-card.dragging { opacity: 0.5; }
  .op-card-header { display: flex; justify-content: space-between; align-items: center; }
  .op-wo { font-size: 11px; font-weight: 700; color: var(--accent); }
  .op-desc { font-size: 12px; color: var(--text-primary); margin-top: 2px; }
  .op-meta { font-size: 10px; color: var(--text-secondary); margin-top: 4px; display: flex; gap: 8px; align-items: center; }

  /* Tags */
  .tag { display: inline-block; padding: 1px 6px; border-radius: 2px; font-size: 9px; font-weight: 700; color: #FFF; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 10px; font-weight: 700; letter-spacing: 0.5px; }

  /* Schedule Grid */
  .schedule-grid { display: grid; grid-template-columns: 150px repeat(6, 1fr); gap: 1px; background: var(--grid-gap); min-width: 950px; }
  .day-header { background: var(--bg-card); padding: 8px 10px; text-align: center; font-weight: 700; font-size: 12px; color: var(--text-primary); border-bottom: 2px solid var(--accent); }
  .day-header-sub { font-size: 10px; color: var(--text-secondary); font-weight: 400; }
  .emp-label { background: var(--bg-card); padding: 6px 10px; display: flex; flex-direction: column; justify-content: center; border-bottom: 1px solid var(--border); }
  .emp-name { font-size: 11px; font-weight: 700; color: var(--text-primary); }
  .emp-craft { font-size: 10px; color: var(--text-secondary); }
  .day-cell { background: var(--cell-bg); padding: 4px; min-height: 60px; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); transition: background 0.15s; display: flex; flex-direction: column; }
  .day-cell.drag-over { background: var(--cell-hover); }
  .day-cell.drag-over > * { pointer-events: none; }
  .day-cell-load { font-size: 9px; color: var(--text-secondary); text-align: right; margin-top: 2px; }
  .day-cell-load.over { color: #DC3545; }

  /* Assigned Op Chips */
  .assigned-op { border-radius: 3px; padding: 3px 6px; margin-bottom: 2px; font-size: 10px; position: relative; }
  .assigned-op.complete { opacity: 0.7; text-decoration: line-through; }
  .assigned-op.dragging { opacity: 0.4; outline: 2px dashed var(--accent); outline-offset: 1px; }
  .assigned-op-header { display: flex; justify-content: space-between; align-items: center; }
  .assigned-op-wo { font-weight: 700; }
  .assigned-op-meta { font-size: 9px; color: var(--text-secondary); margin-top: 1px; }
  .assigned-op-btn { background: none; border: none; cursor: pointer; font-size: 10px; padding: 0 2px; }

  /* Capacity Bar */
  .cap-bar { height: 4px; border-radius: 2px; background: var(--cap-bar-bg); overflow: hidden; margin-top: 4px; }
  .cap-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
  .cap-fill.green { background: #28A745; }
  .cap-fill.yellow { background: #F0AD4E; }
  .cap-fill.red { background: #DC3545; }

  /* Capacity View */
  .cap-table { width: 100%; border-collapse: collapse; font-size: 11px; }
  .cap-table th { text-align: center; padding: 8px 6px; color: var(--text-primary); font-weight: 600; border-bottom: 2px solid var(--accent); }
  .cap-table th:first-child { text-align: left; padding-left: 10px; }
  .cap-table td { padding: 6px; text-align: center; border-bottom: 1px solid var(--border); }
  .cap-table td:first-child { text-align: left; padding-left: 10px; }
  .cap-table .week-total { color: var(--accent); font-weight: 700; }

  /* Stat Cards */
  .stat-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; padding: 12px 16px; text-align: center; transition: background 0.25s; }
  .stat-value { font-size: 24px; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: 10px; color: var(--text-secondary); margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }

  /* Config Row */
  .config-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; padding: 4px 0; }
  .config-row label { font-size: 10px; color: var(--text-secondary); }
  .config-row input { background: var(--bg-input); border: 1px solid var(--border); color: var(--text-primary); padding: 4px 8px; border-radius: 4px; font-size: 12px; width: 50px; text-align: center; }
  .section-title { font-size: 12px; font-weight: 700; color: var(--text-secondary); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 12px; }

  /* Employee Cards */
  .emp-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }
  .emp-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 4px; padding: 14px; transition: background 0.25s; }
  .emp-card-name { font-size: 13px; font-weight: 700; color: var(--text-primary); }
  .emp-card-info { font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; }

  /* WO Cards */
  .wo-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; padding: 14px; margin-bottom: 10px; transition: background 0.25s; }
  .wo-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .wo-number { font-size: 14px; font-weight: 700; color: var(--accent); }
  .wo-desc { font-size: 12px; color: var(--text-primary); margin-left: 10px; }
  .wo-meta { font-size: 11px; color: var(--text-secondary); margin-bottom: 8px; }
  .wo-table { width: 100%; border-collapse: collapse; font-size: 11px; }
  .wo-table th { text-align: left; padding: 4px 8px; color: var(--text-secondary); font-weight: 600; border-bottom: 1px solid var(--border); }
  .wo-table td { padding: 4px 8px; border-bottom: 1px solid var(--border); color: var(--text-primary); }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: var(--modal-overlay); display: flex; align-items: center; justify-content: center; z-index: 1000; }
  .modal { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 24px; min-width: 420px; max-width: 500px; box-shadow: var(--shadow); }
  .modal-title { font-size: 14px; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
  .modal-sub { font-size: 12px; color: var(--text-primary); margin-bottom: 12px; }
  .modal-meta { font-size: 11px; color: var(--text-secondary); margin-bottom: 16px; }
  .form-group { margin-bottom: 10px; }
  .form-label { font-size: 10px; color: var(--text-secondary); display: block; margin-bottom: 4px; }
  .form-input { background: var(--bg-input); border: 1px solid var(--border); color: var(--text-primary); padding: 6px 10px; border-radius: 4px; font-size: 12px; width: 100%; }
  .form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

  /* AI Panel */
  .ai-panel { position: fixed; bottom: 20px; right: 20px; background: var(--bg-card); border: 1px solid var(--accent); border-radius: 8px; padding: 16px; z-index: 999; min-width: 320px; box-shadow: var(--shadow); }
  .ai-title { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 13px; font-weight: 700; color: var(--accent); }
  .ai-status { font-size: 11px; color: var(--text-primary); line-height: 1.5; }
  .shimmer-bar { margin-top: 8px; height: 3px; background: var(--cap-bar-bg); border-radius: 2px; overflow: hidden; }
  .shimmer-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #E8712A, #F0AD4E, #E8712A); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 2px; }
  @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

  /* Craft Colors */
  .craft-electrician { border-left: 3px solid #F0AD4E; }
  .craft-millwright { border-left: 3px solid #28A745; }
  .craft-mechanic { border-left: 3px solid #007BFF; }
  .craft-welder { border-left: 3px solid #DC3545; }
  .craft-pipefitter { border-left: 3px solid #6C757D; }
  .craft-instrument { border-left: 3px solid #7B2FBE; }
  .hidden { display: none !important; }

  /* Chat Sidebar */
  .chat-sidebar { position: fixed; top: 0; right: 0; width: 400px; height: 100vh; background: var(--bg-surface); border-left: 2px solid var(--accent); display: flex; flex-direction: column; z-index: 900; transform: translateX(100%); transition: transform 0.25s ease; box-shadow: -4px 0 24px #00000044; }
  .chat-sidebar.open { transform: translateX(0); }
  .chat-header { padding: 12px 16px; background: var(--bg-card); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .chat-header-title { font-size: 13px; font-weight: 700; color: var(--accent); display: flex; align-items: center; gap: 6px; }
  .chat-close { background: none; border: none; color: var(--text-secondary); font-size: 18px; cursor: pointer; padding: 2px 6px; }
  .chat-close:hover { color: var(--text-primary); }
  .chat-messages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
  .chat-msg { max-width: 90%; padding: 8px 12px; border-radius: 8px; font-size: 12px; line-height: 1.5; word-wrap: break-word; }
  .chat-msg.user { align-self: flex-end; background: var(--accent); color: #FFF; border-bottom-right-radius: 2px; }
  .chat-msg.assistant { align-self: flex-start; background: var(--bg-card); color: var(--text-primary); border: 1px solid var(--border); border-bottom-left-radius: 2px; }
  .chat-msg.system { align-self: center; background: var(--bg-hover); color: var(--text-secondary); font-size: 10px; padding: 4px 10px; border-radius: 10px; }
  .chat-msg.tool { align-self: flex-start; background: #28A74518; border: 1px solid #28A74544; color: #28A745; font-size: 10px; padding: 4px 10px; border-radius: 6px; font-style: italic; }
  .chat-msg pre { background: var(--bg-base); padding: 6px 8px; border-radius: 4px; margin-top: 4px; font-size: 10px; overflow-x: auto; white-space: pre-wrap; }
  .chat-input-area { padding: 10px 12px; border-top: 1px solid var(--border); display: flex; gap: 8px; background: var(--bg-card); }
  .chat-input { flex: 1; background: var(--bg-input); border: 1px solid var(--border); color: var(--text-primary); padding: 8px 12px; border-radius: 6px; font-size: 12px; font-family: inherit; resize: none; outline: none; }
  .chat-input:focus { border-color: var(--accent); }
  .chat-input::placeholder { color: var(--text-muted); }
  .chat-send { background: var(--accent); color: #FFF; border: none; padding: 8px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; }
  .chat-send:disabled { opacity: 0.5; cursor: not-allowed; }
  .chat-typing { display: flex; gap: 4px; padding: 8px 12px; align-self: flex-start; }
  .chat-typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--text-secondary); animation: typingDot 1.4s infinite; }
  .chat-typing span:nth-child(2) { animation-delay: 0.2s; }
  .chat-typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typingDot { 0%,60%,100% { opacity: 0.3; transform: translateY(0); } 30% { opacity: 1; transform: translateY(-4px); } }

  /* Chat Toggle Button */
  .chat-toggle { position: fixed; top: 50%; right: 0; transform: translateY(-50%); background: var(--accent); color: #FFF; border: none; padding: 12px 8px; border-radius: 8px 0 0 8px; font-size: 14px; cursor: pointer; z-index: 899; box-shadow: -2px 2px 8px #00000033; transition: all 0.2s; }
  .chat-toggle:hover { padding-right: 12px; }
  .chat-toggle.has-sidebar { right: 400px; }

  /* Settings Modal */
  .settings-section { margin-bottom: 16px; }
  .settings-label { font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .settings-desc { font-size: 10px; color: var(--text-muted); margin-bottom: 8px; line-height: 1.4; }
  .settings-input { background: var(--bg-input); border: 1px solid var(--border); color: var(--text-primary); padding: 8px 12px; border-radius: 4px; font-size: 12px; width: 100%; font-family: inherit; }
  .settings-input:focus { border-color: var(--accent); outline: none; }
  .settings-status { font-size: 10px; margin-top: 4px; }
  .settings-status.ok { color: #28A745; }
  .settings-status.err { color: #DC3545; }

  /* Adjust main content when chat is open */
  body.chat-open .chat-toggle { right: 400px; }

  /* KPI Dashboard Bar */
  .kpi-bar { display: flex; gap: 1px; background: var(--border); border-bottom: 1px solid var(--border); overflow-x: auto; flex-shrink: 0; }
  .kpi-group { flex: 1; min-width: 0; background: var(--bg-surface); padding: 5px 10px; }
  .kpi-group-title { font-size: 9px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
  .kpi-group-title .kpi-icon { font-size: 11px; }
  .kpi-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .kpi-item { display: flex; flex-direction: column; gap: 1px; min-width: 60px; }
  .kpi-label { font-size: 8px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
  .kpi-value { font-size: 13px; font-weight: 700; line-height: 1.1; }
  .kpi-value.ok { color: #28A745; }
  .kpi-value.warn { color: #F0AD4E; }
  .kpi-value.danger { color: #DC3545; }
  .kpi-value.accent { color: var(--accent); }
  .kpi-value.neutral { color: var(--text-primary); }
  .kpi-sub { font-size: 8px; color: var(--text-muted); }
  .kpi-mini-bar { width: 50px; height: 3px; background: var(--cap-bar-bg); border-radius: 2px; margin-top: 2px; overflow: hidden; }
  .kpi-mini-fill { height: 100%; border-radius: 2px; }
  .kpi-dept-row { display: flex; gap: 12px; align-items: flex-end; }
  .kpi-dept-block { display: flex; flex-direction: column; gap: 1px; }
  .kpi-dept-label { font-size: 8px; font-weight: 600; letter-spacing: 0.5px; }
  .kpi-toggle { background: none; border: none; color: var(--text-muted); font-size: 9px; cursor: pointer; padding: 0; margin-left: auto; }
  .kpi-toggle:hover { color: var(--text-primary); }

  /* Filter dropdowns */
  .filter-select { background: var(--bg-input); border: 1px solid var(--border); color: var(--text-primary); padding: 3px 6px; border-radius: 4px; font-size: 10px; font-family: inherit; cursor: pointer; max-width: 130px; }
  .filter-select:focus { border-color: var(--accent); outline: none; }
  .filter-group { display: flex; align-items: center; gap: 4px; }
  .filter-label { font-size: 9px; color: var(--text-secondary); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
  .filter-reset { background: none; border: 1px solid var(--border); color: var(--text-muted); font-size: 9px; padding: 2px 6px; border-radius: 3px; cursor: pointer; font-family: inherit; }
  .filter-reset:hover { color: var(--accent); border-color: var(--accent); }
  .filter-active { background: var(--accent); color: #FFF; border: none; padding: 3px 8px; border-radius: 3px; font-size: 9px; font-weight: 600; cursor: pointer; font-family: inherit; display: flex; align-items: center; gap: 3px; }
  .filter-active:hover { filter: brightness(1.1); }


  /* ─── GANTT CHART ─── */
  .gantt-wrap { flex: 1; overflow: auto; display: flex; flex-direction: column; }
  .gantt-table { border-collapse: collapse; min-width: 100%; font-size: 11px; }
  .gantt-table th { background: var(--bg-card); padding: 6px 10px; font-weight: 700; color: var(--text-secondary); border-bottom: 2px solid var(--accent); position: sticky; top: 0; z-index: 10; white-space: nowrap; }
  .gantt-table th.gantt-label-col { text-align: left; min-width: 280px; left: 0; z-index: 11; }
  .gantt-table th.gantt-day-col { text-align: center; width: 100px; min-width: 80px; border-left: 1px solid var(--border); }
  .gantt-wo-row td { border-bottom: 1px solid var(--border); vertical-align: middle; padding: 0; }
  .gantt-wo-row td.gantt-label { padding: 6px 10px; background: var(--bg-surface); position: sticky; left: 0; z-index: 5; border-right: 2px solid var(--border); min-width: 280px; max-width: 280px; }
  .gantt-wo-row td.gantt-day-cell { border-left: 1px solid var(--border); height: 40px; position: relative; background: var(--cell-bg); transition: background 0.15s; cursor: pointer; }
  .gantt-wo-row td.gantt-day-cell:hover { background: var(--cell-hover); }
  .gantt-wo-row td.gantt-day-cell.today { background: var(--accent-glow); border-left: 2px solid var(--accent); }
  .gantt-bar { position: absolute; top: 50%; transform: translateY(-50%); height: 22px; border-radius: 3px; display: flex; align-items: center; padding: 0 6px; font-size: 9px; font-weight: 700; color: #FFF; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: grab; user-select: none; box-shadow: 0 1px 4px #00000044; transition: filter 0.15s; z-index: 3; }
  .gantt-bar:hover { filter: brightness(1.15); z-index: 4; }
  .gantt-bar.dragging-bar { opacity: 0.6; cursor: grabbing; }
  .gantt-bar.pm-bar { border-top: 2px solid #17A2B8; }
  .gantt-bar.complete-bar { opacity: 0.6; text-decoration: line-through; }
  .gantt-bar.out-of-window { border: 2px solid #F0AD4E; }
  .gantt-dept-header td { padding: 5px 10px; font-size: 11px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; border-bottom: 1px solid var(--border); background: var(--bg-card); }
  .gantt-controls { display: flex; gap: 8px; align-items: center; padding: 8px 16px; background: var(--bg-surface); border-bottom: 1px solid var(--border); flex-shrink: 0; flex-wrap: wrap; }
  .gantt-zoom-btn { background: var(--bg-hover); border: 1px solid var(--border); color: var(--text-primary); padding: 3px 10px; border-radius: 3px; font-size: 11px; cursor: pointer; font-family: inherit; }
  .gantt-zoom-btn.active { background: var(--accent); color: #FFF; border-color: var(--accent); }
  .gantt-zoom-btn:hover:not(.active) { border-color: var(--accent); color: var(--accent); }
  .gantt-legend { display: flex; gap: 12px; align-items: center; margin-left: 16px; flex-wrap: wrap; }
  .gantt-legend-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--text-secondary); }
  .gantt-legend-swatch { width: 10px; height: 10px; border-radius: 2px; }

  /* ─── CAPACITY HEAT MAP ─── */
  .heatmap-wrap { overflow: auto; flex: 1; }
  .heatmap-table { border-collapse: collapse; font-size: 11px; min-width: 100%; }
  .heatmap-table th { background: var(--bg-card); padding: 6px 8px; font-weight: 700; color: var(--text-secondary); border-bottom: 2px solid var(--accent); position: sticky; top: 0; z-index: 10; white-space: nowrap; text-align: center; }
  .heatmap-table th:first-child { text-align: left; position: sticky; left: 0; z-index: 11; min-width: 180px; }
  .heatmap-table td { padding: 0; border-bottom: 1px solid var(--border); }
  .heatmap-table td:first-child { position: sticky; left: 0; z-index: 5; background: var(--bg-surface); padding: 6px 10px; font-weight: 600; border-right: 2px solid var(--border); min-width: 180px; }
  .heatmap-cell { width: 100%; height: 48px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; transition: filter 0.15s; }
  .heatmap-cell:hover { filter: brightness(1.1); }
  .heatmap-cell .hm-pct { font-size: 13px; font-weight: 700; }
  .heatmap-cell .hm-hrs { font-size: 9px; opacity: 0.8; margin-top: 2px; }
  .hm-empty { background: var(--cell-bg); color: var(--text-muted); }
  .hm-green { background: #28A74522; color: #28A745; border: 1px solid #28A74533; }
  .hm-yellow { background: #F0AD4E22; color: #B87000; border: 1px solid #F0AD4E44; }
  .hm-orange { background: #E8712A22; color: #E8712A; border: 1px solid #E8712A44; }
  .hm-red { background: #DC354522; color: #DC3545; border: 1px solid #DC354544; }
  .hm-off { background: var(--bg-surface); color: var(--text-muted); font-size: 9px; }
  .heatmap-section td { padding: 4px 10px 2px; font-size: 10px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; background: var(--bg-card); }
  .capacity-tabs { display: flex; gap: 2px; padding: 8px 16px 0; background: var(--bg-surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .cap-tab { padding: 6px 16px; border: 1px solid var(--border); border-bottom: none; border-radius: 4px 4px 0 0; font-size: 11px; font-weight: 600; cursor: pointer; background: var(--bg-base); color: var(--text-secondary); font-family: inherit; }
  .cap-tab.active { background: var(--bg-card); color: var(--text-primary); border-bottom-color: var(--bg-card); }
  .cap-tab:hover:not(.active) { color: var(--text-primary); background: var(--bg-hover); }

  /* Dependency violations */
  .dep-violated { border: 2px solid #DC3545 !important; box-shadow: 0 0 6px #DC354544; animation: depPulse 2s infinite; }
  .dep-warn { border: 2px solid #F0AD4E !important; }
  .dep-icon { font-size: 10px; cursor: help; }
  .dep-arrow { position: absolute; pointer-events: none; z-index: 5; }
  .dep-badge { display: inline-flex; align-items: center; gap: 2px; font-size: 8px; padding: 1px 4px; border-radius: 3px; }
  .dep-badge.blocked { background: #DC354522; color: #DC3545; }
  .dep-badge.ready { background: #28A74522; color: #28A745; }
  .dep-badge.parallel { background: #007BFF22; color: #007BFF; }
  @keyframes depPulse { 0%,100% { box-shadow: 0 0 4px #DC354533; } 50% { box-shadow: 0 0 10px #DC354566; } }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

  /* Board View Switcher */
  .board-views { display: flex; gap: 2px; background: var(--bg-base); border-radius: 4px; padding: 2px; border: 1px solid var(--border); }
  .board-view-btn { background: none; border: none; color: var(--text-secondary); font-size: 10px; padding: 4px 10px; border-radius: 3px; cursor: pointer; font-family: inherit; white-space: nowrap; }
  .board-view-btn:hover { color: var(--text-primary); background: var(--bg-hover); }
  .board-view-btn.active { background: var(--accent); color: #FFF; font-weight: 600; }

  /* Plan Week View */
  .plan-layout { display: flex; height: 100%; gap: 0; }
  .plan-candidates { flex: 1; border-right: 2px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .plan-confirmed { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .plan-header { padding: 7px 12px; background: var(--bg-card); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .plan-header-title { font-size: 11px; font-weight: 700; }
  .plan-header-count { font-size: 10px; color: var(--text-secondary); }
  .plan-list { flex: 1; overflow-y: auto; padding: 6px; display: flex; flex-direction: column; gap: 3px; }
  .plan-wo { background: var(--bg-card); border: 1px solid var(--border); border-radius: 5px; padding: 6px 8px; cursor: grab; transition: all 0.15s; }
  .plan-wo:hover { background: var(--bg-hover); border-color: var(--border-hover); }
  .plan-wo.dragging { opacity: 0.4; }
  .plan-wo-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; }
  .plan-wo-num { font-size: 10px; font-weight: 700; color: var(--accent); }
  .plan-wo-desc { font-size: 10px; color: var(--text-primary); margin-bottom: 2px; }
  .plan-wo-meta { font-size: 9px; color: var(--text-secondary); display: flex; gap: 6px; flex-wrap: wrap; }
  .plan-drop-zone { min-height: 60px; border: 2px dashed var(--border); border-radius: 6px; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 11px; margin: 8px; transition: all 0.2s; }
  .plan-drop-zone.drag-over { border-color: var(--accent); background: var(--accent)11; color: var(--accent); }
  .plan-cap-gauge { padding: 6px 12px; background: var(--bg-surface); border-bottom: 1px solid var(--border); }
  .plan-cap-label { font-size: 9px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .plan-cap-bar { height: 6px; background: var(--cap-bar-bg); border-radius: 3px; overflow: hidden; }
  .plan-cap-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
  .plan-cap-detail { font-size: 9px; color: var(--text-secondary); margin-top: 3px; }

  /* Dept/Resource board rows */
  .board-row-header { grid-column: 1/-1; background: var(--bg-card); padding: 6px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
  .board-wo-label { padding: 6px 10px; font-size: 10px; display: flex; flex-direction: column; gap: 2px; border-right: 1px solid var(--border); background: var(--bg-surface); min-width: 160px; }
  .board-wo-num { font-weight: 700; color: var(--accent); font-size: 11px; }
  .board-wo-desc { font-size: 9px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
  .board-wo-badges { display: flex; gap: 3px; margin-top: 2px; }

  /* SVG Dependency Lines Overlay */
  .dep-svg-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
  .dep-line { fill: none; stroke-width: 1.5; opacity: 0.6; }
  .dep-line.ok { stroke: #28A745; }
  .dep-line.violation { stroke: #DC3545; stroke-dasharray: 4 3; }
  .dep-line.warn { stroke: #F0AD4E; stroke-dasharray: 6 3; }
  .dep-arrow-head { opacity: 0.7; }
  .schedule-grid-wrap { position: relative; }
  .dep-links { font-size: 9px; color: var(--text-muted); margin-top: 2px; display: flex; gap: 3px; flex-wrap: wrap; }
  .dep-link-tag { background: var(--bg-hover); padding: 1px 4px; border-radius: 2px; font-size: 8px; display: inline-flex; align-items: center; gap: 2px; }
  .dep-link-tag.ok { border-left: 2px solid #28A745; }
  .dep-link-tag.fail { border-left: 2px solid #DC3545; }
  .dep-link-tag.warn { border-left: 2px solid #F0AD4E; }
</style>
</head>
<body>

<div id="app" style="display:flex;flex-direction:column;height:100vh;overflow:hidden"></div>

<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<script>
// ─── APP STATE ───
const state = {
  view: 'plan',
  boardView: 'resource',
  weekStart: (() => { const d = new Date(); const day = d.getDay(); const diff = day === 0 ? 1 : 8 - day; d.setDate(d.getDate() + diff); return d.toISOString().split('T')[0]; })(),
  ganttStart: null,  // null = auto-detect from WO dates
  ganttExpanded: new Set(), // WO numbers whose ops are expanded
  workOrders: [],
  employees: [],
  assignments: [],
  availability: {}, // key: "empName|date" => { available: false, hours: 0, reason: 'Vacation' } or { available: true, hours: 4, reason: 'Half day' }
  confirmedWOs: new Set(),
  craftConfig: {},
  dragOp: null,
  filterCraft: 'All',
  filterDept: 'All',
  filterEmployee: 'All',
  filterSupervisor: 'All',
  filterWOType: 'All',
  showAI: false,
  aiStatus: '',
  chatOpen: false,
  chatMessages: [],
  chatLoading: false,
  apiKey: '',
  aiProvider: 'anthropic',  // 'anthropic' | 'openai' | 'google'
  aiProviderKeys: {},       // { anthropic: 'sk-...', openai: 'sk-...', google: 'AIza...' }
  showKPIs: true,
  // Feature toggles
  showDependencies: true,
  showDepLines: true,
  showDateWindow: true,
  showCrossDept: true,
  showPMBadges: true,
  // Resource capacity: { 'Mechanic': { headcount: 2, hoursPerDay: 16 }, ... }
  resourceCapacity: {},
  // Gantt state
  ganttZoom: 'week',   // 'week' | 'month'
  ganttDrag: null,     // { woNumber, startX, origStart, origEnd }
  ganttShowOps: true,
  ganttGroupBy: 'dept', // 'dept' | 'priority'
  // Capacity view sub-tab
  capacityTab: 'table', // 'table' | 'heatmap'
  // Resourcing mode: 'named' = named employees required; 'pool' = resource pool counts as fully scheduled
  resourceMode: 'named',
  // Oracle EBS integration
  oracleConfig: null,
  oracleStatus: '', // '', 'connecting', 'connected', 'error'
  oracleError: '',
  oracleSyncing: false,
  oracleSyncProgress: '',
  oracleDataSource: 'file', // 'file' | 'oracle'
  importTab: 'file', // 'file' | 'oracle'
};

// ─── CONSTANTS ───
const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const DAY_ABR = ['Mon','Tue','Wed','Thu','Fri','Sat'];
const DEPARTMENTS = []; // populated from imported data
const DEPT_COLORS = {}; // populated from imported data
const CRAFT_COLORS = {}; // populated from imported data
const DEFAULT_CRAFT_COLOR = { bg:'#E9ECEF', border:'#ADB5BD', text:'#495057', badge:'#ADB5BD' };
const gc = c => CRAFT_COLORS[c] || DEFAULT_CRAFT_COLOR;
const PRIORITY = { 1:'Emergency', 2:'Urgent', 3:'High', 4:'Medium', 5:'Low', 6:'Routine', 7:'Routine', 8:'Routine', 9:'Routine', 10:'Normal', 0:'Unset', null:'Unset' };

// ─── IMPORT DATA ───
// No demo data — all data loaded from spreadsheet upload

state.workOrders = [];
state.employees = [];
state.importLoaded = false;
state.importLoading = false;
state.importError = '';
state.importStats = null;
state.view = 'import'; // Start on import view
state.theme = localStorage.getItem('eam-theme') || 'dark';
document.documentElement.setAttribute('data-theme', state.theme);
try {
  state.aiProvider = localStorage.getItem('eam-ai-provider') || 'anthropic';
  state.aiProviderKeys = JSON.parse(localStorage.getItem('eam-ai-provider-keys') || '{}');
  state.apiKey = state.aiProviderKeys[state.aiProvider] || localStorage.getItem('eam-api-key') || '';
} catch(e) { state.apiKey = ''; }

// ─── AI PROVIDER CONFIGURATION ───
const AI_PROVIDERS = {
  anthropic: {
    name: 'Anthropic (Claude)',
    keyPrefix: 'sk-ant-',
    keyPlaceholder: 'sk-ant-api03-...',
    docsUrl: 'https://console.anthropic.com',
    models: [
      { id: 'claude-opus-4-20250514', name: 'Claude Opus 4 (most capable)', tier: 'premium' },
      { id: 'claude-sonnet-4-20250514', name: 'Claude Sonnet 4 (recommended)', tier: 'standard' },
      { id: 'claude-sonnet-4-6-20250620', name: 'Claude Sonnet 4.6 (latest)', tier: 'standard' },
      { id: 'claude-haiku-4-5-20251001', name: 'Claude Haiku 4.5 (fast/cheap)', tier: 'economy' },
    ],
    defaultModel: 'claude-sonnet-4-20250514',
    apiUrl: 'https://api.anthropic.com/v1/messages',
    buildHeaders: (key) => ({
      'Content-Type': 'application/json',
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    }),
    buildBody: (model, systemPrompt, messages, tools, maxTokens) => ({
      model,
      max_tokens: maxTokens || 2048,
      system: systemPrompt,
      tools: tools,
      messages: messages
    }),
    parseResponse: (data) => {
      const texts = []; const toolCalls = [];
      for (const block of (data.content || [])) {
        if (block.type === 'text') texts.push(block.text);
        if (block.type === 'tool_use') toolCalls.push(block);
      }
      return { text: texts.join('\n'), toolCalls, stopReason: data.stop_reason, raw: data };
    }
  },
  openai: {
    name: 'OpenAI (GPT / o-series)',
    keyPrefix: 'sk-',
    keyPlaceholder: 'sk-proj-...',
    docsUrl: 'https://platform.openai.com/api-keys',
    models: [
      { id: 'o3', name: 'o3 (most capable reasoning)', tier: 'premium' },
      { id: 'o3-mini', name: 'o3-mini (fast reasoning)', tier: 'standard' },
      { id: 'gpt-4.1', name: 'GPT-4.1 (latest)', tier: 'standard' },
      { id: 'gpt-4.1-mini', name: 'GPT-4.1 Mini (fast/cheap)', tier: 'economy' },
      { id: 'gpt-4.1-nano', name: 'GPT-4.1 Nano (fastest)', tier: 'economy' },
      { id: 'gpt-4o', name: 'GPT-4o', tier: 'standard' },
      { id: 'gpt-4o-mini', name: 'GPT-4o Mini', tier: 'economy' },
    ],
    defaultModel: 'gpt-4.1',
    apiUrl: 'https://api.openai.com/v1/chat/completions',
    buildHeaders: (key) => ({
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${key}`
    }),
    buildBody: (model, systemPrompt, messages, tools, maxTokens) => {
      const oaiMessages = [{ role: 'system', content: systemPrompt }];
      for (const m of messages) {
        oaiMessages.push({ role: m.role === 'assistant' ? 'assistant' : 'user', content: m.content });
      }
      const body = { model, max_tokens: maxTokens || 2048, messages: oaiMessages };
      if (tools && tools.length > 0) {
        body.tools = tools.map(t => ({
          type: 'function',
          function: { name: t.name, description: t.description, parameters: t.input_schema }
        }));
      }
      return body;
    },
    parseResponse: (data) => {
      const choice = data.choices?.[0];
      const msg = choice?.message || {};
      const texts = msg.content ? [msg.content] : [];
      const toolCalls = (msg.tool_calls || []).map(tc => ({
        type: 'tool_use',
        id: tc.id,
        name: tc.function.name,
        input: JSON.parse(tc.function.arguments || '{}')
      }));
      return { text: texts.join('\n'), toolCalls, stopReason: choice?.finish_reason === 'tool_calls' ? 'tool_use' : 'end_turn', raw: data };
    }
  },
  google: {
    name: 'Google (Gemini)',
    keyPrefix: 'AIza',
    keyPlaceholder: 'AIzaSy...',
    docsUrl: 'https://aistudio.google.com/apikey',
    models: [
      { id: 'gemini-2.5-pro', name: 'Gemini 2.5 Pro (most capable)', tier: 'premium' },
      { id: 'gemini-2.5-flash', name: 'Gemini 2.5 Flash (recommended)', tier: 'standard' },
      { id: 'gemini-2.0-flash', name: 'Gemini 2.0 Flash', tier: 'standard' },
      { id: 'gemini-2.0-flash-lite', name: 'Gemini 2.0 Flash Lite (fast/cheap)', tier: 'economy' },
    ],
    defaultModel: 'gemini-2.5-flash',
    apiUrl: (model, key) => `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`,
    buildHeaders: (key) => ({ 'Content-Type': 'application/json' }),
    buildBody: (model, systemPrompt, messages, tools, maxTokens) => {
      const contents = [];
      for (const m of messages) {
        contents.push({ role: m.role === 'assistant' ? 'model' : 'user', parts: [{ text: m.content }] });
      }
      const body = {
        system_instruction: { parts: [{ text: systemPrompt }] },
        contents,
        generationConfig: { maxOutputTokens: maxTokens || 2048 }
      };
      if (tools && tools.length > 0) {
        body.tools = [{ function_declarations: tools.map(t => ({
          name: t.name, description: t.description, parameters: t.input_schema
        }))}];
      }
      return body;
    },
    parseResponse: (data) => {
      const candidate = data.candidates?.[0];
      const parts = candidate?.content?.parts || [];
      const texts = parts.filter(p => p.text).map(p => p.text);
      const toolCalls = parts.filter(p => p.functionCall).map(p => ({
        type: 'tool_use',
        id: 'fc_' + Math.random().toString(36).slice(2),
        name: p.functionCall.name,
        input: p.functionCall.args || {}
      }));
      const stopReason = toolCalls.length > 0 ? 'tool_use' : 'end_turn';
      return { text: texts.join('\n'), toolCalls, stopReason, raw: data };
    }
  }
};

function onProviderChange() {
  const provider = document.getElementById('s-ai-provider').value;
  const cfg = AI_PROVIDERS[provider];
  // Update placeholder and info
  document.getElementById('s-apikey').placeholder = cfg.keyPlaceholder;
  document.getElementById('s-provider-info').innerHTML =
    `Get your API key at <a href="${cfg.docsUrl}" target="_blank" style="color:var(--accent)">${cfg.docsUrl}</a>`;
  // Load saved key for this provider
  const savedKeys = JSON.parse(localStorage.getItem('eam-ai-provider-keys') || '{}');
  document.getElementById('s-apikey').value = savedKeys[provider] || '';
  // Populate model dropdown
  const modelSelect = document.getElementById('s-model');
  const savedModel = localStorage.getItem('eam-model-' + provider) || cfg.defaultModel;
  modelSelect.innerHTML = cfg.models.map(m => {
    const tierBadge = m.tier === 'premium' ? ' ⭐' : m.tier === 'economy' ? ' ⚡' : '';
    return `<option value="${m.id}" ${m.id === savedModel ? 'selected' : ''}>${m.name}${tierBadge}</option>`;
  }).join('');
  // Clear test status
  document.getElementById('s-apikey-status').innerHTML = '';
}
// Load feature toggles
try {
  const ft = JSON.parse(localStorage.getItem('eam-features') || '{}');
  if (ft.showDependencies !== undefined) state.showDependencies = ft.showDependencies;
  if (ft.showDepLines !== undefined) state.showDepLines = ft.showDepLines;
  if (ft.showDateWindow !== undefined) state.showDateWindow = ft.showDateWindow;
  if (ft.showCrossDept !== undefined) state.showCrossDept = ft.showCrossDept;
  if (ft.showPMBadges !== undefined) state.showPMBadges = ft.showPMBadges;
} catch(e) {}
// Load resource capacity
try { state.resourceCapacity = JSON.parse(localStorage.getItem('eam-resource-cap') || '{}'); } catch(e) {}
// Load Oracle config
try {
  state.oracleConfig = JSON.parse(localStorage.getItem('eam-oracle-config') || 'null') || {
    mode: 'proxy', host: '', port: '8000', protocol: 'http',
    username: '', password: '', orgId: '', proxyUrl: '',
    connected: false, lastSync: null
  };
} catch(e) {
  state.oracleConfig = { mode: 'proxy', host: '', port: '8000', protocol: 'http', username: '', password: '', orgId: '', proxyUrl: '', connected: false, lastSync: null };
}

// ─── ADMIN: EMPLOYEE SKILLS & SUPERVISOR CONFIG ───
const PREDEFINED_SKILLS = [
  'Welding', 'Electrical', 'HVAC', 'Plumbing', 'Brake Repair', 'Tire Service',
  'Engine Repair', 'Transmission', 'Hydraulics', 'Pneumatics', 'Carpentry',
  'Painting', 'Body Work', 'Diagnostics', 'Fabrication', 'Machining',
  'Rigging', 'Crane Operation', 'Forklift', 'CDL Driver', 'Lockout/Tagout',
  'Confined Space', 'Fall Protection', 'Fire Systems', 'Roofing',
  'Concrete', 'Landscaping', 'Janitorial', 'Pest Control', 'General Labor'
];

state.adminUser = localStorage.getItem('eam-admin-user') || '';

function getSkillsConfig() {
  const key = state.adminUser ? 'eam-skills-' + state.adminUser : 'eam-skills';
  return JSON.parse(localStorage.getItem(key) || '{}');

}

function addSkillToEmployee(empNum, skill) {
  const config = getSkillsConfig();
  if (!config[empNum]) config[empNum] = { skills: [], supervisor: '' };
  if (!config[empNum].skills.includes(skill)) config[empNum].skills.push(skill);
  saveSkillsConfig(config);
  // Also update state.employees
  const emp = state.employees.find(e => e.employeeNumber === empNum);
  if (emp) emp.skills = config[empNum].skills.join(', ');
  render();
}

function removeSkillFromEmployee(empNum, skill) {
  const config = getSkillsConfig();
  if (!config[empNum]) return;
  config[empNum].skills = config[empNum].skills.filter(s => s !== skill);
  saveSkillsConfig(config);
  const emp = state.employees.find(e => e.employeeNumber === empNum);
  if (emp) emp.skills = config[empNum].skills.join(', ');
  render();
}

function setDeptSupervisor(dept, name) {
  const config = getSupervisorConfig();
  config[dept] = name;
  saveSupervisorConfig(config);
  // Update employees in that dept
  state.employees.filter(e => e.department === dept || (e.allDepartments && e.allDepartments.includes(dept)))
    .forEach(e => e.supervisor = name);
  render();
}

function applySkillsToEmployees() {
  const skillsConfig = getSkillsConfig();
  const supervisorConfig = getSupervisorConfig();
  // Store dept supervisors in state so filters can access them
  state.deptSupervisors = supervisorConfig;
  state.employees.forEach(emp => {
    const cfg = skillsConfig[emp.employeeNumber];
    if (cfg && cfg.skills.length > 0) emp.skills = cfg.skills.join(', ');
    // Apply supervisor from dept config
    const supv = supervisorConfig[emp.department];
    if (supv) emp.supervisor = supv;
  });
  // Also apply supervisors to WOs that match departments
  state.workOrders.forEach(wo => {
    const supv = supervisorConfig[wo.department];
    if (supv && !wo.supervisor) wo.supervisor = supv;
  });
}

function getEmployeeSkills(empNum) {
  const config = getSkillsConfig();
  return (config[empNum] && config[empNum].skills) || [];
}

// Skill matching: score how well an employee matches an operation
function skillMatchScore(emp, op) {
  const empSkills = getEmployeeSkills(emp.employeeNumber).map(s => s.toLowerCase());
  if (empSkills.length === 0) return 0;
  const opText = ((op.description || '') + ' ' + (op.craft || '')).toLowerCase();
  let score = 0;
  empSkills.forEach(skill => {
    // Check if skill keywords appear in the operation description
    const keywords = skill.split(/\s+/);
    keywords.forEach(kw => {
      if (kw.length >= 3 && opText.includes(kw)) score += 10;
    });
    // Partial matches
    if (skill.includes('weld') && opText.includes('weld')) score += 20;
    if (skill.includes('electr') && opText.includes('electr')) score += 20;
    if (skill.includes('hvac') && (opText.includes('hvac') || opText.includes('air condition') || opText.includes('heating'))) score += 20;
    if (skill.includes('brake') && opText.includes('brake')) score += 20;
    if (skill.includes('tire') && opText.includes('tire')) score += 20;
    if (skill.includes('engine') && opText.includes('engine')) score += 20;
    if (skill.includes('hydraul') && opText.includes('hydraul')) score += 20;
    if (skill.includes('plumb') && opText.includes('plumb')) score += 20;
    if (skill.includes('paint') && opText.includes('paint')) score += 20;
    if (skill.includes('body') && opText.includes('body')) score += 20;
    if (skill.includes('fabric') && (opText.includes('fabric') || opText.includes('cut') || opText.includes('bend'))) score += 15;
    if (skill.includes('diagnos') && (opText.includes('diagnos') || opText.includes('inspect') || opText.includes('test'))) score += 15;
    if (skill.includes('transmis') && opText.includes('transmis')) score += 20;
  });
  return score;
}

// Uses SheetJS (XLSX) library loaded via CDN in the HTML head

function processUploadedFile(workbook) {
  state.importLoading = true;
  state.importError = '';
  render();
  
  try {
    // Find sheets (case-insensitive match)
    const sheetNames = workbook.SheetNames;
    const woSheetName = sheetNames.find(n => /work.?order|wo|jobs/i.test(n)) || sheetNames[0];
    const empSheetName = sheetNames.find(n => /employee|emp|resource|people|staff/i.test(n));
    
    if (!woSheetName) throw new Error('No worksheet found. Expected a "Work Orders" sheet.');
    
    // Parse Work Orders sheet
    const woSheet = workbook.Sheets[woSheetName];
    const woRaw = XLSX.utils.sheet_to_json(woSheet, { defval: '' });
    
    if (!woRaw.length) throw new Error('Work Orders sheet is empty.');
    
    // Parse Employees sheet (optional)
    let empRaw = [];
    if (empSheetName) {
      const empSheet = workbook.Sheets[empSheetName];
      empRaw = XLSX.utils.sheet_to_json(empSheet, { defval: '' });
    }
    
    // Process into scheduler format
    const result = processWOSheet(woRaw);
    const wos = result.wos;
    const importedAssignments = result.assignments;
    const emps = processEmpSheet(empRaw);
    
    loadImportResults(wos, emps, importedAssignments);
    applySkillsToEmployees();

  } catch(e) {
    state.importError = e.message;
    state.importLoading = false;
    render();
  }
}

// Flexible column name matching
function findCol(row, patterns) {
  const keys = Object.keys(row);
  for (const pat of patterns) {
    const re = new RegExp(pat, 'i');
    const match = keys.find(k => re.test(k));
    if (match) return match;
  }
  return null;
}

function processWOSheet(rows) {
  if (!rows.length) return { wos: [], assignments: [] };
  
  // Auto-detect column names from headers
  const sample = rows[0];
  const COL = {
    woNum:    findCol(sample, ['wo.?num', 'work.?order', 'wip.?entity', 'job.?num', '^wo$', 'order.?num']),
    desc:     findCol(sample, ['desc', 'title', 'summary', 'wo.?desc']),
    dept:     findCol(sample, ['dept', 'department', 'org', 'area', 'group']),
    priority: findCol(sample, ['prio', 'urgency', 'rank']),
    woType:   findCol(sample, ['wo.?type', 'work.?order.?type', 'order.?type', 'type', 'class', 'wo.?class']),
    pmFlag:   findCol(sample, ['pm$', 'planned.?maint', 'prevent', 'pm.?flag', 'is.?pm', 'maint.?type']),
    asset:    findCol(sample, ['asset.?num', 'equip', 'tag.?num', 'asset.?id']),
    assetDesc:findCol(sample, ['asset.?desc', 'equip.?desc', 'asset.?name']),
    schedStart:findCol(sample, ['sched.*start', 'start.?date', 'plan.*start', 'begin.?date']),
    schedEnd: findCol(sample, ['sched.*end', 'end.?date', 'plan.*end', 'due.?date', 'sched.*finish', 'sched.*complet']),
    supervisor:findCol(sample, ['super', 'planner', 'lead', 'foreman', 'manager']),
    opSeq:    findCol(sample, ['op.?seq', 'seq', 'step', 'operation.?seq', 'op.?num']),
    opDesc:   findCol(sample, ['op.?desc', 'op.?name', 'task', 'activity', 'step.?desc']),
    craft:    findCol(sample, ['craft', 'resource', 'trade', 'skill', 'labor']),
    estHours: findCol(sample, ['est.?hour', 'hour', 'duration', 'labor.?hour', 'time', 'effort']),
    depends:  findCol(sample, ['depend', 'predecessor', 'prior', 'prereq', 'before', 'after']),
    // Schedule columns (from exported file)
    assignedTo:   findCol(sample, ['assigned.?to', 'assigned.?emp', 'technician', 'worker']),
    assignedDate: findCol(sample, ['assigned.?date', 'sched.?date', 'work.?date']),
    assignedHours:findCol(sample, ['assigned.?hour', 'sched.?hour', 'work.?hour', 'alloc']),
    status:       findCol(sample, ['^status$', 'op.?status', 'progress']),
  };
  
  if (!COL.woNum) throw new Error('Cannot find WO Number column. Expected column header like "WO Number", "Work Order", "Job Number".');
  
  // Group rows by WO number, carrying forward header info
  const woMap = {};
  const importedAssignments = [];
  const assignDedupSet = new Set();
  let lastWO = null;
  let lastWOData = {};
  
  rows.forEach(row => {
    const woNum = String(row[COL.woNum] || '').trim();
    if (woNum) {
      lastWO = woNum;
      // Capture WO-level data (carry forward for sparse format)
      lastWOData = {
        description: COL.desc ? String(row[COL.desc] || '') : '',
        department: COL.dept ? String(row[COL.dept] || '') : '',
        priority: COL.priority ? (parseInt(row[COL.priority]) || 0) : 0,
        woType: COL.woType ? String(row[COL.woType] || '') : '',
        pmFlag: COL.pmFlag ? String(row[COL.pmFlag] || '').trim().toLowerCase() : '',
        asset: COL.asset ? String(row[COL.asset] || '') : '',
        assetDesc: COL.assetDesc ? String(row[COL.assetDesc] || '') : '',
        scheduledStart: COL.schedStart ? formatDateVal(row[COL.schedStart]) : '',
        scheduledEnd: COL.schedEnd ? formatDateVal(row[COL.schedEnd]) : '',
        supervisor: COL.supervisor ? String(row[COL.supervisor] || '') : '',
      };
    }
    if (!lastWO) return;
    
    if (!woMap[lastWO]) {
      const pmVal = lastWOData.pmFlag;
      const isPM = pmVal === 'yes' || pmVal === 'y' || pmVal === '1' || pmVal === 'true' || pmVal === 'pm' || (lastWOData.woType && /^pm$|prevent|planned/i.test(lastWOData.woType));
      woMap[lastWO] = {
        woNumber: lastWO,
        description: lastWOData.description || lastWO,
        department: lastWOData.department || 'Unassigned',
        priority: lastWOData.priority || 4,
        woType: lastWOData.woType || (isPM ? 'PM' : 'CM'),
        isPM: isPM,
        asset: lastWOData.asset || '',
        assetDesc: lastWOData.assetDesc || '',
        scheduledStart: lastWOData.scheduledStart || '',
        scheduledEnd: lastWOData.scheduledEnd || '',
        supervisor: lastWOData.supervisor || '',
        operations: []
      };
    } else {
      // Fill in WO-level data if this row has it (fully populated format)
      const wo = woMap[lastWO];
      if (COL.desc && row[COL.desc]) wo.description = String(row[COL.desc]);
      if (COL.dept && row[COL.dept]) wo.department = String(row[COL.dept]);
      if (COL.priority && row[COL.priority]) wo.priority = parseInt(row[COL.priority]) || wo.priority;
      if (COL.asset && row[COL.asset]) wo.asset = String(row[COL.asset]);
      if (COL.supervisor && row[COL.supervisor]) wo.supervisor = String(row[COL.supervisor]);
      if (COL.woType && row[COL.woType]) wo.woType = String(row[COL.woType]);
      if (COL.pmFlag && row[COL.pmFlag]) { const v = String(row[COL.pmFlag]).trim().toLowerCase(); wo.isPM = v === 'yes' || v === 'y' || v === '1' || v === 'true' || v === 'pm'; }
      if (COL.schedStart && row[COL.schedStart]) wo.scheduledStart = formatDateVal(row[COL.schedStart]) || wo.scheduledStart;
      if (COL.schedEnd && row[COL.schedEnd]) wo.scheduledEnd = formatDateVal(row[COL.schedEnd]) || wo.scheduledEnd;
    }
    
    // Add operation if op seq exists
    const opSeq = COL.opSeq ? parseInt(row[COL.opSeq]) : null;
    if (opSeq) {
      const depsStr = COL.depends ? String(row[COL.depends] || '') : '';
      const deps = depsStr ? depsStr.split(/[,;\s]+/).map(Number).filter(n => n > 0) : [];
      
      // Only add operation if it doesn't already exist (handles multi-assignment rows)
      const opExists = woMap[lastWO].operations.some(o => o.opSeq === opSeq);
      if (!opExists) {
        woMap[lastWO].operations.push({
          opSeq: opSeq,
          description: COL.opDesc ? String(row[COL.opDesc] || `Op ${opSeq}`) : `Op ${opSeq}`,
          craft: COL.craft ? String(row[COL.craft] || 'General') : 'General',
          estHours: COL.estHours ? (parseFloat(row[COL.estHours]) || 1) : 1,
          dependencies: deps
        });
      }
      
      // Import assignment data if present
      const assignedTo = COL.assignedTo ? String(row[COL.assignedTo] || '').trim() : '';
      const assignedDate = COL.assignedDate ? formatDateVal(row[COL.assignedDate]) : '';
      if (assignedTo && assignedDate) {
        // Normalize pool label back to internal format on re-import
        // e.g. "Mechanical / Mechanic" → "__POOL:Mechanic"
        let empName = assignedTo;
        const poolMatch = assignedTo.match(/^(.+)\s*\/\s*(.+)$/);
        if (poolMatch) {
          // Check if this is a dept/craft pool label (not a real person)
          const craftPart = poolMatch[2].trim();
          const isRealPerson = (state.employees || []).some(e => e.name === assignedTo);
          if (!isRealPerson) empName = '__POOL:' + craftPart;
        }
        const dedupKey = lastWO + '|' + opSeq + '|' + empName + '|' + assignedDate;
        if (!assignDedupSet.has(dedupKey)) {
          assignDedupSet.add(dedupKey);
          importedAssignments.push({
            id: uid(),
            woNumber: lastWO,
            opSeq: opSeq,
            employeeName: empName,
            date: assignedDate,
            hours: COL.assignedHours ? (parseFloat(row[COL.assignedHours]) || (COL.estHours ? (parseFloat(row[COL.estHours]) || 1) : 1)) : (COL.estHours ? (parseFloat(row[COL.estHours]) || 1) : 1),
            status: COL.status ? String(row[COL.status] || 'Scheduled') : 'Scheduled'
          });
        }
      }
    }
  });
  
  // For WOs without operations, create a single default op
  Object.values(woMap).forEach(wo => {
    if (wo.operations.length === 0) {
      wo.operations.push({
        opSeq: 10,
        description: wo.description || wo.woNumber,
        craft: 'General',
        estHours: 1,
        dependencies: []
      });
    }
  });
  
  return { wos: Object.values(woMap), assignments: importedAssignments };
}

function formatDateVal(val) {
  if (!val) return '';
  if (val instanceof Date) {
    // Use UTC components to avoid timezone shift
    const y = val.getFullYear(); const m = String(val.getMonth()+1).padStart(2,'0'); const d = String(val.getDate()).padStart(2,'0');
    return `${y}-${m}-${d}`;
  }
  const s = String(val).trim();
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0, 10);
  // Try common date formats (M/D/YYYY, D-M-YYYY, etc.)
  const m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
  if (m) {
    const mo = m[1].padStart(2,'0'), dy = m[2].padStart(2,'0');
    return `${m[3]}-${mo}-${dy}`;
  }
  // Excel serial date number
  if (/^\d{5}$/.test(s)) {
    const excelEpoch = new Date(Date.UTC(1899, 11, 30));
    const d2 = new Date(excelEpoch.getTime() + parseInt(s) * 86400000);
    return d2.toISOString().slice(0, 10);
  }
  // Fallback — try native parse but use local date components
  const d = new Date(s);
  if (!isNaN(d)) {
    const y = d.getFullYear(); const mo = String(d.getMonth()+1).padStart(2,'0'); const dy = String(d.getDate()).padStart(2,'0');
    return `${y}-${mo}-${dy}`;
  }
  return s;
}

function processEmpSheet(rows) {
  if (!rows.length) return [];
  
  const sample = rows[0];
  const COL = {
    name:  findCol(sample, ['name', 'employee', 'person', 'worker', 'full.?name']),
    dept:  findCol(sample, ['dept', 'department', 'org', 'area', 'group']),
    craft: findCol(sample, ['craft', 'resource', 'trade', 'labor', 'role']),
    hours: findCol(sample, ['hour', 'hrs', 'avail', 'capacity']),
    super: findCol(sample, ['super', 'planner', 'lead', 'manager', 'report']),
    email: findCol(sample, ['email', 'e.?mail', 'mail']),
    skills: findCol(sample, ['skill', 'competenc', 'qualif', 'cert']),
  };
  
  if (!COL.name) throw new Error('Cannot find Employee Name column. Expected header like "Employee Name", "Name", "Person".');
  
  return rows.filter(r => r[COL.name]).map(r => ({
    name: String(r[COL.name] || '').trim(),
    department: COL.dept ? String(r[COL.dept] || 'Unassigned').trim() : 'Unassigned',
    craft: COL.craft ? String(r[COL.craft] || 'General').trim() : 'General',
    skills: COL.skills ? String(r[COL.skills] || '').trim() : (COL.craft ? String(r[COL.craft] || 'General').trim() : 'General'),
    hoursPerDay: COL.hours ? (parseFloat(r[COL.hours]) || 8) : 8,
    supervisor: COL.super ? String(r[COL.super] || '').trim() : '',
    email: COL.email ? String(r[COL.email] || '').trim() : '',
  }));
}

function loadImportResults(wos, emps, importedAssignments) {
  state.workOrders = wos;
  state.employees = emps;
  state.assignments = importedAssignments || [];
  state.confirmedWOs = new Set();
  state.importLoaded = true;
  state.importLoading = false;
  state.importError = '';
  
  // Auto-detect departments
  const depts = [...new Set([...wos.map(w => w.department), ...emps.map(e => e.department)])].filter(d => d && d !== 'Unassigned');
  if (!depts.includes('Unassigned') && wos.some(w => w.department === 'Unassigned')) depts.push('Unassigned');
  DEPARTMENTS.length = 0;
  depts.forEach(d => DEPARTMENTS.push(d));
  
  // Auto-detect crafts and add colors
  const crafts = [...new Set([...wos.flatMap(w => w.operations.map(o => o.craft)), ...emps.map(e => e.craft)])];
  const palette = ['#F0AD4E','#28A745','#007BFF','#DC3545','#6C757D','#7B2FBE','#17A2B8','#E83E8C','#FD7E14','#20C997'];
  crafts.forEach((c, i) => {
    if (!CRAFT_COLORS[c]) {
      const color = palette[i % palette.length];
      CRAFT_COLORS[c] = { bg: color+'22', border: color, text: color, badge: color };
    }
  });

  // Auto-assign DEPT_COLORS
  const deptPalette = [
    { bg:'#1B3A4B', border:'#2196F3', text:'#90CAF9', badge:'#2196F3', light_bg:'#E3F2FD', light_text:'#0D47A1' },
    { bg:'#1B3B2F', border:'#4CAF50', text:'#A5D6A7', badge:'#4CAF50', light_bg:'#E8F5E9', light_text:'#1B5E20' },
    { bg:'#3B2E1B', border:'#FF9800', text:'#FFCC80', badge:'#FF9800', light_bg:'#FFF3E0', light_text:'#E65100' },
    { bg:'#2D1B3B', border:'#9C27B0', text:'#CE93D8', badge:'#9C27B0', light_bg:'#F3E5F5', light_text:'#4A148C' },
    { bg:'#1B3B3B', border:'#00BCD4', text:'#80DEEA', badge:'#00BCD4', light_bg:'#E0F7FA', light_text:'#006064' },
    { bg:'#3B1B1B', border:'#E91E63', text:'#F48FB1', badge:'#E91E63', light_bg:'#FCE4EC', light_text:'#880E4F' },
  ];
  depts.forEach((d, i) => {
    if (!DEPT_COLORS[d]) DEPT_COLORS[d] = deptPalette[i % deptPalette.length];
  });

  // Rebuild craftConfig from detected dept/craft combos
  const empCounts = {};
  emps.forEach(e => {
    const key = `${e.department}|${e.craft}`;
    empCounts[key] = (empCounts[key] || 0) + 1;
  });
  wos.forEach(w => {
    w.operations.forEach(o => {
      const key = `${w.department}|${o.craft}`;
      if (!empCounts[key]) empCounts[key] = 0;
    });
  });
  
  const newCraftConfig = {};
  Object.keys(empCounts).forEach(key => {
    const [dept, craft] = key.split('|');
    newCraftConfig[key] = state.craftConfig[key] || {
      dept: dept,
      resource: craft,
      headcount: empCounts[key] || 1,
      hoursPerDay: 8
    };
  });
  state.craftConfig = newCraftConfig;

  state.importStats = {
    wos: wos.length,
    ops: wos.reduce((s,w) => s + w.operations.length, 0),
    emps: emps.length,
    assignments: state.assignments.length,
    depts: depts,
    crafts: crafts,
  };
  
  // Auto-set week to match the earliest WO scheduled start
  const woStarts = wos.map(w => w.scheduledStart).filter(d => d).sort();
  if (woStarts.length > 0 && !state.oracleConfig?.connected) {
    // Only auto-set week from WO dates for FILE imports
    // For Oracle mode, planner picks the week - WOs are the backlog
    const firstDate = new Date(woStarts[0] + 'T00:00:00');
    const day = firstDate.getDay(); // 0=Sun, 1=Mon...
    const monday = new Date(firstDate);
    monday.setDate(firstDate.getDate() - (day === 0 ? 6 : day - 1));
    state.weekStart = monday.toISOString().split('T')[0];
  }
  
  // Auto-confirm all WOs whose dates overlap the selected week
  const dates = getWeekDates();
  const weekStart = dates[0];
  const weekEnd = dates[dates.length - 1];
  wos.forEach(wo => {
    const ws = wo.scheduledStart ? wo.scheduledStart.slice(0,10) : '';
    const we = wo.scheduledEnd ? wo.scheduledEnd.slice(0,10) : '';
    if ((ws && ws <= weekEnd && we && we >= weekStart) || (!ws && !we)) {
      state.confirmedWOs.add(wo.woNumber);
    }
  });
  
  // Auto-allocate WOs to resource pools by their scheduled dates
  if (state.assignments.length === 0) {
    const allocated = autoAllocateByDates();
    if (allocated > 0) {
      state.importStats.autoAllocated = allocated;
    }
  }
  
  // Go to dashboard after data loads
  state.view = 'dashboard';
  render();
  return state.importStats;
}

function handleFileUpload(input) {
  const file = input.files[0];
  if (!file) return;
  
  state.importLoading = true;
  state.importError = '';
  render();
  
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, { type: 'array', cellDates: true });
      processUploadedFile(workbook);
    } catch(err) {
      state.importError = 'Failed to read file: ' + err.message;
      state.importLoading = false;
      render();
    }
  };
  reader.onerror = function() {
    state.importError = 'Failed to read file.';
    state.importLoading = false;
    render();
  };
  reader.readAsArrayBuffer(file);
}

}

async function testApiKey() {
  const key = document.getElementById('s-apikey').value.trim();
  const provider = document.getElementById('s-ai-provider').value;
  const cfg = AI_PROVIDERS[provider];
  const statusEl = document.getElementById('s-apikey-status');
  if (!key) { statusEl.className = 'settings-status err'; statusEl.textContent = 'Enter an API key first'; return; }
  statusEl.className = 'settings-status'; statusEl.textContent = `Testing ${cfg.name}...`;
  try {
    let url, headers, body;
    if (provider === 'anthropic') {
      url = cfg.apiUrl;
      headers = cfg.buildHeaders(key);
      body = JSON.stringify({ model: cfg.defaultModel, max_tokens: 20, messages: [{ role: 'user', content: 'Say OK' }] });
    } else if (provider === 'openai') {
      url = cfg.apiUrl;
      headers = cfg.buildHeaders(key);
      body = JSON.stringify({ model: cfg.defaultModel, max_tokens: 20, messages: [{ role: 'user', content: 'Say OK' }] });
    } else if (provider === 'google') {
      url = cfg.apiUrl(cfg.defaultModel, key);
      headers = cfg.buildHeaders(key);
      body = JSON.stringify({ contents: [{ parts: [{ text: 'Say OK' }] }], generationConfig: { maxOutputTokens: 20 } });
    }
    const r = await fetch(url, { method: 'POST', headers, body });
    if (r.ok) { statusEl.className = 'settings-status ok'; statusEl.textContent = `✓ ${cfg.name} connected successfully`; }
    else {
      const d = await r.json().catch(() => ({}));
      const errMsg = d.error?.message || d.error?.status || 'Connection failed';
      statusEl.className = 'settings-status err'; statusEl.textContent = '✕ ' + errMsg;
    }
  } catch(e) { statusEl.className = 'settings-status err'; statusEl.textContent = '✕ Network error: ' + e.message; }
}

function oracleBaseUrl() {
  const c = state.oracleConfig;
  return `${c.protocol}://${c.host}${c.port ? ':' + c.port : ''}`;
}

function oracleHeaders() {
  const c = state.oracleConfig;
  return {
    'Authorization': 'Basic ' + btoa(c.username + ':' + c.password),
    'Content-Type': 'application/json',
    'Accept': 'application/json'
  };
}

async function oracleFetch(endpoint, method = 'GET', body = null) {
  const c = state.oracleConfig;
  const url = c.proxyUrl
    ? `${c.proxyUrl}${endpoint.startsWith('/') ? '' : '/'}${endpoint}`
    : `${oracleBaseUrl()}${endpoint}`;
  const opts = { method, headers: oracleHeaders() };
  if (body) opts.body = JSON.stringify(body);
  try {
    const r = await fetch(url, opts);
    if (!r.ok) {
      const txt = await r.text().catch(() => '');
      return { success: false, error: `HTTP ${r.status}: ${txt || r.statusText}` };
    }
    const data = await r.json().catch(() => ({}));
    return { success: true, data };
  } catch(e) {
    if (e.message.includes('Failed to fetch') || e.message.includes('NetworkError') || e.message.includes('CORS')) {
      return { success: false, error: 'CORS/Network error — Oracle EBS may not allow direct browser connections. Configure a proxy URL in settings, or ask your EBS admin to enable CORS headers on the ISG servlet.' };
    }
    return { success: false, error: e.message };
  }
}

async function oracleSQL(sql) {
  const c = state.oracleConfig;
  if (!c.proxyUrl) return { success: false, error: 'Proxy URL required for SQL mode. Start the oracle-proxy server and enter its URL.' };
  try {
    const r = await fetch(c.proxyUrl.replace(/\/+$/, '') + '/query', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sql })
    });
    if (!r.ok) {
      const txt = await r.text().catch(() => '');
      return { success: false, error: `Proxy error ${r.status}: ${txt || r.statusText}` };
    }
    const data = await r.json();
    if (data.error) return { success: false, error: data.error };
    return { success: true, data: data.rows || data };
  } catch(e) {
    return { success: false, error: `Cannot reach proxy at ${c.proxyUrl} — is oracle-proxy running? (${e.message})` };
  }
}

async function testOracleConnection() {
  const statusEl = document.getElementById('ora-status');
  if (!statusEl) return;
  const c = state.oracleConfig;
  const mode = document.querySelector('[name=oracleMode]:checked')?.value || c.mode;
  const host = document.getElementById('ora-host').value.trim();
  const proxy = document.getElementById('ora-proxy').value.trim();

  if (!host && !proxy) {
    statusEl.innerHTML = '<div style="color:#DC3545;font-size:11px">✕ Enter a host or proxy URL first</div>';
    return;
  }
  statusEl.innerHTML = '<div style="color:var(--text-secondary);font-size:11px">Testing connection...</div>';

  if (mode === 'proxy') {
    if (!proxy) {
      statusEl.innerHTML = '<div style="color:#DC3545;font-size:11px">✕ SQL Proxy mode requires a Proxy URL</div>';
      return;
    }
    const r = await oracleSQL('SELECT 1 FROM DUAL');
    if (r.success) {
      statusEl.innerHTML = '<div style="color:#28A745;font-size:11px">✓ Connected to Oracle via proxy</div>';
      c.connected = true;
    } else {
      statusEl.innerHTML = `<div style="color:#DC3545;font-size:11px">✕ ${r.error}</div>`;
      c.connected = false;
    }
  } else {
    // REST mode - try ISG
    const tempConfig = { ...c, host, protocol: document.getElementById('ora-protocol').value, port: document.getElementById('ora-port').value.trim(), proxyUrl: proxy };
    const oldConfig = state.oracleConfig;
    state.oracleConfig = tempConfig;
    const r = await oracleFetch('/webservices/rest/EAM_WORK_ORDERS/?limit=1');
    state.oracleConfig = oldConfig;
    if (r.success) {
      statusEl.innerHTML = '<div style="color:#28A745;font-size:11px">✓ Connected to Oracle EBS REST API</div>';
      c.connected = true;
    } else {
      statusEl.innerHTML = `<div style="color:#DC3545;font-size:11px">✕ ${r.error}</div>`;
      c.connected = false;
    }
  }
}

function mapOracleWOs(rows) {
  // Group rows by wip_entity_id to build WOs with nested operations
  const woMap = {};
  for (const row of rows) {
    const id = row.WIP_ENTITY_ID || row.wip_entity_id;
    const woNum = row.WIP_ENTITY_NAME || row.wip_entity_name || String(id);
    if (!woMap[woNum]) {
      const entityType = Number(row.ENTITY_TYPE || row.entity_type || 6);
      const statusType = Number(row.STATUS_TYPE || row.status_type || 1);
      const woType = entityType === 7 ? 'PM' : 'CM';
      woMap[woNum] = {
        woNumber: woNum,
        description: row.DESCRIPTION || row.description || '',
        department: row.OWNING_DEPT || row.owning_dept || row.DEPARTMENT_CODE || row.department_code || 'General',
        priority: Number(row.PRIORITY || row.priority || 4),
        woType,
        isPM: woType === 'PM',
        asset: row.ASSET_NUMBER || row.asset_number || '',
        assetDesc: row.ASSET_DESCRIPTION || row.asset_description || '',
        scheduledStart: fmtDateISO(row.SCHEDULED_START_DATE || row.scheduled_start_date),
        scheduledEnd: fmtDateISO(row.SCHEDULED_COMPLETION_DATE || row.scheduled_completion_date),
        supervisor: row.PLANNER_MAINTENANCE || row.planner_maintenance || '',
        operations: [],
        _wipEntityId: id,
        _statusType: statusType
      };
    }
  }
  return Object.values(woMap);
}

function mapOracleOps(rows, woMap) {
  // woMap: { wipEntityId -> woNumber }
  for (const row of rows) {
    const woId = row.WIP_ENTITY_ID || row.wip_entity_id;
    const woNum = woMap[woId];
    if (!woNum) continue;
    const wo = state.workOrders.find(w => w.woNumber === woNum);
    if (!wo) continue;
    const opSeq = Number(row.OPERATION_SEQ_NUM || row.operation_seq_num || 10);
    // Check if op already added (avoid dupes from multiple resources per op)
    if (wo.operations.find(o => o.opSeq === opSeq)) {
      // Add hours from additional resources
      const existing = wo.operations.find(o => o.opSeq === opSeq);
      const addlHours = Number(row.EST_HOURS || row.est_hours || row.USAGE_RATE_OR_AMOUNT || row.usage_rate_or_amount || 0);
      if (addlHours > 0) existing.estHours += addlHours;
      continue;
    }
    const rawCraft = row.RESOURCE_CODE || row.resource_code || '';
    const isExternal = !rawCraft; // No resource = outside contractor/vendor
    const craft = rawCraft ? rawCraft.replace(/^LBR-/i, '') : 'Contractor'; // No resource → Contractor
    wo.operations.push({
      opSeq,
      description: row.DESCRIPTION || row.description || row.OP_DESCRIPTION || row.op_description || `Operation ${opSeq}`,
      craft,
      estHours: Number(row.EST_HOURS || row.est_hours || row.USAGE_RATE_OR_AMOUNT || row.usage_rate_or_amount || 0),
      dependencies: [],
      isExternal // Flag for vendor/contractor ops — only show in pool mode
    });
  }
}

function mapOracleEmployees(rows, woDepts) {
  // BOM resource employees come back as one row per dept+resource+person combo
  // We need unique employees, but track all their dept/craft combos
  const empMap = new Map(); // key: employee_number → {employee, depts: Set, crafts: Set}
  rows.forEach(row => {
    const empNum = String(row.EMPLOYEE_NUMBER || row.employee_number || '');
    const name = row.EMPLOYEE_NAME || row.employee_name || row.FULL_NAME || row.full_name || '';
    if (!name || !empNum) return;
    const dept = row.DEPARTMENT_CODE || row.department_code || row.DEPARTMENT_NAME || row.department_name || '';
    const craft = row.RESOURCE_CODE || row.resource_code || row.JOB_NAME || row.job_name || '';
    const craftDesc = row.RESOURCE_DESCRIPTION || row.resource_description || row.CRAFT_DESC || row.craft_desc || craft;
    if (!empMap.has(empNum)) {
      empMap.set(empNum, {
        name, empNum,
        email: row.EMAIL_ADDRESS || row.email_address || '',
        depts: new Set(),
        crafts: new Set(),
        craftDescs: new Map(), // resource_code → description
        primaryDept: dept,
        primaryCraft: craft
      });
    }
    const e = empMap.get(empNum);
    if (dept) e.depts.add(dept);
    if (craft) {
      e.crafts.add(craft);
      e.craftDescs.set(craft, craftDesc);
    }
  });

  // Convert to Joeyi employee objects
  return [...empMap.values()].map(e => {
    const depts = [...e.depts];
    // Pick primary dept: prefer one matching WO depts if available
    const primaryDept = (woDepts && depts.find(d => woDepts.includes(d))) || depts[0] || 'General';
    const crafts = [...e.crafts];
    const primaryCraft = crafts[0] || 'General';
    const craftDesc = e.craftDescs.get(primaryCraft) || primaryCraft;
    return {
      name: e.name,
      employeeNumber: e.empNum,
      department: primaryDept,
      craft: primaryCraft,
      skills: depts.length > 1
        ? `${primaryCraft} (${depts.join(', ')})`
        : crafts.length > 1
          ? crafts.join(', ')
          : craftDesc,
      hoursPerDay: 8,
      supervisor: '',
      email: e.email,
      // Extra fields for scheduling intelligence
      allDepartments: depts,
      allCrafts: crafts
    };
  });
}

function fmtDateISO(d) {
  if (!d) return '';
  // Handle Oracle DD-MON-YY format (e.g., "02-DEC-25")
  const oraMatch = String(d).match(/^(\d{1,2})-([A-Z]{3})-(\d{2,4})$/i);
  if (oraMatch) {
    const months = {JAN:0,FEB:1,MAR:2,APR:3,MAY:4,JUN:5,JUL:6,AUG:7,SEP:8,OCT:9,NOV:10,DEC:11};
    let yr = parseInt(oraMatch[3]);
    if (yr < 100) yr += 2000;
    const dt = new Date(yr, months[oraMatch[2].toUpperCase()] || 0, parseInt(oraMatch[1]));
    if (!isNaN(dt)) return dt.toISOString().substring(0, 10);
  }
  const dt = new Date(d);
  if (isNaN(dt)) return String(d).substring(0, 10);
  return dt.toISOString().substring(0, 10);
}
