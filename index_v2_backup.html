          <div style="display:grid;grid-template-columns:repeat(${state.importStats.assignments > 0 ? 4 : 3},1fr);gap:12px;margin-bottom:12px">
            <div style="text-align:center"><div style="font-size:20px;font-weight:700;color:var(--text-primary)">${state.importStats.wos}</div><div style="font-size:9px;color:var(--text-secondary)">Work Orders</div></div>
            <div style="text-align:center"><div style="font-size:20px;font-weight:700;color:var(--text-primary)">${state.importStats.ops}</div><div style="font-size:9px;color:var(--text-secondary)">Operations</div></div>
            <div style="text-align:center"><div style="font-size:20px;font-weight:700;color:var(--text-primary)">${state.importStats.emps}</div><div style="font-size:9px;color:var(--text-secondary)">Employees</div></div>
            ${state.importStats.assignments > 0 ? `<div style="text-align:center"><div style="font-size:20px;font-weight:700;color:#28A745">${state.importStats.assignments}</div><div style="font-size:9px;color:var(--text-secondary)">Assignments</div></div>` : ''}
          </div>
          <div style="font-size:10px;color:var(--text-secondary)">
            Departments: ${state.importStats.depts.join(', ')} &nbsp;|&nbsp; Crafts: ${state.importStats.crafts.join(', ')}
            ${state.importStats.autoAllocated ? `<br><span style="color:#17A2B8;font-weight:600">⚡ ${state.importStats.autoAllocated} ops auto-allocated to resource pools by WO dates</span>` : ''}
          </div>
          <div style="margin-top:10px;padding:8px 12px;background:var(--bg-hover);border-radius:4px;border-left:3px solid var(--accent);font-size:11px">
            📅 <strong style="color:var(--accent)">Detected week:</strong> ${fmtDate(dates[0])} — ${fmtDate(dates[5])}
            &nbsp;·&nbsp; <span style="color:var(--text-secondary)">${state.oracleDataSource === 'oracle' ? 'Source: Oracle EBS' : 'Based on earliest WO scheduled start date'}</span>
          </div>
          <div style="display:flex;gap:8px;margin-top:12px">
            ${state.importStats.assignments > 0 || state.importStats.autoAllocated > 0 ? `
              <button class="btn btn-green" style="flex:1;padding:12px;font-size:13px;border-radius:6px" onclick="setView('gantt')">Gantt View →</button>

              <button class="btn-outline" style="padding:12px;font-size:12px;border-radius:6px" onclick="setView('gantt')">📊 Gantt</button>
              <button class="btn-outline" style="padding:12px;font-size:12px;border-radius:6px" onclick="setView('summary')">Summary</button>
            ` : `
              <button class="btn btn-green" style="flex:1;padding:12px;font-size:13px;border-radius:6px" onclick="setView('plan')">Continue to Plan Week →</button>
            `}
          </div>
        </div>
        ` : ''}
      </div>
    </div></div>`;
  }

  // ════════════════════════════════════════════
  // DASHBOARD VIEW
  // ════════════════════════════════════════════
  if (state.view === 'dashboard') {
    if (!state.dashboardRole) state.dashboardRole = 'planner';
    const weekDates = getWeekDates();
    const allOps = state.workOrders.flatMap(wo => wo.operations.map(op => ({...op, woNumber: wo.woNumber, department: wo.department, isPM: wo.isPM, priority: wo.priority, supervisor: wo.supervisor, asset: wo.asset, scheduledEnd: wo.scheduledEnd})));
    const confirmedWOs = state.workOrders.filter(wo => state.confirmedWOs.has(wo.woNumber));
    const unconfirmedWOs = state.workOrders.filter(wo => !state.confirmedWOs.has(wo.woNumber));

    // ── KPI Calculations ──
    const totalWOs = state.workOrders.length;
    const totalOps = allOps.length;
    const scheduledOps = allOps.filter(op => state.assignments.some(a => a.woNumber === op.woNumber && a.opSeq === op.opSeq));
    const completedOps = allOps.filter(op => state.assignments.some(a => a.woNumber === op.woNumber && a.opSeq === op.opSeq && a.status === 'Complete'));
    const inProgressOps = allOps.filter(op => state.assignments.some(a => a.woNumber === op.woNumber && a.opSeq === op.opSeq && a.status === 'In Progress'));
    const unschedOps = allOps.filter(op => !state.assignments.some(a => a.woNumber === op.woNumber && a.opSeq === op.opSeq));

    const pmWOs = state.workOrders.filter(w => w.isPM);
    const cmWOs = state.workOrders.filter(w => !w.isPM);
    const pmOps = allOps.filter(o => o.isPM);
    const pmSchedOps = pmOps.filter(op => state.assignments.some(a => a.woNumber === op.woNumber && a.opSeq === op.opSeq));
    const pmCompliance = pmOps.length > 0 ? Math.round(pmSchedOps.length / pmOps.length * 100) : 100;
    const schedCompliance = totalOps > 0 ? Math.round(scheduledOps.length / totalOps * 100) : 0;
    const plannedRatio = totalWOs > 0 ? Math.round(pmWOs.length / totalWOs * 100) : 0;

    // Backlog
    const totalBacklogHrs = allOps.reduce((s, op) => {
      const assigned = state.assignments.filter(a => a.woNumber === op.woNumber && a.opSeq === op.opSeq).reduce((s2, a) => s2 + a.hours, 0);
      return s + Math.max(0, op.estHours - assigned);
    }, 0);
    const weeklyCapacity = state.employees.reduce((s, e) => s + (e.hoursPerDay || 8) * 6, 0) || 240;
    const backlogWeeks = weeklyCapacity > 0 ? (totalBacklogHrs / weeklyCapacity).toFixed(1) : 0;

    // Utilization
    const totalAssignedHrs = state.assignments.reduce((s, a) => s + a.hours, 0);
    const totalAvailHrs = state.employees.reduce((s, e) => s + (e.hoursPerDay || 8) * 6, 0) || 1;
    const utilization = Math.round(totalAssignedHrs / totalAvailHrs * 100);

    // Overdue WOs
    const today = new Date().toISOString().split('T')[0];
    const overdueWOs = state.workOrders.filter(wo => wo.scheduledEnd && wo.scheduledEnd < today && !state.assignments.some(a => a.woNumber === wo.woNumber && a.status === 'Complete'));

    // Dept stats
    const deptStats = DEPARTMENTS.map(dept => {
      const dWOs = state.workOrders.filter(w => w.department === dept);
      const dOps = allOps.filter(o => o.department === dept);
      const dSched = dOps.filter(op => state.assignments.some(a => a.woNumber === op.woNumber && a.opSeq === op.opSeq));
      const dComplete = dOps.filter(op => state.assignments.some(a => a.woNumber === op.woNumber && a.opSeq === op.opSeq && a.status === 'Complete'));
      const dBacklogHrs = dOps.reduce((s, op) => {
        const assigned = state.assignments.filter(a => a.woNumber === op.woNumber && a.opSeq === op.opSeq).reduce((s2, a) => s2 + a.hours, 0);
        return s + Math.max(0, op.estHours - assigned);
      }, 0);
      const dEmps = state.employees.filter(e => e.department === dept || (e.allDepartments && e.allDepartments.includes(dept)));
      const dAvail = dEmps.reduce((s, e) => s + (e.hoursPerDay || 8) * 6, 0) || 0;
      const dAssigned = state.assignments.filter(a => dWOs.some(w => w.woNumber === a.woNumber)).reduce((s, a) => s + a.hours, 0);
      const dUtil = dAvail > 0 ? Math.round(dAssigned / dAvail * 100) : 0;
      const dWeeks = dAvail > 0 ? (dBacklogHrs / (dAvail / 6)).toFixed(1) : '∞';
      const status = dUtil < 30 ? 'Critical' : dUtil < 70 ? 'Watch' : 'Healthy';
      const statusColor = status === 'Critical' ? '#DC3545' : status === 'Watch' ? '#F0AD4E' : '#28A745';
      return {dept, wos: dWOs.length, ops: dOps.length, sched: dSched.length, complete: dComplete.length, backlogHrs: dBacklogHrs, backlogWks: dWeeks, util: dUtil, status, statusColor, assigned: dAssigned, avail: dAvail};
    }).filter(d => d.wos > 0 || d.ops > 0);

    // Resource gaps
    const craftNeeds = {};
    allOps.forEach(op => {
      if (!craftNeeds[op.craft]) craftNeeds[op.craft] = {need: 0, have: 0};
      craftNeeds[op.craft].need += op.estHours;
    });
    Object.keys(state.craftConfig).forEach(k => {
      const cfg = state.craftConfig[k];
      if (!craftNeeds[cfg.resource]) craftNeeds[cfg.resource] = {need: 0, have: 0};
      craftNeeds[cfg.resource].have += cfg.headcount * cfg.hoursPerDay * 6;
    });
    state.employees.forEach(emp => {
      if (!craftNeeds[emp.craft]) craftNeeds[emp.craft] = {need: 0, have: 0};
      craftNeeds[emp.craft].have += (emp.hoursPerDay || 8) * 6;
    });

    // Supervisor stats
    const supervisors = [...new Set([...state.employees.map(e => e.supervisor), ...Object.values(state.deptSupervisors || {})].filter(Boolean))];
    const supStats = supervisors.map(sup => {
      const supWOs = state.workOrders.filter(w => w.supervisor === sup);
      const supOps = supWOs.flatMap(wo => wo.operations);
      const supSched = supOps.filter(op => state.assignments.some(a => a.woNumber === op.woNumber && a.opSeq === op.opSeq));
      const supComplete = supOps.filter(op => state.assignments.some(a => a.woNumber === op.woNumber && a.opSeq === op.opSeq && a.status === 'Complete'));
      const supOverdue = supWOs.filter(wo => wo.scheduledEnd && wo.scheduledEnd < today && !state.assignments.some(a => a.woNumber === wo.woNumber && a.status === 'Complete'));
      const supDept = supWOs.length > 0 ? supWOs[0].department : Object.keys(state.deptSupervisors || {}).find(k => state.deptSupervisors[k] === sup) || '';
      const schedPct = supOps.length > 0 ? Math.round(supSched.length / supOps.length * 100) : 0;
      const completePct = supOps.length > 0 ? Math.round(supComplete.length / supOps.length * 100) : 0;
      const grade = schedPct >= 90 && supOverdue.length === 0 ? 'A' : schedPct >= 70 ? 'B' : 'C';
      const gradeColor = grade === 'A' ? '#28A745' : grade === 'B' ? '#F0AD4E' : '#DC3545';
      return {sup, dept: supDept, wos: supWOs.length, ops: supOps.length, schedPct, completePct, overdue: supOverdue.length, grade, gradeColor};
    }).filter(s => s.wos > 0).sort((a, b) => b.wos - a.wos);

    // Color helpers
    const kpiColor = (val, greenMin, amberMin) => val >= greenMin ? '#28A745' : val >= amberMin ? '#F0AD4E' : '#DC3545';
    const kpiClass = (val, greenMin, amberMin) => val >= greenMin ? 'green' : val >= amberMin ? 'amber' : 'red';
    const backlogColor = parseFloat(backlogWeeks) <= 4 ? '#28A745' : parseFloat(backlogWeeks) <= 6 ? '#F0AD4E' : '#DC3545';

    html += `<div class="content" style="padding:16px;overflow-y:auto">`;

    // Role tabs
    html += `<div style="display:flex;gap:4px;margin-bottom:16px">
      <button class="btn" style="padding:6px 18px;font-size:11px;font-weight:700;${state.dashboardRole==='planner'?'background:#FF6B35;color:white;border-color:#FF6B35':'background:var(--bg-surface);color:var(--text-secondary);border:1px solid var(--border)'}" onclick="state.dashboardRole='planner';render()">📋 Planner / Scheduler</button>
      <button class="btn" style="padding:6px 18px;font-size:11px;font-weight:700;${state.dashboardRole==='manager'?'background:#FF6B35;color:white;border-color:#FF6B35':'background:var(--bg-surface);color:var(--text-secondary);border:1px solid var(--border)'}" onclick="state.dashboardRole='manager';render()">👔 Maintenance Manager</button>
      <button class="btn" style="padding:6px 18px;font-size:11px;font-weight:700;${state.dashboardRole==='executive'?'background:#FF6B35;color:white;border-color:#FF6B35':'background:var(--bg-surface);color:var(--text-secondary);border:1px solid var(--border)'}" onclick="state.dashboardRole='executive';render()">📊 Leadership</button>
    </div>`;

    // ═══════ PLANNER VIEW ═══════
    if (state.dashboardRole === 'planner') {
      // Top 5 KPIs
      html += `<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px">
        <div style="background:var(--bg-surface);border:1px solid var(--border);border-left:3px solid ${kpiColor(schedCompliance,90,70)};border-radius:8px;padding:14px;text-align:center">
          <div style="font-size:28px;font-weight:800;color:${kpiColor(schedCompliance,90,70)}">${schedCompliance}%</div>
          <div style="font-size:10px;color:var(--text-secondary);text-transform:uppercase">Schedule Compliance</div>
          <div style="font-size:9px;color:var(--text-muted)">Target: 90%</div>

  // ─── PLAN WEEK VIEW ───
  if (state.view === 'plan') {

      if (state.filterDept !== 'All' && wo.department !== state.filterDept) return false;

    const sortedWOs = [...state.workOrders].filter(planFilterWO).sort((a,b) => {
      const aPM = a.isPM ? 0 : 1;

    const confirmedWOList = sortedWOs.filter(wo => state.confirmedWOs.has(wo.woNumber));
    // Capacity from filtered employees (dept-aware via craftConfig)

    if (state.filterDept !== 'All') {
      Object.entries(state.craftConfig).forEach(([k, v]) => {
        if (v.dept === state.filterDept) planDeptCrafts.add(v.resource);

      sortedWOs.forEach(wo => wo.operations.forEach(op => planDeptCrafts.add(op.craft)));
    }
    const planEmps = state.employees.filter(e => {
      if (state.filterDept !== 'All') {
        if (e.department !== state.filterDept && !planDeptCrafts.has(e.craft)) return false;
      }
      if (state.filterCraft !== 'All' && e.craft !== state.filterCraft) return false;
      if (state.filterEmployee !== 'All' && e.name !== state.filterEmployee) return false;
      if (state.filterSupervisor !== 'All' && e.supervisor !== state.filterSupervisor) return false;
      return true;
    });
    const confirmedHrs = confirmedWOList.reduce((s,wo) => s + wo.operations.reduce((s2,op) => s2 + op.estHours, 0), 0);
    const totalAvail = state.resourceMode === 'pool'
      ? getPoolWeekAvail(state.filterDept, state.filterCraft)
      : planEmps.reduce((s,e) => s + 6 * e.hoursPerDay, 0);
    // Actual scheduled hours (assignments on board for filtered employees this week)
    const planEmpNames = new Set(planEmps.map(e => e.name));
    const planDateSet = new Set(dates);
    const planSchedHrs = state.assignments.filter(a => planDateSet.has(a.date) && (planEmpNames.has(a.employeeName) || isPoolAssignment(a))).reduce((s,a) => s + a.hours, 0);
    const schedPct = totalAvail > 0 ? Math.min((planSchedHrs / totalAvail) * 100, 100) : 0;
    const schedColor = schedPct > 95 ? '#DC3545' : schedPct > 75 ? '#F0AD4E' : '#007BFF';
    const capPct = totalAvail > 0 ? Math.min((confirmedHrs / totalAvail) * 100, 100) : 0;
    const capColor = capPct > 95 ? '#DC3545' : capPct > 75 ? '#F0AD4E' : '#28A745';
    const planHasFilters = state.filterDept !== 'All' || state.filterCraft !== 'All' || state.filterEmployee !== 'All' || state.filterSupervisor !== 'All' || (state.filterWOType && state.filterWOType !== 'All');

            const opCrafts = [...new Set(wo.operations.map(o => o.craft))];

                  <span class="tag" style="background:${dc.badge||'#666'};font-size:8px">${wo.department}</span>
                  ${wo.isExternal ? '<span class="tag" style="background:#F0AD4E;font-size:8px">VENDOR</span>' : wo.hasMixedOps ? '<span class="tag" style="background:#17A2B8;font-size:8px">MIXED</span>' : ''}

                  <span class="tag" style="background:${dc.badge||'#666'};font-size:8px">${wo.department}</span>

        const pColor = wo.priority <= 2 ? '#DC3545' : wo.priority <= 3 ? '#F0AD4E' : 'var(--text-secondary)';
        const crafts = [...new Set(ops.map(o => o.craft))];
        const expandId = 'bl-wo-' + woNum.replace(/[^a-zA-Z0-9]/g, '');
        
        // WO card — draggable (drags first unscheduled op)
        const firstOp = ops[0];
        html += `<div class="op-card" style="border-left:3px solid ${dc.badge || 'var(--border)'};${isPartial ? 'border-right:3px solid #F0AD4E' : ''}" draggable="true"
          ondragstart="onDragStartBacklog(event, getAllOps().find(o=>o.woNumber==='${firstOp.woNumber}'&&o.opSeq===${firstOp.opSeq}))"

              <span class="tag" style="background:${pColor}22;color:${pColor};font-size:7px;padding:1px 4px;border:1px solid ${pColor}44">P${wo.priority}</span>

    const rowLabel = state.boardView === 'employee' ? 'EMPLOYEE' : state.boardView === 'dept' ? 'WORK ORDER' : state.boardView === 'resource' ? 'RESOURCE / WO' : 'WORK ORDER';
    html += `<div class="day-header" style="background:var(--bg-surface);text-align:left;padding-left:10px;font-size:10px;color:var(--text-secondary)">${rowLabel}</div>`;
    dates.forEach((d,i) => { html += `<div class="day-header"><div>${DAY_ABR[i]}</div><div class="day-header-sub">${fmtDate(d)}</div></div>`; });

    if (state.boardView === 'employee') {
    // ── EMPLOYEE VIEW (existing) ──
    if (state.employees.length === 0) {
      html += `<div style="grid-column:1/-1;padding:40px;text-align:center;color:var(--text-secondary)">
        <div style="font-size:14px;margin-bottom:8px">No employees loaded</div>
        <div style="font-size:11px">Upload a workbook with an Employees sheet, or use the <strong>By Resource</strong> view to schedule by resource pool.</div>
        <button class="btn-outline" style="margin-top:12px" onclick="setBoardView('resource')">Switch to Resource View</button>
      </div>`;
    } else {

    // Group employees by department, filter if dept selected
    const visibleDepts = state.filterDept === 'All' ? DEPARTMENTS : [state.filterDept];
    visibleDepts.forEach(dept => {
      let deptEmps = state.employees.filter(e => e.department === dept);
      if (state.filterCraft !== 'All') deptEmps = deptEmps.filter(e => e.craft === state.filterCraft);
      if (state.filterEmployee !== 'All') deptEmps = deptEmps.filter(e => e.name === state.filterEmployee);
      if (state.filterSupervisor !== 'All') deptEmps = deptEmps.filter(e => e.supervisor === state.filterSupervisor);
      if (!deptEmps.length) return;
      const dc = DEPT_COLORS[dept] || {};

      // Department separator row spanning all columns
      html += `<div style="grid-column:1/-1;background:${dc.border}18;border-left:3px solid ${dc.badge};padding:5px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)">
        <span style="font-size:11px;font-weight:700;color:${dc.badge};letter-spacing:1px;text-transform:uppercase">${dept}</span>
        <span style="font-size:10px;color:var(--text-secondary)">${deptEmps.length} employees</span>
      </div>`;

      deptEmps.forEach(emp => {
        const wk = getEmpWeekLoad(emp.name);
        const mx = getEmpWeekAvail(emp.name);
        const defaultMx = 6 * emp.hoursPerDay;
        const hasOverrides = mx !== defaultMx;
        const pct = mx > 0 ? (wk/mx)*100 : 0;
        const cls = pct > 100 ? 'red' : pct > 85 ? 'yellow' : mx === 0 ? 'neutral' : 'green';
        html += `<div class="emp-label" style="border-left:3px solid ${dc.badge}44">
          <div class="emp-name" style="display:flex;align-items:center;gap:4px">${emp.name}${hasOverrides ? '<span style="font-size:9px;color:#F0AD4E" title="Availability overrides set">⏰</span>' : ''}
            <button style="margin-left:auto;background:none;border:none;cursor:pointer;font-size:10px;color:var(--text-secondary);padding:0" onclick="event.stopPropagation();showAvailModal('${emp.name}')" title="Set availability">📅</button>
          </div>
          <div class="emp-craft">${emp.craft} • ${wk.toFixed(1)}h/${mx}h${hasOverrides ? ' ⏰' : ''}</div>
          <div class="cap-bar"><div class="cap-fill ${cls}" style="width:${Math.min(pct,100)}%"></div></div>
        </div>`;

        dates.forEach((date) => {
          const dayA = state.assignments.filter(a => a.employeeName === emp.name && a.date === date);
          const dayH = dayA.reduce((s,a) => s + a.hours, 0);
          const dayAvail = getEmpAvailHours(emp.name, date);
          const dayReason = getEmpAvailReason(emp.name, date);
          const isOff = dayAvail === 0;
          const isReduced = dayAvail > 0 && dayAvail < emp.hoursPerDay;
          html += `<div class="day-cell" style="${isOff ? 'background:repeating-linear-gradient(45deg,transparent,transparent 4px,var(--border) 4px,var(--border) 5px);opacity:0.7' : isReduced ? 'background:#F0AD4E0A' : ''}" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,'${date}','${emp.name}')" title="${isOff ? dayReason || 'Off' : isReduced ? dayReason + ' (' + dayAvail + 'h)' : ''}">`;
          if (isOff) {
            html += `<div style="text-align:center;padding:6px 2px;font-size:9px;color:var(--text-secondary);font-style:italic">${dayReason || 'Off'}</div>`;
          }
          dayA.forEach(a => {
            const op = allOps.find(o => o.woNumber === a.woNumber && o.opSeq === a.opSeq);
            if (!op) return;
            const cc = gc(op.craft);
            const opDc = DEPT_COLORS[op.department] || {};
            const isDone = a.status === 'Complete';
            const statusIcon = a.status === 'Complete' ? '↩' : a.status === 'In Progress' ? '✓' : '►';
            const statusColor = a.status === 'Complete' ? '#28A745' : a.status === 'In Progress' ? '#F0AD4E' : 'var(--text-secondary)';
            const isBorrowed = op.department !== emp.department;
            
            // Date window check
            const wo = state.workOrders.find(w => w.woNumber === a.woNumber);
            const outOfWindow = wo && !isDone && ((wo.scheduledStart && a.date < wo.scheduledStart) || (wo.scheduledEnd && a.date > wo.scheduledEnd));
            
            // Dependency checking
            const depViols = getDepViolations(a);
            const hasViol = depViols.length > 0 && !isDone;
            const hasSameDayWarn = depViols.some(v => v.type === 'sameday') && !depViols.some(v => v.type === 'unscheduled' || v.type === 'after');
            const violClass = hasViol ? (hasSameDayWarn ? 'dep-warn' : 'dep-violated') : '';
            const violTitle = hasViol ? depViols.map(v => v.msg).join('\\n') : '';
            
            // Dep link indicators
            const depLinks = (op.dependencies || []).map(depSeq => {
              const depA = state.assignments.find(x => x.woNumber === a.woNumber && x.opSeq === depSeq);
              if (!depA) return `<span class="dep-link-tag fail">← Op${depSeq} ✕</span>`;
              if (depA.date > a.date) return `<span class="dep-link-tag fail">← Op${depSeq} late</span>`;
              if (depA.date === a.date) return `<span class="dep-link-tag warn">← Op${depSeq} same</span>`;
              return `<span class="dep-link-tag ok">← Op${depSeq} ✓</span>`;
            }).join('');
            
            html += `<div class="assigned-op ${isDone?'complete':''} ${state.showDependencies?violClass:''}" data-dep-node="${a.woNumber}:${op.opSeq}" draggable="true" ondragstart="onDragStartAssigned(event,'${a.id}')" ondragend="onDragEnd(event)" ${state.showDependencies&&violTitle ? `title="${violTitle}"` : ''} style="cursor:grab;background:${isDone?'#28A74522':outOfWindow&&state.showDateWindow?'#DC354522':cc.bg+'33'};border-color:${isDone?'#28A74566':outOfWindow&&state.showDateWindow?'#DC354566':cc.border+'66'}${isBorrowed&&state.showCrossDept?';border-left:3px solid '+opDc.badge:''}">
              <div class="assigned-op-header">
                <span class="assigned-op-wo" style="color:${outOfWindow&&state.showDateWindow?'#DC3545':cc.text}">${hasViol&&state.showDependencies ? '<span class="dep-icon" style="color:#DC3545">⚠</span> ' : ''}${outOfWindow&&state.showDateWindow ? '🕐 ' : ''}${isBorrowed&&state.showCrossDept?'⇄ ':''}${op.woNumber.replace('WO-','')}</span>
                <span>
                  <button class="assigned-op-btn" style="color:${statusColor}" onclick="event.stopPropagation();cycleStatus('${a.id}')" title="Cycle status">${statusIcon}</button>
                  <button class="assigned-op-btn" style="color:#DC354566" onclick="event.stopPropagation();removeAssignment('${a.id}')" title="Remove">×</button>
                </span>
              </div>
              <div class="assigned-op-meta">${state.showPMBadges && op.isPM ? '<span style="color:#17A2B8;font-weight:600">PM</span> • ' : ''}Op${op.opSeq} ${a.hours}h${isBorrowed&&state.showCrossDept ? ' • <span style="color:'+opDc.badge+'">'+op.department+'</span>' : ''}${outOfWindow&&state.showDateWindow ? ' • <span style="color:#DC3545">⚠ outside window</span>' : ''} ${a.status !== 'Scheduled' ? '• '+a.status : ''}</div>
              <div style="font-size:8px;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${op.description}">${op.description}</div>
              ${state.showDependencies && depLinks ? `<div class="dep-links">${depLinks}</div>` : ''}
            </div>`;
          });
          if (dayH > 0) {
            html += `<div class="day-cell-load ${dayH > dayAvail ? 'over':''}">${dayH}/${dayAvail}h</div>`;
          }
          html += `</div>`;
        });
      });
    });
    } // end employees exist
    } // end employee view

    else if (state.boardView === 'dept' || state.boardView === 'priority') {
    // ── DEPT or PRIORITY VIEW ── (rows = WOs grouped by dept or sorted by priority)
    const boardWOs = state.boardView === 'priority'
      ? [...state.workOrders].filter(wo => {
          if (state.confirmedWOs.size > 0 && !state.confirmedWOs.has(wo.woNumber)) return false;
          if (state.filterDept !== 'All' && wo.department !== state.filterDept) return false;
          if (state.filterSupervisor !== 'All' && wo.supervisor !== state.filterSupervisor) return false;
          if (state.filterCraft !== 'All' && !wo.operations.some(op => op.craft === state.filterCraft)) return false;
          if (state.filterWOType === 'PM' && !wo.isPM) return false;
          if (state.filterWOType === 'CM' && wo.isPM) return false;
          return true;
        }).sort((a,b) => { const ap = a.isPM?0:1, bp = b.isPM?0:1; return (ap-bp) || (a.priority - b.priority); })
      : [...state.workOrders].filter(wo => {
          if (state.confirmedWOs.size > 0 && !state.confirmedWOs.has(wo.woNumber)) return false;
          if (state.filterDept !== 'All' && wo.department !== state.filterDept) return false;
          if (state.filterSupervisor !== 'All' && wo.supervisor !== state.filterSupervisor) return false;
          if (state.filterCraft !== 'All' && !wo.operations.some(op => op.craft === state.filterCraft)) return false;
          if (state.filterWOType === 'PM' && !wo.isPM) return false;
          if (state.filterWOType === 'CM' && wo.isPM) return false;
          return true;
        });

    const boardGroups = state.boardView === 'dept' ? DEPARTMENTS.filter(d => state.filterDept === 'All' || state.filterDept === d) : ['All'];
    
    boardGroups.forEach(group => {
      const groupWOs = state.boardView === 'dept' ? boardWOs.filter(wo => wo.department === group) : boardWOs;
      if (!groupWOs.length) return;
      
      if (state.boardView === 'dept') {
        const dc = DEPT_COLORS[group] || {};
        html += `<div style="grid-column:1/-1;background:${dc.border}18;border-left:3px solid ${dc.badge};padding:5px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)">
          <span style="font-size:11px;font-weight:700;color:${dc.badge};letter-spacing:1px;text-transform:uppercase">${group}</span>
          <span style="font-size:10px;color:var(--text-secondary)">${groupWOs.length} WOs</span>
        </div>`;
      }
      
      groupWOs.forEach(wo => {
        const totalH = wo.operations.reduce((s,op) => s + op.estHours, 0);
        const schedOps = wo.operations.filter(op => state.assignments.some(a => a.woNumber === wo.woNumber && a.opSeq === op.opSeq)).length;
        const pColor = wo.priority <= 2 ? '#DC3545' : wo.priority <= 3 ? '#F0AD4E' : 'var(--text-secondary)';
        const dc = DEPT_COLORS[wo.department] || {};
        
        html += `<div class="board-wo-label">
          <div class="board-wo-num">${wo.woNumber}</div>
          <div class="board-wo-desc" title="${wo.description}">${wo.description}</div>
          <div class="board-wo-badges">
            <span class="badge" style="background:${pColor}22;color:${pColor};border:1px solid ${pColor}44;font-size:8px">P${wo.priority}</span>
            ${state.showPMBadges && wo.isPM ? `<span class="tag" style="background:#17A2B8;font-size:7px">PM</span>` : ''}
            ${state.boardView === 'priority' ? `<span class="tag" style="background:${dc.badge};font-size:7px">${wo.department}</span>` : ''}
            <span style="font-size:8px;color:var(--text-secondary)">${schedOps}/${wo.operations.length} sched • ${totalH}h</span>
          </div>
        </div>`;
        
        dates.forEach(date => {
          const dayOps = wo.operations.filter(op => state.assignments.some(a => a.woNumber === wo.woNumber && a.opSeq === op.opSeq && a.date === date));
          html += `<div class="day-cell" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,'${date}','')">`;
          dayOps.forEach(op => {
            const a = state.assignments.find(x => x.woNumber === wo.woNumber && x.opSeq === op.opSeq && x.date === date);
            if (!a) return;
            const cc = gc(op.craft);
            const isDone = a.status === 'Complete';
            const depViols = getDepViolations(a);
            const hasViol = depViols.length > 0 && !isDone;
            const violClass = hasViol ? 'dep-violated' : '';
            html += `<div class="assigned-op ${isDone?'complete':''} ${violClass}" data-dep-node="${a.woNumber}:${op.opSeq}" style="background:${isDone?'#28A74522':cc.bg+'33'};border:1px solid ${isDone?'#28A74566':cc.border+'66'}">
              <div class="assigned-op-header">
                <span class="assigned-op-wo" style="color:${cc.text}">${hasViol?'⚠ ':''}Op${op.opSeq}</span>
                <span>
                  <button class="assigned-op-btn" style="color:${isDone?'#28A745':a.status==='In Progress'?'#F0AD4E':'var(--text-secondary)'}" onclick="event.stopPropagation();cycleStatus('${a.id}')">${isDone?'↩':a.status==='In Progress'?'✓':'►'}</button>
                  <button class="assigned-op-btn" style="color:#DC354566" onclick="event.stopPropagation();removeAssignment('${a.id}')">×</button>
                </span>
              </div>
              <div class="assigned-op-meta">${a.employeeName.split(' ')[0]} • ${a.hours}h • ${op.craft}</div>
            </div>`;
          });
          html += `</div>`;
        });
      });
    });
    }

    else if (state.boardView === 'resource') {
    // ── RESOURCE VIEW ── (rows = resource pools, cells show WO-level cards, click to expand ops)
    const resources = state.filterCraft !== 'All' ? [state.filterCraft] : [...new Set(getAllOps().map(o => o.craft))];
    resources.forEach(craft => {
      const cc = gc(craft);
      const cap = getResourceCapacity(craft);
      const craftOps = getAllOps().filter(o => o.craft === craft && (state.filterDept === 'All' || o.department === state.filterDept));
      const totalEst = craftOps.reduce((s,o) => s + o.estHours, 0);
      const totalRemain = craftOps.reduce((s,o) => s + getRemainingHours(o), 0);
      
      html += `<div class="emp-label" style="border-left:3px solid ${cc.badge};cursor:pointer" onclick="showResourceCapModal('${craft}')">
        <div class="emp-name" style="color:${cc.text}">${craft} ${!cap.auto ? '<span style="font-size:8px;color:var(--accent)">⚙</span>' : ''}</div>
        <div class="emp-craft">${cap.unconfigured ? '<span style="color:var(--accent)">Click to set capacity</span>' : cap.headcount + ' ' + (cap.auto ? 'employees' : 'headcount') + ' • ' + cap.hoursPerDay + 'h/day'}</div>
        <div class="emp-craft">${totalRemain > 0 ? totalRemain.toFixed(1) + 'h backlog' : totalEst + 'h est'}</div>
      </div>`;
      
      dates.forEach(date => {
        const dayLoad = getResourceDayLoad(craft, date);
        const dayCap = getResourceDayCapacity(craft, date);
        const pct = dayCap > 0 ? (dayLoad / dayCap) * 100 : 0;
        const heatBg = pct > 95 ? '#DC354518' : pct > 75 ? '#F0AD4E12' : pct > 0 ? '#28A74508' : '';
        
        // Get assignments for this craft+date, grouped by WO
        const dayAssign = state.assignments.filter(a => {
          const op = allOps.find(o => o.woNumber === a.woNumber && o.opSeq === a.opSeq);
          if (!op || op.craft !== craft) return false;
          if (state.filterDept !== 'All' && op.department !== state.filterDept) return false;
          return a.date === date;
        });
        
        // Group by WO number
        const woGroups = {};
        dayAssign.forEach(a => {
          if (!woGroups[a.woNumber]) woGroups[a.woNumber] = [];
          woGroups[a.woNumber].push(a);
        });
        
        html += `<div class="day-cell" style="background:${heatBg}" 
          ondragover="onDragOver(event)" 
          ondragleave="onDragLeave(event)" 
          ondrop="onDrop(event,'${date}',null,'${craft}')">`;
        
        // Render WO-level cards
        Object.entries(woGroups).forEach(([woNum, assigns]) => {
          const wo = state.workOrders.find(w => w.woNumber === woNum);
          const woHrs = assigns.reduce((s,a) => s + a.hours, 0);
          const opsCount = assigns.length;
          const allDone = assigns.every(a => a.status === 'Complete');
          const anyPool = assigns.some(a => isPoolAssignment(a));
          const anyInProg = assigns.some(a => a.status === 'In Progress');
          const dc = DEPT_COLORS[wo?.department] || {};
          const pColor = wo && wo.priority <= 2 ? '#DC3545' : wo && wo.priority <= 3 ? '#F0AD4E' : 'var(--text-secondary)';
          const expandId = 'res-' + craft.replace(/\s/g,'') + '-' + date + '-' + woNum.replace(/[^a-zA-Z0-9]/g,'');
          
          html += `<div class="assigned-op ${allDone?'complete':''}" draggable="true"
            ondragstart="onDragStartResourceWO(event,'${woNum}','${craft}','${date}')"
            ondragend="onDragEnd(event)"
            style="background:${allDone?'#28A74515':anyPool?'#17A2B810':cc.bg+'22'};border:1px solid ${allDone?'#28A74544':anyPool?'#17A2B833':cc.border+'44'};cursor:grab;${anyPool?'border-left:3px solid #17A2B8':''}"
            onclick="document.getElementById('${expandId}').style.display=document.getElementById('${expandId}').style.display==='none'?'block':'none'">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <span style="font-size:9px;font-weight:700;color:${cc.text}">${woNum.replace('WO-','')}</span>
              <span style="display:flex;gap:3px;align-items:center">
                ${state.showPMBadges && wo?.isPM ? '<span style="background:#17A2B8;color:white;font-size:6px;padding:1px 3px;border-radius:2px">PM</span>' : ''}
                <span style="font-size:8px;font-weight:600;color:${pColor}">P${wo?.priority||'?'}</span>
                <span style="font-size:8px;color:${allDone?'#28A745':anyInProg?'#F0AD4E':anyPool?'#17A2B8':'var(--text-secondary)'}">${allDone?'✓':anyInProg?'▶':anyPool?'◉':'●'}</span>
              </span>
            </div>
            <div style="font-size:8px;color:var(--text-primary);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${wo?.description || ''}">${wo?.description || ''}</div>
            <div style="font-size:7px;color:var(--text-muted);margin-top:1px">${wo?.asset || ''}</div>
            <div style="font-size:8px;color:var(--text-secondary);margin-top:1px;display:flex;justify-content:space-between;align-items:center">
              <span>${opsCount} op${opsCount>1?'s':''} • ${woHrs}h${anyPool ? ' • <span style="color:#17A2B8">pool</span>' : ''}</span>
              <span style="display:flex;gap:2px" onclick="event.stopPropagation()">
                <button style="background:none;border:1px solid var(--border);border-radius:3px;color:var(--text-secondary);cursor:pointer;font-size:8px;padding:0 3px;line-height:14px" onclick="moveResourceWO('${woNum}','${craft}','${date}',-7)" title="Move to previous week">◀ wk</button>
                <button style="background:none;border:1px solid var(--border);border-radius:3px;color:var(--text-secondary);cursor:pointer;font-size:8px;padding:0 3px;line-height:14px" onclick="moveResourceWO('${woNum}','${craft}','${date}',7)" title="Move to next week">wk ▶</button>
              </span>
            </div>
          </div>
          <div id="${expandId}" style="display:none;margin-top:-2px;margin-bottom:4px">`;
          
          // Expanded ops detail
          assigns.forEach(a => {
            const op = allOps.find(o => o.woNumber === a.woNumber && o.opSeq === a.opSeq);
            if (!op) return;
            const isDone = a.status === 'Complete';
            const isPool = isPoolAssignment(a);
            html += `<div style="background:var(--bg-base);border:1px solid var(--border);border-radius:3px;padding:3px 5px;margin-top:2px;font-size:8px;display:flex;justify-content:space-between;align-items:center">
              <span style="color:var(--text-primary)">Op ${op.opSeq}: ${op.description.substring(0,25)}${op.description.length>25?'…':''}</span>
              <span style="display:flex;gap:4px;align-items:center">
                <span style="color:var(--text-secondary)">${isPool ? '<span style="color:#17A2B8">Pool</span>' : a.employeeName.split(' ')[0]}</span>
                <span style="color:var(--accent);font-weight:600">${a.hours}h</span>
                ${isPool ? `<button style="background:none;border:none;color:#17A2B8;cursor:pointer;font-size:9px;padding:0" onclick="event.stopPropagation();promoteToEmployee('${a.id}')" title="Assign employee">👤</button>` : ''}
                <button style="background:none;border:none;color:#DC354566;cursor:pointer;font-size:10px;padding:0" onclick="event.stopPropagation();removeAssignment('${a.id}')">×</button>
              </span>
            </div>`;
          });
          html += `</div>`;
        });
        
        // Capacity bar
        if (dayCap > 0) {
          const barColor = pct > 95 ? '#DC3545' : pct > 75 ? '#F0AD4E' : pct > 0 ? '#28A745' : 'var(--text-muted)';
          html += `<div style="margin-top:auto;padding:2px 4px;font-size:9px;display:flex;align-items:center;gap:4px">
            <div style="flex:1;height:4px;background:var(--cap-bar-bg);border-radius:2px;overflow:hidden">
              <div style="height:100%;width:${Math.min(100, pct)}%;background:${barColor};border-radius:2px"></div>
            </div>
            <span style="color:${barColor};font-weight:600;white-space:nowrap">${dayLoad.toFixed(1)}/${dayCap}h</span>
          </div>`;
        }
        html += `</div>`;
      });
    });
    }

    html += `</div><svg class="dep-svg-overlay" id="dep-lines-svg"></svg></div></div></div></div></div>`;
  }

  // ─── GANTT VIEW ───
  if (state.view === 'gantt') {
    html += `<div style="display:flex;flex-direction:column;flex:1;overflow:hidden;min-height:0">`;
    const ganttDates = getGanttDates();
    html = renderGanttView(html, ganttDates);
    html += `</div>`;
  }

  // ─── WORK ORDERS VIEW ───
  if (state.view === 'backlog') {
    const filteredWOs = state.workOrders.filter(wo => {
      if (state.filterDept !== 'All' && wo.department !== state.filterDept) return false;
      if (state.filterSupervisor !== 'All' && wo.supervisor !== state.filterSupervisor) return false;
      if (state.filterCraft !== 'All' && !wo.operations.some(op => op.craft === state.filterCraft)) return false;
      return true;
    });
    html += `<div class="content" style="padding:20px">`;

    DEPARTMENTS.forEach(dept => {

      ${overdueWOs.length > 0 ? `

      // ── AI Agent Instructions Section ──
      const customPrompt = getCustomPrompt() || DEFAULT_CUSTOM_RULES;

      // ── Agent Workflow Config ──
      html += `<div style="margin-top:16px;padding:16px;background:var(--bg-surface);border:1px solid var(--border);border-radius:8px">
        <div style="font-size:14px;font-weight:700;color:var(--text-primary);margin-bottom:8px">AI Agent Workflow</div>
        <div style="font-size:10px;color:var(--text-secondary);margin-bottom:12px">When Auto-Sched runs, these two agents work together:</div>
        <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:start">
          <div style="padding:12px;background:var(--bg-card);border:1px solid #28A74566;border-radius:8px;border-left:3px solid #28A745">
            <div style="font-size:11px;font-weight:700;color:#28A745;margin-bottom:4px">Stage 1: Planner Agent</div>
            <div style="font-size:10px;color:var(--text-secondary);line-height:1.4">
              Analyzes WOs, reads operation descriptions, matches employee skills, considers availability and dependencies.
              Proposes a complete schedule as a preview — nothing is assigned yet.
            </div>
          </div>
          <div style="font-size:20px;color:var(--text-muted);padding-top:16px">then</div>
          <div style="padding:12px;background:var(--bg-card);border:1px solid #17A2B866;border-radius:8px;border-left:3px solid #17A2B8">
            <div style="font-size:11px;font-weight:700;color:#17A2B8;margin-bottom:4px">Stage 2: Reviewer Agent</div>
            <div style="font-size:10px;color:var(--text-secondary);line-height:1.4">
              Receives the proposed schedule. Checks for skill mismatches, capacity overloads, dependency violations, conflicts.
              Returns a grade (A/B/C) with issues. You approve or request changes.

        <div style="margin-top:12px;font-size:10px;color:var(--text-muted);font-style:italic">
          The Planner reads your custom rules above. The Reviewer is independent — it catches what the Planner missed.
        </div>
      </div>`;
    }

    html += `</div>`;
  }

  // ════════════════════════════════════════════
  // GUIDE VIEW
  // ════════════════════════════════════════════
  if (state.view === 'guide') {
    const guideCSS = `
      .guide-wrap { max-width:960px; margin:0 auto; padding:20px 0; }
      .guide-section { background:var(--bg-card); border:1px solid var(--border); border-radius:10px; padding:24px; margin-bottom:20px; }

      .guide-card { background:var(--bg-base); border:1px solid var(--border); border-radius:8px; padding:14px; }

      .guide-table th { background:var(--bg-base); color:var(--text-secondary); font-weight:700; text-transform:uppercase; letter-spacing:0.5px; padding:8px 10px; text-align:left; border-bottom:2px solid var(--border); }

      .guide-tip { background:#17A2B810; border-left:3px solid #17A2B8; padding:10px 14px; border-radius:0 6px 6px 0; margin:10px 0; font-size:10px; color:var(--text-secondary); line-height:1.6; }
      .guide-tip strong { color:#17A2B8; }
      .guide-warn { background:#F0AD4E10; border-left:3px solid #F0AD4E; padding:10px 14px; border-radius:0 6px 6px 0; margin:10px 0; font-size:10px; color:var(--text-secondary); line-height:1.6; }
      .guide-warn strong { color:#F0AD4E; }
    `;
    html += `<style>${guideCSS}</style><div class="content" style="padding:20px;overflow:auto"><div class="guide-wrap">

    <!-- TITLE -->
    <div class="guide-section" style="text-align:center;padding:32px">
      <div class="guide-h1">⚙ Joeyi — Operations Scheduling Workbench</div>
      <div class="guide-p" style="font-size:13px;color:var(--text-primary);margin-bottom:0">User Guide & Methodology</div>
      <div class="guide-p" style="font-size:10px;margin-top:8px">Version 1.0 &bull; Spreadsheet Import Edition</div>
    </div>

    <!-- OVERVIEW -->
    <div class="guide-section">
      <div class="guide-h2">Overview</div>
      <div class="guide-p">Joeyi is a weekly maintenance scheduling workbench. It imports work orders and employee rosters from Excel, then provides visual tools to plan, schedule, and track operations across your maintenance workforce. The tool supports both manual drag-and-drop scheduling and AI-assisted auto-scheduling.</div>
      <div class="guide-grid">
        <div class="guide-card">
          <div class="guide-card-title">🎯 Purpose</div>
          <div class="guide-card-body">Schedule maintenance work order operations to available employees across a Mon–Sat work week, respecting craft skills, capacity limits, operation dependencies, and date windows.</div>
        </div>
        <div class="guide-card">
          <div class="guide-card-title">👤 Users</div>
          <div class="guide-card-body">Maintenance planners, supervisors, and scheduling coordinators who manage weekly work assignments for trades personnel across one or more departments.</div>
        </div>
      </div>
    </div>

    <!-- WORKFLOW -->
    <div class="guide-section">
      <div class="guide-h2">Scheduling Workflow</div>
      <div class="guide-p">Follow this sequence each week to build your schedule:</div>
      <ol class="guide-ol">
        <li><strong>Import Data</strong> — Upload your Excel workbook with Work Orders and Employees sheets. The scheduler auto-detects column mappings. Download the blank template for the expected format.</li>
        <li><strong>Plan Week</strong> — Review candidate work orders sorted by PM priority then urgency. Drag or click to confirm which WOs will be scheduled this week. The capacity gauge shows confirmed hours vs. available labor.</li>
        <li><strong>Set Availability</strong> — On the Schedule Board or Capacity tab, click the 📅 icon next to any employee to set vacation, sick days, half days, or custom hours. Off days block scheduling entirely.</li>
        <li><strong>Schedule Operations</strong> — Drag unscheduled ops from the backlog to employee day cells, or use the Auto-Schedule button. The scheduler enforces craft matching, capacity limits, and dependency order.</li>
        <li><strong>Track Progress</strong> — Click the status icon on any assigned op to cycle through Scheduled → In Progress → Complete. Track completion rates on the Summary dashboard.</li>
        <li><strong>Export</strong> — Download the schedule as Excel. The export respects your department filter, includes the week date, and auto-versions (v1, v2, v3) so you keep a history.</li>
      </ol>
      <div class="guide-tip"><strong>Tip:</strong> PM (Planned Maintenance) work orders are automatically prioritized above CM (Corrective Maintenance) at the same priority level — both in the Plan Week sort and the auto-scheduler. This ensures compliance windows are met.</div>
    </div>

    <!-- TABS REFERENCE -->
    <div class="guide-section">
      <div class="guide-h2">Tab Reference</div>
      <table class="guide-table">
        <thead><tr><th>Tab</th><th>Purpose</th><th>Key Actions</th></tr></thead>
        <tbody>
          <tr><td><strong>📁 Import Data</strong></td><td>Upload your Excel workbook or download the blank template</td><td>Drag & drop or click to upload. Re-upload anytime to refresh data.</td></tr>
          <tr><td><strong>📋 Plan Week</strong></td><td>Triage and confirm which WOs to schedule this week</td><td>Drag WOs between Candidate and Confirmed lists. Use "Confirm Top N" for bulk actions. Monitor capacity gauge.</td></tr>
          <tr><td><strong>Schedule Board</strong></td><td>Visual calendar grid — the main scheduling workspace</td><td>Drag ops to day cells. Switch between Employee, Department, Priority, and Resource views. Set availability. Track status.</td></tr>
          <tr><td><strong>Work Orders</strong></td><td>Detailed view of all WOs grouped by department</td><td>Review operations, dependencies, assignments, and status per WO. Shows PM/CM badges and date windows.</td></tr>
          <tr><td><strong>Employees</strong></td><td>Workforce roster with utilization</td><td>View craft, skills, supervisor, weekly load, and utilization %. See availability overrides.</td></tr>
          <tr><td><strong>Capacity</strong></td><td>Department and employee capacity analysis</td><td>Daily availability grid with color-coded load levels. Edit availability directly. Department-level breakdowns.</td></tr>
          <tr><td><strong>📊 Summary</strong></td><td>Executive dashboard with KPIs and analytics</td><td>PM vs CM breakdown, utilization, compliance, department stats, and week-over-week trends.</td></tr>
        </tbody>
      </table>
    </div>

    <!-- SCHEDULING METHODOLOGY -->
    <div class="guide-section">
      <div class="guide-h2">Scheduling Methodology</div>

      <div class="guide-h3">Priority System</div>
      <table class="guide-table">
        <thead><tr><th>Priority</th><th>Label</th><th>Scheduling Rule</th></tr></thead>
        <tbody>
          <tr><td><span class="guide-badge" style="background:#DC354522;color:#DC3545">P1</span></td><td>Emergency</td><td>Schedule immediately. Takes precedence over all other work. Assign first available qualified resource.</td></tr>
          <tr><td><span class="guide-badge" style="background:#E6510022;color:#E65100">P2</span></td><td>Urgent</td><td>Schedule within 24-48 hours. High priority but can be sequenced with other urgent work.</td></tr>
          <tr><td><span class="guide-badge" style="background:#F0AD4E22;color:#F0AD4E">P3</span></td><td>High</td><td>Schedule this week. Standard priority for PMs and important corrective work.</td></tr>
          <tr><td><span class="guide-badge" style="background:#6C757D22;color:#6C757D">P4</span></td><td>Medium</td><td>Schedule when capacity allows. Fills remaining slots after higher priority work.</td></tr>
          <tr><td><span class="guide-badge" style="background:#6C757D22;color:#6C757D">P5</span></td><td>Low</td><td>Backlog work. Schedule in slack time or when specific resources are underutilized.</td></tr>
        </tbody>
      </table>

      <div class="guide-h3">PM vs CM Prioritization</div>
      <div class="guide-p">The scheduler uses a two-tier sort: <strong>PM first, then by priority number</strong>. This means a P3 PM will be scheduled before a P3 CM. The rationale is that planned maintenance has compliance windows and regulatory requirements that corrective work typically doesn't.</div>
      <div class="guide-grid">
        <div class="guide-card">
          <div class="guide-card-title"><span class="guide-badge" style="background:#17A2B822;color:#17A2B8">PM</span> Planned Maintenance</div>
          <div class="guide-card-body">Preventive, predictive, and compliance-driven work with defined windows. PMs have regulatory or OEM-mandated intervals. Missing a PM window can trigger audit findings or equipment warranty issues. Scheduled first within each priority tier.</div>
        </div>
        <div class="guide-card">
          <div class="guide-card-title"><span class="guide-badge" style="background:#6C757D22;color:#6C757D">CM</span> Corrective Maintenance</div>
          <div class="guide-card-body">Reactive or condition-based repairs. CM work fills remaining capacity after PMs are placed. High-priority CM (P1/P2) still takes precedence over low-priority PM — the PM-first rule only applies within the same priority level.</div>
        </div>
      </div>

      <div class="guide-h3">Auto-Scheduler Algorithm</div>
      <div class="guide-p">The auto-scheduler (both local and AI-powered) follows this logic:</div>
      <ol class="guide-ol">
        <li><strong>Filter</strong> — Only considers confirmed WOs and respects active department/craft/type filters</li>
        <li><strong>Sort</strong> — Orders operations: PM before CM → lower priority number first → WO number → op sequence</li>
        <li><strong>Dependency Resolution</strong> — Topological sort ensures predecessor ops are scheduled before dependent ops. Dependent ops are placed on the next day after their predecessor completes.</li>
        <li><strong>Capacity Check</strong> — For each op, finds employees with matching craft. Checks each employee's daily availability (respecting vacation/reduced hours). Assigns to the employee with the most remaining capacity on the earliest valid day.</li>
        <li><strong>Date Window</strong> — Prefers scheduling within the WO's Scheduled Start → End window. Operations scheduled outside this window are flagged with a ⚠ warning.</li>
      </ol>
      <div class="guide-warn"><strong>Important:</strong> Dependencies are hard constraints. An op that depends on Op 10 and Op 20 will never be scheduled before both predecessors are placed. If predecessors can't be scheduled (no matching craft, no capacity), the dependent op stays in the backlog.</div>

      <div class="guide-h3">Dependency Types</div>
      <table class="guide-table">
        <thead><tr><th>Type</th><th>Example</th><th>Behavior</th></tr></thead>
        <tbody>
          <tr><td><span class="guide-badge" style="background:#007BFF22;color:#007BFF">∥ Parallel</span></td><td>Op has no dependencies listed</td><td>Can be scheduled on any day, in parallel with other ops on the same WO</td></tr>
          <tr><td><span class="guide-badge" style="background:#28A74522;color:#28A745">→ Sequential</span></td><td>Op 30 depends on Op 20</td><td>Must be scheduled on the same day or after Op 20. Preferably the next day.</td></tr>
          <tr><td><span class="guide-badge" style="background:#F0AD4E22;color:#F0AD4E">⇉ Multi-dep</span></td><td>Op 50 depends on Op 30, Op 40</td><td>Must wait for ALL predecessors. Scheduled after the latest predecessor completes.</td></tr>
        </tbody>
      </table>

      <div class="guide-h3">Capacity Model</div>
      <div class="guide-p">Each employee has a base hours-per-day (typically 8h). Availability overrides let you set custom hours for specific days:</div>
      <table class="guide-table">
        <thead><tr><th>Status</th><th>Visual</th><th>Effect</th></tr></thead>
        <tbody>
          <tr><td>Full day</td><td>Normal cell</td><td>Default hours available (e.g., 8h). No restrictions.</td></tr>
          <tr><td>Reduced hours</td><td>Amber tint, shows custom hours</td><td>Scheduling capped at available hours (e.g., 4h for half day). Load bar adjusts.</td></tr>
          <tr><td>Day off</td><td>Diagonal hash pattern</td><td>Completely blocked. Drag-drop disabled. Auto-scheduler skips. Shows reason (Vacation, Sick, etc.).</td></tr>
        </tbody>
      </table>
      <div class="guide-p">Utilization is always calculated against <em>actual available hours</em>, not theoretical max. If an employee has 36h available (one day off), and 32h scheduled, utilization is 89% — not 67%.</div>

      <div class="guide-h3">Split Assignments</div>
      <div class="guide-p">Operations can be assigned to <strong>multiple employees</strong> and/or <strong>spread across multiple days</strong>. This is essential for large ops that exceed one person's daily capacity, or when you want two mechanics working in parallel.</div>

      <div class="guide-h3">How to Split</div>
      <div class="guide-p">Click any op in the backlog to open the Assign modal. The modal shows a row-based assignment builder where each row is one person/day/hours combination. Add rows manually or use the Quick Split buttons:</div>
      <table class="guide-table">
        <thead><tr><th>Button</th><th>What It Does</th><th>Use Case</th></tr></thead>
        <tbody>
          <tr><td>📅 1 person × multiple days</td><td>Creates one row per day in the WO window, splits hours evenly</td><td>4h op assigned 1h/day Mon–Thu to same person</td></tr>
          <tr><td>👥 Multiple people × 1 day</td><td>Creates one row per craft-matched employee, splits hours evenly</td><td>4h op with 2 mechanics doing 2h each same day</td></tr>
          <tr><td>⭐ People × days grid</td><td>Creates a matrix of people and days, splits hours across all slots</td><td>Large op spread across multiple people and days</td></tr>
        </tbody>
      </table>
      <div class="guide-p">After clicking a Quick Split button, review and adjust the pre-filled rows: change employees, days, or hours as needed. Then click <strong>Assign All</strong> to create every row as a separate assignment in one action.</div>
      <div class="guide-tip"><strong>Tip:</strong> The running total at the bottom of the modal shows assigned vs estimated hours in real time. Green = fully covered, yellow = partial, red = over-assigned.</div>

      <div class="guide-h3">Partial Assignments in the Backlog</div>
      <div class="guide-p">When an op is partially assigned (some hours covered, but not all), it stays in the backlog with a yellow left border and a badge showing assigned/total hours (e.g., <span class="guide-badge" style="background:#F0AD4E;color:white">2/4h</span>). The card also lists who's already assigned. Click it to open the modal and add more assignments — the hours field defaults to the remaining amount.</div>
    </div>

    <!-- DATA FORMAT -->

// ─── DEPENDENCY LINE DRAWING ───
function drawDepLines() {
  const svg = document.getElementById('dep-lines-svg');
  if (!svg) return;
  
  const wrap = svg.closest('.schedule-grid-wrap');
  if (!wrap) return;
  
  const wrapRect = wrap.getBoundingClientRect();
  svg.setAttribute('width', wrap.scrollWidth);
  svg.setAttribute('height', wrap.scrollHeight);
  svg.style.width = wrap.scrollWidth + 'px';
  svg.style.height = wrap.scrollHeight + 'px';
  
  let lines = '';
  const arrowId = 'dep-arrow';
  
  // Define arrowhead markers
  lines += `<defs>
    <marker id="${arrowId}-ok" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#28A745" class="dep-arrow-head"/>
    </marker>
    <marker id="${arrowId}-violation" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#DC3545" class="dep-arrow-head"/>
    </marker>
    <marker id="${arrowId}-warn" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#F0AD4E" class="dep-arrow-head"/>
    </marker>
  </defs>`;
  
  // Find all scheduled ops and build position map
  const nodes = wrap.querySelectorAll('[data-dep-node]');
  const posMap = {};
  nodes.forEach(el => {
    const key = el.getAttribute('data-dep-node');
    const r = el.getBoundingClientRect();
    posMap[key] = {
      x: r.left - wrapRect.left + wrap.scrollLeft,
      y: r.top - wrapRect.top + wrap.scrollTop,
      w: r.width,
      h: r.height
    };
  });
  
  // Draw lines for each dependency link
  state.workOrders.forEach(wo => {
    wo.operations.forEach(op => {
      if (!op.dependencies || !op.dependencies.length) return;
      const toKey = `${wo.woNumber}:${op.opSeq}`;
      const toPos = posMap[toKey];
      if (!toPos) return;
      
      op.dependencies.forEach(depSeq => {
        const fromKey = `${wo.woNumber}:${depSeq}`;
        const fromPos = posMap[fromKey];
        if (!fromPos) return;
        
        // Determine line status
        const toA = state.assignments.find(a => a.woNumber === wo.woNumber && a.opSeq === op.opSeq);
        const fromA = state.assignments.find(a => a.woNumber === wo.woNumber && a.opSeq === depSeq);
        let lineClass = 'ok';
        if (toA && fromA) {
          if (fromA.date > toA.date) lineClass = 'violation';
          else if (fromA.date === toA.date) lineClass = 'warn';
        }
        
        // Calculate start and end points
        const x1 = fromPos.x + fromPos.w;
        const y1 = fromPos.y + fromPos.h / 2;
        const x2 = toPos.x;
        const y2 = toPos.y + toPos.h / 2;
        
        // Draw curved line
        const dx = Math.abs(x2 - x1);
        const midX = (x1 + x2) / 2;
        
        if (Math.abs(y1 - y2) < 3 && dx < 5) return; // skip if same position
        
        // Use bezier curve for nice routing
        const cpx = dx > 30 ? midX : x1 + 20;
        const path = `M${x1},${y1} C${cpx},${y1} ${cpx},${y2} ${x2},${y2}`;
        
        lines += `<path d="${path}" class="dep-line ${lineClass}" marker-end="url(#${arrowId}-${lineClass})"/>`;
      });
    });
  });
  
  svg.innerHTML = lines;
}

// Also redraw lines when scrolling the grid
document.addEventListener('scroll', () => {
  if (state.view === 'schedule' && state.showDepLines) requestAnimationFrame(() => drawDepLines());
}, true);

      <!-- Hours per day -->
      <div style="display:flex;align-items:center;gap:6px">
        <span style="font-size:10px;color:var(--text-secondary);white-space:nowrap">Hours/day:</span>
        <input id="gap-hours" type="number" min="0.5" max="24" step="0.5" placeholder="Hrs"
          style="width:60px;padding:5px 8px;background:var(--bg-base);border:1px solid var(--border);border-radius:4px;color:var(--text-primary);font-size:11px">
        <button onclick="document.querySelectorAll('.gap-day-cb').forEach(c=>c.checked=true)" style="font-size:8px;padding:2px 6px;background:var(--bg-base);border:1px solid var(--border);border-radius:3px;color:var(--text-secondary);cursor:pointer">All</button>
        <button onclick="document.querySelectorAll('.gap-day-cb').forEach(c=>c.checked=false)" style="font-size:8px;padding:2px 6px;background:var(--bg-base);border:1px solid var(--border);border-radius:3px;color:var(--text-secondary);cursor:pointer">None</button>
      </div>
      <div id="gap-emp-load" style="font-size:9px;color:var(--text-secondary)"></div>
      <button onclick="ganttPanelAddAssignMulti()" style="width:100%;padding:6px;background:var(--accent);color:#FFF;border:none;border-radius:4px;font-size:12px;font-weight:600;cursor:pointer">+ Assign</button>
      <div id="gap-assign-summary" style="font-size:9px;color:var(--text-muted);text-align:center"></div>
    </div>
  </div>
  <!-- Resource pool section (all matched craft employees + their week load) -->
  <div style="flex:1;overflow-y:auto;padding:10px 16px">
    <div style="font-size:9px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">RESOURCE POOL</div>
    <div id="gap-pool"></div>
  </div>
</div>

</body>
</html>
