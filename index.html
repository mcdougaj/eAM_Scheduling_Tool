async function runLocalScheduler(deptLabel, craftLabel) {
  state.showAI = true;
  state.aiStatus = `Running local scheduler for ${deptLabel} / ${craftLabel}...`;
  render();
  await new Promise(r => setTimeout(r, 500));

  const dates = getWeekDates();
  const newA = [];
  const tempLoad = {};
  state.employees.forEach(e => { tempLoad[e.name] = {}; dates.forEach(d => { tempLoad[e.name][d] = getEmpLoad(e.name, d); }); });

  let candidates = getUnscheduledOps();
  if (state.filterDept !== 'All') candidates = candidates.filter(op => op.department === state.filterDept);
  if (state.filterCraft !== 'All') candidates = candidates.filter(op => op.craft === state.filterCraft);

  // Topological sort: schedule ops whose dependencies are all resolved first
  const scheduled = new Set(state.assignments.map(a => `${a.woNumber}:${a.opSeq}`));
  const remaining = [...candidates];
  const sorted = [];
  let safety = 0;
  while (remaining.length > 0 && safety < 500) {
    safety++;
    let progressed = false;
    for (let i = remaining.length - 1; i >= 0; i--) {
      const op = remaining[i];
      const deps = op.dependencies || [];
      const allDepsMet = deps.every(depSeq => scheduled.has(`${op.woNumber}:${depSeq}`));
      if (allDepsMet || deps.length === 0) {
        sorted.push(op);
        remaining.splice(i, 1);
        // Mark as "will be scheduled" so downstream ops can proceed in the sort
        scheduled.add(`${op.woNumber}:${op.opSeq}`);
        progressed = true;
      }
    }
    if (!progressed) {
      // Remaining ops have unresolvable dependencies in this batch — add them last
      sorted.push(...remaining.sort((a,b) => a.priority - b.priority || a.opSeq - b.opSeq));
      break;
    }
  }

  // Sub-sort by priority within dependency-safe order
  // PM first, then by priority, maintain topo order within WO
  const woOrder = {};
  sorted.forEach((op, i) => {
    if (!(op.woNumber in woOrder)) {
      const isPM = op.isPM ? 0 : 1;
      woOrder[op.woNumber] = isPM * 100000 + op.priority * 10000 + i;
    }
  });
  sorted.sort((a,b) => {
    const wa = woOrder[a.woNumber] || 99999;
    const wb = woOrder[b.woNumber] || 99999;
    if (wa !== wb) return wa - wb;
    return a.opSeq - b.opSeq;
  });

  let depViols = 0;
  const usePoolMode = state.employees.length === 0;
  
  for (const op of sorted) {
    if (usePoolMode) {
      // ── RESOURCE POOL MODE: allocate to craft pool ──
      const earliest = dates.find(d => d >= (op.scheduledStart||dates[0])) || dates[0];
      const latest = dates.findLast(d => d <= (op.scheduledEnd||dates[dates.length-1])) || dates[dates.length-1];
      
      const deps = op.dependencies || [];
      let depEarliestDate = '';
      deps.forEach(depSeq => {
        const depA = [...newA, ...state.assignments].find(a => a.woNumber === op.woNumber && a.opSeq === depSeq);
        if (depA && depA.date > depEarliestDate) depEarliestDate = depA.date;
      });
      const constrainedEarliest = depEarliestDate > earliest ? depEarliestDate : earliest;
      
      // Track pool load per craft per day
      if (!tempLoad['__POOL:' + op.craft]) { tempLoad['__POOL:' + op.craft] = {}; dates.forEach(d => { tempLoad['__POOL:' + op.craft][d] = getResourceDayLoad(op.craft, d); }); }
      
      const cap = getResourceCapacity(op.craft);
      const dailyCap = cap.hoursPerDay || 8;
      const remain = getRemainingHours(op);
      if (remain <= 0) continue;
      
      // Find best day with most capacity
      let bestDate = null, bestAvail = -1;
      for (const date of dates) {
        if (date < constrainedEarliest || date > latest) continue;
        const load = tempLoad['__POOL:' + op.craft][date] || 0;
        const avail = dailyCap - load;
        if (avail >= remain && avail > bestAvail) { bestAvail = avail; bestDate = date; }
      }
      // Fallback: any day with space
      if (!bestDate) {
        for (const date of dates) {
          if (date < constrainedEarliest) continue;
          const load = tempLoad['__POOL:' + op.craft][date] || 0;
          if (dailyCap - load > 0) { bestDate = date; break; }
        }
      }
      if (!bestDate) bestDate = constrainedEarliest || dates[0];
      
      const a = { id: uid(), woNumber: op.woNumber, opSeq: op.opSeq, employeeName: '__POOL:' + op.craft, date: bestDate, hours: remain, status: 'Allocated' };
      newA.push(a);
      tempLoad['__POOL:' + op.craft][bestDate] = (tempLoad['__POOL:' + op.craft][bestDate] || 0) + remain;
      
    } else {
    // ── EMPLOYEE MODE (existing) ──
    const matchEmps = state.employees.filter(e => e.craft === op.craft);
    if (!matchEmps.length) continue;

    const earliest = dates.find(d => d >= op.scheduledStart) || dates[0];
    const latest = dates.findLast(d => d <= op.scheduledEnd) || dates[dates.length-1];

    // Find the latest date any dependency is scheduled — this op MUST go on or after that date
    const deps = op.dependencies || [];
    let depEarliestDate = '';
    deps.forEach(depSeq => {
      const depA = [...newA, ...state.assignments].find(a => a.woNumber === op.woNumber && a.opSeq === depSeq);
      if (depA && depA.date > depEarliestDate) depEarliestDate = depA.date;
    });
    // Hard constraint: must be on or after latest dependency date
    const constrainedEarliest = depEarliestDate > earliest ? depEarliestDate : earliest;

    let bestEmp = null, bestDate = null, bestScore = -Infinity;
    const opWords = op.description.toLowerCase().split(/\s+/);

    for (const emp of matchEmps) {
      const skillMatch = opWords.filter(w => emp.skills.toLowerCase().includes(w)).length;
      const sameDeptBonus = emp.department === op.department ? 15 : 0;
      for (const date of dates) {
        if (date < constrainedEarliest || date > latest) continue;
        const dayAvail = getEmpAvailHours(emp.name, date);
        if (dayAvail === 0) continue;
        const remaining = dayAvail - (tempLoad[emp.name][date] || 0);
        if (remaining < op.estHours) continue;
        const totalWeek = dates.reduce((s,d) => s + (tempLoad[emp.name][d]||0), 0);
        // Prefer day after dependency (not same day) for safety
        const afterDepBonus = depEarliestDate && date > depEarliestDate ? 10 : 0;
        const score = -totalWeek + skillMatch * 10 + sameDeptBonus + afterDepBonus - dates.indexOf(date);
        if (score > bestScore) { bestScore = score; bestEmp = emp; bestDate = date; }
      }
    }

    if (bestEmp && bestDate) {
      const a = { id: uid(), woNumber: op.woNumber, opSeq: op.opSeq, employeeName: bestEmp.name, date: bestDate, hours: op.estHours, status: 'Scheduled' };
      newA.push(a);
      tempLoad[bestEmp.name][bestDate] += op.estHours;
    }
    } // end employee mode
  }

  // Count violations in final assignments
  state.assignments = [...state.assignments, ...newA];
  newA.forEach(a => { if (hasDepViolation(a)) depViols++; });
  const skipped = sorted.length - newA.length;
  state.aiStatus = `Local scheduler: ${newA.length} of ${sorted.length} ops scheduled (${deptLabel} / ${craftLabel}).${skipped > 0 ? ' ' + skipped + ' could not fit.' : ''}${depViols > 0 ? ' ⚠ ' + depViols + ' dependency warnings.' : ' ✓ All dependencies respected.'} Add API key in ⚙ Settings for AI-powered scheduling.`;
  render();
  await new Promise(r => setTimeout(r, 3500));
  state.showAI = false;
  render();
}

// ─── EXPORT ───
function getExportVersion(weekStart, dept) {
  const key = 'eam-export-versions';
  let versions = {};
  try { versions = JSON.parse(localStorage.getItem(key)) || {}; } catch(e) {}
  const vKey = weekStart + '|' + dept;
  const ver = (versions[vKey] || 0) + 1;
  versions[vKey] = ver;
  try { localStorage.setItem(key, JSON.stringify(versions)); } catch(e) {}
  return ver;
}

function exportSchedule() {
  const dates = getWeekDates();
  const allOps = getAllOps();
  const wb = XLSX.utils.book_new();
  
  // Determine active dept filter
  const deptFilter = state.filterDept || 'All';
  const deptLabel = deptFilter === 'All' ? 'All_Departments' : deptFilter.replace(/\s+/g, '_');
  
  // Filter WOs by dept if active
  const exportWOs = deptFilter === 'All'
    ? state.workOrders
    : state.workOrders.filter(wo => wo.department === deptFilter);
  const exportWONums = new Set(exportWOs.map(wo => wo.woNumber));
  
  // Filter employees by dept if active
  const exportEmps = deptFilter === 'All'
    ? state.employees
    : state.employees.filter(e => e.department === deptFilter);
  
  // Version tracking — resets per week
  const version = getExportVersion(state.weekStart, deptLabel);
  
  // Build filename: [Dept]_Schedule_WK[WeekOf]_v1.xlsx
  const filename = `${deptLabel}_Schedule_WK${state.weekStart}_v${version}.xlsx`;
  
  // ── Sheet 1: Work Orders + Schedule ──
  const woHeaders = [
    'WO Number','Description','Department','Priority','WO Type','PM',
    'Asset Number','Asset Description',
    'Scheduled Start','Scheduled End','Supervisor',
    'Op Seq','Op Description','Craft/Resource','Est Hours','Depends On Op',
    'Assigned To','Assigned Date','Assigned Hours','Status'
  ];
  
  const woRows = [woHeaders];
  exportWOs.forEach(wo => {
    wo.operations.forEach(op => {
      const assignment = state.assignments.find(a => a.woNumber === wo.woNumber && a.opSeq === op.opSeq);
      woRows.push([
        wo.woNumber,
        wo.description,
        wo.department,
        wo.priority,
        wo.woType || '',
        wo.isPM ? 'Yes' : 'No',
        wo.asset || '',
        wo.assetDesc || '',
        wo.scheduledStart || '',
        wo.scheduledEnd || '',
        wo.supervisor || '',
        op.opSeq,
        op.description,
        op.craft,
        op.estHours,
        (op.dependencies || []).join(','),
        assignment ? assignment.employeeName : '',
        assignment ? assignment.date : '',
        assignment ? assignment.hours : '',
        assignment ? (assignment.status || 'Scheduled') : ''
      ]);
    });
  });
  
  const wsWO = XLSX.utils.aoa_to_sheet(woRows);
  wsWO['!cols'] = [
    {wch:14},{wch:30},{wch:16},{wch:8},{wch:10},{wch:5},
    {wch:16},{wch:26},
    {wch:14},{wch:14},{wch:18},
    {wch:8},{wch:28},{wch:16},{wch:10},{wch:14},
    {wch:22},{wch:14},{wch:12},{wch:12}
  ];
  XLSX.utils.book_append_sheet(wb, wsWO, 'Work Orders');
  
  // ── Sheet 2: Employees ──
  const empHeaders = ['Employee Name','Department','Craft/Resource','Hours Per Day','Supervisor','Skills'];
  const empRows = [empHeaders];
  exportEmps.forEach(e => {
    empRows.push([e.name, e.department, e.craft, e.hoursPerDay, e.supervisor || '', e.skills || e.email || '']);
  });
  const wsEmp = XLSX.utils.aoa_to_sheet(empRows);
  wsEmp['!cols'] = [{wch:22},{wch:16},{wch:16},{wch:12},{wch:18},{wch:28}];
  XLSX.utils.book_append_sheet(wb, wsEmp, 'Employees');
  
  // ── Sheet 3: Schedule Summary (by supervisor × day) ──
  const sumHeaders = ['Supervisor','Employee','Department','Craft',...dates.map((d,i) => DAY_ABR[i] + ' ' + fmtDate(d)),'Total Hours'];
  const sumRows = [sumHeaders];
  
  const empSchedule = {};
  state.assignments.filter(a => exportWONums.has(a.woNumber)).forEach(a => {
    if (!empSchedule[a.employeeName]) empSchedule[a.employeeName] = {};
    if (!empSchedule[a.employeeName][a.date]) empSchedule[a.employeeName][a.date] = 0;
    empSchedule[a.employeeName][a.date] += a.hours;
  });
  
  exportEmps.forEach(emp => {
    const dayHours = dates.map(d => empSchedule[emp.name]?.[d] || 0);
    const total = dayHours.reduce((s,h) => s+h, 0);
    if (total > 0) {
      sumRows.push([emp.supervisor || '', emp.name, emp.department, emp.craft, ...dayHours, total]);
    }
  });
  // Add pool (resource-level) assignments
  const poolCrafts = [...new Set(state.assignments.filter(a => isPoolAssignment(a) && exportWONums.has(a.woNumber)).map(a => getPoolCraft(a)))];
  poolCrafts.forEach(craft => {
    const dayHours = dates.map(d => empSchedule['__POOL:' + craft]?.[d] || 0);
    const total = dayHours.reduce((s,h) => s+h, 0);
    if (total > 0) {
      sumRows.push(['', craft + ' (Pool)', '', craft, ...dayHours, total]);
    }
  });
  
  const wsSum = XLSX.utils.aoa_to_sheet(sumRows);
  wsSum['!cols'] = [{wch:18},{wch:22},{wch:16},{wch:14},...dates.map(() => ({wch:12})),{wch:10}];
  XLSX.utils.book_append_sheet(wb, wsSum, 'Schedule Summary');
  
  // ── Sheet 4: Export Info ──
  const infoRows = [
    ['Export Details'],
    ['Department', deptFilter === 'All' ? 'All Departments' : deptFilter],
    ['Week Of', state.weekStart],
    ['Version', 'v' + version],
    ['Exported At', new Date().toLocaleString()],
    ['Work Orders', exportWOs.length],
    ['Operations', woRows.length - 1],
    ['Employees', exportEmps.length],
    ['Assignments', state.assignments.filter(a => exportWONums.has(a.woNumber)).length],
  ];
  const wsInfo = XLSX.utils.aoa_to_sheet(infoRows);
  wsInfo['!cols'] = [{wch:16},{wch:30}];
  XLSX.utils.book_append_sheet(wb, wsInfo, 'Export Info');
  
  XLSX.writeFile(wb, filename);
}

// ─── DRAG & DROP ───
// Supports two drag types:
//   1. Backlog op → calendar cell (new assignment)
//   2. Assigned op on calendar → different cell (move assignment)
let dragData = null;    // { type: 'backlog', op } or { type: 'assigned', assignmentId, op }

function onDragStartBacklog(e, op) {
  dragData = { type: 'backlog', op };
  e.dataTransfer.effectAllowed = 'move';
  e.target.classList.add('dragging');
}

function onDragStartAssigned(e, assignmentId) {
  const a = state.assignments.find(x => x.id === assignmentId);
  if (!a) return;
  const op = getAllOps().find(o => o.woNumber === a.woNumber && o.opSeq === a.opSeq);
  if (!op) return;
  dragData = { type: 'assigned', assignmentId, op, sourceEmp: a.employeeName, sourceDate: a.date };
  e.dataTransfer.effectAllowed = 'move';
  // Slight delay so the drag image captures before we style it
  setTimeout(() => { e.target.classList.add('dragging'); }, 0);
}

function onDragEnd(e) {
  dragData = null;
  e.target.classList.remove('dragging');
  // Clean up any lingering drag-over states
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
}

function onDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; e.currentTarget.classList.add('drag-over'); }
function onDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }

function onDragStartResourceWO(e, woNumber, craft, sourceDate) {
  dragData = { type: 'resourceWO', woNumber, craft, sourceDate };
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => { e.target.classList.add('dragging'); }, 0);
}

function moveResourceWO(woNumber, craft, sourceDate, direction) {
  // direction: -1 = prev day, +1 = next day, -7 = prev week, +7 = next week
  const src = new Date(sourceDate + 'T00:00:00');
  src.setDate(src.getDate() + direction);
  const newDate = src.toISOString().split('T')[0];
  
  // Move all assignments for this WO+craft on sourceDate
  const toMove = state.assignments.filter(a => {
    if (a.woNumber !== woNumber || a.date !== sourceDate) return false;
    const op = getAllOps().find(o => o.woNumber === a.woNumber && o.opSeq === a.opSeq);
    return op && op.craft === craft;
  });
  
  if (toMove.length === 0) return;
  toMove.forEach(a => { a.date = newDate; });
  
  // If the new date is outside the current week, navigate to that week
  const dates = getWeekDates();
  if (newDate < dates[0] || newDate > dates[dates.length - 1]) {
    setWeekStart(newDate);
  } else {
    render();
  }
}

function onDrop(e, date, empName, craftPool) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (!dragData) return;

  // ── Move resource WO card to a different day ──
  if (dragData.type === 'resourceWO') {
    const { woNumber, craft, sourceDate } = dragData;
    if (date === sourceDate) { dragData = null; return; } // same day, no-op
    
    // Find all assignments for this WO+craft on the source date
    const toMove = state.assignments.filter(a => {
      if (a.woNumber !== woNumber || a.date !== sourceDate) return false;
      const op = getAllOps().find(o => o.woNumber === a.woNumber && o.opSeq === a.opSeq);
      return op && op.craft === (craftPool || craft);
    });
    
    if (toMove.length === 0) { dragData = null; return; }
    
    // Move all to the new date
    toMove.forEach(a => { a.date = date; });
    dragData = null;
    render();
    return;
  }

  const op = dragData.op;

  // Resource pool drop (By Resource view)
  if (craftPool && !empName) {
    if (dragData.type === 'backlog') {
      // Get ALL unscheduled ops for this WO that match the craft pool
      const woNum = op.woNumber;
      const wo = state.workOrders.find(w => w.woNumber === woNum);
      if (!wo) { dragData = null; return; }
      
      const woOps = wo.operations.filter(o => o.craft === craftPool && !isFullyScheduled(o.woNumber, o.opSeq));
      
      if (woOps.length === 0) {
        alert(`No unscheduled ${craftPool} ops on ${woNum}`);
        dragData = null;
        return;
      }
      
      // Date window check (ask once for the WO, not per op)
      const ow = wo.scheduledStart && date < wo.scheduledStart.slice(0,10) || wo.scheduledEnd && date > wo.scheduledEnd.slice(0,10);
      if (ow) {
        const parseUTC = s => { const p = s.split('-'); return new Date(Date.UTC(+p[0], +p[1]-1, +p[2])); };
        let msg = '';
        if (wo.scheduledStart && date < wo.scheduledStart.slice(0,10)) {
          const diff = Math.round((parseUTC(wo.scheduledStart) - parseUTC(date)) / 86400000);
          msg = `${woNum} is scheduled to start ${fmtDate(wo.scheduledStart)} but you're allocating to ${fmtDate(date)} (${diff} day${diff!==1?'s':''} early).`;
        } else {
          const diff = Math.round((parseUTC(date) - parseUTC(wo.scheduledEnd)) / 86400000);
          msg = `${woNum} is due by ${fmtDate(wo.scheduledEnd)} but you're allocating to ${fmtDate(date)} (${diff} day${diff!==1?'s':''} past due).`;
        }
        if (!confirm(`⚠ Outside Date Window\n\n${msg}\n\nAllocate ${woOps.length} ${craftPool} ops (${woOps.reduce((s,o)=>s+getRemainingHours(o),0)}h) anyway?`)) {
          dragData = null;
          return;
        }
      }
      
      // Allocate all matching craft ops
      woOps.forEach(woOp => {
        const remain = getRemainingHours(woOp);
        if (remain > 0) {
          addPoolAssignment(woOp.woNumber, woOp.opSeq, craftPool, date, remain, true);
        }
      });
      render();
    }
    dragData = null;
    return;
  }

  // If no employee specified (dept/priority view), open assign modal with date pre-selected
  if (!empName) {
    if (dragData.type === 'backlog') {
      showAssignModal(op, date);
    }
    dragData = null;
    return;
  }

  const emp = state.employees.find(x => x.name === empName);
  if (!emp) return;

  // Craft match check
  if (emp.craft !== op.craft) {
    alert(`Craft mismatch: ${op.craft} operation cannot be assigned to ${emp.name} (${emp.craft})`);
    dragData = null;
    return;
  }

  if (dragData.type === 'backlog') {
    // Date window check
    if (!checkDateWindow(op.woNumber, date)) {
      dragData = null;
      return;
    }
    // New assignment from backlog
    const load = getEmpLoad(empName, date);
    const avail = getEmpAvailHours(empName, date);
    if (avail === 0) {
      const reason = getEmpAvailReason(empName, date);
      alert(`${empName} is unavailable on ${fmtDate(date)}${reason ? ' (' + reason + ')' : ''}`);
      dragData = null;
      return;
    }
    if (load + op.estHours > avail) {
      // If there's remaining capacity, offer to assign what fits
      const canFit = Math.max(0, avail - load);
      const remain = getRemainingHours(op);
      const assignHrs = Math.min(remain > 0 ? remain : op.estHours, canFit);
      if (assignHrs >= 0.5) {
        if (confirm(`${empName} has ${canFit.toFixed(1)}h available. Assign ${assignHrs}h of this ${op.estHours}h op?`)) {
          addAssignment(op.woNumber, op.opSeq, empName, date, assignHrs);
        }
      } else {
        alert(`${empName} only has ${canFit.toFixed(1)}h available on ${fmtDate(date)}${avail < emp.hoursPerDay ? ' (reduced)' : ''}`);
      }
      dragData = null;
      return;
    }
    const remain = getRemainingHours(op);
    addAssignment(op.woNumber, op.opSeq, empName, date, remain > 0 ? remain : op.estHours);

  } else if (dragData.type === 'assigned') {
    // Moving existing assignment
    const a = state.assignments.find(x => x.id === dragData.assignmentId);
    if (!a) { dragData = null; return; }

    // Skip if dropped on same cell
    if (a.date === date && a.employeeName === empName) { dragData = null; return; }

    // Date window check on new date
    if (a.date !== date && !checkDateWindow(a.woNumber, date)) {
      dragData = null;
      return;
    }

    // Check availability on target
    const targetAvail = getEmpAvailHours(empName, date);
    if (targetAvail === 0) {
      const reason = getEmpAvailReason(empName, date);
      alert(`${empName} is unavailable on ${fmtDate(date)}${reason ? ' (' + reason + ')' : ''}`);
      dragData = null;
      return;
    }

    // Check capacity on target cell
    const targetLoad = getEmpLoad(empName, date) - (a.employeeName === empName && a.date === date ? a.hours : 0);
    if (targetLoad + a.hours > targetAvail) {
      alert(`${empName} only has ${(targetAvail - getEmpLoad(empName, date)).toFixed(1)}h available on ${fmtDate(date)}${targetAvail < emp.hoursPerDay ? ' (reduced)' : ''}`);
      dragData = null;
      return;
    }

    // Update the assignment in place
    a.date = date;
    a.employeeName = empName;
    render();
  }

  dragData = null;
}

// ─── MODAL ───
function showAssignModal(op, preDate) {
  const dates = getWeekDates();
  const matchEmps = state.employees.filter(e => e.craft === op.craft);
  const wo = state.workOrders.find(w => w.woNumber === op.woNumber);
  const woOps = wo ? wo.operations : [];
  const priorOps = woOps.filter(o => o.opSeq < op.opSeq);
  const currentDeps = op.dependencies || [];
  const depSt = getDepStatus(op.woNumber, op.opSeq);

  const existingAssignments = state.assignments.filter(a => a.woNumber === op.woNumber && a.opSeq === op.opSeq);
  const assignedH = existingAssignments.reduce((s, a) => s + a.hours, 0);
  const remainH = Math.max(0, op.estHours - assignedH);

  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.onclick = e => { if (e.target === modal) modal.remove(); };

  const empOpts = matchEmps.map(e => `<option value="${e.name}">${e.name} [${e.department}] (${getEmpWeekLoad(e.name).toFixed(1)}/${getEmpWeekAvail(e.name)}h)</option>`).join('');
  const dateOpts = dates.map((d,i) => {
    const ow = wo && ((wo.scheduledStart && d < wo.scheduledStart) || (wo.scheduledEnd && d > wo.scheduledEnd));
    return `<option value="${d}" ${preDate === d ? 'selected' : ''}>${DAY_ABR[i]} ${fmtDate(d)}${ow ? ' \u26a0' : ''}</option>`;
  }).join('');

  // Existing assignments display
  let existHtml = '';
  if (existingAssignments.length > 0) {
    existHtml = `<div style="margin-bottom:12px">
      <div style="font-size:10px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">Current Assignments (${assignedH}/${op.estHours}h)</div>
      ${existingAssignments.map(a => `<div style="display:flex;align-items:center;gap:8px;padding:5px 8px;background:var(--bg-base);border-radius:4px;font-size:10px;margin-bottom:3px">
        <span style="flex:1;color:var(--text-primary);font-weight:600">${a.employeeName}</span>
        <span style="color:var(--text-secondary)">${fmtDate(a.date)}</span>
        <span style="color:var(--accent);font-weight:600">${a.hours}h</span>
        <button style="background:none;border:none;color:#DC354588;cursor:pointer;font-size:12px;padding:2px" onclick="removeAssignment('${a.id}');this.closest('.modal-overlay').remove();showAssignModal(getAllOps().find(o=>o.woNumber==='${op.woNumber}'&&o.opSeq===${op.opSeq}))">x</button>
      </div>`).join('')}
      <div style="margin-top:6px;height:4px;background:var(--cap-bar-bg);border-radius:2px;overflow:hidden">
        <div style="height:100%;width:${Math.min(100,(assignedH/op.estHours)*100)}%;background:${assignedH>=op.estHours?'#28A745':'#F0AD4E'};border-radius:2px"></div>
      </div>
      <div style="font-size:9px;color:var(--text-muted);margin-top:3px">${remainH > 0 ? remainH + 'h remaining' : 'Fully assigned'}</div>
    </div>`;
  }

  // Dependency section (collapsible)
  let depHtml = '';
  if (priorOps.length > 0) {
    depHtml = `<details style="margin-bottom:10px">
      <summary style="font-size:10px;font-weight:600;color:var(--text-secondary);cursor:pointer;padding:4px 0">Dependencies (${currentDeps.length} of ${priorOps.length})</summary>
      <div style="background:var(--bg-base);border:1px solid var(--border);border-radius:4px;padding:6px 8px;margin-top:4px;max-height:100px;overflow-y:auto">
        ${priorOps.map(po => {
          const isChecked = currentDeps.includes(po.opSeq);
          const depA = state.assignments.find(a => a.woNumber === op.woNumber && a.opSeq === po.opSeq);
          const stIcon = depA ? (depA.status === 'Complete' ? '\u2713' : fmtDate(depA.date)) : '\u2717';
          const stColor = depA ? (depA.status === 'Complete' ? '#28A745' : '#007BFF') : '#DC3545';

            <input type="checkbox" class="dep-check" data-opseq="${po.opSeq}" ${isChecked ? 'checked' : ''} style="accent-color:var(--accent)">
            <span>Op ${po.opSeq}: ${po.description}</span>
            <span style="margin-left:auto;font-size:9px;color:${stColor}">${stIcon}</span>
          </label>`;
        }).join('')}
      </div>
    </details>`;
  }

  // Row template builder
  const rowHtml = (empVal, dateVal, hrsVal, showRemove) => `
    <div class="split-row" style="display:grid;grid-template-columns:1fr 105px 58px 24px;gap:5px;align-items:center">
      <select class="form-input sr-emp" style="font-size:10px;padding:4px 6px"><option value="">Employee...</option>${empOpts}</select>
      <select class="form-input sr-date" style="font-size:10px;padding:4px 6px"><option value="">Day...</option>${dateOpts}</select>
      <input type="number" class="form-input sr-hrs" style="font-size:10px;padding:4px 6px;text-align:center" value="${hrsVal}" min="0.5" max="16" step="0.5" placeholder="hrs">
      ${showRemove ? `<button style="background:none;border:none;color:#DC354566;cursor:pointer;font-size:13px;padding:0" onclick="this.parentElement.remove();updateSplitTotal()">\u00d7</button>` : '<span></span>'}
    </div>`;

  modal.innerHTML = `
    <div class="modal" style="min-width:560px;max-width:640px;max-height:90vh;overflow-y:auto">
      <div class="modal-title" style="margin-bottom:2px">Assign Operation</div>
      <div class="modal-sub">${op.woNumber} \u2022 Op ${op.opSeq}: ${op.description}</div>
      <div class="modal-meta" style="margin-bottom:12px">${op.department} \u2022 ${op.craft} \u2022 ${op.estHours}h est \u2022 ${op.asset}${wo && wo.scheduledStart ? ' \u2022 Window: '+fmtDate(wo.scheduledStart)+'\u2013'+fmtDate(wo.scheduledEnd) : ''}</div>

      ${existHtml}
      ${depHtml}

      <!-- Quick Split Actions -->
      ${remainH > 0 && matchEmps.length > 0 ? `
      <div style="margin-bottom:12px;padding:10px;background:var(--bg-base);border:1px solid var(--border);border-radius:6px">
        <div style="font-size:10px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">\u26a1 Quick Split \u2014 ${remainH}h to assign</div>
        <div style="display:flex;flex-wrap:wrap;gap:5px">
          <button class="btn-outline" style="font-size:9px;padding:4px 8px" onclick="splitAcrossDays()">
            \ud83d\udcc5 1 person \u00d7 multiple days
          </button>
          <button class="btn-outline" style="font-size:9px;padding:4px 8px" onclick="splitAcrossPeople()">
            \ud83d\udc65 Multiple people \u00d7 1 day
          </button>
          <button class="btn-outline" style="font-size:9px;padding:4px 8px" onclick="evenSplit()">
            \u2b50 People \u00d7 days grid
          </button>
        </div>
      </div>` : ''}

      <!-- Assignment Rows -->
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <div style="font-size:10px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.5px">${existingAssignments.length > 0 ? 'Add Assignments' : 'Assignments'}</div>
        <div style="display:flex;gap:4px;font-size:9px;color:var(--text-muted)">
          <span style="font-weight:600">Employee</span>
          <span>\u2022</span>
          <span style="font-weight:600">Day</span>
          <span>\u2022</span>
          <span style="font-weight:600">Hours</span>
        </div>
      </div>
      <div id="split-rows" style="display:flex;flex-direction:column;gap:5px">
        ${rowHtml('', '', remainH > 0 ? Math.min(remainH, 8) : op.estHours, false)}
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
        <button class="btn-outline" style="font-size:9px;padding:3px 8px" onclick="addSplitRow()">+ Add Row</button>
        <div id="split-total" style="font-size:10px;color:var(--text-secondary)"></div>
      </div>

      <div class="form-actions" style="margin-top:14px">
        <button class="btn-outline" onclick="this.closest('.modal-overlay').remove()">Close</button>
        <button class="btn" id="m-assign-all">Assign All</button>
      </div>
    </div>`;
  document.body.appendChild(modal);

  // ─── Helper: create a row DOM element ───
  function makeRow(empVal, dateVal, hrsVal) {
    const row = document.createElement('div');
    row.className = 'split-row';
    row.style.cssText = 'display:grid;grid-template-columns:1fr 105px 58px 24px;gap:5px;align-items:center';
    row.innerHTML = `
      <select class="form-input sr-emp" style="font-size:10px;padding:4px 6px"><option value="">Employee...</option>${empOpts}</select>
      <select class="form-input sr-date" style="font-size:10px;padding:4px 6px"><option value="">Day...</option>${dateOpts}</select>
      <input type="number" class="form-input sr-hrs" style="font-size:10px;padding:4px 6px;text-align:center" value="${hrsVal || ''}" min="0.5" max="16" step="0.5" placeholder="hrs">
      <button style="background:none;border:none;color:#DC354566;cursor:pointer;font-size:13px;padding:0" onclick="this.parentElement.remove();updateSplitTotal()">\u00d7</button>`;
    if (empVal) row.querySelector('.sr-emp').value = empVal;
    if (dateVal) row.querySelector('.sr-date').value = dateVal;
    return row;
  }

  // ─── Split functions ───
  window.addSplitRow = function() {
    document.getElementById('split-rows').appendChild(makeRow('', '', ''));
    updateSplitTotal();
  };

  window.splitAcrossDays = function() {
    const container = document.getElementById('split-rows');
    container.innerHTML = '';
    // Pick days within WO window, or all weekdays
    const validDates = dates.filter(d => {
      if (wo && wo.scheduledStart && d < wo.scheduledStart) return false;
      if (wo && wo.scheduledEnd && d > wo.scheduledEnd) return false;
      return true;
    });
    const useDates = validDates.length > 0 ? validDates : dates.slice(0, 5);
    const perDay = Math.round(remainH / useDates.length * 2) / 2 || 0.5;
    let left = remainH;
    useDates.forEach(d => {
      if (left <= 0) return;
      const h = Math.min(perDay, left, 8);
      left = Math.round((left - h) * 10) / 10;
      container.appendChild(makeRow('', d, h));
    });
    // If rounding left a remainder, add to last row
    if (left > 0) {
      const lastHrs = container.lastChild?.querySelector('.sr-hrs');
      if (lastHrs) lastHrs.value = parseFloat(lastHrs.value) + left;
    }
    updateSplitTotal();
  };

  window.splitAcrossPeople = function() {
    const container = document.getElementById('split-rows');
    container.innerHTML = '';
    const numP = Math.min(matchEmps.length, Math.max(2, Math.ceil(remainH / 4)));
    const perP = Math.round(remainH / numP * 2) / 2 || 0.5;
    let left = remainH;
    for (let i = 0; i < numP && left > 0; i++) {
      const h = Math.min(perP, left, 8);
      left = Math.round((left - h) * 10) / 10;
      container.appendChild(makeRow(matchEmps[i]?.name || '', '', h));
    }
    if (left > 0) {
      const lastHrs = container.lastChild?.querySelector('.sr-hrs');
      if (lastHrs) lastHrs.value = parseFloat(lastHrs.value) + left;
    }
    updateSplitTotal();
  };

  window.evenSplit = function() {
    const container = document.getElementById('split-rows');
    container.innerHTML = '';
    const numP = Math.min(matchEmps.length, 2);
    const validDates = dates.filter(d => {
      if (wo && wo.scheduledStart && d < wo.scheduledStart) return false;
      if (wo && wo.scheduledEnd && d > wo.scheduledEnd) return false;
      return true;
    });
    const useDates = validDates.length > 0 ? validDates.slice(0, 3) : dates.slice(0, 3);
    const slots = numP * useDates.length;
    const perSlot = Math.round(remainH / slots * 2) / 2 || 0.5;
    let left = remainH;
    for (let p = 0; p < numP && left > 0; p++) {
      for (let di = 0; di < useDates.length && left > 0; di++) {
        const h = Math.min(perSlot, left, 8);
        left = Math.round((left - h) * 10) / 10;
        container.appendChild(makeRow(matchEmps[p]?.name || '', useDates[di], h));
      }
    }
    if (left > 0) {
      const lastHrs = container.lastChild?.querySelector('.sr-hrs');
      if (lastHrs) lastHrs.value = parseFloat(lastHrs.value) + left;
    }
    updateSplitTotal();
  };

  window.updateSplitTotal = function() {
    const rows = document.querySelectorAll('#split-rows .split-row');
    let total = 0;
    rows.forEach(r => { total += parseFloat(r.querySelector('.sr-hrs')?.value) || 0; });
    const el = document.getElementById('split-total');
    if (el) {
      const grandTotal = Math.round((assignedH + total) * 10) / 10;
      const color = grandTotal > op.estHours ? '#DC3545' : grandTotal >= op.estHours ? '#28A745' : '#F0AD4E';
      el.innerHTML = `<span style="color:${color};font-weight:600">${total}h in rows</span> \u00b7 ${grandTotal}/${op.estHours}h total`;
    }
  };

  // Wire up hours input changes
  modal.addEventListener('input', e => { if (e.target.classList.contains('sr-hrs')) updateSplitTotal(); });
  updateSplitTotal();

  // Set initial row values after DOM is ready
  const firstRow = modal.querySelector('.split-row');
  if (firstRow && preDate) {
    firstRow.querySelector('.sr-date').value = preDate;
  }

  // ─── Assign All ───
  document.getElementById('m-assign-all').onclick = () => {
    // Save dependency edits
    const depChecks = modal.querySelectorAll('.dep-check');
    if (depChecks.length > 0) {
      const newDeps = [];
      depChecks.forEach(cb => { if (cb.checked) newDeps.push(parseInt(cb.dataset.opseq)); });
      if (wo) {
        const woOp = wo.operations.find(o => o.opSeq === op.opSeq);
        if (woOp) woOp.dependencies = newDeps;
      }
    }

    // Collect and validate all rows
    const rows = document.querySelectorAll('#split-rows .split-row');
    const assignments = [];
    let errors = [];
    rows.forEach((r, i) => {
      const emp = r.querySelector('.sr-emp')?.value;
      const date = r.querySelector('.sr-date')?.value;
      const hrs = parseFloat(r.querySelector('.sr-hrs')?.value);
      if (!emp && !date && (!hrs || isNaN(hrs))) return; // skip fully empty rows
      if (!emp) { errors.push(`Row ${i+1}: pick an employee`); r.querySelector('.sr-emp').style.borderColor='#DC3545'; return; }
      if (!date) { errors.push(`Row ${i+1}: pick a day`); r.querySelector('.sr-date').style.borderColor='#DC3545'; return; }
      if (!hrs || hrs <= 0) { errors.push(`Row ${i+1}: enter hours`); r.querySelector('.sr-hrs').style.borderColor='#DC3545'; return; }
      assignments.push({ emp, date, hrs });
    });

    if (assignments.length === 0) {
      if (errors.length > 0) alert(errors.join('\n'));
      return;
    }

    // Date window checks
    for (const a of assignments) {
      if (!checkDateWindow(op.woNumber, a.date)) return;
    }

    // All good — create assignments
    assignments.forEach(a => {
      addAssignment(op.woNumber, op.opSeq, a.emp, a.date, a.hrs);
    });
    modal.remove();
  };
}


function showAvailModal(empName) {
  const emp = state.employees.find(e => e.name === empName);
  if (!emp) return;
  const dates = getWeekDates();
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.onclick = e => { if (e.target === modal) modal.remove(); };

  const dayRows = dates.map((d, i) => {
    const avail = getEmpAvailHours(empName, d);
    const reason = getEmpAvailReason(empName, d);
    const load = getEmpLoad(empName, d);
    const hasOverride = state.availability[empName + '|' + d] !== undefined;
    const isOff = avail === 0 && hasOverride;
    return `<tr style="${isOff ? 'background:#DC354510' : avail < emp.hoursPerDay && hasOverride ? 'background:#F0AD4E10' : ''}">
      <td style="font-weight:600;padding:6px 8px">${DAYS[i]}<br><span style="font-size:9px;color:var(--text-secondary);font-weight:400">${fmtDate(d)}</span></td>
      <td style="padding:6px 4px;text-align:center">
        <select class="form-input" style="width:90px;padding:4px;font-size:11px" data-date="${d}" data-field="hours" onchange="this.closest('tr').querySelector('[data-field=reason]').style.display = this.value < ${emp.hoursPerDay} ? '' : 'none'">
          <option value="${emp.hoursPerDay}" ${!hasOverride ? 'selected' : ''}>Full (${emp.hoursPerDay}h)</option>
          <option value="${emp.hoursPerDay/2}" ${avail === emp.hoursPerDay/2 && hasOverride ? 'selected' : ''}>Half (${emp.hoursPerDay/2}h)</option>
          <option value="0" ${isOff ? 'selected' : ''}>Off (0h)</option>
          <option value="custom" ${hasOverride && avail !== emp.hoursPerDay && avail !== emp.hoursPerDay/2 && avail !== 0 ? 'selected' : ''}>Custom</option>
        </select>
        <input type="number" class="form-input" style="width:50px;padding:4px;font-size:11px;margin-left:4px;display:${hasOverride && avail !== emp.hoursPerDay && avail !== emp.hoursPerDay/2 && avail !== 0 ? '' : 'none'}" data-date="${d}" data-field="custom-hours" value="${avail}" min="0" max="16" step="0.5">
      </td>
      <td style="padding:6px 4px">
        <input type="text" class="form-input" style="width:120px;padding:4px;font-size:11px;display:${hasOverride ? '' : 'none'}" data-date="${d}" data-field="reason" value="${reason}" placeholder="Reason...">
      </td>
      <td style="padding:6px 4px;text-align:center;font-size:10px;color:var(--text-secondary)">${load > 0 ? load.toFixed(1) + 'h sched' : '—'}</td>
    </tr>`;
  }).join('');

  modal.innerHTML = `
    <div class="modal" style="min-width:560px">
      <div class="modal-title">Employee Availability</div>
      <div class="modal-sub">${empName} • ${emp.craft} • ${emp.department}</div>
      <div class="modal-meta">Default: ${emp.hoursPerDay}h/day • Week of ${fmtDate(dates[0])}</div>
      <div style="display:flex;gap:6px;margin:10px 0">
        <button class="btn-outline" style="font-size:10px;padding:4px 10px" onclick="this.closest('.modal').querySelectorAll('select[data-field=hours]').forEach(s=>{s.value='0';s.dispatchEvent(new Event('change'))});this.closest('.modal').querySelectorAll('input[data-field=reason]').forEach(r=>{r.style.display='';r.value='Vacation'})">🏖 Full Week Off</button>
        <button class="btn-outline" style="font-size:10px;padding:4px 10px" onclick="this.closest('.modal').querySelectorAll('select[data-field=hours]').forEach(s=>{s.value='${emp.hoursPerDay}';s.dispatchEvent(new Event('change'))});this.closest('.modal').querySelectorAll('input[data-field=reason]').forEach(r=>{r.style.display='none';r.value=''})">↺ Reset All</button>
      </div>
      <table style="width:100%;border-collapse:collapse">
        <thead><tr style="border-bottom:1px solid var(--border)">
          <th style="text-align:left;padding:4px 8px;font-size:10px;color:var(--text-secondary)">Day</th>
          <th style="text-align:center;padding:4px;font-size:10px;color:var(--text-secondary)">Hours</th>
          <th style="padding:4px;font-size:10px;color:var(--text-secondary)">Reason</th>
          <th style="text-align:center;padding:4px;font-size:10px;color:var(--text-secondary)">Load</th>
        </tr></thead>
        <tbody>${dayRows}</tbody>
      </table>
      <div class="form-actions" style="margin-top:12px">
        <button class="btn-outline" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
        <button class="btn" id="avail-save">Save Availability</button>
      </div>
    </div>`;
  document.body.appendChild(modal);

  document.getElementById('avail-save').onclick = () => {
    dates.forEach(d => {
      const row = modal.querySelector('select[data-date="' + d + '"]');
      if (!row) return;
      const sel = row.value;
      const customInput = modal.querySelector('input[data-field="custom-hours"][data-date="' + d + '"]');
      const reasonInput = modal.querySelector('input[data-field="reason"][data-date="' + d + '"]');
      const reason = reasonInput ? reasonInput.value.trim() : '';
      
      let hours;
      if (sel === 'custom') {
        hours = parseFloat(customInput?.value) || 0;
      } else {
        hours = parseFloat(sel);
      }
      
      if (hours === emp.hoursPerDay && !reason) {
        // Full day = remove override
        delete state.availability[empName + '|' + d];
      } else {
        state.availability[empName + '|' + d] = { hours, reason };
      }
    });
    saveAvailability();
    modal.remove();
    render();
  };
}

        <select class="filter-select" onchange="state.filterWOType=this.value;render()">
          <option value="All" ${(state.filterWOType||'All')==='All'?'selected':''}>All Types</option>
          <option value="PM" ${state.filterWOType==='PM'?'selected':''}>PM Only</option>
          <option value="CM" ${state.filterWOType==='CM'?'selected':''}>CM Only</option>
        </select>
      </div>
      ${(state.filterDept !== 'All' || state.filterCraft !== 'All' || state.filterEmployee !== 'All' || state.filterSupervisor !== 'All' || (state.filterWOType && state.filterWOType !== 'All')) ? `
        <button class="filter-reset" onclick="state.filterDept='All';state.filterCraft='All';state.filterEmployee='All';state.filterSupervisor='All';state.filterWOType='All';render()">✕ Clear Filters</button>
        <div style="display:flex;gap:3px;flex-wrap:wrap">
          ${state.filterDept !== 'All' ? `<button class="filter-active" onclick="state.filterDept='All';render()">${state.filterDept} ✕</button>` : ''}
          ${state.filterCraft !== 'All' ? `<button class="filter-active" onclick="state.filterCraft='All';render()">${state.filterCraft} ✕</button>` : ''}
          ${state.filterEmployee !== 'All' ? `<button class="filter-active" onclick="state.filterEmployee='All';render()">${state.filterEmployee} ✕</button>` : ''}
          ${state.filterSupervisor !== 'All' ? `<button class="filter-active" onclick="state.filterSupervisor='All';render()">${state.filterSupervisor} ✕</button>` : ''}
          ${state.filterWOType && state.filterWOType !== 'All' ? `<button class="filter-active" onclick="state.filterWOType='All';render()">${state.filterWOType} ✕</button>` : ''}
        </div>` : ''}
    </div>
    <div style="flex:1"></div>
  </div>`}`;

  // ─── KPI DASHBOARD BAR (filter-aware) ───
  if (state.view !== 'oracle') {
  const hasFilters = state.filterDept !== 'All' || state.filterCraft !== 'All' || state.filterEmployee !== 'All' || state.filterSupervisor !== 'All';
  
  // Filtered employee set
  const kpiEmps = state.employees.filter(e => {
    if (state.filterDept !== 'All' && e.department !== state.filterDept) return false;
    if (state.filterCraft !== 'All' && e.craft !== state.filterCraft) return false;
    if (state.filterEmployee !== 'All' && e.name !== state.filterEmployee) return false;
    if (state.filterSupervisor !== 'All' && e.supervisor !== state.filterSupervisor) return false;
    return true;
  });
  const kpiEmpNames = new Set(kpiEmps.map(e => e.name));

  // Filtered WOs
  const kpiWOs = state.workOrders.filter(wo => {
    if (state.filterDept !== 'All' && wo.department !== state.filterDept) return false;
    if (state.filterSupervisor !== 'All' && wo.supervisor !== state.filterSupervisor) return false;
    if (state.filterWOType === 'PM' && !wo.isPM) return false;
    if (state.filterWOType === 'CM' && wo.isPM) return false;
    return true;
  });

  // Filtered assignments (by employee filter AND current week)
  const kpiDateSet = new Set(dates);
  const kpiAssignments = state.assignments.filter(a => kpiDateSet.has(a.date) && (kpiEmpNames.has(a.employeeName) || isPoolAssignment(a)));

  // Filtered unscheduled ops
  const kpiUnscheduled = unscheduled.filter(op => {
    if (state.filterDept !== 'All' && op.department !== state.filterDept) return false;
    if (state.filterCraft !== 'All' && op.craft !== state.filterCraft) return false;
    if (state.filterSupervisor !== 'All' && op.supervisor !== state.filterSupervisor) return false;
    if (state.filterWOType === 'PM' && !op.isPM) return false;
    if (state.filterWOType === 'CM' && op.isPM) return false;
    return true;
  });

  const totalAvailHrs = kpiEmps.reduce((s,e) => s + getEmpWeekAvail(e.name), 0);
  const totalSchedHrs = kpiAssignments.reduce((s,a) => s + a.hours, 0);
  const totalBacklogHrs = kpiUnscheduled.reduce((s,op) => s + getRemainingHours(op), 0);
  const kpiAllOps = getAllOps().filter(op => {
    if (state.filterDept !== 'All' && op.department !== state.filterDept) return false;
    if (state.filterCraft !== 'All' && op.craft !== state.filterCraft) return false;
    if (state.filterSupervisor !== 'All' && op.supervisor !== state.filterSupervisor) return false;
    if (state.filterWOType === 'PM' && !op.isPM) return false;
    if (state.filterWOType === 'CM' && op.isPM) return false;
    return true;
  });
  const kpiCompletedCount = kpiAssignments.filter(a => a.status === 'Complete').length;
  const overallUtil = totalAvailHrs > 0 ? (totalSchedHrs / totalAvailHrs * 100) : 0;
  const utilClass = v => v > 95 ? 'danger' : v > 75 ? 'warn' : v > 0 ? 'ok' : 'neutral';
  const utilColor = v => v > 95 ? '#DC3545' : v > 75 ? '#F0AD4E' : '#28A745';

  // Compliance (filtered WOs)
  let onTrack = 0, atRisk = 0, overdue = 0;
  kpiWOs.forEach(wo => {
    const ops = wo.operations.filter(op => state.filterCraft === 'All' || op.craft === state.filterCraft);
    if (!ops.length) return;
    const allSched = ops.every(op => isFullyScheduled(wo.woNumber, op.opSeq));
    const anySched = ops.some(op => state.assignments.some(a => a.woNumber === wo.woNumber && a.opSeq === op.opSeq));
    const lastDate = state.assignments.filter(a => a.woNumber === wo.woNumber).reduce((m,a) => a.date > m ? a.date : m, '');
    if (allSched && lastDate <= wo.scheduledEnd) onTrack++;
    else if (lastDate > wo.scheduledEnd) overdue++;
    else if (anySched && !allSched) atRisk++;
    else if (!anySched) atRisk++;
  });

  const filterScope = hasFilters ? `<span style="font-size:8px;color:var(--accent);font-weight:400;margin-left:4px">(filtered)</span>` : '';

  html += `
  <div class="kpi-bar" style="${state.showKPIs ? '' : 'display:none'}">
    <!-- HOURS -->
    <div class="kpi-group">
      <div class="kpi-group-title"><span class="kpi-icon">📊</span> HOURS ${filterScope}
        <button class="kpi-toggle" onclick="state.showKPIs=false;render()">▲ hide</button>
      </div>
      <div class="kpi-row">
        <div class="kpi-item">
          <div class="kpi-label">Available</div>
          <div class="kpi-value neutral">${totalAvailHrs}</div>
          <div class="kpi-sub">${kpiEmps.length} emp × 6d</div>
        </div>
        <div class="kpi-item">
          <div class="kpi-label">Scheduled</div>
          <div class="kpi-value accent">${totalSchedHrs.toFixed(0)}</div>
          <div class="kpi-sub">${kpiAssignments.length} ops</div>
        </div>
        <div class="kpi-item">
          <div class="kpi-label">Remaining</div>
          <div class="kpi-value ${totalAvailHrs - totalSchedHrs < totalBacklogHrs ? 'warn' : 'ok'}">${(totalAvailHrs - totalSchedHrs).toFixed(0)}</div>
        </div>
        <div class="kpi-item">
          <div class="kpi-label">Backlog</div>
          <div class="kpi-value ${totalBacklogHrs > 0 ? 'warn' : 'ok'}">${totalBacklogHrs.toFixed(0)}</div>
          <div class="kpi-sub">${kpiUnscheduled.length} ops</div>
        </div>
      </div>
    </div>

    <!-- UTILIZATION -->
    <div class="kpi-group">
      <div class="kpi-group-title"><span class="kpi-icon">⚡</span> UTILIZATION</div>
      <div class="kpi-row">
        <div class="kpi-item">
          <div class="kpi-label">Overall</div>
          <div class="kpi-value ${utilClass(overallUtil)}">${overallUtil.toFixed(0)}%</div>
          <div class="kpi-mini-bar"><div class="kpi-mini-fill" style="width:${Math.min(overallUtil,100)}%;background:${utilColor(overallUtil)}"></div></div>
        </div>
        ${DEPARTMENTS.filter(d => state.filterDept === 'All' || state.filterDept === d).map(dept => {
          const deptEmps = kpiEmps.filter(e => e.department === dept);
          if (!deptEmps.length) return '';
          const deptAvail = deptEmps.reduce((s,e) => s + 6 * e.hoursPerDay, 0);
          const deptSched = kpiAssignments.filter(a => deptEmps.some(e => e.name === a.employeeName)).reduce((s,a) => s + a.hours, 0);
          const deptUtil = deptAvail > 0 ? (deptSched / deptAvail * 100) : 0;
          const dc = DEPT_COLORS[dept] || {};
          return `<div class="kpi-item">
            <div class="kpi-dept-label" style="color:${dc.badge}">${dept}</div>
            <div class="kpi-value ${utilClass(deptUtil)}" style="font-size:12px">${deptUtil.toFixed(0)}%</div>
            <div class="kpi-mini-bar"><div class="kpi-mini-fill" style="width:${Math.min(deptUtil,100)}%;background:${utilColor(deptUtil)}"></div></div>
            <div class="kpi-sub">${deptSched.toFixed(0)}/${deptAvail}h</div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <!-- BACKLOG -->
    <div class="kpi-group">
      <div class="kpi-group-title"><span class="kpi-icon">📋</span> BACKLOG</div>
      <div class="kpi-row">
        ${DEPARTMENTS.filter(d => state.filterDept === 'All' || state.filterDept === d).map(dept => {
          const deptBacklog = kpiUnscheduled.filter(op => op.department === dept);
          const deptHrs = deptBacklog.reduce((s,op) => s + op.estHours, 0);
          const dc = DEPT_COLORS[dept] || {};
          return `<div class="kpi-item">
            <div class="kpi-dept-label" style="color:${dc.badge}">${dept}</div>
            <div class="kpi-value ${deptHrs > 0 ? 'warn' : 'ok'}" style="font-size:12px">${deptHrs.toFixed(0)}h</div>
            <div class="kpi-sub">${deptBacklog.length} ops</div>
          </div>`;
        }).join('')}
        ${(() => {
          const resCounts = {};
          kpiUnscheduled.forEach(op => { resCounts[op.craft] = (resCounts[op.craft]||0) + op.estHours; });
          const topRes = Object.entries(resCounts).sort((a,b) => b[1]-a[1]).slice(0,3);
          if (!topRes.length) return `<div class="kpi-item"><div class="kpi-label">Top Need</div><div class="kpi-value ok" style="font-size:10px">Clear ✓</div></div>`;
          return topRes.map(([r,h]) => `<div class="kpi-item">
            <div class="kpi-label">${r}</div>
            <div class="kpi-value warn" style="font-size:11px">${h.toFixed(0)}h</div>
          </div>`).join('');
        })()}
      </div>
    </div>

    <!-- COMPLIANCE -->
    <div class="kpi-group">
      <div class="kpi-group-title"><span class="kpi-icon">✅</span> COMPLIANCE</div>
      <div class="kpi-row">
        <div class="kpi-item">
          <div class="kpi-label">On Track</div>
          <div class="kpi-value ok">${onTrack}</div>
          <div class="kpi-sub">of ${kpiWOs.length} WOs</div>
        </div>
        <div class="kpi-item">
          <div class="kpi-label">At Risk</div>
          <div class="kpi-value ${atRisk > 0 ? 'warn' : 'ok'}">${atRisk}</div>
        </div>
        <div class="kpi-item">
          <div class="kpi-label">Overdue</div>
          <div class="kpi-value ${overdue > 0 ? 'danger' : 'ok'}">${overdue}</div>
        </div>
        <div class="kpi-item">
          <div class="kpi-label">Complete</div>
          <div class="kpi-value ok">${kpiCompletedCount}</div>
          <div class="kpi-sub">of ${kpiAllOps.length} ops</div>
        </div>
      </div>
    </div>
  </div>
  ${!state.showKPIs ? `<div style="background:var(--bg-surface);border-bottom:1px solid var(--border);padding:2px 12px;text-align:right"><button class="kpi-toggle" style="font-size:10px;color:var(--text-secondary)" onclick="state.showKPIs=true;render()">▼ Show KPIs</button></div>` : ''}
  `;
  } // end if (state.view !== 'import') for controls/KPI

  html += `<div class="main">`;

  // ─── IMPORT DATA VIEW ───
  if (state.view === 'import') {
    const dates = getWeekDates();
    html += `<div style="flex:1;overflow:auto;padding:24px;display:flex;justify-content:center;align-items:flex-start">
    <div style="max-width:720px;width:100%">
      <div style="text-align:center;margin-bottom:24px">
        <div style="font-size:48px;margin-bottom:8px">📁</div>
        <h2 style="margin:0;font-size:20px;color:var(--text-primary)">Import Data from Spreadsheet</h2>
        <p style="margin:4px 0 0;font-size:12px;color:var(--text-secondary)">Upload an Excel file with work orders and employees to populate the scheduler</p>
      </div>

      <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:16px">
        <div style="margin-bottom:16px">
          <label style="font-size:10px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.5px">Schedule Board Week Start (Monday)</label>
          <input type="date" value="${dates[0]}" onchange="setWeekStart(this.value)" style="display:block;width:100%;margin-top:4px;padding:8px;background:var(--bg-base);border:1px solid var(--border);border-radius:4px;color:var(--text-primary);font-size:12px">
          <div style="font-size:9px;color:var(--text-secondary);margin-top:4px">Sets which week the schedule board displays — Mon through Sat</div>
        </div>

        ${!state.importLoading && !state.importLoaded ? `
        <div style="border:2px dashed var(--border);border-radius:8px;padding:32px;text-align:center;margin-bottom:16px;cursor:pointer;transition:border-color 0.2s" 
             ondragover="event.preventDefault();this.style.borderColor='var(--accent)'"
             ondragleave="this.style.borderColor='var(--border)'"
             ondrop="event.preventDefault();this.style.borderColor='var(--border)';const f=event.dataTransfer.files[0];if(f){const dt=new DataTransfer();dt.items.add(f);document.getElementById('file-upload').files=dt.files;handleFileUpload(document.getElementById('file-upload'))}"
             onclick="document.getElementById('file-upload').click()">
          <input type="file" id="file-upload" accept=".xlsx,.xls,.csv" style="display:none" onchange="handleFileUpload(this)">
          <div style="font-size:28px;margin-bottom:8px">📄</div>
          <div style="font-size:13px;font-weight:600;color:var(--text-primary);margin-bottom:4px">Drop your spreadsheet here or click to browse</div>
          <div style="font-size:10px;color:var(--text-secondary)">Accepts .xlsx, .xls, or .csv files</div>
        </div>

        <div style="background:var(--bg-base);border:1px solid var(--border);border-radius:6px;padding:14px;margin-bottom:16px">
          <div style="font-size:11px;font-weight:600;color:var(--text-primary);margin-bottom:8px">📋 Expected Format</div>
          <div style="font-size:10px;color:var(--text-secondary);line-height:1.6">
            Your spreadsheet should have two sheets:<br>
            <strong>Sheet 1: Work Orders</strong> — columns: WO Number, Description, Department, Priority (1-5), WO Type (PM/CM), PM (Yes/No), Asset Number, Asset Description, Scheduled Start, Scheduled End, Supervisor, Op Seq, Op Description, Craft/Resource, Est Hours, Depends On Op<br>
            <strong>Sheet 2: Employees</strong> — columns: Employee Name, Department, Craft/Resource, Hours Per Day, Supervisor, Skills<br><br>
            Column names are matched flexibly — the scheduler auto-detects them. WO Type and PM flag are optional but recommended. Departments and crafts are auto-discovered from the data.
          </div>
          <a href="#" onclick="event.preventDefault();downloadTemplate()" style="display:inline-block;margin-top:8px;font-size:10px;color:var(--accent);font-weight:600">↓ Download blank template with examples</a>
        </div>
        ` : ''}

        ${!state.importLoading && state.importLoaded ? `
        <button class="btn-outline btn-outline-orange" style="width:100%;padding:10px;font-size:12px;margin-bottom:16px;border-radius:6px" onclick="state.importLoaded=false;state.importStats=null;state.workOrders=[];state.employees=[];state.assignments=[];render()">
          ↻ Upload New File
        </button>
        ` : ''}

        ${state.importLoading ? `
        <div style="background:var(--bg-base);border:1px solid var(--border);border-radius:6px;padding:16px;margin-bottom:16px;text-align:center">
          <div class="chat-typing" style="display:inline-flex;margin-bottom:8px"><span></span><span></span><span></span></div>
          <div style="font-size:12px;color:var(--text-secondary)">Processing spreadsheet...</div>
        </div>
        ` : ''}

        ${state.importError ? `<div style="background:#DC354522;border:1px solid #DC354544;border-radius:4px;padding:8px 12px;margin-bottom:12px;font-size:11px;color:#DC3545">${state.importError}</div>` : ''}

        ${state.importLoaded && state.importStats ? `
        <div style="background:#28A74522;border:1px solid #28A74544;border-radius:6px;padding:16px;margin-bottom:16px">
          <div style="font-size:12px;font-weight:700;color:#28A745;margin-bottom:12px">✓ Data Loaded Successfully${state.importStats.assignments > 0 ? ' (with schedule data)' : ''}</div>
          <div style="display:grid;grid-template-columns:repeat(${state.importStats.assignments > 0 ? 4 : 3},1fr);gap:12px;margin-bottom:12px">
            <div style="text-align:center"><div style="font-size:20px;font-weight:700;color:var(--text-primary)">${state.importStats.wos}</div><div style="font-size:9px;color:var(--text-secondary)">Work Orders</div></div>
            <div style="text-align:center"><div style="font-size:20px;font-weight:700;color:var(--text-primary)">${state.importStats.ops}</div><div style="font-size:9px;color:var(--text-secondary)">Operations</div></div>
            <div style="text-align:center"><div style="font-size:20px;font-weight:700;color:var(--text-primary)">${state.importStats.emps}</div><div style="font-size:9px;color:var(--text-secondary)">Employees</div></div>
            ${state.importStats.assignments > 0 ? `<div style="text-align:center"><div style="font-size:20px;font-weight:700;color:#28A745">${state.importStats.assignments}</div><div style="font-size:9px;color:var(--text-secondary)">Assignments</div></div>` : ''}
          </div>
          <div style="font-size:10px;color:var(--text-secondary)">
            Departments: ${state.importStats.depts.join(', ')} &nbsp;|&nbsp; Crafts: ${state.importStats.crafts.join(', ')}
            ${state.importStats.autoAllocated ? `<br><span style="color:#17A2B8;font-weight:600">⚡ ${state.importStats.autoAllocated} ops auto-allocated to resource pools by WO dates</span>` : ''}
          </div>
          <div style="display:flex;gap:8px;margin-top:12px">
            ${state.importStats.assignments > 0 || state.importStats.autoAllocated > 0 ? `
              <button class="btn btn-green" style="flex:1;padding:12px;font-size:13px;border-radius:6px" onclick="state.boardView='resource';setView('schedule')">Resource Board →</button>
              ${state.importStats.emps > 0 ? `<button class="btn-outline" style="flex:1;padding:12px;font-size:12px;border-radius:6px" onclick="state.boardView='employee';setView('schedule')">Employee Board</button>` : ''}
              <button class="btn-outline" style="padding:12px;font-size:12px;border-radius:6px" onclick="setView('summary')">Summary</button>
            ` : `
              <button class="btn btn-green" style="flex:1;padding:12px;font-size:13px;border-radius:6px" onclick="setView('plan')">Continue to Plan Week →</button>
            `}
          </div>
        </div>
        ` : ''}
      </div>
    </div></div>`;
  }

  // ─── PLAN WEEK VIEW ───
  if (state.view === 'plan') {
    const sortedWOs = [...state.workOrders].sort((a,b) => {
      const aPM = a.isPM ? 0 : 1;
      const bPM = b.isPM ? 0 : 1;
      return (aPM - bPM) || (a.priority - b.priority);
    });
    const candidateWOs = sortedWOs.filter(wo => !state.confirmedWOs.has(wo.woNumber));
    const confirmedWOList = sortedWOs.filter(wo => state.confirmedWOs.has(wo.woNumber));
    const confirmedHrs = confirmedWOList.reduce((s,wo) => s + wo.operations.reduce((s2,op) => s2 + op.estHours, 0), 0);
    const totalAvail = state.employees.reduce((s,e) => s + 6 * e.hoursPerDay, 0);
    const capPct = totalAvail > 0 ? Math.min((confirmedHrs / totalAvail) * 100, 100) : 0;
    const capColor = capPct > 95 ? '#DC3545' : capPct > 75 ? '#F0AD4E' : '#28A745';

    html += `<div class="plan-layout">
      <!-- CANDIDATES -->
      <div class="plan-candidates" ondragover="onDragOverPlan(event)" ondragleave="onDragLeavePlan(event)" ondrop="onDropCandidate(event)">
        <div class="plan-header">
          <div>
            <div class="plan-header-title" style="color:var(--text-secondary)">📋 Candidate WOs</div>
            <div class="plan-header-count">${candidateWOs.length} work orders</div>
          </div>
          <div style="display:flex;gap:4px">
            <button class="btn-outline" style="font-size:9px;padding:3px 8px" onclick="confirmAllByPriority(${Math.min(state.workOrders.length, 25)})">Confirm Top ${Math.min(state.workOrders.length, 25)} by Priority</button>
          </div>
        </div>
        <div class="plan-list">
          ${candidateWOs.length === 0 ? `<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:11px">All WOs confirmed for this week ✓</div>` : ''}
          ${candidateWOs.map(wo => {
            const totalH = wo.operations.reduce((s,op) => s + op.estHours, 0);
            const opCrafts = [...new Set(wo.operations.map(o => o.craft))];
            const dc = DEPT_COLORS[wo.department] || {};
            const pColor = wo.priority <= 2 ? '#DC3545' : wo.priority <= 3 ? '#F0AD4E' : 'var(--text-secondary)';
            return `<div class="plan-wo" draggable="true" ondragstart="onDragStartPlanWO(event,'${wo.woNumber}')" ondragend="onDragEndPlanWO(event)">
              <div class="plan-wo-header">
                <span class="plan-wo-num">${wo.woNumber}</span>
                <div style="display:flex;gap:3px;align-items:center">
                  <span class="badge" style="background:${pColor}22;color:${pColor};border:1px solid ${pColor}44;font-size:9px">P${wo.priority}</span>
                  ${state.showPMBadges ? (wo.isPM ? `<span class="tag" style="background:#17A2B8;font-size:8px">PM</span>` : `<span class="tag" style="background:#6C757D;font-size:8px">${wo.woType||'CM'}</span>`) : ''}
                  <span class="tag" style="background:${dc.badge||'#666'};font-size:8px">${wo.department}</span>
                  <button class="btn-outline" style="font-size:8px;padding:2px 6px;color:#28A745;border-color:#28A74566" onclick="event.stopPropagation();confirmWO('${wo.woNumber}')">+ Confirm</button>
                </div>
              </div>
              <div class="plan-wo-desc">${wo.description}</div>
              <div class="plan-wo-meta">
                <span>${wo.asset}</span>
                <span>${totalH}h total</span>
                <span>${wo.operations.length} ops</span>
                <span>${opCrafts.join(', ')}</span>
                <span>${fmtDate(wo.scheduledStart)} – ${fmtDate(wo.scheduledEnd)}</span>
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>

      <!-- CONFIRMED -->
      <div class="plan-confirmed" ondragover="onDragOverPlan(event)" ondragleave="onDragLeavePlan(event)" ondrop="onDropConfirm(event)">
        <div class="plan-header">
          <div>
            <div class="plan-header-title" style="color:#28A745">✅ Confirmed for Week</div>
            <div class="plan-header-count">${confirmedWOList.length} work orders • ${confirmedHrs.toFixed(0)}h</div>
          </div>
          <div style="display:flex;gap:4px">
            ${confirmedWOList.length > 0 ? `<button class="btn btn-green" style="font-size:9px;padding:4px 10px" onclick="state.view='schedule';render()">→ Schedule Board</button>` : ''}
          </div>
        </div>
        ${confirmedWOList.length === 0 ? `
          <div class="plan-drop-zone" ondragover="onDragOverPlan(event)" ondragleave="onDragLeavePlan(event)" ondrop="onDropConfirm(event)">
            Drag work orders here to confirm for this week
          </div>
        ` : ''}
        <div class="plan-list">
          ${confirmedWOList.map(wo => {
            const totalH = wo.operations.reduce((s,op) => s + op.estHours, 0);
            const opCrafts = [...new Set(wo.operations.map(o => o.craft))];
            const dc = DEPT_COLORS[wo.department] || {};
            const pColor = wo.priority <= 2 ? '#DC3545' : wo.priority <= 3 ? '#F0AD4E' : 'var(--text-secondary)';
            const schedCount = wo.operations.filter(op => state.assignments.some(a => a.woNumber === wo.woNumber && a.opSeq === op.opSeq)).length;
            return `<div class="plan-wo" draggable="true" ondragstart="onDragStartPlanWO(event,'${wo.woNumber}')" ondragend="onDragEndPlanWO(event)" style="border-left:3px solid #28A745">
              <div class="plan-wo-header">
                <span class="plan-wo-num">${wo.woNumber}</span>
                <div style="display:flex;gap:3px;align-items:center">
                  <span class="badge" style="background:${pColor}22;color:${pColor};border:1px solid ${pColor}44;font-size:9px">P${wo.priority}</span>
                  ${state.showPMBadges ? (wo.isPM ? `<span class="tag" style="background:#17A2B8;font-size:8px">PM</span>` : `<span class="tag" style="background:#6C757D;font-size:8px">${wo.woType||'CM'}</span>`) : ''}
                  <span class="tag" style="background:${dc.badge||'#666'};font-size:8px">${wo.department}</span>
                  ${schedCount > 0 ? `<span style="font-size:8px;color:#28A745">${schedCount}/${wo.operations.length} sched</span>` : ''}
                  <button class="btn-outline" style="font-size:8px;padding:2px 6px;color:#DC3545;border-color:#DC354566" onclick="event.stopPropagation();unconfirmWO('${wo.woNumber}')">✕ Remove</button>
                </div>
              </div>
              <div class="plan-wo-desc">${wo.description}</div>
              <div class="plan-wo-meta">
                <span>${wo.asset}</span>
                <span>${totalH}h total</span>
                <span>${wo.operations.length} ops</span>
                <span>${opCrafts.join(', ')}</span>
              </div>
            </div>`;
          }).join('')}
        </div>
        <div class="plan-cap-gauge">
          <div class="plan-cap-label">Capacity: ${confirmedHrs.toFixed(0)}h confirmed / ${totalAvail}h available</div>
          <div class="plan-cap-bar"><div class="plan-cap-fill" style="width:${capPct}%;background:${capColor}"></div></div>
          <div class="plan-cap-detail">${capPct.toFixed(0)}% of weekly capacity • ${(totalAvail - confirmedHrs).toFixed(0)}h remaining</div>
        </div>
      </div>
    </div>`;
  }

  // ─── SCHEDULE VIEW ───
  if (state.view === 'schedule') {
    // Board view switcher
    html += `<div style="display:flex;flex-direction:column;width:100%;min-height:0;flex:1">
      <div style="display:flex;align-items:center;gap:8px;padding:6px 12px;background:var(--bg-surface);border-bottom:1px solid var(--border);flex-shrink:0">
        <span style="font-size:9px;color:var(--text-secondary);font-weight:600">VIEW:</span>
        <div class="board-views">
          <button class="board-view-btn ${state.boardView==='dept'?'active':''}" onclick="setBoardView('dept')">By Dept</button>
          <button class="board-view-btn ${state.boardView==='resource'?'active':''}" onclick="setBoardView('resource')">By Resource</button>
          <button class="board-view-btn ${state.boardView==='employee'?'active':''}" onclick="setBoardView('employee')">By Employee</button>
          <button class="board-view-btn ${state.boardView==='priority'?'active':''}" onclick="setBoardView('priority')">By Priority</button>
        </div>
        ${state.confirmedWOs.size > 0 ? `<span style="font-size:9px;color:#28A745">${state.confirmedWOs.size} WOs confirmed</span>` : `<span style="font-size:9px;color:#F0AD4E">No WOs confirmed — <a href="#" style="color:var(--accent)" onclick="event.preventDefault();setView('plan')">Plan Week first</a></span>`}
      </div>
      <div style="display:flex;flex:1;overflow:hidden;min-height:0">`;

    // Sidebar (backlog)
    html += `<div class="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">Backlog (${state.boardView === 'resource' || state.boardView === 'dept' ? [...new Set(filteredBacklog.map(o=>o.woNumber))].length + ' WOs' : filteredBacklog.length})</span>
      </div>
      <div class="sidebar-content">`;

    if (filteredBacklog.length === 0) {
      html += `<div style="padding:20px;text-align:center;color:var(--text-secondary);font-size:11px">All operations scheduled ✓</div>`;
    }

    // Resource/Dept view: show WO-level backlog cards
    if (state.boardView === 'resource' || state.boardView === 'dept') {
      // Group backlog ops by WO
      const woBacklog = {};
      filteredBacklog.forEach(op => {
        if (!woBacklog[op.woNumber]) woBacklog[op.woNumber] = [];
        woBacklog[op.woNumber].push(op);
      });
      
      html += `<div style="font-size:9px;color:var(--text-muted);padding:0 8px 6px">Showing ${Object.keys(woBacklog).length} WOs</div>`;
      
      Object.entries(woBacklog).forEach(([woNum, ops]) => {
        const wo = state.workOrders.find(w => w.woNumber === woNum);
        if (!wo) return;
        const dc = DEPT_COLORS[wo.department] || {};
        const totalEst = ops.reduce((s, o) => s + o.estHours, 0);
        const totalRemain = ops.reduce((s, o) => s + getRemainingHours(o), 0);
        const totalAssigned = totalEst - totalRemain;
        const isPartial = totalAssigned > 0 && totalRemain > 0;
        const pColor = wo.priority <= 2 ? '#DC3545' : wo.priority <= 3 ? '#F0AD4E' : 'var(--text-secondary)';
        const crafts = [...new Set(ops.map(o => o.craft))];
        const expandId = 'bl-wo-' + woNum.replace(/[^a-zA-Z0-9]/g, '');
        
        // WO card — draggable (drags first unscheduled op)
        const firstOp = ops[0];
        html += `<div class="op-card" style="border-left:3px solid ${dc.badge || 'var(--border)'};${isPartial ? 'border-right:3px solid #F0AD4E' : ''}" draggable="true"
          ondragstart="onDragStartBacklog(event, getAllOps().find(o=>o.woNumber==='${firstOp.woNumber}'&&o.opSeq===${firstOp.opSeq}))"
          ondragend="onDragEnd(event)">
          <div class="op-card-header" onclick="document.getElementById('${expandId}').style.display=document.getElementById('${expandId}').style.display==='none'?'block':'none'" style="cursor:pointer">
            <span class="op-wo">${wo.woNumber}</span>
            <span style="display:flex;gap:3px;align-items:center">
              ${isPartial ? `<span class="tag" style="background:#F0AD4E;font-size:7px;padding:1px 4px">${totalAssigned.toFixed(1)}/${totalEst}h</span>` : ''}
              ${state.showPMBadges && wo.isPM ? `<span class="tag" style="background:#17A2B8;font-size:7px;padding:1px 4px">PM</span>` : ''}
              <span class="tag" style="background:${pColor}22;color:${pColor};font-size:7px;padding:1px 4px;border:1px solid ${pColor}44">P${wo.priority}</span>
              <span class="tag" style="background:${dc.badge||'#666'};font-size:7px">${wo.department}</span>
            </span>
          </div>
          <div class="op-desc">${wo.description}</div>
          <div class="op-meta">
            <span>${ops.length} ops</span><span>•</span>
            <span>${isPartial ? `<span style="color:#F0AD4E;font-weight:600">${totalRemain.toFixed(1)}h remaining</span>` : totalEst + 'h est'}</span><span>•</span>
            <span>${crafts.join(', ')}</span>
            ${wo.scheduledStart ? `<span>•</span><span style="font-size:8px;color:var(--text-muted)">${fmtDate(wo.scheduledStart)}–${fmtDate(wo.scheduledEnd)}</span>` : ''}
          </div>
          <div id="${expandId}" style="display:none;margin-top:4px;border-top:1px solid var(--border);padding-top:4px">
            ${ops.map(op => {
              const cc = gc(op.craft);
              const opAssH = getAssignedHours(op.woNumber, op.opSeq);
              const opRemH = getRemainingHours(op);
              return `<div style="display:flex;justify-content:space-between;align-items:center;padding:2px 0;font-size:9px;cursor:pointer;border-bottom:1px solid var(--border)" 
                onclick="event.stopPropagation();showAssignModal(getAllOps().find(o=>o.woNumber==='${op.woNumber}'&&o.opSeq===${op.opSeq}))">
                <span style="color:var(--text-primary)">Op ${op.opSeq}: ${op.description.substring(0,30)}${op.description.length>30?'…':''}</span>
                <span style="display:flex;gap:4px;align-items:center">
                  <span class="tag" style="background:${cc.badge};font-size:7px">${op.craft}</span>
                  <span style="color:${opRemH < op.estHours && opRemH > 0 ? '#F0AD4E' : 'var(--text-secondary)'};font-size:8px">${opRemH < op.estHours ? opAssH + '/' : ''}${op.estHours}h</span>
                </span>
              </div>`;
            }).join('')}
          </div>
        </div>`;
      });
    }
    // Employee/Priority view: show op-level backlog cards (original behavior)
    else {
    filteredBacklog.forEach((op, i) => {
      const cc = gc(op.craft);
      const dc = DEPT_COLORS[op.department] || {};
      const depSt = getDepStatus(op.woNumber, op.opSeq);
      const deps = op.dependencies || [];
      const depInfo = deps.length > 0 ? deps.map(d => {
        const dA = state.assignments.find(a => a.woNumber === op.woNumber && a.opSeq === d);
        return dA ? `Op${d}✓` : `Op${d}✕`;
      }).join(' ') : '';
      const assignedH = getAssignedHours(op.woNumber, op.opSeq);
      const remainH = getRemainingHours(op);
      const isPartial = assignedH > 0 && remainH > 0;
      html += `<div class="op-card craft-${op.craft.toLowerCase()}" style="${depSt === 'blocked' ? 'opacity:0.65' : ''}${isPartial ? ';border-left:3px solid #F0AD4E' : ''}" draggable="true" 
        ondragstart="onDragStartBacklog(event, getAllOps().find(o=>o.woNumber==='${op.woNumber}'&&o.opSeq===${op.opSeq}))"
        ondragend="onDragEnd(event)"
        onclick="showAssignModal(getAllOps().find(o=>o.woNumber==='${op.woNumber}'&&o.opSeq===${op.opSeq}))">
        <div class="op-card-header">
          <span class="op-wo">${op.woNumber} • Op ${op.opSeq}</span>
          <span style="display:flex;gap:3px">
            ${isPartial ? `<span class="tag" style="background:#F0AD4E;font-size:7px;padding:1px 4px">${assignedH}/${op.estHours}h</span>` : ''}
            ${state.showPMBadges && op.isPM ? `<span class="tag" style="background:#17A2B8;font-size:7px;padding:1px 4px">PM</span>` : ''}
            ${state.showDependencies ? (depSt === 'blocked' ? `<span class="dep-badge blocked">🔒 blocked</span>` : deps.length > 0 ? `<span class="dep-badge ready">✓ ready</span>` : `<span class="dep-badge parallel">∥ no deps</span>`) : ''}
            <span class="tag" style="background:${dc.badge||'#666'};font-size:8px">${op.department}</span>
            <span class="tag" style="background:${cc.badge}">${op.craft}</span>
          </span>
        </div>
        <div class="op-desc">${op.description}</div>
        <div class="op-meta">
          <span>${op.asset}</span><span>•</span><span>${isPartial ? `<span style="color:#F0AD4E;font-weight:600">${remainH}h remaining</span>` : `${op.estHours}h est`}</span><span>•</span>
          <span style="color:${op.priority<=2?'#DC3545':op.priority<=3?'#F0AD4E':'var(--text-secondary)'}">P${op.priority}</span>
          ${state.showDateWindow && op.scheduledStart ? `<span>•</span><span style="font-size:8px;color:var(--text-muted)">${fmtDate(op.scheduledStart)}–${fmtDate(op.scheduledEnd)}</span>` : ''}
          ${state.showDependencies && depInfo ? `<span>•</span><span style="font-size:8px;color:var(--text-muted)">${depInfo}</span>` : ''}
          ${isPartial ? `<span>•</span><span style="font-size:8px;color:var(--text-muted)">${state.assignments.filter(a=>a.woNumber===op.woNumber&&a.opSeq===op.opSeq).map(a=>a.employeeName.split(' ')[0]+' '+a.hours+'h').join(', ')}</span>` : ''}
        </div>
      </div>`;
    });
    }
    html += `</div></div>`;

    // Schedule grid
    html += `<div class="content"><div style="overflow-x:auto"><div class="schedule-grid-wrap"><div class="schedule-grid">`;
    // Header - changes based on board view
    const rowLabel = state.boardView === 'employee' ? 'EMPLOYEE' : state.boardView === 'dept' ? 'WORK ORDER' : state.boardView === 'resource' ? 'RESOURCE / WO' : 'WORK ORDER';
    html += `<div class="day-header" style="background:var(--bg-surface);text-align:left;padding-left:10px;font-size:10px;color:var(--text-secondary)">${rowLabel}</div>`;
    dates.forEach((d,i) => { html += `<div class="day-header"><div>${DAY_ABR[i]}</div><div class="day-header-sub">${fmtDate(d)}</div></div>`; });

    if (state.boardView === 'employee') {
    // ── EMPLOYEE VIEW (existing) ──
    if (state.employees.length === 0) {
      html += `<div style="grid-column:1/-1;padding:40px;text-align:center;color:var(--text-secondary)">
        <div style="font-size:14px;margin-bottom:8px">No employees loaded</div>
        <div style="font-size:11px">Upload a workbook with an Employees sheet, or use the <strong>By Resource</strong> view to schedule by resource pool.</div>
        <button class="btn-outline" style="margin-top:12px" onclick="setBoardView('resource')">Switch to Resource View</button>
      </div>`;
    } else {

    // Group employees by department, filter if dept selected
    const visibleDepts = state.filterDept === 'All' ? DEPARTMENTS : [state.filterDept];
    visibleDepts.forEach(dept => {
      let deptEmps = state.employees.filter(e => e.department === dept);
      if (state.filterCraft !== 'All') deptEmps = deptEmps.filter(e => e.craft === state.filterCraft);
      if (state.filterEmployee !== 'All') deptEmps = deptEmps.filter(e => e.name === state.filterEmployee);
      if (state.filterSupervisor !== 'All') deptEmps = deptEmps.filter(e => e.supervisor === state.filterSupervisor);
      if (!deptEmps.length) return;
      const dc = DEPT_COLORS[dept] || {};

      // Department separator row spanning all columns
