      html += `<div style="grid-column:1/-1;background:${dc.border}18;border-left:3px solid ${dc.badge};padding:5px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)">
        <span style="font-size:11px;font-weight:700;color:${dc.badge};letter-spacing:1px;text-transform:uppercase">${dept}</span>
        <span style="font-size:10px;color:var(--text-secondary)">${deptEmps.length} employees</span>
      </div>`;

      deptEmps.forEach(emp => {
        const wk = getEmpWeekLoad(emp.name);
        const mx = getEmpWeekAvail(emp.name);
        const defaultMx = 6 * emp.hoursPerDay;
        const hasOverrides = mx !== defaultMx;
        const pct = mx > 0 ? (wk/mx)*100 : 0;
        const cls = pct > 100 ? 'red' : pct > 85 ? 'yellow' : mx === 0 ? 'neutral' : 'green';
        html += `<div class="emp-label" style="border-left:3px solid ${dc.badge}44">
          <div class="emp-name" style="display:flex;align-items:center;gap:4px">${emp.name}${hasOverrides ? '<span style="font-size:9px;color:#F0AD4E" title="Availability overrides set">⏰</span>' : ''}
            <button style="margin-left:auto;background:none;border:none;cursor:pointer;font-size:10px;color:var(--text-secondary);padding:0" onclick="event.stopPropagation();showAvailModal('${emp.name}')" title="Set availability">📅</button>
          </div>
          <div class="emp-craft">${emp.craft} • ${wk.toFixed(1)}h/${mx}h${hasOverrides ? ' ⏰' : ''}</div>
          <div class="cap-bar"><div class="cap-fill ${cls}" style="width:${Math.min(pct,100)}%"></div></div>
        </div>`;

        dates.forEach((date) => {
          const dayA = state.assignments.filter(a => a.employeeName === emp.name && a.date === date);
          const dayH = dayA.reduce((s,a) => s + a.hours, 0);
          const dayAvail = getEmpAvailHours(emp.name, date);
          const dayReason = getEmpAvailReason(emp.name, date);
          const isOff = dayAvail === 0;
          const isReduced = dayAvail > 0 && dayAvail < emp.hoursPerDay;
          html += `<div class="day-cell" style="${isOff ? 'background:repeating-linear-gradient(45deg,transparent,transparent 4px,var(--border) 4px,var(--border) 5px);opacity:0.7' : isReduced ? 'background:#F0AD4E0A' : ''}" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,'${date}','${emp.name}')" title="${isOff ? dayReason || 'Off' : isReduced ? dayReason + ' (' + dayAvail + 'h)' : ''}">`;
          if (isOff) {
            html += `<div style="text-align:center;padding:6px 2px;font-size:9px;color:var(--text-secondary);font-style:italic">${dayReason || 'Off'}</div>`;
          }
          dayA.forEach(a => {
            const op = allOps.find(o => o.woNumber === a.woNumber && o.opSeq === a.opSeq);
            if (!op) return;
            const cc = gc(op.craft);
            const opDc = DEPT_COLORS[op.department] || {};
            const isDone = a.status === 'Complete';
            const statusIcon = a.status === 'Complete' ? '↩' : a.status === 'In Progress' ? '✓' : '►';
            const statusColor = a.status === 'Complete' ? '#28A745' : a.status === 'In Progress' ? '#F0AD4E' : 'var(--text-secondary)';
            const isBorrowed = op.department !== emp.department;
            
            // Date window check
            const wo = state.workOrders.find(w => w.woNumber === a.woNumber);
            const outOfWindow = wo && !isDone && ((wo.scheduledStart && a.date < wo.scheduledStart) || (wo.scheduledEnd && a.date > wo.scheduledEnd));
            
            // Dependency checking
            const depViols = getDepViolations(a);
            const hasViol = depViols.length > 0 && !isDone;
            const hasSameDayWarn = depViols.some(v => v.type === 'sameday') && !depViols.some(v => v.type === 'unscheduled' || v.type === 'after');
            const violClass = hasViol ? (hasSameDayWarn ? 'dep-warn' : 'dep-violated') : '';
            const violTitle = hasViol ? depViols.map(v => v.msg).join('\\n') : '';
            
            // Dep link indicators
            const depLinks = (op.dependencies || []).map(depSeq => {
              const depA = state.assignments.find(x => x.woNumber === a.woNumber && x.opSeq === depSeq);
              if (!depA) return `<span class="dep-link-tag fail">← Op${depSeq} ✕</span>`;
              if (depA.date > a.date) return `<span class="dep-link-tag fail">← Op${depSeq} late</span>`;
              if (depA.date === a.date) return `<span class="dep-link-tag warn">← Op${depSeq} same</span>`;
              return `<span class="dep-link-tag ok">← Op${depSeq} ✓</span>`;
            }).join('');
            
            html += `<div class="assigned-op ${isDone?'complete':''} ${state.showDependencies?violClass:''}" data-dep-node="${a.woNumber}:${op.opSeq}" draggable="true" ondragstart="onDragStartAssigned(event,'${a.id}')" ondragend="onDragEnd(event)" ${state.showDependencies&&violTitle ? `title="${violTitle}"` : ''} style="cursor:grab;background:${isDone?'#28A74522':outOfWindow&&state.showDateWindow?'#DC354522':cc.bg+'33'};border-color:${isDone?'#28A74566':outOfWindow&&state.showDateWindow?'#DC354566':cc.border+'66'}${isBorrowed&&state.showCrossDept?';border-left:3px solid '+opDc.badge:''}">
              <div class="assigned-op-header">
                <span class="assigned-op-wo" style="color:${outOfWindow&&state.showDateWindow?'#DC3545':cc.text}">${hasViol&&state.showDependencies ? '<span class="dep-icon" style="color:#DC3545">⚠</span> ' : ''}${outOfWindow&&state.showDateWindow ? '🕐 ' : ''}${isBorrowed&&state.showCrossDept?'⇄ ':''}${op.woNumber.replace('WO-','')}</span>
                <span>
                  <button class="assigned-op-btn" style="color:${statusColor}" onclick="event.stopPropagation();cycleStatus('${a.id}')" title="Cycle status">${statusIcon}</button>
                  <button class="assigned-op-btn" style="color:#DC354566" onclick="event.stopPropagation();removeAssignment('${a.id}')" title="Remove">×</button>
                </span>
              </div>
              <div class="assigned-op-meta">${state.showPMBadges && op.isPM ? '<span style="color:#17A2B8;font-weight:600">PM</span> • ' : ''}Op${op.opSeq} ${a.hours}h${isBorrowed&&state.showCrossDept ? ' • <span style="color:'+opDc.badge+'">'+op.department+'</span>' : ''}${outOfWindow&&state.showDateWindow ? ' • <span style="color:#DC3545">⚠ outside window</span>' : ''} ${a.status !== 'Scheduled' ? '• '+a.status : ''}</div>
              ${state.showDependencies && depLinks ? `<div class="dep-links">${depLinks}</div>` : ''}
            </div>`;
          });
          if (dayH > 0) {
            html += `<div class="day-cell-load ${dayH > dayAvail ? 'over':''}">${dayH}/${dayAvail}h</div>`;
          }
          html += `</div>`;
        });
      });
    });
    } // end employees exist
    } // end employee view

    else if (state.boardView === 'dept' || state.boardView === 'priority') {
    // ── DEPT or PRIORITY VIEW ── (rows = WOs grouped by dept or sorted by priority)
    const boardWOs = state.boardView === 'priority'
      ? [...state.workOrders].filter(wo => {
          if (state.confirmedWOs.size > 0 && !state.confirmedWOs.has(wo.woNumber)) return false;
          if (state.filterDept !== 'All' && wo.department !== state.filterDept) return false;
          if (state.filterSupervisor !== 'All' && wo.supervisor !== state.filterSupervisor) return false;
          if (state.filterCraft !== 'All' && !wo.operations.some(op => op.craft === state.filterCraft)) return false;
          if (state.filterWOType === 'PM' && !wo.isPM) return false;
          if (state.filterWOType === 'CM' && wo.isPM) return false;
          return true;
        }).sort((a,b) => { const ap = a.isPM?0:1, bp = b.isPM?0:1; return (ap-bp) || (a.priority - b.priority); })
      : [...state.workOrders].filter(wo => {
          if (state.confirmedWOs.size > 0 && !state.confirmedWOs.has(wo.woNumber)) return false;
          if (state.filterDept !== 'All' && wo.department !== state.filterDept) return false;
          if (state.filterSupervisor !== 'All' && wo.supervisor !== state.filterSupervisor) return false;
          if (state.filterCraft !== 'All' && !wo.operations.some(op => op.craft === state.filterCraft)) return false;
          if (state.filterWOType === 'PM' && !wo.isPM) return false;
          if (state.filterWOType === 'CM' && wo.isPM) return false;
          return true;
        });

    const boardGroups = state.boardView === 'dept' ? DEPARTMENTS.filter(d => state.filterDept === 'All' || state.filterDept === d) : ['All'];
    
    boardGroups.forEach(group => {
      const groupWOs = state.boardView === 'dept' ? boardWOs.filter(wo => wo.department === group) : boardWOs;
      if (!groupWOs.length) return;
      
      if (state.boardView === 'dept') {
        const dc = DEPT_COLORS[group] || {};
        html += `<div style="grid-column:1/-1;background:${dc.border}18;border-left:3px solid ${dc.badge};padding:5px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)">
          <span style="font-size:11px;font-weight:700;color:${dc.badge};letter-spacing:1px;text-transform:uppercase">${group}</span>
          <span style="font-size:10px;color:var(--text-secondary)">${groupWOs.length} WOs</span>
        </div>`;
      }
      
      groupWOs.forEach(wo => {
        const totalH = wo.operations.reduce((s,op) => s + op.estHours, 0);
        const schedOps = wo.operations.filter(op => state.assignments.some(a => a.woNumber === wo.woNumber && a.opSeq === op.opSeq)).length;
        const pColor = wo.priority <= 2 ? '#DC3545' : wo.priority <= 3 ? '#F0AD4E' : 'var(--text-secondary)';
        const dc = DEPT_COLORS[wo.department] || {};
        
        html += `<div class="board-wo-label">
          <div class="board-wo-num">${wo.woNumber}</div>
          <div class="board-wo-desc" title="${wo.description}">${wo.description}</div>
          <div class="board-wo-badges">
            <span class="badge" style="background:${pColor}22;color:${pColor};border:1px solid ${pColor}44;font-size:8px">P${wo.priority}</span>
            ${state.showPMBadges && wo.isPM ? `<span class="tag" style="background:#17A2B8;font-size:7px">PM</span>` : ''}
            ${state.boardView === 'priority' ? `<span class="tag" style="background:${dc.badge};font-size:7px">${wo.department}</span>` : ''}
            <span style="font-size:8px;color:var(--text-secondary)">${schedOps}/${wo.operations.length} sched • ${totalH}h</span>
          </div>
        </div>`;
        
        dates.forEach(date => {
          const dayOps = wo.operations.filter(op => state.assignments.some(a => a.woNumber === wo.woNumber && a.opSeq === op.opSeq && a.date === date));
          html += `<div class="day-cell" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,'${date}','')">`;
          dayOps.forEach(op => {
            const a = state.assignments.find(x => x.woNumber === wo.woNumber && x.opSeq === op.opSeq && x.date === date);
            if (!a) return;
            const cc = gc(op.craft);
            const isDone = a.status === 'Complete';
            const depViols = getDepViolations(a);
            const hasViol = depViols.length > 0 && !isDone;
            const violClass = hasViol ? 'dep-violated' : '';
            html += `<div class="assigned-op ${isDone?'complete':''} ${violClass}" data-dep-node="${a.woNumber}:${op.opSeq}" style="background:${isDone?'#28A74522':cc.bg+'33'};border:1px solid ${isDone?'#28A74566':cc.border+'66'}">
              <div class="assigned-op-header">
                <span class="assigned-op-wo" style="color:${cc.text}">${hasViol?'⚠ ':''}Op${op.opSeq}</span>
                <span>
                  <button class="assigned-op-btn" style="color:${isDone?'#28A745':a.status==='In Progress'?'#F0AD4E':'var(--text-secondary)'}" onclick="event.stopPropagation();cycleStatus('${a.id}')">${isDone?'↩':a.status==='In Progress'?'✓':'►'}</button>
                  <button class="assigned-op-btn" style="color:#DC354566" onclick="event.stopPropagation();removeAssignment('${a.id}')">×</button>
                </span>
              </div>
              <div class="assigned-op-meta">${a.employeeName.split(' ')[0]} • ${a.hours}h • ${op.craft}</div>
            </div>`;
          });
          html += `</div>`;
        });
      });
    });
    }

    else if (state.boardView === 'resource') {
    // ── RESOURCE VIEW ── (rows = resource pools, cells show WO-level cards, click to expand ops)
    const resources = state.filterCraft !== 'All' ? [state.filterCraft] : [...new Set(getAllOps().map(o => o.craft))];
    resources.forEach(craft => {
      const cc = gc(craft);
      const cap = getResourceCapacity(craft);
      const craftOps = getAllOps().filter(o => o.craft === craft && (state.filterDept === 'All' || o.department === state.filterDept));
      const totalEst = craftOps.reduce((s,o) => s + o.estHours, 0);
      const totalRemain = craftOps.reduce((s,o) => s + getRemainingHours(o), 0);
      
      html += `<div class="emp-label" style="border-left:3px solid ${cc.badge};cursor:pointer" onclick="showResourceCapModal('${craft}')">
        <div class="emp-name" style="color:${cc.text}">${craft} ${!cap.auto ? '<span style="font-size:8px;color:var(--accent)">⚙</span>' : ''}</div>
        <div class="emp-craft">${cap.unconfigured ? '<span style="color:var(--accent)">Click to set capacity</span>' : cap.headcount + ' ' + (cap.auto ? 'employees' : 'headcount') + ' • ' + cap.hoursPerDay + 'h/day'}</div>
        <div class="emp-craft">${totalRemain > 0 ? totalRemain.toFixed(1) + 'h backlog' : totalEst + 'h est'}</div>
      </div>`;
      
      dates.forEach(date => {
        const dayLoad = getResourceDayLoad(craft, date);
        const dayCap = getResourceDayCapacity(craft, date);
        const pct = dayCap > 0 ? (dayLoad / dayCap) * 100 : 0;
        const heatBg = pct > 95 ? '#DC354518' : pct > 75 ? '#F0AD4E12' : pct > 0 ? '#28A74508' : '';
        
        // Get assignments for this craft+date, grouped by WO
        const dayAssign = state.assignments.filter(a => {
          const op = allOps.find(o => o.woNumber === a.woNumber && o.opSeq === a.opSeq);
          if (!op || op.craft !== craft) return false;
          if (state.filterDept !== 'All' && op.department !== state.filterDept) return false;
          return a.date === date;
        });
        
        // Group by WO number
        const woGroups = {};
        dayAssign.forEach(a => {
          if (!woGroups[a.woNumber]) woGroups[a.woNumber] = [];
          woGroups[a.woNumber].push(a);
        });
        
        html += `<div class="day-cell" style="background:${heatBg}" 
          ondragover="onDragOver(event)" 
          ondragleave="onDragLeave(event)" 
          ondrop="onDrop(event,'${date}',null,'${craft}')">`;
        
        // Render WO-level cards
        Object.entries(woGroups).forEach(([woNum, assigns]) => {
          const wo = state.workOrders.find(w => w.woNumber === woNum);
          const woHrs = assigns.reduce((s,a) => s + a.hours, 0);
          const opsCount = assigns.length;
          const allDone = assigns.every(a => a.status === 'Complete');
          const anyPool = assigns.some(a => isPoolAssignment(a));
          const anyInProg = assigns.some(a => a.status === 'In Progress');
          const dc = DEPT_COLORS[wo?.department] || {};
          const pColor = wo && wo.priority <= 2 ? '#DC3545' : wo && wo.priority <= 3 ? '#F0AD4E' : 'var(--text-secondary)';
          const expandId = 'res-' + craft.replace(/\s/g,'') + '-' + date + '-' + woNum.replace(/[^a-zA-Z0-9]/g,'');
          
          html += `<div class="assigned-op ${allDone?'complete':''}" draggable="true"
            ondragstart="onDragStartResourceWO(event,'${woNum}','${craft}','${date}')"
            ondragend="onDragEnd(event)"
            style="background:${allDone?'#28A74515':anyPool?'#17A2B810':cc.bg+'22'};border:1px solid ${allDone?'#28A74544':anyPool?'#17A2B833':cc.border+'44'};cursor:grab;${anyPool?'border-left:3px solid #17A2B8':''}"
            onclick="document.getElementById('${expandId}').style.display=document.getElementById('${expandId}').style.display==='none'?'block':'none'">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <span style="font-size:9px;font-weight:700;color:${cc.text}">${woNum.replace('WO-','')}</span>
              <span style="display:flex;gap:3px;align-items:center">
                ${state.showPMBadges && wo?.isPM ? '<span style="background:#17A2B8;color:white;font-size:6px;padding:1px 3px;border-radius:2px">PM</span>' : ''}
                <span style="font-size:8px;font-weight:600;color:${pColor}">P${wo?.priority||'?'}</span>
                <span style="font-size:8px;color:${allDone?'#28A745':anyInProg?'#F0AD4E':anyPool?'#17A2B8':'var(--text-secondary)'}">${allDone?'✓':anyInProg?'▶':anyPool?'◉':'●'}</span>
              </span>
            </div>
            <div style="font-size:8px;color:var(--text-primary);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${wo?.description || ''}">${wo?.description || ''}</div>
            <div style="font-size:7px;color:var(--text-muted);margin-top:1px">${wo?.asset || ''}</div>
            <div style="font-size:8px;color:var(--text-secondary);margin-top:1px;display:flex;justify-content:space-between;align-items:center">
              <span>${opsCount} op${opsCount>1?'s':''} • ${woHrs}h${anyPool ? ' • <span style="color:#17A2B8">pool</span>' : ''}</span>
              <span style="display:flex;gap:2px" onclick="event.stopPropagation()">
                <button style="background:none;border:1px solid var(--border);border-radius:3px;color:var(--text-secondary);cursor:pointer;font-size:8px;padding:0 3px;line-height:14px" onclick="moveResourceWO('${woNum}','${craft}','${date}',-7)" title="Move to previous week">◀ wk</button>
                <button style="background:none;border:1px solid var(--border);border-radius:3px;color:var(--text-secondary);cursor:pointer;font-size:8px;padding:0 3px;line-height:14px" onclick="moveResourceWO('${woNum}','${craft}','${date}',7)" title="Move to next week">wk ▶</button>
              </span>
            </div>
          </div>
          <div id="${expandId}" style="display:none;margin-top:-2px;margin-bottom:4px">`;
          
          // Expanded ops detail
          assigns.forEach(a => {
            const op = allOps.find(o => o.woNumber === a.woNumber && o.opSeq === a.opSeq);
            if (!op) return;
            const isDone = a.status === 'Complete';
            const isPool = isPoolAssignment(a);
            html += `<div style="background:var(--bg-base);border:1px solid var(--border);border-radius:3px;padding:3px 5px;margin-top:2px;font-size:8px;display:flex;justify-content:space-between;align-items:center">
              <span style="color:var(--text-primary)">Op ${op.opSeq}: ${op.description.substring(0,25)}${op.description.length>25?'…':''}</span>
              <span style="display:flex;gap:4px;align-items:center">
                <span style="color:var(--text-secondary)">${isPool ? '<span style="color:#17A2B8">Pool</span>' : a.employeeName.split(' ')[0]}</span>
                <span style="color:var(--accent);font-weight:600">${a.hours}h</span>
                ${isPool ? `<button style="background:none;border:none;color:#17A2B8;cursor:pointer;font-size:9px;padding:0" onclick="event.stopPropagation();promoteToEmployee('${a.id}')" title="Assign employee">👤</button>` : ''}
                <button style="background:none;border:none;color:#DC354566;cursor:pointer;font-size:10px;padding:0" onclick="event.stopPropagation();removeAssignment('${a.id}')">×</button>
              </span>
            </div>`;
          });
          html += `</div>`;
        });
        
        // Capacity bar
        if (dayCap > 0) {
          const barColor = pct > 95 ? '#DC3545' : pct > 75 ? '#F0AD4E' : pct > 0 ? '#28A745' : 'var(--text-muted)';
          html += `<div style="margin-top:auto;padding:2px 4px;font-size:9px;display:flex;align-items:center;gap:4px">
            <div style="flex:1;height:4px;background:var(--cap-bar-bg);border-radius:2px;overflow:hidden">
              <div style="height:100%;width:${Math.min(100, pct)}%;background:${barColor};border-radius:2px"></div>
            </div>
            <span style="color:${barColor};font-weight:600;white-space:nowrap">${dayLoad.toFixed(1)}/${dayCap}h</span>
          </div>`;
        }
        html += `</div>`;
      });
    });
    }

    html += `</div><svg class="dep-svg-overlay" id="dep-lines-svg"></svg></div></div></div></div></div>`;
  }

  // ─── WORK ORDERS VIEW ───
  if (state.view === 'backlog') {
    const filteredWOs = state.workOrders.filter(wo => {
      if (state.filterDept !== 'All' && wo.department !== state.filterDept) return false;
      if (state.filterSupervisor !== 'All' && wo.supervisor !== state.filterSupervisor) return false;
      if (state.filterCraft !== 'All' && !wo.operations.some(op => op.craft === state.filterCraft)) return false;
      return true;
    });
    html += `<div class="content" style="padding:20px">`;

    DEPARTMENTS.forEach(dept => {
      const deptWOs = filteredWOs.filter(wo => wo.department === dept);
      if (!deptWOs.length) return;
      const dc = DEPT_COLORS[dept] || {};
      html += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;margin-top:${dept===DEPARTMENTS[0]?'0':'20'}px;padding:6px 12px;background:${dc.border}18;border-left:3px solid ${dc.badge};border-radius:0 4px 4px 0">
        <span style="font-size:12px;font-weight:700;color:${dc.badge};letter-spacing:1px;text-transform:uppercase">${dept}</span>
        <span style="font-size:10px;color:var(--text-secondary)">${deptWOs.length} work orders</span>
      </div>`;

      deptWOs.forEach(wo => {
        const sched = wo.operations.filter(op => state.assignments.some(a => a.woNumber === wo.woNumber && a.opSeq === op.opSeq)).length;
        const done = wo.operations.filter(op => state.assignments.some(a => a.woNumber === wo.woNumber && a.opSeq === op.opSeq && a.status === 'Complete')).length;
        const pColor = wo.priority <= 2 ? '#DC3545' : wo.priority <= 3 ? '#F0AD4E' : 'var(--text-secondary)';
        html += `<div class="wo-card">
          <div class="wo-header">
            <div><span class="wo-number">${wo.woNumber}</span><span class="wo-desc">${wo.description}</span></div>
            <div style="display:flex;gap:6px;align-items:center">
              <span class="badge" style="background:${dc.badge}22;color:${dc.badge};border:1px solid ${dc.badge}44">${dept}</span>
              <span class="badge" style="background:${pColor}22;color:${pColor};border:1px solid ${pColor}44">P${wo.priority} ${PRIORITY[wo.priority]}</span>
              ${state.showPMBadges ? (wo.isPM ? `<span class="badge" style="background:#17A2B822;color:#17A2B8;border:1px solid #17A2B844">PM</span>` : `<span class="badge" style="background:#6C757D22;color:#6C757D;border:1px solid #6C757D44">${wo.woType||'CM'}</span>`) : ''}
              <span style="font-size:10px;color:var(--text-secondary)">${sched}/${wo.operations.length} sched</span>
              ${done > 0 ? `<span style="font-size:10px;color:#28A745">${done} done</span>` : ''}
            </div>
          </div>
          <div class="wo-meta">Asset: ${wo.asset} (${wo.assetDesc}) &bull; Type: ${wo.woType || 'CM'}${wo.isPM ? ' (Planned Maintenance)' : ''} &bull; Window: ${fmtDate(wo.scheduledStart)} – ${fmtDate(wo.scheduledEnd)} &bull; Supervisor: ${wo.supervisor}</div>
          <table class="wo-table"><thead><tr>
            <th>Op</th><th>Description</th><th>Resource</th><th style="text-align:center">Est Hrs</th><th>Dependencies</th><th style="text-align:center">Status</th><th>Assigned To</th>
          </tr></thead><tbody>`;
        wo.operations.forEach(op => {
          const a = state.assignments.find(x => x.woNumber === wo.woNumber && x.opSeq === op.opSeq);
          const stColor = a ? (a.status==='Complete'?'#28A745':a.status==='In Progress'?'#F0AD4E':'#007BFF') : '#ADB5BD';
          const stText = a ? a.status : 'Unscheduled';
          const deps = op.dependencies || [];
          const depDisplay = deps.length > 0 ? deps.map(d => {
            const dA = state.assignments.find(x => x.woNumber === wo.woNumber && x.opSeq === d);
            const col = dA ? (dA.status === 'Complete' ? '#28A745' : '#007BFF') : '#DC3545';
            return `<span style="color:${col};font-size:10px">Op${d}${dA?'✓':'✕'}</span>`;
          }).join(' ') : '<span style="color:var(--text-muted);font-size:10px">none (parallel)</span>';
          html += `<tr>
            <td style="font-weight:600">${op.opSeq}</td><td>${op.description}</td>
            <td><span class="tag" style="background:${gc(op.craft).badge}">${op.craft}</span></td>
            <td style="text-align:center">${op.estHours}</td>
            <td>${depDisplay}</td>
            <td style="text-align:center"><span class="badge" style="background:${stColor}22;color:${stColor};border:1px solid ${stColor}44">${stText}</span></td>
            <td>${a ? a.employeeName + ' (' + fmtDate(a.date) + ')' : '—'}</td>
          </tr>`;
        });
        html += `</tbody></table></div>`;
      });
    });
    html += `</div>`;
  }

  // ─── EMPLOYEES VIEW ───
  if (state.view === 'employees') {
    const filteredEmps = state.employees.filter(e => {
      if (state.filterDept !== 'All' && e.department !== state.filterDept) return false;
      if (state.filterCraft !== 'All' && e.craft !== state.filterCraft) return false;
      if (state.filterEmployee !== 'All' && e.name !== state.filterEmployee) return false;
      if (state.filterSupervisor !== 'All' && e.supervisor !== state.filterSupervisor) return false;
      return true;
    });
    html += `<div class="content" style="padding:20px">`;

    DEPARTMENTS.forEach(dept => {
      const deptEmps = filteredEmps.filter(e => e.department === dept);
      if (!deptEmps.length) return;
      const dc = DEPT_COLORS[dept] || {};
      html += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;margin-top:${dept===DEPARTMENTS[0]?'0':'20'}px;padding:6px 12px;background:${dc.border}18;border-left:3px solid ${dc.badge};border-radius:0 4px 4px 0">
        <span style="font-size:12px;font-weight:700;color:${dc.badge};letter-spacing:1px;text-transform:uppercase">${dept}</span>
        <span style="font-size:10px;color:var(--text-secondary)">${deptEmps.length} employees</span>
      </div>
      <div class="emp-cards" style="margin-bottom:8px">`;

      deptEmps.forEach(emp => {
        const wk = getEmpWeekLoad(emp.name);
        const mx = getEmpWeekAvail(emp.name);
        const defaultMx = 6 * emp.hoursPerDay;
        const hasOverrides = mx !== defaultMx;
        const pct = mx > 0 ? (wk/mx)*100 : 0;
        const cls = pct > 85 ? 'yellow' : mx === 0 ? 'neutral' : 'green';
        html += `<div class="emp-card" style="border-left:3px solid ${dc.badge}">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
            <span class="emp-card-name">${emp.name}${hasOverrides ? ' <span style="font-size:9px;color:#F0AD4E">⏰</span>' : ''}</span>
            <span style="display:flex;gap:3px">
              <span class="tag" style="background:${dc.badge};font-size:8px">${dept}</span>
              <span class="tag" style="background:${gc(emp.craft).badge}">${emp.craft}</span>
            </span>
          </div>
          <div class="emp-card-info">Skills: ${emp.skills}</div>
          <div class="emp-card-info">Supervisor: ${emp.supervisor}</div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px">
            <span style="font-size:11px;color:var(--text-primary)">${wk.toFixed(1)}h / ${mx}h this week${hasOverrides ? ' ⏰' : ''}</span>
            <span style="font-size:11px;font-weight:700;color:${pct>85?'#F0AD4E':'#28A745'}">${pct.toFixed(0)}%</span>
          </div>
          <div class="cap-bar" style="margin-top:6px"><div class="cap-fill ${cls}" style="width:${Math.min(pct,100)}%"></div></div>
        </div>`;
      });
      html += `</div>`;
    });
    html += `</div>`;
  }

  // ─── CAPACITY VIEW ───
  if (state.view === 'capacity') {
    const totalSched = state.assignments.reduce((s,a) => s+a.hours, 0);
    const totalAvail = dates.length * Object.values(state.craftConfig).reduce((s,c) => s + c.headcount*c.hoursPerDay, 0);
    html += `<div class="content" style="padding:20px">
      <div class="stat-cards">
        <div class="stat-card"><div class="stat-value">${totalSched.toFixed(0)}</div><div class="stat-label">Scheduled Hours</div></div>
        <div class="stat-card"><div class="stat-value">${totalAvail}</div><div class="stat-label">Available Hours</div></div>
        <div class="stat-card"><div class="stat-value">${totalAvail>0?((totalSched/totalAvail)*100).toFixed(0)+'%':'N/A'}</div><div class="stat-label">Utilization</div></div>
      </div>`;

    // Capacity tables grouped by department
    const capDepts = state.filterDept === 'All' ? DEPARTMENTS : [state.filterDept];
    capDepts.forEach(dept => {
      let deptConfigs = Object.entries(state.craftConfig).filter(([k,v]) => v.dept === dept);
      if (state.filterCraft !== 'All') deptConfigs = deptConfigs.filter(([k,v]) => v.resource === state.filterCraft);
      if (!deptConfigs.length) return;
      const dc = DEPT_COLORS[dept] || {};

      html += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;margin-top:20px;padding:6px 12px;background:${dc.border}18;border-left:3px solid ${dc.badge};border-radius:0 4px 4px 0">
        <span style="font-size:12px;font-weight:700;color:${dc.badge};letter-spacing:1px;text-transform:uppercase">${dept}</span>
      </div>`;

      html += `<table class="cap-table"><thead><tr><th style="text-align:left">Dept / Resource</th>`;
      dates.forEach((d,i) => { html += `<th>${DAY_ABR[i]} ${fmtDate(d)}</th>`; });
      html += `<th class="week-total">Week Total</th></tr></thead><tbody>`;

      deptConfigs.forEach(([key, cfg]) => {
        const cc = gc(cfg.resource);
        const weekSched = dates.reduce((s,d) => s + getDeptCraftCap(dept, cfg.resource, d).scheduled, 0);
        const weekAvail = dates.length * cfg.headcount * cfg.hoursPerDay;
        html += `<tr><td><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${cc.badge};margin-right:8px;vertical-align:middle"></span><span style="font-weight:600">${cfg.resource}</span> <span style="color:var(--text-secondary);font-size:10px">(${cfg.headcount}×${cfg.hoursPerDay}h)</span></td>`;
        dates.forEach(d => {
          const cap = getDeptCraftCap(dept, cfg.resource, d);
          const col = cap.utilization > 100 ? '#DC3545' : cap.utilization > 85 ? '#F0AD4E' : cap.utilization > 0 ? '#28A745' : 'var(--text-secondary)';
          const cls = cap.utilization > 100 ? 'red' : cap.utilization > 85 ? 'yellow' : 'green';
          html += `<td><div style="color:${col};font-weight:600">${cap.scheduled.toFixed(1)}/${cap.available}</div>
            <div class="cap-bar" style="width:80%;margin:4px auto 0"><div class="cap-fill ${cls}" style="width:${Math.min(cap.utilization,100)}%"></div></div>
            <div style="font-size:9px;color:var(--text-secondary)">${cap.utilization.toFixed(0)}%</div></td>`;
        });
        html += `<td style="font-weight:700">${weekSched.toFixed(1)}/${weekAvail}h</td></tr>`;
      });
      html += `</tbody></table>`;
    });

    // Employee Availability
    html += `<div class="section-title" style="margin-top:24px">Employee Availability — Week of ${fmtDate(dates[0])}</div>`;
    const capDepts2 = state.filterDept === 'All' ? DEPARTMENTS : [state.filterDept];
    capDepts2.forEach(dept => {
      let deptEmps = state.employees.filter(e => e.department === dept);
      if (state.filterCraft !== 'All') deptEmps = deptEmps.filter(e => e.craft === state.filterCraft);
      if (state.filterEmployee !== 'All') deptEmps = deptEmps.filter(e => e.name === state.filterEmployee);
      if (state.filterSupervisor !== 'All') deptEmps = deptEmps.filter(e => e.supervisor === state.filterSupervisor);
      if (!deptEmps.length) return;
      const dc = DEPT_COLORS[dept] || {};

      html += `<div style="font-size:11px;font-weight:700;color:${dc.badge};margin:12px 0 6px;letter-spacing:0.5px">${dept}</div>`;
      html += `<table class="cap-table"><thead><tr><th style="text-align:left">Employee</th><th>Craft</th>`;
      dates.forEach((d,i) => html += `<th>${DAY_ABR[i]} ${fmtDate(d)}</th>`);
      html += `<th class="week-total">Week</th><th></th></tr></thead><tbody>`;

      deptEmps.forEach(emp => {
        const wkAvail = getEmpWeekAvail(emp.name);
        const wkLoad = getEmpWeekLoad(emp.name);
        const defaultWk = 6 * emp.hoursPerDay;
        const hasOverrides = wkAvail !== defaultWk;
        html += `<tr><td style="font-weight:600">${emp.name}</td><td><span class="tag" style="background:${gc(emp.craft).badge};font-size:8px">${emp.craft}</span></td>`;
        dates.forEach(d => {
          const avail = getEmpAvailHours(emp.name, d);
          const reason = getEmpAvailReason(emp.name, d);
          const load = getEmpLoad(emp.name, d);
          const isOff = avail === 0 && state.availability[emp.name+'|'+d] !== undefined;
          const isReduced = avail < emp.hoursPerDay && avail > 0 && state.availability[emp.name+'|'+d] !== undefined;
          html += `<td style="text-align:center;${isOff ? 'background:#DC354512;color:#DC3545' : isReduced ? 'background:#F0AD4E12;color:#F0AD4E' : ''}">`;
          if (isOff) {
            html += `<div style="font-size:10px;font-weight:600">OFF</div><div style="font-size:8px">${reason || ''}</div>`;
          } else if (isReduced) {
            html += `<div style="font-size:10px;font-weight:600">${avail}h</div><div style="font-size:8px">${reason || ''}</div>`;
          } else {
            html += `<div style="font-size:10px;color:var(--text-secondary)">${avail}h</div>`;
          }
          if (load > 0) html += `<div style="font-size:8px;color:${load > avail ? '#DC3545' : '#28A745'}">${load.toFixed(1)}h used</div>`;
          html += `</td>`;
        });
        html += `<td style="text-align:center;font-weight:700;${hasOverrides ? 'color:#F0AD4E' : ''}">${wkAvail}/${defaultWk}h</td>`;
        html += `<td><button class="btn-outline" style="font-size:9px;padding:2px 8px" onclick="showAvailModal('${emp.name}')">Edit</button></td></tr>`;
      });
      html += `</tbody></table>`;
    });

    // Config
    html += `<div class="section-title" style="margin-top:24px">Department / Resource Configuration</div>`;
    DEPARTMENTS.forEach(dept => {
      const deptConfigs = Object.entries(state.craftConfig).filter(([k,v]) => v.dept === dept);
      if (!deptConfigs.length) return;
      const dc = DEPT_COLORS[dept] || {};
      html += `<div style="font-size:11px;font-weight:700;color:${dc.badge};margin:12px 0 6px;letter-spacing:0.5px">${dept}</div>`;
      deptConfigs.forEach(([key, cfg]) => {
        html += `<div class="config-row">
          <span class="tag" style="background:${gc(cfg.resource).badge};min-width:80px;text-align:center">${cfg.resource}</span>
          <label>Headcount:</label>
          <input type="number" min="0" max="20" value="${cfg.headcount}" onchange="state.craftConfig['${key}'].headcount=parseInt(this.value)||0;render()">
          <label>Hrs/Day:</label>
          <input type="number" min="1" max="16" value="${cfg.hoursPerDay}" onchange="state.craftConfig['${key}'].hoursPerDay=parseFloat(this.value)||8;render()">
        </div>`;
      });
    });
    html += `</div>`;
  }

  // ─── EXECUTIVE SUMMARY VIEW ───
  if (state.view === 'summary') {
    const dates = getWeekDates();
    const dateSet = new Set(dates);
    const allOps = getAllOps();
    const totalOps = allOps.length;
    
    // Filter assignments to current week only
    const weekAssignments = state.assignments.filter(a => dateSet.has(a.date));
    const allAssignments = state.assignments;
    
    const scheduledOps = weekAssignments.length;
    const unscheduledOps = totalOps - allAssignments.length; // true backlog = never assigned anywhere
    const completedOps = weekAssignments.filter(a => a.status === 'Complete').length;
    const inProgressOps = weekAssignments.filter(a => a.status === 'In Progress').length;
    const scheduledOnlyOps = weekAssignments.filter(a => a.status === 'Scheduled').length;
    
    // PM / CM breakdown
    const pmWOs = state.workOrders.filter(w => w.isPM);
    const cmWOs = state.workOrders.filter(w => !w.isPM);
    const pmOps = allOps.filter(o => o.isPM);
    const cmOps = allOps.filter(o => !o.isPM);
    const pmWeekAssign = weekAssignments.filter(a => { const op = allOps.find(o => o.woNumber === a.woNumber && o.opSeq === a.opSeq); return op && op.isPM; });
    const cmWeekAssign = weekAssignments.filter(a => { const op = allOps.find(o => o.woNumber === a.woNumber && o.opSeq === a.opSeq); return op && !op.isPM; });
    const pmComplete = pmWeekAssign.filter(a => a.status === 'Complete').length;
    const cmComplete = cmWeekAssign.filter(a => a.status === 'Complete').length;
    const pmHours = pmWeekAssign.reduce((s,a) => s + a.hours, 0);
    const cmHours = cmWeekAssign.reduce((s,a) => s + a.hours, 0);
    
    const totalSchedHours = weekAssignments.reduce((s,a) => s + a.hours, 0);
    const totalAvailHours = state.employees.reduce((s,e) => s + dates.reduce((s2,d) => s2 + getEmpAvailHours(e.name, d), 0), 0);
    const utilization = totalAvailHours > 0 ? (totalSchedHours / totalAvailHours * 100) : 0;
    const weekBacklogOps = totalOps - allAssignments.length;
    const totalBacklogHours = allOps.filter(o => !allAssignments.some(a => a.woNumber === o.woNumber && a.opSeq === o.opSeq)).reduce((s,o) => s + o.estHours, 0);
    
    // Compliance: overdue = past scheduled end but not complete
    const today = new Date().toISOString().slice(0,10);
    const overdueWOs = state.workOrders.filter(wo => wo.scheduledEnd && wo.scheduledEnd < today && !wo.operations.every(op => allAssignments.some(a => a.woNumber === wo.woNumber && a.opSeq === op.opSeq && a.status === 'Complete')));
    const atRiskOps = weekAssignments.filter(a => {
      const wo = state.workOrders.find(w => w.woNumber === a.woNumber);
      return wo && wo.scheduledEnd && a.date > wo.scheduledEnd;
    });
    
    // By department — scoped to this week
    const deptStats = {};
    DEPARTMENTS.forEach(dept => {
      const deptOps = allOps.filter(o => o.department === dept);
      const deptAssign = weekAssignments.filter(a => {
        const op = allOps.find(o => o.woNumber === a.woNumber && o.opSeq === a.opSeq);
        return op && op.department === dept;
      });
      const deptComplete = deptAssign.filter(a => a.status === 'Complete');
      const deptIP = deptAssign.filter(a => a.status === 'In Progress');
      const deptHours = deptAssign.reduce((s,a) => s + a.hours, 0);
      const deptAvail = state.employees.filter(e => e.department === dept).reduce((s,e) => s + dates.reduce((s2,d) => s2 + getEmpAvailHours(e.name, d), 0), 0);
      deptStats[dept] = { total: deptOps.length, scheduled: deptAssign.length, complete: deptComplete.length, inProgress: deptIP.length, hours: deptHours, avail: deptAvail };
    });
    
    // By supervisor — scoped to this week
    const supStats = {};
    state.workOrders.forEach(wo => {
      const sup = wo.supervisor || 'Unassigned';
      if (!supStats[sup]) supStats[sup] = { wos: 0, ops: 0, scheduled: 0, complete: 0, inProgress: 0, hours: 0 };
      supStats[sup].wos++;
      wo.operations.forEach(op => {
        supStats[sup].ops++;
        const a = weekAssignments.find(x => x.woNumber === wo.woNumber && x.opSeq === op.opSeq);
        if (a) {
          supStats[sup].scheduled++;
          supStats[sup].hours += a.hours;
          if (a.status === 'Complete') supStats[sup].complete++;
          if (a.status === 'In Progress') supStats[sup].inProgress++;
        }
      });
    });
    
    // By priority — scoped to this week
    const prioStats = {};
    [1,2,3,4,5].forEach(p => {
      const pWOs = state.workOrders.filter(w => w.priority === p);
      const pOps = pWOs.flatMap(w => w.operations);
      const pAssigned = pOps.filter(op => weekAssignments.some(a => a.woNumber === pWOs.find(w => w.operations.includes(op))?.woNumber && a.opSeq === op.opSeq));
      prioStats[p] = { wos: pWOs.length, ops: pOps.length, assigned: pAssigned.length };
    });

    const dc = d => DEPT_COLORS[d] || { badge:'#6C757D' };
    
    html += `<div class="content" style="padding:20px;overflow:auto">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
        <div>
          <h2 style="margin:0;font-size:18px;color:var(--text-primary)">Executive Summary</h2>
          <div style="font-size:11px;color:var(--text-secondary)">Week of ${fmtDate(dates[0])} — ${fmtDate(dates[dates.length-1])}</div>
        </div>
        <button class="btn-outline btn-outline-orange" style="font-size:11px;padding:6px 14px" onclick="exportSchedule()">↓ Export to Excel</button>
      </div>

      <!-- KPI Cards — This Week -->
      <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:24px">
        <div class="stat-card" style="border-top:3px solid #007BFF"><div class="stat-value" style="color:#007BFF">${state.workOrders.length}</div><div class="stat-label">Work Orders</div></div>
        <div class="stat-card" style="border-top:3px solid #17A2B8"><div class="stat-value" style="color:#17A2B8">${scheduledOps}</div><div class="stat-label">This Week Ops</div></div>
        <div class="stat-card" style="border-top:3px solid #F0AD4E"><div class="stat-value" style="color:#F0AD4E">${scheduledOnlyOps}</div><div class="stat-label">Scheduled</div></div>
        <div class="stat-card" style="border-top:3px solid #FF9800"><div class="stat-value" style="color:#FF9800">${inProgressOps}</div><div class="stat-label">In Progress</div></div>
        <div class="stat-card" style="border-top:3px solid #28A745"><div class="stat-value" style="color:#28A745">${completedOps}</div><div class="stat-label">Complete</div></div>
        <div class="stat-card" style="border-top:3px solid #DC3545"><div class="stat-value" style="color:#DC3545">${unscheduledOps}</div><div class="stat-label">Unscheduled</div></div>
      </div>

      <!-- PM vs CM Breakdown -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px">
        <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:16px;border-left:4px solid #17A2B8">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
            <div style="font-size:11px;font-weight:700;color:#17A2B8;text-transform:uppercase;letter-spacing:0.5px">Planned Maintenance (PM)</div>
            <span style="font-size:20px;font-weight:700;color:#17A2B8">${pmWOs.length}</span>
          </div>
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;font-size:10px">
            <div style="text-align:center"><div style="font-size:14px;font-weight:700;color:var(--text-primary)">${pmOps.length}</div><div style="color:var(--text-secondary)">Total Ops</div></div>
            <div style="text-align:center"><div style="font-size:14px;font-weight:700;color:#007BFF">${pmWeekAssign.length}</div><div style="color:var(--text-secondary)">Scheduled</div></div>
            <div style="text-align:center"><div style="font-size:14px;font-weight:700;color:#28A745">${pmComplete}</div><div style="color:var(--text-secondary)">Complete</div></div>
            <div style="text-align:center"><div style="font-size:14px;font-weight:700;color:var(--text-primary)">${pmHours.toFixed(0)}h</div><div style="color:var(--text-secondary)">Hours</div></div>
          </div>
          ${pmOps.length > 0 ? `<div style="background:var(--bg-base);border-radius:4px;height:6px;overflow:hidden;margin-top:8px"><div style="height:100%;width:${(pmWeekAssign.length/pmOps.length*100).toFixed(0)}%;background:#17A2B8;border-radius:4px"></div></div>
          <div style="font-size:9px;color:var(--text-secondary);margin-top:4px">${(pmWeekAssign.length/pmOps.length*100).toFixed(0)}% PM ops scheduled</div>` : ''}
        </div>
        <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:16px;border-left:4px solid #6C757D">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
            <div style="font-size:11px;font-weight:700;color:#6C757D;text-transform:uppercase;letter-spacing:0.5px">Corrective Maintenance (CM)</div>
            <span style="font-size:20px;font-weight:700;color:#6C757D">${cmWOs.length}</span>
          </div>
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;font-size:10px">
            <div style="text-align:center"><div style="font-size:14px;font-weight:700;color:var(--text-primary)">${cmOps.length}</div><div style="color:var(--text-secondary)">Total Ops</div></div>
            <div style="text-align:center"><div style="font-size:14px;font-weight:700;color:#007BFF">${cmWeekAssign.length}</div><div style="color:var(--text-secondary)">Scheduled</div></div>
            <div style="text-align:center"><div style="font-size:14px;font-weight:700;color:#28A745">${cmComplete}</div><div style="color:var(--text-secondary)">Complete</div></div>
            <div style="text-align:center"><div style="font-size:14px;font-weight:700;color:var(--text-primary)">${cmHours.toFixed(0)}h</div><div style="color:var(--text-secondary)">Hours</div></div>
          </div>
          ${cmOps.length > 0 ? `<div style="background:var(--bg-base);border-radius:4px;height:6px;overflow:hidden;margin-top:8px"><div style="height:100%;width:${(cmWeekAssign.length/cmOps.length*100).toFixed(0)}%;background:#6C757D;border-radius:4px"></div></div>
          <div style="font-size:9px;color:var(--text-secondary);margin-top:4px">${(cmWeekAssign.length/cmOps.length*100).toFixed(0)}% CM ops scheduled</div>` : ''}
        </div>
      </div>

      <!-- Utilization + Compliance Row -->
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:24px">
        <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:16px">
          <div style="font-size:10px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px">Resource Utilization</div>
          <div style="text-align:center;margin-bottom:8px">
            <span style="font-size:36px;font-weight:700;color:${utilization > 90 ? '#DC3545' : utilization > 70 ? '#F0AD4E' : utilization > 0 ? '#28A745' : 'var(--text-secondary)'}">${utilization.toFixed(0)}%</span>
          </div>
          <div style="background:var(--bg-base);border-radius:4px;height:8px;overflow:hidden;margin-bottom:8px">
            <div style="height:100%;width:${Math.min(utilization,100)}%;background:${utilization > 90 ? '#DC3545' : utilization > 70 ? '#F0AD4E' : '#28A745'};border-radius:4px;transition:width 0.3s"></div>
          </div>
          <div style="font-size:10px;color:var(--text-secondary)">${totalSchedHours.toFixed(0)}h scheduled of ${totalAvailHours}h available</div>
        </div>

        <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:16px">
          <div style="font-size:10px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px">This Week Progress</div>
          <div style="text-align:center;margin-bottom:8px">
            <span style="font-size:36px;font-weight:700;color:#007BFF">${scheduledOps > 0 ? ((completedOps/scheduledOps)*100).toFixed(0) : 0}%</span>
            <div style="font-size:10px;color:var(--text-secondary)">${completedOps} of ${scheduledOps} ops complete</div>
          </div>
          <div style="background:var(--bg-base);border-radius:4px;height:8px;overflow:hidden;margin-bottom:8px">
            <div style="display:flex;height:100%">
              <div style="width:${scheduledOps>0?((completedOps/scheduledOps)*100):0}%;background:#28A745"></div>
              <div style="width:${scheduledOps>0?((inProgressOps/scheduledOps)*100):0}%;background:#F0AD4E"></div>
              <div style="width:${scheduledOps>0?((scheduledOnlyOps/scheduledOps)*100):0}%;background:#007BFF"></div>
            </div>
          </div>
          <div style="font-size:10px;color:var(--text-secondary)">
            <span style="color:#28A745">■</span> ${completedOps} done &nbsp;
            <span style="color:#F0AD4E">■</span> ${inProgressOps} active &nbsp;
            <span style="color:#007BFF">■</span> ${scheduledOnlyOps} planned
          </div>
        </div>

        <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:16px">
          <div style="font-size:10px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px">Compliance</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;text-align:center">
            <div>
              <div style="font-size:24px;font-weight:700;color:#DC3545">${overdueWOs.length}</div>
              <div style="font-size:9px;color:var(--text-secondary)">Overdue WOs</div>
            </div>
            <div>
              <div style="font-size:24px;font-weight:700;color:#F0AD4E">${atRiskOps.length}</div>
              <div style="font-size:9px;color:var(--text-secondary)">At Risk Ops</div>
            </div>
          </div>
          <div style="font-size:10px;color:var(--text-secondary);margin-top:8px;text-align:center">${totalBacklogHours.toFixed(0)}h remaining backlog</div>
        </div>
      </div>

      <!-- Department Breakdown -->
      <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:16px">
        <div style="font-size:10px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px">By Department</div>
        <table class="cap-table"><thead><tr>
          <th style="text-align:left">Department</th><th>Ops</th><th>Scheduled</th><th>In Progress</th><th>Complete</th><th>Backlog</th><th>Hours</th><th>Utilization</th>
        </tr></thead><tbody>
        ${DEPARTMENTS.map(dept => {
          const s = deptStats[dept]; if (!s) return '';
          const u = s.avail > 0 ? (s.hours/s.avail*100) : 0;
          return `<tr>
            <td><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:${dc(dept).badge};margin-right:8px;vertical-align:middle"></span><strong>${dept}</strong></td>
            <td>${s.total}</td>
            <td style="color:#007BFF">${s.scheduled - s.complete - s.inProgress}</td>
            <td style="color:#F0AD4E">${s.inProgress}</td>
            <td style="color:#28A745">${s.complete}</td>
            <td style="color:#DC3545">${s.total - s.scheduled}</td>
            <td>${s.hours.toFixed(0)}/${s.avail}h</td>
            <td><span style="color:${u > 90 ? '#DC3545' : u > 70 ? '#F0AD4E' : '#28A745'};font-weight:600">${u.toFixed(0)}%</span></td>
          </tr>`;
        }).join('')}
        </tbody></table>
      </div>

      <!-- By Supervisor -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
        <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:16px">
          <div style="font-size:10px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px">By Supervisor</div>
          <table class="cap-table"><thead><tr>
            <th style="text-align:left">Supervisor</th><th>WOs</th><th>Ops</th><th>Sched</th><th>Done</th><th>Hours</th>
          </tr></thead><tbody>
          ${Object.entries(supStats).sort((a,b) => b[1].hours - a[1].hours).map(([sup, s]) => `<tr>
            <td><strong>${sup}</strong></td>
            <td>${s.wos}</td>
            <td>${s.ops}</td>
            <td>${s.scheduled}</td>
            <td style="color:#28A745">${s.complete}</td>
            <td>${s.hours.toFixed(0)}h</td>
          </tr>`).join('')}
          </tbody></table>
        </div>

        <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:16px">
          <div style="font-size:10px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px">By Priority</div>
          <table class="cap-table"><thead><tr>
            <th style="text-align:left">Priority</th><th>WOs</th><th>Ops</th><th>Scheduled</th><th>% Covered</th>
          </tr></thead><tbody>
          ${[1,2,3,4,5].filter(p => prioStats[p].wos > 0).map(p => {
            const s = prioStats[p];
            const pct = s.ops > 0 ? (s.assigned/s.ops*100) : 0;
            const prioColor = p <= 2 ? '#DC3545' : p === 3 ? '#F0AD4E' : '#28A745';
            return `<tr>
              <td><span style="color:${prioColor};font-weight:700">${p}</span> ${PRIORITY[p]}</td>
              <td>${s.wos}</td>
              <td>${s.ops}</td>
              <td>${s.assigned}</td>
              <td><span style="color:${pct >= 100 ? '#28A745' : pct > 50 ? '#F0AD4E' : '#DC3545'};font-weight:600">${pct.toFixed(0)}%</span></td>
            </tr>`;
          }).join('')}
          </tbody></table>
        </div>
      </div>

      ${overdueWOs.length > 0 ? `
      <div style="background:#DC354512;border:1px solid #DC354533;border-radius:8px;padding:16px;margin-bottom:16px">
        <div style="font-size:10px;font-weight:600;color:#DC3545;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">⚠ Overdue Work Orders</div>
        ${overdueWOs.slice(0,10).map(wo => `<div style="font-size:11px;padding:4px 0;border-bottom:1px solid #DC354522;display:flex;gap:8px">
          <strong>${wo.woNumber}</strong>
          <span style="color:var(--text-secondary)">${wo.description}</span>
          <span style="margin-left:auto;color:#DC3545;font-size:10px">Due: ${wo.scheduledEnd}</span>

    <!-- SCHEDULING METHODOLOGY -->

      <table class="guide-table">
        <thead><tr><th>Priority</th><th>Label</th><th>Scheduling Rule</th></tr></thead>
        <tbody>
          <tr><td><span class="guide-badge" style="background:#DC354522;color:#DC3545">P1</span></td><td>Emergency</td><td>Schedule immediately. Takes precedence over all other work. Assign first available qualified resource.</td></tr>

      <div class="guide-h3">PM vs CM Prioritization</div>
      <div class="guide-p">The scheduler uses a two-tier sort: <strong>PM first, then by priority number</strong>. This means a P3 PM will be scheduled before a P3 CM. The rationale is that planned maintenance has compliance windows and regulatory requirements that corrective work typically doesn't.</div>
      <div class="guide-grid">

        <div class="guide-card">

        </div>
      </div>

      <div class="guide-h3">Auto-Scheduler Algorithm</div>
      <div class="guide-p">The auto-scheduler (both local and AI-powered) follows this logic:</div>
      <ol class="guide-ol">
        <li><strong>Filter</strong> — Only considers confirmed WOs and respects active department/craft/type filters</li>
        <li><strong>Sort</strong> — Orders operations: PM before CM → lower priority number first → WO number → op sequence</li>
        <li><strong>Dependency Resolution</strong> — Topological sort ensures predecessor ops are scheduled before dependent ops. Dependent ops are placed on the next day after their predecessor completes.</li>
        <li><strong>Capacity Check</strong> — For each op, finds employees with matching craft. Checks each employee's daily availability (respecting vacation/reduced hours). Assigns to the employee with the most remaining capacity on the earliest valid day.</li>
        <li><strong>Date Window</strong> — Prefers scheduling within the WO's Scheduled Start → End window. Operations scheduled outside this window are flagged with a ⚠ warning.</li>
      </ol>
      <div class="guide-warn"><strong>Important:</strong> Dependencies are hard constraints. An op that depends on Op 10 and Op 20 will never be scheduled before both predecessors are placed. If predecessors can't be scheduled (no matching craft, no capacity), the dependent op stays in the backlog.</div>

      <div class="guide-h3">Dependency Types</div>
      <table class="guide-table">

          <tr><td><span class="guide-badge" style="background:#F0AD4E22;color:#F0AD4E">⇉ Multi-dep</span></td><td>Op 50 depends on Op 30, Op 40</td><td>Must wait for ALL predecessors. Scheduled after the latest predecessor completes.</td></tr>

      <div class="guide-h3">Capacity Model</div>

      <div class="guide-p">Utilization is always calculated against <em>actual available hours</em>, not theoretical max. If an employee has 36h available (one day off), and 32h scheduled, utilization is 89% — not 67%.</div>

// ─── DEPENDENCY LINE DRAWING ───
function drawDepLines() {
  const svg = document.getElementById('dep-lines-svg');
  if (!svg) return;
  
  const wrap = svg.closest('.schedule-grid-wrap');
  if (!wrap) return;
  
  const wrapRect = wrap.getBoundingClientRect();
  svg.setAttribute('width', wrap.scrollWidth);
  svg.setAttribute('height', wrap.scrollHeight);
  svg.style.width = wrap.scrollWidth + 'px';
  svg.style.height = wrap.scrollHeight + 'px';
  
  let lines = '';
  const arrowId = 'dep-arrow';
  
  // Define arrowhead markers
  lines += `<defs>
    <marker id="${arrowId}-ok" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#28A745" class="dep-arrow-head"/>
    </marker>
    <marker id="${arrowId}-violation" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#DC3545" class="dep-arrow-head"/>
    </marker>
    <marker id="${arrowId}-warn" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#F0AD4E" class="dep-arrow-head"/>
    </marker>
  </defs>`;
  
  // Find all scheduled ops and build position map
  const nodes = wrap.querySelectorAll('[data-dep-node]');
  const posMap = {};
  nodes.forEach(el => {
    const key = el.getAttribute('data-dep-node');
    const r = el.getBoundingClientRect();
    posMap[key] = {
      x: r.left - wrapRect.left + wrap.scrollLeft,
      y: r.top - wrapRect.top + wrap.scrollTop,
      w: r.width,
      h: r.height
    };
  });
  
  // Draw lines for each dependency link
  state.workOrders.forEach(wo => {
    wo.operations.forEach(op => {
      if (!op.dependencies || !op.dependencies.length) return;
      const toKey = `${wo.woNumber}:${op.opSeq}`;
      const toPos = posMap[toKey];
      if (!toPos) return;
      
      op.dependencies.forEach(depSeq => {
        const fromKey = `${wo.woNumber}:${depSeq}`;
        const fromPos = posMap[fromKey];
        if (!fromPos) return;
        
        // Determine line status
        const toA = state.assignments.find(a => a.woNumber === wo.woNumber && a.opSeq === op.opSeq);
        const fromA = state.assignments.find(a => a.woNumber === wo.woNumber && a.opSeq === depSeq);
        let lineClass = 'ok';
        if (toA && fromA) {
          if (fromA.date > toA.date) lineClass = 'violation';
          else if (fromA.date === toA.date) lineClass = 'warn';
        }
        
        // Calculate start and end points
        const x1 = fromPos.x + fromPos.w;
        const y1 = fromPos.y + fromPos.h / 2;
        const x2 = toPos.x;
        const y2 = toPos.y + toPos.h / 2;
        
        // Draw curved line
        const dx = Math.abs(x2 - x1);
        const midX = (x1 + x2) / 2;
        
        if (Math.abs(y1 - y2) < 3 && dx < 5) return; // skip if same position
        
        // Use bezier curve for nice routing
        const cpx = dx > 30 ? midX : x1 + 20;
        const path = `M${x1},${y1} C${cpx},${y1} ${cpx},${y2} ${x2},${y2}`;
        
        lines += `<path d="${path}" class="dep-line ${lineClass}" marker-end="url(#${arrowId}-${lineClass})"/>`;
      });
    });
  });
  
  svg.innerHTML = lines;
}

// Also redraw lines when scrolling the grid
document.addEventListener('scroll', () => {
  if (state.view === 'schedule' && state.showDepLines) requestAnimationFrame(() => drawDepLines());
}, true);
